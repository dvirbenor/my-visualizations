3e  built hook precedes session, breaks inserted, not rearranged\u003cbr\u003eSPEAKER_TREATMENT: protect main speaker’s runway, mute stray interjections mid-point, keep\u003cbr\u003e  overlapping reactions for energy, co-hosts edited fairly symmetrically\u003cbr\u003eRULES:\u003cbr\u003e- CUT analogy MUST: When an analogy is explicitly acknowledged as a “relatability” move or\u003cbr\u003e  is immediately challenged as not mapping to the issue at hand.\u003cbr\u003e- CUT floor grab PREFER: When both speakers compete for the next beat (e.g., repeated\u003cbr\u003e  “okay\u002fso\u002flet’s” attempts) and one clean lead can carry the transition alone.\u003cbr\u003e- CUT host throat clearing PREFER: When a speaker restarts a question\u002fsetup with repeated\u003cbr\u003e  conjunctions or partial lead-ins before the other speaker answers.\u003cbr\u003e- CUT numeric detail PREFER: When a specific number\u002frange is floated but not essential to\u003cbr\u003e  the claim and the surrounding sentence works without it.\u003cbr\u003e- KEEP chronological order MUST: For the main conversation once the hosts are in the\u003cbr\u003e  topic, unless a reorder is required to repair a genuine continuity\u002fconfusion problem.\u003cbr\u003e- KEEP banter PREFER: When the banter establishes the relationship\u002froles quickly\u003cbr\u003e  (especially early) and doesn’t delay the first substantive beat for long.\u003cbr\u003e- KEEP crosstalk PREFER: When the overlap functions as conversational momentum (agreement,\u003cbr\u003e  quick completion, shared phrasing) and remains intelligible.\u003cbr\u003e- KEEP story block PREFER: When a long anecdote clearly functions as evidence\u002ftexture for\u003cbr\u003e  the main argument, even if it’s indulgent or banter-heavy.\u003cbr\u003e- MUTE interjection MUST: When a short reaction (e.g., a single word\u002fsyllable) lands on\u003cbr\u003e  top of a key explanatory sentence and doesn’t add meaning.\u003cbr\u003e- REORDER topic blocks AVOID: Avoid clustering by topic if it would break the\u003cbr\u003e  conversational escalation or call-and-response rhythm.\u003cbr\u003e- REORDER highlight hook PREFER: When creating a hook, prefer a non-session cold open (or\u003cbr\u003e  a clearly separated insert) rather than moving later conversation forward.","\u003cb\u003eTen Percent Happier with Dan Harris\u003c\u002fb\u003e\u003cbr\u003eHarvard Business School Professor on Building Trust, Reducing Regret, and the Underrated Power of Oversharing | Leslie John\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaving between turns, low pause tolerance; frequent trims,\u003cbr\u003e  keeps full idea beats intact, episode length not the constraint\u003cbr\u003eCUT_CRITERIA: cuts self-conscious “you can cut” meta, protects vulnerable personal story\u003cbr\u003e  blocks, host setups compressed; guest logic preserved, comedy kept; framing fluff\u003cbr\u003e  trimmed\u003cbr\u003eAUTHENTICITY_POLICY: polished delivery; rough edges selectively kept, profanity allowed\u003cbr\u003e  when expressive, laughs\u002frapport retained, not scrubbed\u003cbr\u003eSTRUCTURE_TEMPLATE: produced intro with thesis framing, music-bedded teases and resets,\u003cbr\u003e  frequent mid-episode sponsor blocks, produced outro with credits + spot\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with tiny stitch reorders, reorders mainly to smooth\u003cbr\u003e  joins, no thematic reshuffling\u003cbr\u003eSPEAKER_TREATMENT: guest protected; host tightened hardest, backchannels muted more than\u003cbr\u003e  cut, guest monologues kept uninterrupted\u003cbr\u003eRULES:\u003cbr\u003e- CUT self editing meta MUST: When a speaker flags that they’re rambling, offers\u003cbr\u003e  permission to cut, or discusses what will be cut\u002fkept, unless it is needed to clarify\u003cbr\u003e  stakes or meaning.\u003cbr\u003e- CUT host preface stack PREFER: When the host piles qualifiers (“let me back up \u002f\u003cbr\u003e  logically \u002f order of operations \u002f promo again”) before the actual question, unless it is\u003cbr\u003e  necessary to reframe a complex transition.\u003cbr\u003e- CUT host ramble PREFER: When the host is mid-riff or adding extra context after the\u003cbr\u003e  point is already understood, unless it directly sets up a concrete next question or\u003cbr\u003e  produces a clear comedic payoff.\u003cbr\u003e- CUT redundant restatement PREFER: When a point is immediately restated by the same\u003cbr\u003e  speaker (summary → summary again), unless the second pass introduces a sharper phrase\u003cbr\u003e  that becomes a transition into the next topic.\u003cbr\u003e- KEEP chronological topic progression MUST: When a section is already coherent, even if\u003cbr\u003e  slightly digressive—avoid moving large blocks to “improve” argument structure.\u003cbr\u003e- KEEP guest emotional peak MUST: When the guest reaches an emotional or insight peak in a\u003cbr\u003e  personal story, even if messy or long, unless it repeats the same point without new\u003cbr\u003e  detail.\u003cbr\u003e- KEEP guest personal confession arc PREFER: When the guest moves into a sensitive\u003cbr\u003e  personal narrative that illustrates the thesis (even if long), unless it becomes\u003cbr\u003e  repetitious after the emotional\u002finsight peak.\u003cbr\u003e- KEEP tangent with payoff PREFER: When an anecdote\u002ftangent quickly returns to the core\u003cbr\u003e  theme and earns a laugh or a clarifying takeaway; otherwise treat it as expendable.\u003cbr\u003e- MUTE guest backchannel PREFER: When the host is narrating or asking a multi-clause\u003cbr\u003e  question and the guest’s brief agreement overlaps, unless it contributes to a comedic\u003cbr\u003e  beat or explicit permission to proceed.\u003cbr\u003e- MUTE host backchannel PREFER: When the guest is in a sustained explanation and the host\u003cbr\u003e  adds short affirmations (mm-hmm\u002fyeah), unless the backchannel is functioning as an\u003cbr\u003e  audible handoff to a new question.\u003cbr\u003e- REORDER lead in phrase PREFER: When a short host lead-in or clause can be pulled\u003cbr\u003e  earlier\u002flater (single sentence scale) to restore a clean setup after a cut or to\u003cbr\u003e  eliminate an orphaned fragment.\u003cbr\u003e- REORDER post break reentry PREFER: When returning from an external insert, reorder a\u003cbr\u003e  brief recap\u002fquestion so the first post-break line re-orients immediately.","\u003cb\u003eThe Richard Robbins Show\u003c\u002fb\u003e\u003cbr\u003eAt Capacity? When and How to Scale Before Burnout Derails Your Business | A LIVE Coaching Session\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light overall compression, few big-block removals, long coaching runs\u003cbr\u003e  preserved, breathing room via added pads\u003cbr\u003eCUT_CRITERIA: cuts insider-framework explanations first, removes time-stamping and dating\u003cbr\u003e  talk, trims extended pleasantries\u002fsetup chatter, keeps vulnerability and mindset beats\u003cbr\u003eAUTHENTICITY_POLICY: conversational rough edges tolerated, allows some repetition for\u003cbr\u003e  emphasis, self-deprecation kept intact\u003cbr\u003eSTRUCTURE_TEMPLATE: very short branded music open, premise-to-problem quickly, soft music-\u003cbr\u003e  supported landing\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved, no thematic reshuffling, cuts stay as contiguous\u003cbr\u003e  blocks\u003cbr\u003eSPEAKER_TREATMENT: protects the coach’s full explanations, non-essential guest speech is\u003cbr\u003e  expendable, minimal muting; mostly hard cuts\u003cbr\u003eRULES:\u003cbr\u003e- CUT extended intro pleasantries MUST: During the opening minutes, when greetings,\u003cbr\u003e  compliments, studio\u002fsetup admiration, or 'great to be here' exchanges delay the start of\u003cbr\u003e  the coaching problem definition.\u003cbr\u003e- CUT insider framework explainer MUST: When the conversation shifts into defining\u003cbr\u003e  internal jargon\u002fframeworks (profiles, terminology, program mechanics) without\u003cbr\u003e  immediately producing a concrete next action for the listener.\u003cbr\u003e- CUT post session debrief MUST: After the apparent close\u002fthank-you, when the speakers\u003cbr\u003e  slip into 'off-mic' wrap-up (who coaches whom, behind-the-scenes next steps, compliments\u003cbr\u003e  on performance).\u003cbr\u003e- CUT guest polite echoes PREFER: When the guest is agreeing\u002fcomplimenting or offering\u003cbr\u003e  brief confirmations that do not add new constraints, data, or an objection that advances\u003cbr\u003e  the coaching.\u003cbr\u003e- CUT redundant recap before next step PREFER: When a speaker restates the setup or\u003cbr\u003e  repeats the plan immediately before moving into the same plan again; prefer a straight\u003cbr\u003e  jump into the next actionable step rather than reordering.\u003cbr\u003e- CUT time stamp context PREFER: When speakers mention the recording date\u002fseason\u002fyear or\u003cbr\u003e  otherwise 'date' the conversation, unless it is necessary for factual comprehension of\u003cbr\u003e  advice.\u003cbr\u003e- KEEP chronological flow MUST: By default, unless a reorder is required to fix confusion\u003cbr\u003e  created by a cut (e.g., references to removed material).\u003cbr\u003e- KEEP emotional stakes and limiting beliefs MUST: When the guest names capacity\u002fburnout,\u003cbr\u003e  fear, ego, self-importance, or a breakthrough realization—even if phrased\u003cbr\u003e  imperfectly—because it motivates the tactical plan that follows.\u003cbr\u003e- KEEP host coaching monologue MUST: When the host is laying out a multi-step rationale\u003cbr\u003e  (trade-offs, math, examples, scripts) that leads directly to a concrete action plan.\u003cbr\u003e- MUTE brief interruptions PREFER: When a short interjection overlaps or punctures an\u003cbr\u003e  otherwise clean run from the main speaker and removing it does not change meaning.\u003cbr\u003e- REORDER clarity fix only AVOID: Only when a section’s meaning depends on a later\u003cbr\u003e  definition\u002fexample and the episode would otherwise feel internally inconsistent after\u003cbr\u003e  trims.","\u003cb\u003eMac Power Users\u003c\u002fb\u003e\u003cbr\u003e838: iPhone Setup Showdown\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between clauses, macro blocks removed wholesale,\u003cbr\u003e  conversation density prioritized over polish, comfortable leaving real-time pace\u003cbr\u003eCUT_CRITERIA: cuts on-air production coordination, cuts side chatter without payoff, keeps\u003cbr\u003e  friendly ribbing and rapport, keeps detailed how-i-use-it walkthroughs\u003cbr\u003eAUTHENTICITY_POLICY: natural co-host looseness preserved, edits stay mostly invisible,\u003cbr\u003e  stumbles lightly cleaned, not sterilized, overlap tolerated, then tamed\u003cbr\u003eSTRUCTURE_TEMPLATE: music-bedded show open, midroll sponsors as chapter breaks, clean\u003cbr\u003e  segment handoffs via host prompts, hard stop after outro cta\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, no thematic reshuffling, external inserts\u003cbr\u003e  used over reorders\u003cbr\u003eSPEAKER_TREATMENT: symmetric co-host trimming, backchannels muted rather than cut,\u003cbr\u003e  protects the active speaker’s runway, allows some crosstalk for energy\u003cbr\u003eRULES:\u003cbr\u003e- CUT environmental interruption block MUST: When an external interruption (noise,\u003cbr\u003e  waiting, pausing, acknowledging the interruption) derails the conversation into a\u003cbr\u003e  holding pattern rather than content progression.\u003cbr\u003e- CUT host self edit markers MUST: When a host verbalizes editing\u002fnavigation like ‘edit\u003cbr\u003e  point’, ‘hold on’, ‘did you get it’, or ‘let me swap this’, unless it is necessary to\u003cbr\u003e  understand a later reference.\u003cbr\u003e- CUT on air production talk MUST: Whenever the hosts discuss edit points, where to place\u003cbr\u003e  breaks, who introduces ads, or any other behind-the-scenes assembly decisions, even if\u003cbr\u003e  it happens mid-conversation.\u003cbr\u003e- CUT tool name repetition PREFER: When a point is already established and the speaker re-\u003cbr\u003e  states the same claim or restarts a sentence without adding a new detail or example.\u003cbr\u003e- KEEP crosstalk reaction PREFER: When overlap conveys humor, disbelief, or shared\u003cbr\u003e  excitement and remains intelligible without requiring the listener to rewind.\u003cbr\u003e- KEEP host teasing banter PREFER: When the ribbing is directly tied to an ongoing show\u003cbr\u003e  premise or becomes a recurring callback that sustains the segment’s energy.\u003cbr\u003e- MUTE backchannel under active speaker PREFER: When one host is mid-explanation and the\u003cbr\u003e  other adds short affirmations (e.g., ‘yeah’, ‘right’, ‘mm-hmm’) that don’t change\u003cbr\u003e  meaning and compete for clarity.\u003cbr\u003e- REORDER topic blocks AVOID: Only when a recorded ordering mistake creates confusion\u003cbr\u003e  (e.g., a reference to a screenshot\u002fsegment that hasn’t been introduced yet) and cannot\u003cbr\u003e  be solved with a trim or a short clarifying insert.","\u003cb\u003eFriends Per Second\u003c\u002fb\u003e\u003cbr\u003eWhy Resident Evil Requiem is absolutely peak ft. TheSphereHunter (FPS #89)\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light macro-cut; heavy micro-shave, keeps most session content, minimal\u003cbr\u003e  silence trimming; pace via word-level cuts, episode length expands via inserts\u003cbr\u003eCUT_CRITERIA: cuts logistics; keeps the real talk, protects long argument runs, banter\u003cbr\u003e  survives, but is de-fluffed, off-topic cold-open anecdotes dropped\u003cbr\u003eAUTHENTICITY_POLICY: cleans clutter, keeps personality, profanity and candid tone\u003cbr\u003e  retained, mistakes sometimes left in, crosstalk energy not fully sanitized\u003cbr\u003eSTRUCTURE_TEMPLATE: produced sponsor-led open, early hook before formal intro, mid-episode\u003cbr\u003e  guest block with setup, music beds around transitions\u003cbr\u003eREORDER_ASSEMBLY: chronology-first; micro-reorders only, single small shift to sharpen\u003cbr\u003e  entry, reorders used to remove repetition, segment boundaries prioritized over timeline\u003cbr\u003e  purity\u003cbr\u003eSPEAKER_TREATMENT: primary speaker continuity protected, backchannels often muted, not\u003cbr\u003e  cut, overlap kept when it’s laughter\u002fenergy, all-host panel edited fairly evenly\u003cbr\u003eRULES:\u003cbr\u003e- CUT meta planning MUST: When the speakers discuss run-of-show logistics (ad counts,\u003cbr\u003e  interview setup, what to do after a segment) rather than content intended for the\u003cbr\u003e  audience.\u003cbr\u003e- CUT redundant micro words MUST: When single words\u002fshort fragments (‘like’, ‘just’,\u003cbr\u003e  ‘what’, etc.) add no meaning or comedic timing and can be removed without changing the\u003cbr\u003e  sentence structure.\u003cbr\u003e- CUT interruption false start PREFER: When a speaker starts to interject but abandons it\u003cbr\u003e  or repeats the same short entry multiple times during someone else’s turn.\u003cbr\u003e- CUT off topic anecdote PREFER: When an early-session or between-topic story doesn’t\u003cbr\u003e  connect back to the episode’s theme or next beat, especially if it functions as private\u003cbr\u003e  banter.\u003cbr\u003e- KEEP bit payoff banter PREFER: When a joke\u002fpile-on clearly pays off (shared laugh,\u003cbr\u003e  callback, or clean transition into the next segment); trim only the extra passes at the\u003cbr\u003e  same beat.\u003cbr\u003e- KEEP long explanatory monologue PREFER: When a speaker is building a multi-step argument\u003cbr\u003e  or framing the stakes, even if it runs long, unless it becomes repetitive; then trim\u003cbr\u003e  only the repetitions.\u003cbr\u003e- KEEP minor mistake correction exchange PREFER: When a small correction (episode number,\u003cbr\u003e  quick fact fix) lands as natural banter and doesn’t derail the topic; trim only if it\u003cbr\u003e  spirals.\u003cbr\u003e- KEEP supportive crosstalk laughter PREFER: When overlap is clearly comedic\u002fsupportive\u003cbr\u003e  (laughs, quick punchline tags) and doesn’t obscure the key words.\u003cbr\u003e- MUTE backchannel affirmations MUST: When a non-primary speaker’s short interjections\u003cbr\u003e  occur under a longer explanation and don’t add distinct meaning (agreement, ‘yeah’,\u003cbr\u003e  ‘mmm’).\u003cbr\u003e- MUTE self-talk under others PREFER: When a speaker’s under-the-breath commentary runs\u003cbr\u003e  beneath another speaker’s main point and creates distraction without payoff.\u003cbr\u003e- REORDER thematic resequence AVOID: When the change would restructure the conversation by\u003cbr\u003e  theme rather than fixing a local clarity issue.\u003cbr\u003e- REORDER duplicate setup PREFER: When two near-identical setups exist (e.g., multiple\u003cbr\u003e  ‘I’ll rephrase’ ramps); keep the best one and reorder only enough to eliminate the\u003cbr\u003e  redundancy.\u003cbr\u003e- REORDER question prompt PREFER: When a clarifying question or framing prompt appears\u003cbr\u003e  slightly after the answer has already begun; move the prompt earlier if the shift is\u003cbr\u003e  small and improves comprehension.\u003cbr\u003e- REORDER segment onramp PREFER: At the start of a new topic\u002fsegment, if the first kept\u003cbr\u003e  lines are mid-thought; pull in a short lead-in from nearby session time to create a\u003cbr\u003e  clean entry.","\u003cb\u003eHow To Be 60 with Kaye Adams\u003c\u002fb\u003e\u003cbr\u003eMidweek Catchup: Bathroom Floors, Gas Bills & Stabbing the Devil\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light-touch runtime reduction, relentless micro-shaves between turns, keeps\u003cbr\u003e  long story blocks intact\u003cbr\u003eCUT_CRITERIA: protects crude-but-funny candor, trims redundancy, not substance, drops\u003cbr\u003e  logistics and micro-asides fast\u003cbr\u003eAUTHENTICITY_POLICY: profanity left in for honesty, messy overlap tolerated, polish only\u003cbr\u003e  for flow\u003cbr\u003eSTRUCTURE_TEMPLATE: branded produced cold open, music under intro\u002foutro beats,\u003cbr\u003e  conversation starts immediately after\u003cbr\u003eREORDER_ASSEMBLY: chronology strongly protected, no thematic rearranging\u003cbr\u003eSPEAKER_TREATMENT: symmetric respect for both hosts, mutes backchannel interference, keeps\u003cbr\u003e  energetic crosstalk\u003cbr\u003eRULES:\u003cbr\u003e- CUT host false start fragment PREFER: When a host begins a line, abandons it, and\u003cbr\u003e  immediately restarts—unless the stumble itself is the joke.\u003cbr\u003e- CUT micro tangent no payoff PREFER: When a brief side-remark (gift list, minor aside,\u003cbr\u003e  throwaway speculation) interrupts the current thread and does not create a new beat or\u003cbr\u003e  callback within the next few turns.\u003cbr\u003e- CUT redundant reaction echo PREFER: When both hosts repeat the same reaction\u002fwording\u003cbr\u003e  (e.g., stacked confirmations or echoed phrases) after the joke\u002fpoint has already landed.\u003cbr\u003e- KEEP comedic grossout story block MUST: When a speaker is in a sustained anecdote with\u003cbr\u003e  clear escalation and the other host is actively reacting, even if the content is crude\u003cbr\u003e  or ‘too much’.\u003cbr\u003e- KEEP crosstalk laughter and reactions PREFER: When overlap is functioning as comedic\u003cbr\u003e  emphasis (stacked laughs, mock horror, shouted reactions) and the main line remains\u003cbr\u003e  understandable.\u003cbr\u003e- KEEP running callback superstition bits PREFER: When a recurring motif\u002fcallback\u003cbr\u003e  resurfaces and helps stitch the episode together, even if it’s slightly rambling or\u003cbr\u003e  silly.\u003cbr\u003e- MUTE backchannel under primary speaker MUST: When one host’s brief interjection overlaps\u003cbr\u003e  the other’s key sentence and competes for intelligibility, especially during\u003cbr\u003e  explanation-heavy lines.\u003cbr\u003e- REORDER topic blocks AVOID: Only when chronology creates a clear continuity\u002flogic\u003cbr\u003e  problem that cannot be solved with micro-cuts.","\u003cb\u003eThe Athletic FC Podcast\u003c\u002fb\u003e\u003cbr\u003eThe Preview: Arsenal vs Chelsea\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between clauses, keeps macro blocks mostly intact, low\u003cbr\u003e  tolerance for dead air, occasional padding for flow\u003cbr\u003eCUT_CRITERIA: cuts meta-talk and self-navigation, redundancy pruned inside answers, keeps\u003cbr\u003e  sharp analysis even if rough, banter survives only if punchy\u003cbr\u003eAUTHENTICITY_POLICY: polished transcript-first cleanup, stumbles removed; tone retained,\u003cbr\u003e  minimal crosstalk left in, edits aim to feel invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open + branded music, feature match first, then round-\u003cbr\u003e  up, mid-episode sponsor block with bed, standardized credits\u002foutro insert\u003cbr\u003eREORDER_ASSEMBLY: chronology strongly preferred, no thematic reshuffling, transitions\u003cbr\u003e  handled by stings\u002finserts\u003cbr\u003eSPEAKER_TREATMENT: backchannels muted rather than mixed, one host tightened much harder,\u003cbr\u003e  guest answers protected; host prompts trimmed, overtalk resolved to a single lane\u003cbr\u003eRULES:\u003cbr\u003e- CUT meta navigation MUST: When a speaker references looking something up, repeating a\u003cbr\u003e  prior take, or coordinating what they said elsewhere (e.g., ‘let me find… so I say the\u003cbr\u003e  same thing’), unless it directly sets up an on-air payoff.\u003cbr\u003e- CUT host excess preface PREFER: When hosts add extra lead-in words or repeat the\u003cbr\u003e  question premise after it’s already established; keep only what’s needed to tee up the\u003cbr\u003e  response.\u003cbr\u003e- CUT long comparisons PREFER: When a comparison\u002fexample becomes a second mini-story and\u003cbr\u003e  the main point is already established; keep only the clause that directly supports the\u003cbr\u003e  argument.\u003cbr\u003e- CUT rambling host clauses PREFER: When a host (especially the more verbose one) extends\u003cbr\u003e  with qualifiers\u002fside-notes that don’t change the meaning; tighten more aggressively than\u003cbr\u003e  you would for the guest.\u003cbr\u003e- CUT redundant qualifiers PREFER: When a speaker stacks softeners and rephrases the same\u003cbr\u003e  idea within one turn (multiple ‘I think \u002f kind of \u002f you know’ clauses) without adding\u003cbr\u003e  new information.\u003cbr\u003e- KEEP analysis with specifics MUST: When a point includes concrete specifics (numbers,\u003cbr\u003e  named tactical mechanisms, clear causal claim), even if surrounding delivery is\u003cbr\u003e  choppy—tighten around it rather than removing it.\u003cbr\u003e- KEEP chronological order MUST: Across the main conversation, unless there is an explicit\u003cbr\u003e  continuity problem (e.g., references to something that hasn’t happened yet in the\u003cbr\u003e  episode).\u003cbr\u003e- KEEP guest argument arc MUST: When the guest is building a multi-sentence explanation\u003cbr\u003e  (setup → example → conclusion); compress internally but avoid cutting the connective\u003cbr\u003e  logic.\u003cbr\u003e- KEEP quick witty asides PREFER: When a joke\u002fanalogy is a single clean line that adds\u003cbr\u003e  personality without needing follow-up explanation; remove laughter or extensions that\u003cbr\u003e  dilute it.\u003cbr\u003e- MUTE backchannel interjections MUST: When a non-primary speaker drops short\u003cbr\u003e  interjections (‘yeah’, ‘you’, ‘hmm’, partial phrases) during an active answer,\u003cbr\u003e  especially if it distracts from the main sentence.\u003cbr\u003e- MUTE crosstalk during key words MUST: When overlap occurs on names, numbers, or the end\u003cbr\u003e  of a question where comprehension is at risk; favor the speaker carrying the\u003cbr\u003e  informational content.\u003cbr\u003e- REORDER topic block AVOID: Only when a short move would restore clarity of cause→effect\u003cbr\u003e  or question→answer, and can be done without creating new continuity references.\u003cbr\u003e- REORDER highlight hook PREFER: Do not pull later highlights forward into a cold open;\u003cbr\u003e  rely on produced intro\u002fmusic instead of teaser reassembly.","\u003cb\u003eJavaScript Jabber\u003c\u002fb\u003e\u003cbr\u003eTanStack Start, AI, and the Future of Frontend Architecture - JSJ 701\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between turns, near-zero silence tolerance, macro\u003cbr\u003e  conversation mostly intact\u003cbr\u003eCUT_CRITERIA: cut admin\u002flogistics completely, keep lively digressions and riffs, trim\u003cbr\u003e  single-word micro-stumbles\u003cbr\u003eAUTHENTICITY_POLICY: overlap and laughter left in, light cleanup, not pristine, leave\u003cbr\u003e  conversational rough edges\u003cbr\u003eSTRUCTURE_TEMPLATE: produced intro with music bed, standard 'picks' closing segment, ads\u003cbr\u003e  stitched across all zones\u003cbr\u003eREORDER_ASSEMBLY: strong chronological fidelity, no thematic reshuffling, assembly relies\u003cbr\u003e  on trims, not moves\u003cbr\u003eSPEAKER_TREATMENT: mute interjections to de-clutter, host tightened more than guests,\u003cbr\u003e  crosstalk kept for energy\u003cbr\u003eRULES:\u003cbr\u003e- CUT micro repeats single words MUST: When a speaker repeats a short word\u002ffragment (e.g.,\u003cbr\u003e  'oh', 'it', 'yeah') without adding meaning and the sentence remains grammatical without\u003cbr\u003e  it.\u003cbr\u003e- CUT preroll logistics MUST: Before the first on-mic introduction, when the talk is about\u003cbr\u003e  links, going live, platforms, scheduling, or other operational setup with no audience\u003cbr\u003e  value.\u003cbr\u003e- CUT dangling closers PREFER: At segment\u002fepisode endings, when the remaining audio is\u003cbr\u003e  post-signoff noise, trailing reactions, or repeated 'okay\u002fbye' cleanup after the closing\u003cbr\u003e  line.\u003cbr\u003e- CUT host self interruptions PREFER: When the host starts, restarts, or inserts asides\u003cbr\u003e  that don’t change the question or add clarity for the listener.\u003cbr\u003e- KEEP guest explanation arc PREFER: When a guest is in a multi-sentence technical\u003cbr\u003e  explanation, even if verbose, unless it becomes repetitive rather than additive.\u003cbr\u003e- KEEP tangent banter PREFER: When a tangent is serving rapport, humor, or a\u003cbr\u003e  conversational reset and it does not prevent the discussion from returning to the main\u003cbr\u003e  thread within the next few turns.\u003cbr\u003e- MUTE non primary backchannel MUST: When a non-primary speaker interjects during someone\u003cbr\u003e  else’s sentence and it competes with intelligibility, but the interjection is not\u003cbr\u003e  essential to the beat.\u003cbr\u003e- REORDER topic blocks AVOID: When the only motivation is thematic neatness (grouping\u003cbr\u003e  similar ideas) rather than a concrete continuity\u002fclarity problem.\u003cbr\u003e- REORDER continuity fix PREFER: When a brief move is required to restore coherence (e.g.,\u003cbr\u003e  a reference appears before its setup due to an edit) and the shift is small enough to\u003cbr\u003e  remain unnoticeable.","\u003cb\u003eComplexified\u003c\u002fb\u003e\u003cbr\u003eThe Rev. William Barber II: Fighting Autocrats Starts at the Grassroots\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: aggressive runtime compression, macro cuts over micro-polish, fast turn-to-\u003cbr\u003e  point pacing, low tolerance for meanders\u003cbr\u003eCUT_CRITERIA: keeps thesis lines, drops scaffolding, examples trimmed to one punch,\u003cbr\u003e  removes long historical frameworks, avoids extended performative riffs\u003cbr\u003eAUTHENTICITY_POLICY: meaning-first cleanup, not verbatim, rough emphasis allowed to stand,\u003cbr\u003e  minimal crosstalk left in, clarity via rewrite rather than stumbles\u003cbr\u003eSTRUCTURE_TEMPLATE: produced sponsor-heavy open, externally narrated\u002fstitched main, mid-\u003cbr\u003e  episode promo break, produced credits + cta close\u003cbr\u003eREORDER_ASSEMBLY: small thematic nudges, not reshuffles, reorders to restore logic, break-\u003cbr\u003e  point assembly prioritized, chronology mostly preserved\u003cbr\u003eSPEAKER_TREATMENT: lead voice protected; others tightened, backchannels frequently\u003cbr\u003e  suppressed, questions rebuilt for clarity, interruptions cleaned with muting\u003cbr\u003eRULES:\u003cbr\u003e- CUT interviewer self-corrections and question restarts MUST: When the interviewer re-\u003cbr\u003e  asks or re-frames the same question; keep only the cleanest final ask (optionally\u003cbr\u003e  supported by a short externally inserted setup).\u003cbr\u003e- CUT long enumerations and multi-part frameworks MUST: When a speaker launches into a\u003cbr\u003e  multi-item historical\u002ftheological framework or extended list; keep at most the capstone\u003cbr\u003e  takeaway line that connects directly back to the present question.\u003cbr\u003e- CUT over-specific place or proper-noun details PREFER: When a specific location\u002fname is\u003cbr\u003e  not required for comprehension of the broader point; prefer generalized phrasing to keep\u003cbr\u003e  momentum.\u003cbr\u003e- CUT quoted or sung lyrics PREFER: When the conversation includes hymn\u002fsong lyrics or\u003cbr\u003e  recitations; remove unless the exact wording is the analytic object of discussion.\u003cbr\u003e- CUT secondary anecdotes PREFER: When a story functions as color or illustration but does\u003cbr\u003e  not change the conclusion; keep only if it is the sole memorable proof point for the\u003cbr\u003e  segment’s claim.\u003cbr\u003e- KEEP sharp moral definition or reframe MUST: When a line names the underlying mechanism\u003cbr\u003e  (e.g., a reframing\u002fdiagnosis) that answers the prompt; protect it even if delivery is\u003cbr\u003e  rough or adjacent material must be sacrificed.\u003cbr\u003e- KEEP macro chronology PREFER: Across major topics\u002fsections; do not reorder in a way that\u003cbr\u003e  changes the underlying narrative arc of the conversation.\u003cbr\u003e- KEEP strong interviewer buttons PREFER: When the interviewer distills the answer or\u003cbr\u003e  summarizes the stakes in one concise line that advances the next question.\u003cbr\u003e- MUTE backchannels and overlap reactions MUST: When a secondary speaker affirms\u002freacts\u003cbr\u003e  during a substantive answer; mute unless it’s needed to signal a transition or to prompt\u003cbr\u003e  the next beat.\u003cbr\u003e- MUTE premature answer or side-comment during question PREFER: When one speaker starts\u003cbr\u003e  answering or editorializing while the other is still asking\u002fsetting context; mute to\u003cbr\u003e  preserve a clean question → answer exchange.\u003cbr\u003e- REORDER break setup and return MUST: When approaching a planned break, reorder nearby\u003cbr\u003e  lines to land a clear pre-break button and restart cleanly on the next topic without\u003cbr\u003e  logistical chatter.\u003cbr\u003e- REORDER short answer clarifier blocks PREFER: When a later sentence\u002fblock cleanly\u003cbr\u003e  clarifies or completes the immediately preceding point; move it earlier to avoid detours\u003cbr\u003e  or interruptions in the argument chain.","\u003cb\u003eThe Athletic Football Show: A show about the NFL\u003c\u002fb\u003e\u003cbr\u003eTakeaways from the 2026 NFL Scouting Combine\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light overall compression, big blocks, few micro-shaves between clauses, lets\u003cbr\u003e  analysis breathe past pace, short silence tolerance, not zero\u003cbr\u003eCUT_CRITERIA: cuts planning talk, keeps analysis, removes resets and redo takes, protects\u003cbr\u003e  stat-heavy explanations, trims only when no payoff\u003cbr\u003eAUTHENTICITY_POLICY: conversational rough edges mostly kept, counts\u002froll-ins removed for\u003cbr\u003e  polish, crosstalk energy tolerated, cleanup focused on obvious artifacts\u003cbr\u003eSTRUCTURE_TEMPLATE: produced host-led open with music, topic blocks with hard breaks,\u003cbr\u003e  break tees kept, breaks inserted, outro retains forward-looking plug\u003cbr\u003eREORDER_ASSEMBLY: aggressive non-chronological assembly, reorders to create clean on-ramp,\u003cbr\u003e  topic-clustered beats over timeline, uses pads to hide seams\u003cbr\u003eSPEAKER_TREATMENT: primary expert voice protected, host interjections muted when\u003cbr\u003e  redundant, acknowledgment noises selectively removed, overlap kept unless obscuring\u003cbr\u003eRULES:\u003cbr\u003e- CUT pre show planning MUST: When the speakers are coordinating structure, timing, or\u003cbr\u003e  what they’ll cover (run-of-show negotiation), unless a tiny line is needed to justify a\u003cbr\u003e  sudden topic jump for listeners.\u003cbr\u003e- CUT reset lines MUST: When a speaker calls out a redo or admits losing the train of\u003cbr\u003e  thought, and the surrounding content already stands on its own.\u003cbr\u003e- CUT cold open ramble PREFER: When the opening veers into informal back-and-forth or\u003cbr\u003e  niche side observations before the episode’s headline framing is delivered.\u003cbr\u003e- CUT host self interruptions PREFER: When the host interrupts themselves with\u003cbr\u003e  apology\u002fhand-off clutter (‘sorry—no you go’) and the conversation continues cleanly\u003cbr\u003e  without it.\u003cbr\u003e- KEEP expert long answer MUST: When the answer contains evaluative reasoning, scouting\u003cbr\u003e  logic, or supporting examples, even if it runs long or includes mild verbal roughness.\u003cbr\u003e- KEEP dense supporting data PREFER: When a speaker uses specific numbers, percentiles,\u003cbr\u003e  participation rates, or cross-checking logic to support a claim, even if it lengthens\u003cbr\u003e  the segment.\u003cbr\u003e- KEEP within topic sequence PREFER: Within a given topic block (e.g., one position\u003cbr\u003e  group), unless chronology creates confusion or forces listeners to hear setup after\u003cbr\u003e  payoff.\u003cbr\u003e- MUTE backchannel during explanation PREFER: When one speaker is delivering a long,\u003cbr\u003e  substantive explanation and the other speaker’s short reactions (e.g.,\u003cbr\u003e  ‘hmm\u002fokay\u002fcheers’) add no new information or slightly muddy the audio.\u003cbr\u003e- REORDER start of show block MUST: When a stronger listener-facing start (scene-setting,\u003cbr\u003e  ‘week that was,’ or thesis) occurs later in the session after planning chatter.\u003cbr\u003e- REORDER topic cluster PREFER: When related discussion is split by a break, tangent, or\u003cbr\u003e  brief detour; cluster the related parts together if it reduces listener context-\u003cbr\u003e  switching without changing meaning.","\u003cb\u003eThe Times of Israel Daily Briefing\u003c\u002fb\u003e\u003cbr\u003eJordan Hoffman on 'Blue Moon': Brilliant or a waste of space?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high-retention, light compression, relentless micro-shaves between turns,\u003cbr\u003e  lets long monologues run, trims only when momentum flags\u003cbr\u003eCUT_CRITERIA: keep the rant, trim the spillover, cut sharp detours that escalate, preserve\u003cbr\u003e  recurring show callbacks, micro-cut redundant connector words\u003cbr\u003eAUTHENTICITY_POLICY: natural crosstalk left intact, visible edit hand, invisible feel,\u003cbr\u003e  keeps self-aware meta remarks, allows rough laughter\u002fenergy\u003cbr\u003eSTRUCTURE_TEMPLATE: music-branded open, no cold open, mid-episode sponsor blocks in-body,\u003cbr\u003e  hard 'we're back' segment resets, conversation-first, minimal chaptering\u003cbr\u003eREORDER_ASSEMBLY: chronology is essentially sacred, no thematic reshuffling to tighten,\u003cbr\u003e  edits solve locally, not structurally\u003cbr\u003eSPEAKER_TREATMENT: backchannel muting over hard cuts, protect primary speaker’s runway,\u003cbr\u003e  keep lively overlap when legible, symmetric polish across co-hosts\u003cbr\u003eRULES:\u003cbr\u003e- CUT redundant micro repeats MUST: When a speaker repeats a single function word\u002fshort\u003cbr\u003e  phrase during a stuttery handoff (e.g., stacked 'yeah\u002fokay\u002fit is\u002fyou'), unless the\u003cbr\u003e  repetition is the joke.\u003cbr\u003e- CUT host interrupt meta PREFER: When a host explicitly negotiates the running order or\u003cbr\u003e  'host card' logistics on-mic, unless it lands as a comedic beat that the other host\u003cbr\u003e  plays off.\u003cbr\u003e- CUT political aside spike PREFER: When a tangent shifts from context-setting into name-\u003cbr\u003e  calling, moral labeling, or broadside commentary that isn’t needed to understand the\u003cbr\u003e  entertainment topic at hand.\u003cbr\u003e- CUT speculative news warning PREFER: When end-matter includes forward-looking\u003cbr\u003e  speculation about imminent breaking news that could date the episode or introduce\u003cbr\u003e  avoidable alarm by publish time.\u003cbr\u003e- KEEP chronological order MUST: For the main conversation and topic transitions, even\u003cbr\u003e  when earlier portions run long or digress, unless a reorder is required to correct\u003cbr\u003e  factual\u002ftemporal confusion.\u003cbr\u003e- KEEP crosstalk energy PREFER: When overlap is brief, playful, and still intelligible,\u003cbr\u003e  especially during banter or rapid-fire agreement.\u003cbr\u003e- KEEP long explanation block PREFER: When a speaker is laying out a cohesive\u003cbr\u003e  narrative\u002fargument (multi-minute setup with examples), as long as it continues adding\u003cbr\u003e  new information or stakes.\u003cbr\u003e- KEEP primary monologue PREFER: When a speaker is delivering a prepared-style rundown\u003cbr\u003e  (festival\u002fnews explainer), even if it runs long, as long as it stays on the announced\u003cbr\u003e  segment topic.\u003cbr\u003e- KEEP running gag household bits PREFER: When light domestic or recurring-show motifs\u003cbr\u003e  resurface as quick palate cleansers that pay off earlier mentions and keep tone buoyant\u003cbr\u003e  between heavier beats.\u003cbr\u003e- MUTE backchannel laughter MUST: When the non-primary speaker’s laugh\u002faffirmation lands\u003cbr\u003e  under an active sentence and doesn’t add a distinct beat of its own.\u003cbr\u003e- REORDER topic block AVOID: Only when a recorded sequence error or missing setup would\u003cbr\u003e  otherwise make a later segment incomprehensible.","\u003cb\u003eHow I Work\u003c\u002fb\u003e\u003cbr\u003eThe AI critique system we use to improve our work\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-full-session retention, micro-intervention only, relaxed pace, few trims\u003cbr\u003eCUT_CRITERIA: cuts are the exception, protects complete explanation arcs, prefers muting\u003cbr\u003e  over cutting\u003cbr\u003eAUTHENTICITY_POLICY: raw conversational texture preserved, audible filler tolerated,\u003cbr\u003e  minimal polish, maximal naturalness\u003cbr\u003eSTRUCTURE_TEMPLATE: produced bookends, raw core, hooky scripted intro framing,\u003cbr\u003e  credits\u002fpromo in outro\u003cbr\u003eREORDER_ASSEMBLY: chronology treated as sacred, no thematic reshuffling, assembly via\u003cbr\u003e  framing, not reordering\u003cbr\u003eSPEAKER_TREATMENT: guest continuity strongly protected, host kept conversational, not\u003cbr\u003e  minimized, overtalk handled by selective mutes\u003cbr\u003eRULES:\u003cbr\u003e- CUT redundant phrase or pickup PREFER: When a speaker repeats or restarts a clause\u003cbr\u003e  within the same breath and the later wording cleanly replaces the earlier without losing\u003cbr\u003e  any nuance.\u003cbr\u003e- KEEP chronological order MUST: For the main conversation, even when a later moment could\u003cbr\u003e  be a stronger hook—prefer to keep timeline intact and let the intro do the hooking.\u003cbr\u003e- KEEP host clarifying questions MUST: When the host question concretely translates the\u003cbr\u003e  guest’s idea into usage, examples, or practical constraints (i.e., it drives\u003cbr\u003e  specificity), even if it’s slightly wordy.\u003cbr\u003e- KEEP longform step by step explanation MUST: When the guest is enumerating steps,\u003cbr\u003e  categories, or a full workflow, even if it includes minor roughness or small asides, as\u003cbr\u003e  long as it remains on-topic.\u003cbr\u003e- KEEP guest hesitation before key point PREFER: When minor hesitations occur adjacent to\u003cbr\u003e  a substantive instruction or nuance; preserve if removing would make the delivery feel\u003cbr\u003e  unnaturally clipped.\u003cbr\u003e- KEEP light overlap for energy PREFER: When brief crosstalk or duplicated affirmations\u003cbr\u003e  don’t obscure intelligibility and help maintain conversational energy.\u003cbr\u003e- MUTE host or guest quick overlap PREFER: When a short laugh\u002facknowledgment\u002fpartial\u003cbr\u003e  prompt overlaps the other speaker’s line and isn’t needed for meaning, mute the\u003cbr\u003e  overlapping fragment instead of cutting the surrounding exchange.\u003cbr\u003e- MUTE single word interjection PREFER: When a speaker blurts a brief interjection (e.g.,\u003cbr\u003e  a lone transition word, quick laugh, or partial prompt) that adds no information and\u003cbr\u003e  risks stepping on the next line.\u003cbr\u003e- REORDER only to fix hard confusion AVOID: Only if chronology creates a direct logical\u003cbr\u003e  break (e.g., referenced concept not yet introduced) that cannot be resolved with a brief\u003cbr\u003e  trim; otherwise avoid reorders.","\u003cb\u003eCoaches Panel | Fantasy AFL Podcasts\u003c\u002fb\u003e\u003cbr\u003eEssendon vs St Kilda Community Series Review\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light-touch runtime compression, relentless micro-shaves between clauses,\u003cbr\u003e  macro blocks left intact, short pause tolerance\u003cbr\u003eCUT_CRITERIA: cuts connective cruft, not ideas, deletes stray intensifiers and hedges,\u003cbr\u003e  keeps emphasis repetitions when intentional, avoids removing full subtopics\u003cbr\u003eAUTHENTICITY_POLICY: polished wording, natural cadence kept, stumbles sometimes preserved\u003cbr\u003e  as voice, minimal audible editorial hand, cleans only what distracts\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open with ids, single continuous main monologue, cta-\u003cbr\u003e  heavy outro before sting, brand bed music bookends\u003cbr\u003eREORDER_ASSEMBLY: chronology locked; no thematic reshuffle, assembly via inserts, not\u003cbr\u003e  reordering, ad breaks integrated at seams\u003cbr\u003eSPEAKER_TREATMENT: single-speaker clarity over full verbatim, minimal muting; only for\u003cbr\u003e  artifacts, edits prioritize momentum, not warmth\u003cbr\u003eRULES:\u003cbr\u003e- CUT sentence starters (and\u002fbut\u002fso\u002fuh) MUST: When they appear at a new clause\u002fparagraph\u003cbr\u003e  start and the sentence reads cleanly without them.\u003cbr\u003e- CUT host micro-hesitations PREFER: When the host is already in a confident run of\u003cbr\u003e  analysis and the hesitation does not signal a transition or deliberate emphasis.\u003cbr\u003e- CUT isolated single-word filler inside technical points PREFER: When a lone filler\u003cbr\u003e  (e.g., 'um', 'uh', 'wow', 'fine') does not add emphasis and sits between two complete\u003cbr\u003e  thoughts.\u003cbr\u003e- CUT micro-specific words that derail flow PREFER: When a single proper-noun detail or\u003cbr\u003e  qualifier briefly detours the sentence and its removal does not change the listener's\u003cbr\u003e  needed meaning.\u003cbr\u003e- KEEP rhetorical repetition for emphasis PREFER: When the speaker repeats a phrase to\u003cbr\u003e  underline conviction (not to restart a sentence) and removing it would flatten the\u003cbr\u003e  point.\u003cbr\u003e- MUTE mouth noises\u002fbreaths PREFER: When non-verbal artifacts sit under otherwise-keepable\u003cbr\u003e  speech and muting avoids a more noticeable cut.\u003cbr\u003e- REORDER session content blocks AVOID: Only if required to resolve a clear continuity\u003cbr\u003e  error; otherwise preserve original sequence even if slightly meandering.\u003cbr\u003e- REORDER external insert placement PREFER: When inserting an ad\u002fbranding element, bracket\u003cbr\u003e  it with micro-cuts so the pre- and post-lines reconnect cleanly (even if the insert\u003cbr\u003e  lands mid-thought).","\u003cb\u003eThat's Absurd Please Elaborate\u003c\u002fb\u003e\u003cbr\u003eGimmie Glue, a Lever, and a Frickin' 1999 Toyota Corolla\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between turns, macro cuts for off-topic detours, lets\u003cbr\u003e  long explanations run, light pause-tightening, not frantic\u003cbr\u003eCUT_CRITERIA: cuts real-life interruptions hard, keeps motif-building banter, protects\u003cbr\u003e  nerdy depth over brevity, removes tangents without payoff\u003cbr\u003eAUTHENTICITY_POLICY: overlap and crosstalk left audible, cleans distractors, not\u003cbr\u003e  personality, allows messy joking cadence, selective polish via micro-cuts\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open into intro, question-by-question chaptering,\u003cbr\u003e  midroll sponsor as mini-scene, extended outro credits + tag\u003cbr\u003eREORDER_ASSEMBLY: big reorders to plant end tags, groups explanation beats for clarity,\u003cbr\u003e  chronology flexible outside main, uses bridges to conceal moves\u003cbr\u003eSPEAKER_TREATMENT: symmetric trimming of both hosts, mutes side-comments under active\u003cbr\u003e  lead, protects uninterrupted explainer runs, keeps high-energy overlap\u003cbr\u003eRULES:\u003cbr\u003e- CUT real world interruption MUST: When the conversation shifts to immediate off-mic\u003cbr\u003e  events (bugs, texts, calls, background happenings) that don’t advance the topic or set\u003cbr\u003e  up a later callback.\u003cbr\u003e- CUT bit overrun PREFER: When a comedic riff keeps escalating but stops producing new\u003cbr\u003e  tags, new information, or clear set-ups for the next segment.\u003cbr\u003e- CUT derail question mid explanation PREFER: When the non-leading host interrupts with a\u003cbr\u003e  new tangent\u002fquestion that would restart the segment’s focus before the current thought\u003cbr\u003e  lands.\u003cbr\u003e- CUT meta recording talk PREFER: When hosts comment on the recording itself (waiting,\u003cbr\u003e  searching, fact-checking live) unless it’s a quick punchline that lands and exits.\u003cbr\u003e- CUT reorder explanations about reorder PREFER: When the hosts verbally negotiate the\u003cbr\u003e  structure (\"we’ll come back to that\", \"I wrote this wrong\") and the final assembled\u003cbr\u003e  order already resolves it.\u003cbr\u003e- KEEP crosstalk reaction PREFER: When overlap is a punchline, a delighted reaction, or a\u003cbr\u003e  rapid confirmation that increases comedic momentum without masking the main sentence.\u003cbr\u003e- KEEP running bit motif PREFER: When a joke introduces or reinforces a repeatable\u003cbr\u003e  motif\u002finsult\u002fphrase that can be referenced later in the episode’s wrap-up or\u003cbr\u003e  transitions.\u003cbr\u003e- KEEP setup softball PREFER: When a host tees up the other with a short prompt that\u003cbr\u003e  clearly hands over the floor to the better-positioned explainer.\u003cbr\u003e- KEEP technical explanation block PREFER: When a host is delivering a structured\u003cbr\u003e  explanation (definitions, mechanism breakdowns, stepwise reasoning), even if it runs\u003cbr\u003e  long, unless it becomes repetitive or self-contradictory.\u003cbr\u003e- MUTE cohost aside under explainer MUST: When one host is mid-explanation and the other’s\u003cbr\u003e  overlap is not adding meaning (agreement noises, small jokes, restating the same\u003cbr\u003e  phrase).\u003cbr\u003e- REORDER definition then examples PREFER: When the session introduces examples before\u003cbr\u003e  defining the concept; move the clean definition earlier and follow with examples to\u003cbr\u003e  avoid listener confusion.\u003cbr\u003e- REORDER outro callback tag PREFER: When an earlier joke or anecdote becomes a stronger\u003cbr\u003e  button if relocated to the end (after the formal outro setup), even if the temporal\u003cbr\u003e  shift is large.\u003cbr\u003e- REORDER q and a internal PREFER: Within a single question segment, only reorder blocks\u003cbr\u003e  if it fixes a clear contradiction\u002ffalse start or restores a logical progression (setup →\u003cbr\u003e  math\u002fmechanism → implication).","\u003cb\u003eToday, Explained\u003c\u002fb\u003e\u003cbr\u003eThe “Epstein class”\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro blocks cut for focus, light silence tolerance, keeps long answer runs\u003cbr\u003e  intact, micro-shaves inside host turns\u003cbr\u003eCUT_CRITERIA: topic discipline over completeness, procedural\u002finside-baseball details\u003cbr\u003e  pruned, host scaffolding is expendable, definitions and stakes protected\u003cbr\u003eAUTHENTICITY_POLICY: polished transcript-forward cleanup, splice-friendly, not precious\u003cbr\u003e  about continuity, keeps conversational roughness when clear\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open with context, music stings as separators, mid-\u003cbr\u003e  episode promo break, fully produced credits outro\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, tiny reorders to fix q\u002fa flow\u003cbr\u003eSPEAKER_TREATMENT: interviewer heavily compressed, interviewee runs protected, mutes used\u003cbr\u003e  to cover splices\u002foverlaps\u003cbr\u003eRULES:\u003cbr\u003e- CUT host overlong question MUST: When the interviewer piles on examples, nested clauses,\u003cbr\u003e  or commentary after the central question is already asked, unless those additions force\u003cbr\u003e  a materially different answer.\u003cbr\u003e- CUT third topic detour MUST: When the conversation veers into a substantial new issue\u003cbr\u003e  that is not one of the episode’s two primary themes, unless it directly explains or\u003cbr\u003e  reframes the main themes.\u003cbr\u003e- CUT high-risk specific allegation PREFER: When the transcript contains a very specific\u003cbr\u003e  accusation or naming detail that is not essential to the episode’s argument (especially\u003cbr\u003e  if it reads like an uncontextualized claim), favor generalizing to the broader\u003cbr\u003e  accountability point.\u003cbr\u003e- CUT interviewer backchannel as content PREFER: When interviewer agreement\u002fenthusiasm\u003cbr\u003e  becomes part of the transcript ('yeah, I like that…') and delays the next substantive\u003cbr\u003e  exchange.\u003cbr\u003e- CUT personal philosophy origin story PREFER: When the speaker shifts into extended\u003cbr\u003e  autobiography, moral philosophy, or legacy references, unless it clearly motivates an\u003cbr\u003e  actionable political stance or explains a key decision already in the episode.\u003cbr\u003e- CUT procedural legislative play by play PREFER: When discussion becomes step-by-step\u003cbr\u003e  process, legal mechanics, or tactical Hill minutiae, unless it answers a listener-facing\u003cbr\u003e  question ('what happens next' \u002f 'what can people do') in a concrete way.\u003cbr\u003e- KEEP chronological topic progression MUST: When the conversation is naturally moving\u003cbr\u003e  through the planned topics; avoid thematic restructuring that would require large jumps\u003cbr\u003e  or repeated re-intros.\u003cbr\u003e- KEEP core definitions and frames MUST: When a speaker gives a crisp definition, names\u003cbr\u003e  the core conflict, or draws a clear line between acceptable vs unacceptable behavior\u003cbr\u003e  (i.e., the episode’s organizing frame).\u003cbr\u003e- KEEP guest uninterrupted argument run PREFER: When the interviewee is in a sustained\u003cbr\u003e  explanation (multi-sentence chain of reasoning); avoid intercutting with interviewer\u003cbr\u003e  affirmations or extra prompts unless required for clarity.\u003cbr\u003e- MUTE host overlap during bridge PREFER: When the interviewer’s interjection lands during\u003cbr\u003e  a splice, external insert, or bridge line and doesn’t add meaning; mute rather than\u003cbr\u003e  rewriting the surrounding content.\u003cbr\u003e- REORDER question answer alignment PREFER: When a clarifying question or framing line is\u003cbr\u003e  needed to precede an already-kept answer for listener comprehension, and the move can be\u003cbr\u003e  done within the same local beat without creating a noticeable time jump.","\u003cb\u003eThe Team House\u003c\u002fb\u003e\u003cbr\u003eWAR: U.S. & Israel Strike Iran, Khamenei Killed | EYES ON GEOPOLITICS\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: minimal runtime compression, micro-shaves, not macro cuts, long answers run\u003cbr\u003e  uninterrupted, breathing room over speed\u003cbr\u003eCUT_CRITERIA: cuts for clarity, not content, single-word repairs inside turns, tolerates\u003cbr\u003e  spicy, messy debate, tangents rarely removed\u003cbr\u003eAUTHENTICITY_POLICY: profanity left in, natural rough edges retained, light cleanup stays\u003cbr\u003e  invisible, doesn’t sterilize cadence\u003cbr\u003eSTRUCTURE_TEMPLATE: external cta before welcome, main conversation uninterrupted,\u003cbr\u003e  bookended promos at end, outro may carry music bed\u003cbr\u003eREORDER_ASSEMBLY: chronology is protected, no thematic reshuffle, fixes happen in-place\u003cbr\u003eSPEAKER_TREATMENT: guests broadly protected, overlap handled via muting, backchannels\u003cbr\u003e  reduced aggressively, host kept as full participant\u003cbr\u003eRULES:\u003cbr\u003e- CUT micro stumble words MUST: When a speaker repeats or garbles a short connector (e.g.,\u003cbr\u003e  'you know', 'mean', 'why', 'and') in a way that interrupts readability, but the\u003cbr\u003e  surrounding sentence remains intact without it.\u003cbr\u003e- CUT host micro interruptions PREFER: When the host interjects with short fragments that\u003cbr\u003e  collide with another speaker’s sentence and do not change the meaning or set up a needed\u003cbr\u003e  follow-up.\u003cbr\u003e- KEEP chronological order MUST: Throughout the main discussion, unless a reorder is the\u003cbr\u003e  only way to restore basic comprehension after a recording\u002fassembly error.\u003cbr\u003e- KEEP heated disagreement MUST: When disagreement sharpens stakes or reveals each\u003cbr\u003e  speaker’s position, even if the language is blunt or the exchange is imperfectly\u003cbr\u003e  overlapped.\u003cbr\u003e- KEEP primary speaker sentence MUST: When overlap occurs, prioritize preserving the\u003cbr\u003e  speaker who has the conversational floor (the one delivering the substantive point) even\u003cbr\u003e  if the other speaker must be muted.\u003cbr\u003e- KEEP long explanatory monologue PREFER: When a guest is laying out background,\u003cbr\u003e  definitions, lists, or causal chains—even if it’s dense or slightly meandering—unless\u003cbr\u003e  there is a clear, self-contained redundancy.\u003cbr\u003e- MUTE backchannel overlap MUST: When a speaker’s short agreement\u002fnoise ('yeah', 'mm-hmm',\u003cbr\u003e  quick asides) lands on top of another speaker’s sentence without adding new information.\u003cbr\u003e- MUTE interruption stub PREFER: When an interrupting speaker starts but abandons the\u003cbr\u003e  thought (a fragment that doesn’t resolve), especially during fast back-and-forth.\u003cbr\u003e- REORDER context prerequisite block AVOID: Only when a short explanatory setup clearly\u003cbr\u003e  belongs immediately before the segment that depends on it, and the shift is small enough\u003cbr\u003e  to feel like the same continuous moment.","\u003cb\u003eThe Decibel\u003c\u002fb\u003e\u003cbr\u003eThe argument for AI regulation after Tumbler Ridge\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro cuts for narrative focus, relentless micro-shaves between clauses,\u003cbr\u003e  keeps long expert runs intact\u003cbr\u003eCUT_CRITERIA: cuts meta-talk and process chatter, prefers concrete policy mechanics over\u003cbr\u003e  discourse, eliminates speculative side-branches quickly, keeps caveats that define\u003cbr\u003e  stakes\u003cbr\u003eAUTHENTICITY_POLICY: polished, stitched conversation, disfluencies removed more than\u003cbr\u003e  preserved, allows small natural overlap\u003cbr\u003eSTRUCTURE_TEMPLATE: produced news-style cold open, bookended by narrated context and\u003cbr\u003e  credits, midroll break with music bed\u003cbr\u003eREORDER_ASSEMBLY: heavy thematic re-assembly, large timeline shifts tolerated, reorders to\u003cbr\u003e  sharpen q→a logic\u003cbr\u003eSPEAKER_TREATMENT: primary expert protected; others trimmed, interviewer minimized to\u003cbr\u003e  clean prompts, backchannels frequently muted\u003cbr\u003eRULES:\u003cbr\u003e- CUT interviewer rambliness MUST: When an interviewer question includes multiple false\u003cbr\u003e  starts, hedges, or embedded commentary; replace with the cleanest version or reconstruct\u003cbr\u003e  with a tighter prompt.\u003cbr\u003e- CUT meta process talk MUST: When speakers discuss how to ask\u002fanswer, what to include, or\u003cbr\u003e  how the edit will be stitched, even if it is friendly or affirming.\u003cbr\u003e- CUT chronology only transitions PREFER: When the only purpose of a transition is to mark\u003cbr\u003e  that time has passed in the recording (e.g., ‘before we get into that’), and the new\u003cbr\u003e  block can be hard-joined with narration or a tighter question.\u003cbr\u003e- CUT extended speculation PREFER: When a passage lists possibilities or philosophizes\u003cbr\u003e  without adding a new factual constraint, example, or decision point for the listener.\u003cbr\u003e- CUT repeated host summaries PREFER: When the interviewer restates what the guest just\u003cbr\u003e  said and it doesn’t set up a sharper next question or add new context.\u003cbr\u003e- CUT secondary speaker detours PREFER: When a secondary voice (non-primary expert) begins\u003cbr\u003e  a tangent that doesn’t directly set up the primary expert’s next point.\u003cbr\u003e- KEEP expert caveats and limits PREFER: When the guest explicitly marks uncertainty,\u003cbr\u003e  scope limits, or what evidence is missing (opacity, unknown details), as long as it\u003cbr\u003e  stays tied to the central question.\u003cbr\u003e- KEEP expert longform explanation PREFER: When the expert is laying out a multi-part\u003cbr\u003e  causal or policy chain; do not interrupt with cuts that remove connective reasoning\u003cbr\u003e  unless it is redundant.\u003cbr\u003e- MUTE backchannel under answer MUST: When a non-speaking party produces ‘mm-hmm\u002fyeah’\u003cbr\u003e  during the guest’s substantive explanation and it competes with intelligibility or\u003cbr\u003e  rhythm.\u003cbr\u003e- REORDER pickup lines MUST: When cleaner re-recorded or later-session lines exist to fix\u003cbr\u003e  an earlier fumble, stitch the pickup into the earlier moment rather than keeping the\u003cbr\u003e  original stumble.\u003cbr\u003e- REORDER answer block PREFER: When an answer contains a self-contained\u003cbr\u003e  definition\u002fmechanism that will be needed to understand later sections, move it earlier\u003cbr\u003e  even if it breaks chronology.","\u003cb\u003eIndustry | The Unofficial Companion Podcast for HBO Max's \"Industry\"\u003c\u002fb\u003e\u003cbr\u003eIndustry S4E8 \"Both\u002fAnd\" | Where does Industry go from here?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaving between clauses, long topical stretches still\u003cbr\u003e  preserved, low silence-trim intensity, pacing tightened more than length\u003cbr\u003eCUT_CRITERIA: cuts host uncertainty and on-air searching, keeps substantive theory-\u003cbr\u003e  crafting even long, protects emotional\u002fvalues reactions, removes self-referential edit\u003cbr\u003e  talk\u003cbr\u003eAUTHENTICITY_POLICY: cleans roughness, keeps voice, profanity and bluntness retained, some\u003cbr\u003e  overlap left for texture, polish via removals, not rewrites\u003cbr\u003eSTRUCTURE_TEMPLATE: scene-by-scene recap backbone, brief recap cue lines inserted, minimal\u003cbr\u003e  produced bookends, outro kept appreciative and complete\u003cbr\u003eREORDER_ASSEMBLY: tiny continuity reorders only, reorders to remove backtracking,\u003cbr\u003e  chronology largely protected\u003cbr\u003eSPEAKER_TREATMENT: one host trimmed far harder, backchannels often muted not cut,\u003cbr\u003e  crosstalk selectively preserved, primary narrative turn protected\u003cbr\u003eRULES:\u003cbr\u003e- CUT host confusion exchange MUST: When both hosts get briefly tangled in who’s speaking\u003cbr\u003e  next \u002f what was just said; resolve by cutting the exchange or muting one side rather\u003cbr\u003e  than leaving the confusion.\u003cbr\u003e- CUT on air reconstruction MUST: When a speaker pauses to re-find a detail (e.g., looking\u003cbr\u003e  something up, replaying a scene, searching notes) and the episode can proceed without\u003cbr\u003e  that process being audible.\u003cbr\u003e- CUT reorder explanation MUST: When speakers narrate their own reordering\u002frecap process\u003cbr\u003e  (“let’s restart,” “I’ll say it again”)—fix with assembly rather than leaving the\u003cbr\u003e  explanation in.\u003cbr\u003e- CUT verbose host ramble MUST: When one host starts stacking qualifiers, parentheticals,\u003cbr\u003e  or repeated framing before making a point; keep the point and cut the scaffolding.\u003cbr\u003e- CUT factoid speculation without payoff PREFER: When a detail is flagged as possibly\u003cbr\u003e  wrong and doesn’t feed a later argument (names, trivia, uncertain claims), especially if\u003cbr\u003e  followed by more hedging.\u003cbr\u003e- CUT meta editing mentions PREFER: When a speaker explicitly proposes editing actions\u003cbr\u003e  (“we can cut this,” “we’ll cut that,” “restart the scene”) unless it is itself the\u003cbr\u003e  punchline or reveals a meaningful stance.\u003cbr\u003e- KEEP supportive overlap AVOID: When overlap signals alignment or shared excitement\u003cbr\u003e  (quick “mm,” “yeah,” finishing a thought) without obscuring intelligibility.\u003cbr\u003e- KEEP interpretive thesis block MUST: When the hosts are building a coherent thematic\u003cbr\u003e  read or character-motive thesis, even if it includes strong opinions or extended\u003cbr\u003e  explanation—compress only for repetition, not for stance.\u003cbr\u003e- KEEP emotional reaction turn PREFER: When a speaker lands a clear emotional\u002fvalues\u003cbr\u003e  reaction that frames why the discussion matters (disappointment, moral line-drawing,\u003cbr\u003e  stakes), even if it’s not strictly plot-advancing.\u003cbr\u003e- MUTE underlay backchannel PREFER: When a speaker’s short affirmations sit under the\u003cbr\u003e  other’s sentence and don’t create a comedic beat; prefer mute over cutting the main\u003cbr\u003e  speaker’s line.\u003cbr\u003e- REORDER topic shift anchor MUST: When a transition sentence (“from here…next scene…”)\u003cbr\u003e  exists but is separated from the content it introduces due to cuts; reunite the anchor\u003cbr\u003e  with its segment.\u003cbr\u003e- REORDER duplicate scene recap PREFER: When the same scene is re-summarized after a\u003cbr\u003e  tangent; keep the stronger version and move it to the first point of need, cutting the\u003cbr\u003e  weaker duplicate.\u003cbr\u003e- REORDER summary setup lines PREFER: When a short summary or scene-intro line is recorded\u003cbr\u003e  after a digression but is needed earlier to make the next kept block intelligible.","\u003cb\u003eThe Trial\u003c\u002fb\u003e\u003cbr\u003eDriven to Death? - Do No Harm\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between clauses, macro cuts for retakes\u002flogistics,\u003cbr\u003e  low tolerance for dead air, allows runtime to expand via inserts\u003cbr\u003eCUT_CRITERIA: cuts meta talk even mid-flow, keeps granular evidentiary detail, removes\u003cbr\u003e  hedging that weakens assertions, prioritizes courtroom-context explanation\u003cbr\u003eAUTHENTICITY_POLICY: polished, broadcast-clean dialogue, minimal audible rough edges,\u003cbr\u003e  fixes flow with stitched phrasing\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open with warning, music-bedded narration throughout,\u003cbr\u003e  evidence presented in chronological runs, mid-episode break as chapter marker\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, reorders only for outro packaging, small\u003cbr\u003e  shifts, not thematic reshuffles\u003cbr\u003eSPEAKER_TREATMENT: primary host protected as narrator, secondary host heavily tightened,\u003cbr\u003e  interruptions muted to preserve flow, allows brief crosstalk only if harmless\u003cbr\u003eRULES:\u003cbr\u003e- CUT timeline disruption AVOID: If a proposed reorder would mix dates\u002fincidents and risks\u003cbr\u003e  obscuring the chronological escalation of events, do not reorder—cut or tighten instead.\u003cbr\u003e- CUT production meta MUST: Any time hosts reference re-recording, changing a line,\u003cbr\u003e  rambling, or fixing a mistake, even if it momentarily overlaps with story content.\u003cbr\u003e- CUT redundant setup PREFER: When a host restates the same point in adjacent sentences\u003cbr\u003e  (e.g., repeating the same contextual qualifier) without adding a new fact or new\u003cbr\u003e  framing.\u003cbr\u003e- CUT secondary host qualifiers PREFER: When the supporting host adds softeners (e.g.,\u003cbr\u003e  ‘sort of’, ‘I think’, ‘obviously’) that do not change meaning or set up a new point.\u003cbr\u003e- KEEP evidence detail MUST: When listing or reading specific incidents, dates, injuries,\u003cbr\u003e  or quoted notes that advance the chronology, even if the content is heavy and would be\u003cbr\u003e  easy to summarize.\u003cbr\u003e- KEEP procedural context PREFER: When explaining courtroom mechanics or why a detail\u003cbr\u003e  matters for how evidence is presented, unless it becomes a long aside with no payoff to\u003cbr\u003e  the current evidence beat.\u003cbr\u003e- KEEP supporting host context add PREFER: When the supporting host contributes concrete\u003cbr\u003e  context (e.g., procedural comparison or clarifying detail) that strengthens the\u003cbr\u003e  listener’s understanding of the current beat.\u003cbr\u003e- MUTE interrupting interjection MUST: When one host interrupts with a check-in,\u003cbr\u003e  correction, or glitch-related comment while the other is mid-delivery of\u003cbr\u003e  narrative\u002fevidence.\u003cbr\u003e- REORDER outro cta block PREFER: When social\u002fCTA lines are cleaner in an alternate take\u003cbr\u003e  and can be moved as a single intact block to the end without affecting story\u003cbr\u003e  comprehension.","\u003cb\u003eThe Twenty Minute VC (20VC): Venture Capital | Startup Funding | The Pitch\u003c\u002fb\u003e\u003cbr\u003e20VC: Anthropic Wipes Billions Off Markets | Citrini Research: The Ultimate Breakdown: Agents, \"Ghost GDP\", Consumer Spend etc. | Figma Earnings Beat & Four Public Stocks to Buy | Jack Altman Joins Benchmark\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless sub-second micro-trims, big blocks cut when circular, low\u003cbr\u003e  tolerance for dead air, density prioritized over cadence\u003cbr\u003eCUT_CRITERIA: cut meta-chatter that stalls, keep sharp disagreement beats, prune examples\u003cbr\u003e  after one lands, remove self-aware process talk\u003cbr\u003eAUTHENTICITY_POLICY: heavily cleaned, lightly human, profanity kept for emphasis, overlap\u003cbr\u003e  left when energizing, stumbles removed unless purposeful\u003cbr\u003eSTRUCTURE_TEMPLATE: hook into sponsor stack, headline-driven topic blocks, frequent mid-\u003cbr\u003e  episode insert beats, ad-heavy outro wrap\u003cbr\u003eREORDER_ASSEMBLY: chronological core, tiny reorders, reorder to fix q→a flow, local\u003cbr\u003e  clustering over thematic reshuffle, avoid large timeline jumps\u003cbr\u003eSPEAKER_TREATMENT: host trimmed to crisp prompts, interruptions muted, thread preserved,\u003cbr\u003e  uneven trimming by clarity\u002futility, one voice prioritized in crosstalk\u003cbr\u003eRULES:\u003cbr\u003e- CUT process meta MUST: When speakers comment on how the discussion should go (\"we\u003cbr\u003e  should\u002fshouldn’t do macro,\" \"let’s not be like that,\" \"you’re the boss\") without\u003cbr\u003e  introducing a new analytical claim or reframing that immediately moves the topic\u003cbr\u003e  forward.\u003cbr\u003e- CUT repetition restart MUST: When a speaker restarts the same sentence\u002fidea multiple\u003cbr\u003e  times or re-states the same conclusion within a few turns; keep the strongest phrasing\u003cbr\u003e  and drop the rest.\u003cbr\u003e- CUT example overrun PREFER: When an example has already established the point and\u003cbr\u003e  continues into extra comparables, side names, or extended color; keep one representative\u003cbr\u003e  example and the takeaway line.\u003cbr\u003e- CUT host ramble PREFER: When the host starts answering their own question, stacking\u003cbr\u003e  examples, or editorializing—unless it directly forces a clearer, more specific guest\u003cbr\u003e  answer in the next turn.\u003cbr\u003e- CUT self-deprecating disclaimer PREFER: When speakers repeatedly qualify credibility (\"I\u003cbr\u003e  know nothing,\" \"I’m not smart at this\") without adding substantive context; keep at most\u003cbr\u003e  one instance if it frames uncertainty.\u003cbr\u003e- CUT transition dependency for reorder PREFER: When reordering would require keeping weak\u003cbr\u003e  transitional chatter (\"anyway,\" \"back to...\") solely to glue sections; prefer cutting\u003cbr\u003e  the chatter and using a minimal insert\u002fclean jump instead.\u003cbr\u003e- KEEP chronological debate build PREFER: When a debate escalates naturally through turn-\u003cbr\u003e  taking (each turn responds to the previous); avoid reordering that would blunt\u003cbr\u003e  escalation or remove the sense of live sparring.\u003cbr\u003e- KEEP disagreement exchange PREFER: When a disagreement is stated cleanly (e.g., direct\u003cbr\u003e  \"strong disagree\" \u002f thesis vs antithesis) and each side adds at least one new supporting\u003cbr\u003e  reason; trim only the redundancy around it.\u003cbr\u003e- KEEP guest conviction line PREFER: When a guest delivers a definitive, quotable stance\u003cbr\u003e  (even if blunt) that anchors the segment’s thesis; trim surrounding hedges but keep the\u003cbr\u003e  line intact.\u003cbr\u003e- KEEP punchline analogy PREFER: When a comedic analogy or vivid metaphor becomes the\u003cbr\u003e  shorthand for the argument that follows; trim setup but preserve the payoff line.\u003cbr\u003e- MUTE crosstalk secondary speaker MUST: When two guests talk over each other and only one\u003cbr\u003e  is advancing a new point; mute the non-advancing voice to maintain intelligibility and\u003cbr\u003e  pace.\u003cbr\u003e- MUTE interruption interjection MUST: When a secondary speaker interrupts with\u003cbr\u003e  agreement\u002fnoise while a primary speaker is delivering an explanation; mute the\u003cbr\u003e  interruption rather than cutting the main speaker’s sentence.\u003cbr\u003e- REORDER qa sequence MUST: When an answer, caveat, or key premise appears slightly before\u003cbr\u003e  the question\u002fprompt it responds to; move the prompt earlier to preserve natural Q→A\u003cbr\u003e  causality.\u003cbr\u003e- REORDER setup payoff PREFER: When a speaker’s setup line is separated from its immediate\u003cbr\u003e  payoff by a short diversion; pull the setup closer (within ~1–2 minutes) so the payoff\u003cbr\u003e  lands cleanly.","\u003cb\u003eJavaScript Jabber\u003c\u002fb\u003e\u003cbr\u003eNode.js Performance, Kubernetes, and Why “Fast” Isn’t Always Fast - JSJ 702\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: micro-shave between nearly every turn, moderate runtime reduction overall,\u003cbr\u003e  low tolerance for dead air, adds short pacing pads\u003cbr\u003eCUT_CRITERIA: protect technical explanation continuity, banter allowed once on-mic, cuts\u003cbr\u003e  throat-clears and stray noises, removes host-side embellishment first\u003cbr\u003eAUTHENTICITY_POLICY: conversational rough edges largely kept, polish focuses on noises,\u003cbr\u003e  not tone, overlap energy not over-cleaned\u003cbr\u003eSTRUCTURE_TEMPLATE: ad-first open, then intro, long uninterrupted main segment, picks\u003cbr\u003e  segment retained near end\u003cbr\u003eREORDER_ASSEMBLY: chronology is strongly preserved, no thematic reshuffling, edits solve\u003cbr\u003e  locally, not globally\u003cbr\u003eSPEAKER_TREATMENT: guests protected; hosts tightened more, uses mutes to suppress\u003cbr\u003e  interjections, allows some crosstalk to remain\u003cbr\u003eRULES:\u003cbr\u003e- CUT host ramble MUST: When it occurs before the official welcome\u002ftopic start and doesn’t\u003cbr\u003e  introduce the guest or episode premise.\u003cbr\u003e- CUT bit or joke tag PREFER: When it’s a single-word button\u002ftag after the joke already\u003cbr\u003e  landed (e.g., extra ‘oh\u002fyeah\u002fpretty’ style tails).\u003cbr\u003e- CUT host question tail PREFER: When the host adds a trailing phrase after the question\u003cbr\u003e  is already clear and the guest begins answering.\u003cbr\u003e- CUT technical aside PREFER: When it restates the same point without adding a new\u003cbr\u003e  constraint, number, definition, or example.\u003cbr\u003e- KEEP chronological order MUST: Across the main discussion, unless a reorder is required\u003cbr\u003e  to correct factual\u002fcausal confusion introduced by cutting.\u003cbr\u003e- KEEP crosstalk energy PREFER: When the overlap is brief and functions as affirmation or\u003cbr\u003e  humor without obscuring key technical content.\u003cbr\u003e- KEEP definition or translation PREFER: When a speaker pauses to define jargon or\u003cbr\u003e  translate a metric into plain language (even if it lengthens the segment).\u003cbr\u003e- KEEP guest cadence PREFER: When tightening would require removing a guest’s qualifying\u003cbr\u003e  clause that preserves technical accuracy (e.g., ‘in this scenario’, ‘p95 vs p99’).\u003cbr\u003e- MUTE host backchannel over guest MUST: When a host interjects (‘yeah’, ‘like’, short\u003cbr\u003e  corrections) during a guest’s sentence and the guest’s line remains intelligible without\u003cbr\u003e  it.\u003cbr\u003e- REORDER topic block AVOID: Only when a cut creates an orphaned reference that can’t be\u003cbr\u003e  repaired with a micro-trim or a short bridging line.\u003cbr\u003e- REORDER highlight hook PREFER: Even if a later moment would make a stronger cold open;\u003cbr\u003e  default is not to manufacture a cold open via reassembly.","\u003cb\u003eReality Receipts Podcast\u003c\u002fb\u003e\u003cbr\u003eEpisode 251: Love Is Blind S10 Ohio Receipt Report! Devonta Responds To Taylor!\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between turns, macro-cuts for dead-end detours, keeps\u003cbr\u003e  most core discussion intact\u003cbr\u003eCUT_CRITERIA: cuts spirals that invite trouble, protects accountability framing and\u003cbr\u003e  context, banter kept, then quickly tightened, recap\u002farticle readouts survive in full\u003cbr\u003eAUTHENTICITY_POLICY: keeps profanity and blunt tone, cleans repetitions, not personality,\u003cbr\u003e  allows some messy overlap\u003cbr\u003eSTRUCTURE_TEMPLATE: sponsor-heavy, including long midrolls, produced ad blocks with music,\u003cbr\u003e  loose intro banter then topic dive\u003cbr\u003eREORDER_ASSEMBLY: strictly chronological assembly, no thematic reshuffling to tighten,\u003cbr\u003e  cuts instead of rearranging\u003cbr\u003eSPEAKER_TREATMENT: selective muting of mid-turn interjections, symmetric tightening across\u003cbr\u003e  speakers, backchannel energy sometimes preserved\u003cbr\u003eRULES:\u003cbr\u003e- CUT speculative deep dive spiral MUST: When the conversation shifts from discussing on-\u003cbr\u003e  record claims into trying to identify, locate, or \"prove\" private details (e.g.,\u003cbr\u003e  searching accounts, guessing identities, legal worry spirals) without adding new,\u003cbr\u003e  episode-relevant facts.\u003cbr\u003e- CUT comment section back and forth PREFER: When reacting to audience critiques becomes\u003cbr\u003e  circular or repeats the same defense more than once, unless it introduces a new\u003cbr\u003e  clarifying detail about process.\u003cbr\u003e- CUT extended riff after punchline PREFER: When a joke\u002froast has landed and the speakers\u003cbr\u003e  continue reiterating the same comedic point without adding a new beat.\u003cbr\u003e- CUT speaker restarts stutter chain PREFER: When a speaker repeatedly restarts a clause\u003cbr\u003e  (multiple rapid false starts\u002frepeated “so\u002fyeah”) before delivering the actual point;\u003cbr\u003e  keep the final, clean entry.\u003cbr\u003e- KEEP chronological order MUST: Throughout the main discussion, even when there are\u003cbr\u003e  opportunities to cluster similar subtopics; prefer leaving the natural progression and\u003cbr\u003e  trimming within it.\u003cbr\u003e- KEEP ethics and limits disclaimer PREFER: When a speaker draws a boundary about what\u003cbr\u003e  they won’t do (no doxxing, no pulling records, not crossing certain lines), even if it\u003cbr\u003e  briefly slows pacing.\u003cbr\u003e- KEEP overlap as energy signal PREFER: When brief crosstalk reinforces agreement or\u003cbr\u003e  excitement without obscuring key words from the lead speaker.\u003cbr\u003e- KEEP summary quote readout PREFER: When a host\u002fguest is reading or paraphrasing a key\u003cbr\u003e  quote\u002farticle response that advances the main narrative; tighten only for obvious\u003cbr\u003e  redundancies, not for length alone.\u003cbr\u003e- MUTE single word interjection MUST: When a speaker blurts a short interjection mid-\u003cbr\u003e  sentence of the other speaker and it doesn’t change meaning (affirmations, quick\u003cbr\u003e  corrections, stray reactions).\u003cbr\u003e- REORDER continuity repair only AVOID: Only if a late clarification is required for\u003cbr\u003e  understanding an earlier kept segment and cannot be addressed with a short pickup\u002finsert\u003cbr\u003e  or a cut.","\u003cb\u003eFantasy FanFellas\u003c\u002fb\u003e\u003cbr\u003eEp 4: Well of Ascension Chapters 19-25\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between phrases, macro-cuts when speakers derail, low\u003cbr\u003e  tolerance for verbal churn, occasional pacing pads ins
