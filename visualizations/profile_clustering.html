    <div>                        <script type="text/javascript">window.PlotlyConfig = {MathJaxConfig: 'local'};</script>
        <script charset="utf-8" src="https://cdn.plot.ly/plotly-3.3.1.min.js" integrity="sha256-4rD3fugVb/nVJYUv5Ky3v+fYXoouHaBSP20WIJuEiWg=" crossorigin="anonymous"></script>                <div id="55e7984a-4ed4-450e-b6a9-25451435d0ae" class="plotly-graph-div" style="height:750px; width:1000px;"></div>            <script type="text/javascript">                window.PLOTLYENV=window.PLOTLYENV || {};                                if (document.getElementById("55e7984a-4ed4-450e-b6a9-25451435d0ae")) {                    Plotly.newPlot(                        "55e7984a-4ed4-450e-b6a9-25451435d0ae",                        [{"hoverinfo":"text","marker":{"color":"#1f77b4","line":{"color":"white","width":0.5},"size":8},"mode":"markers","name":"Macro-Block Pruning","text":["\u003cb\u003eCost of Living\u003c\u002fb\u003e\u003cbr\u003eBONUS! What does the Iran conflict mean for the global economy?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: heavy runtime compression to essentials, macro-block pruning over micro-\u003cbr\u003e  shaving, low silence sensitivity, short, broadcast-length final cut\u003cbr\u003eCUT_CRITERIA: cut technical deep-dives into one takeaway, trim speculative\u002funcertain\u003cbr\u003e  assertions fast, preserve ethical\u002fhuman-stakes acknowledgments, de-jargonize by removing\u003cbr\u003e  side definitions\u003cbr\u003eAUTHENTICITY_POLICY: polished, broadcast-safe phrasing, disfluency removed; tone retained,\u003cbr\u003e  cleaned edges around inserts, allows some conversational color\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open plus intro copy, tight explainer q&a core, frequent\u003cbr\u003e  short sponsor\u002fpromo breaks, produced credits\u002foutro tag\u003cbr\u003eREORDER_ASSEMBLY: chronology is default, small reorders for continuity only, completes\u003cbr\u003e  thoughts by stitching, avoids thematic reshuffling\u003cbr\u003eSPEAKER_TREATMENT: guest substance prioritized over host, host kept as question-forward\u003cbr\u003e  driver, mutes used to de-clutter seams, guest gets room for key definitions\u003cbr\u003eRULES:\u003cbr\u003e- CUT host ramble MUST: When the host adds extended framing, personal asides, or repeats\u003cbr\u003e  the premise, unless it directly sets up the next guest answer.\u003cbr\u003e- CUT speculative intel claims MUST: When a speaker asserts contested facts or\u003cbr\u003e  intelligence-dependent outcomes (especially early in a breaking-news timeline), even if\u003cbr\u003e  followed by hedging.\u003cbr\u003e- CUT technical market mechanics MUST: When the guest shifts from macro impacts into\u003cbr\u003e  trading\u002fpositioning\u002fderivatives mechanics (e.g., options skew, spec positioning) without\u003cbr\u003e  a simple listener payoff.\u003cbr\u003e- CUT guest overextended analogy PREFER: When the guest leans on a long parallel case\u003cbr\u003e  study to make a point that can be stated directly in one or two lines.\u003cbr\u003e- CUT host redundant scene setting PREFER: When the host re-locates the conversation\u003cbr\u003e  (“we’re sitting here…”, audience-watching framing) after the topic is already\u003cbr\u003e  established, unless it introduces a new question.\u003cbr\u003e- CUT redundant bridge after reorder PREFER: After a reorder, remove any original\u003cbr\u003e  transitional lines that now repeat or re-announce the same point.\u003cbr\u003e- KEEP chronological argument arc MUST: When the guest is building a step-by-step causal\u003cbr\u003e  explanation; do not reorder within that arc unless there is an explicit continuity\u003cbr\u003e  break.\u003cbr\u003e- KEEP guest key numbers definitions MUST: When the guest states a concrete, listener-\u003cbr\u003e  usable metric or definition that anchors the explainer (even if the surrounding setup is\u003cbr\u003e  trimmed).\u003cbr\u003e- KEEP human cost context PREFER: When either speaker briefly names the human stakes or\u003cbr\u003e  the ‘this feels ghoulish’ tension as a framing device before returning to economics.\u003cbr\u003e- MUTE stray words during transitions PREFER: When a speaker’s small fragment (“the\u003cbr\u003e  regime…”, similar partials) lands during a cut boundary or insert handoff and distracts\u003cbr\u003e  from the surviving sentence.\u003cbr\u003e- REORDER clarifying followup sentence PREFER: When a later sentence cleanly completes the\u003cbr\u003e  immediately preceding idea that would otherwise feel truncated after a macro cut.","\u003cb\u003eThe Richard Robbins Show\u003c\u002fb\u003e\u003cbr\u003eMost-Asked Agent Questions (& Answers) with RRI Coach Braden Wheatcroft\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro-block trims over micro-shaves, long explanatory runs stay intact, near-\u003cbr\u003e  zero intervention on silence\u003cbr\u003eCUT_CRITERIA: cut warmup even if funny, cut meta\u002finside-baseball talk hard, keep teaching\u003cbr\u003e  metaphors and frameworks\u003cbr\u003eAUTHENTICITY_POLICY: some ums survive in runs, light polish, not slicked-over, occasional\u003cbr\u003e  rough edges tolerated\u003cbr\u003eSTRUCTURE_TEMPLATE: branded music bookends, fast start: straight to topic, outro kept\u003cbr\u003e  short and clean\u003cbr\u003eREORDER_ASSEMBLY: topic-clustered assembly over timeline, willing to make big time jumps,\u003cbr\u003e  reorders to reveal value sooner\u003cbr\u003eSPEAKER_TREATMENT: single-voice presentation tolerated, interviewer minimized to\u003cbr\u003e  essentials, no active muting\u002fcrosstalk policing\u003cbr\u003eRULES:\u003cbr\u003e- CUT production meta MUST: When the conversation shifts to cameras\u002fmics\u002froom setup\u002fwhat\u003cbr\u003e  to say on YouTube or other recording logistics, unless it is being used as a purposeful\u003cbr\u003e  on-air bit.\u003cbr\u003e- CUT warmup story block MUST: When the opening contains personal banter or unrelated\u003cbr\u003e  storytelling that doesn’t tee up the episode’s promised topic within the next beat.\u003cbr\u003e- CUT gratitude loop and outro logistics PREFER: When closing devolves into repeated\u003cbr\u003e  thanks, ‘like\u002fsubscribe’ negotiation, or post-wrap chatter after the final point has\u003cbr\u003e  landed.\u003cbr\u003e- CUT interviewer smalltalk and self-reference PREFER: When the non-expert\u002finterviewer\u003cbr\u003e  voice is doing banter, status updates, or commentary that doesn’t sharpen the next\u003cbr\u003e  question or clarify the last answer.\u003cbr\u003e- KEEP expert answer arc MUST: When the speaker is mid-argument (premise → example →\u003cbr\u003e  takeaway); avoid interrupting with cuts that would remove the connective logic.\u003cbr\u003e- KEEP intra block continuity MUST: When a block contains a multi-step explanation; avoid\u003cbr\u003e  splitting it across the episode just to preserve timeline order.\u003cbr\u003e- KEEP extended framework explanation PREFER: When a speaker is laying out a clear model\u003cbr\u003e  (e.g., phases, checklists, metaphors) with practical implications, even if it includes\u003cbr\u003e  minor rambles or asides.\u003cbr\u003e- REORDER topic cluster PREFER: When similar subtopics appear in multiple places;\u003cbr\u003e  consolidate them into a single continuous run even if it breaks recording chronology.\u003cbr\u003e- REORDER value dense block PREFER: When a later segment contains clearer framing or\u003cbr\u003e  higher practical value than the current section; move it forward to improve early\u003cbr\u003e  momentum.","\u003cb\u003eThe Money To The Masses Podcast\u003c\u002fb\u003e\u003cbr\u003eEp 535 - Small changes with big impact and filling your pension gap\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro-block pruning over micro-tightening, long instructional runs left\u003cbr\u003e  intact, host airtime minimized for pace, low reliance on silence trimming\u003cbr\u003eCUT_CRITERIA: deletes all redo-and-rehearse chatter, keeps practical examples and numbers,\u003cbr\u003e  banter survives only if short, newsletter\u002fcta kept but tightened\u003cbr\u003eAUTHENTICITY_POLICY: clean-take illusion via heavy cleanup, some rough language left in,\u003cbr\u003e  stumbles removed, cadence preserved, franken-edits tolerated if smooth\u003cbr\u003eSTRUCTURE_TEMPLATE: music-led intro and music bed outro, early personal\u002fnews hook then\u003cbr\u003e  cta, explicit agenda before main content, two-topic chaptered main body\u003cbr\u003eREORDER_ASSEMBLY: micro-reorders to fix lead-ins, chronology largely preserved, reorders\u003cbr\u003e  used as sentence-smoothers\u003cbr\u003eSPEAKER_TREATMENT: primary host protected as main voice, secondary host reduced to\u003cbr\u003e  framing, reaction sounds muted, not highlighted, long monologues kept uninterrupted\u003cbr\u003eRULES:\u003cbr\u003e- CUT recording process meta MUST: Whenever either speaker references retakes, reads copy\u003cbr\u003e  aloud to test it, comments on performance\u002faudio\u002fvideo, or negotiates what to say next,\u003cbr\u003e  unless a single line is needed to motivate the next on-topic segment.\u003cbr\u003e- CUT secondary host ramble MUST: When the secondary host extends a tangent, repeats\u003cbr\u003e  context already understood, or adds color that doesn’t advance the financial\u003cbr\u003e  point—especially early in the episode.\u003cbr\u003e- CUT host personal color overrun PREFER: When the host’s personal anecdote continues past\u003cbr\u003e  the first clear payoff and stops advancing the episode’s finance\u002fnews value, especially\u003cbr\u003e  before the main topics begin.\u003cbr\u003e- CUT repetitive restatement PREFER: When the same point is rephrased multiple times in\u003cbr\u003e  succession (especially around definitions, transitions, or summaries), keep only the\u003cbr\u003e  strongest\u002fclearest phrasing that preserves the logical link to the next point.\u003cbr\u003e- KEEP actionable how to with numbers MUST: When a tip includes a worked example, a\u003cbr\u003e  concrete threshold\u002flimit, or a specific next action (calculator\u002flink\u002fchecker), even if\u003cbr\u003e  it runs long—trim only detours that don’t change the instruction.\u003cbr\u003e- KEEP primary host explanation run MUST: When the primary host is mid-explanation\u003cbr\u003e  (definitions, examples, step-by-step instructions), avoid intercutting with the other\u003cbr\u003e  host unless needed to remove confusion or redundancy.\u003cbr\u003e- MUTE mid-sentence self prompt PREFER: When a speaker blurts a self-prompt or half-start\u003cbr\u003e  (e.g., \"and as well…\") during a usable take and removing it preserves the surrounding\u003cbr\u003e  sentence.\u003cbr\u003e- MUTE overlapping reactions PREFER: When a host’s laugh\u002fbackchannel\u002faside sits on top of\u003cbr\u003e  the other speaker’s intelligible line; prefer muting the reaction over cutting the main\u003cbr\u003e  line.\u003cbr\u003e- REORDER topic blocks AVOID: If reordering would move a full topic segment away from its\u003cbr\u003e  original position or alter the perceived recording timeline beyond minor cleanup.\u003cbr\u003e- REORDER setup line PREFER: When a single setup\u002fbridge line occurs shortly after the\u003cbr\u003e  content it should introduce, and moving it earlier creates a cleaner transition without\u003cbr\u003e  changing meaning; keep shifts small (tens of seconds).","\u003cb\u003eThe Money To The Masses Podcast\u003c\u002fb\u003e\u003cbr\u003eEp 536 - Should you buy gold, how to do it & the risks\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: aggressive runtime halving, macro-block cuts over micro-shaves, low silence-\u003cbr\u003e  trim focus\u003cbr\u003eCUT_CRITERIA: remove rehearsal; keep final take, cut redundancy inside explanations, keep\u003cbr\u003e  listener-facing value segments\u003cbr\u003eAUTHENTICITY_POLICY: polished, restart-free delivery, banter allowed only when tight,\u003cbr\u003e  visible cleanup kept unobtrusive\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music-bookended episode, comments → agenda → main explainer,\u003cbr\u003e  hard pivot to practical takeaway, cta-heavy branded outro\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, no thematic reshuffling, continuity fixed by\u003cbr\u003e  cutting, not moving\u003cbr\u003eSPEAKER_TREATMENT: one lead voice dominates, secondary host reduced to signposts, protect\u003cbr\u003e  structured expert monologues, mute used for patch-level repairs\u003cbr\u003eRULES:\u003cbr\u003e- CUT rehearsal and reset talk MUST: When speakers are planning phrasing\u002fstructure,\u003cbr\u003e  checking recording, or doing multiple run-ups to the same line, keep only the final\u003cbr\u003e  clean delivery that would make sense to a first-time listener.\u003cbr\u003e- CUT secondary host extended commentary MUST: When the non-lead host is reacting at\u003cbr\u003e  length (sympathy, anecdotes, process talk) without adding a new listener-relevant point\u003cbr\u003e  or a necessary setup question, compress to a short bridge or remove.\u003cbr\u003e- CUT self critique and editorial asides MUST: When a speaker labels their own line as\u003cbr\u003e  ‘cheesy’, debates wording, or comments on how something should be edited, remove unless\u003cbr\u003e  it produces a genuinely entertaining beat that also sets up the next clean line.\u003cbr\u003e- CUT duplicated definitions PREFER: When definitions or explanations are repeated with\u003cbr\u003e  only minor wording changes, retain the clearest version and remove the rest even if it\u003cbr\u003e  slightly reduces conversational back-and-forth.\u003cbr\u003e- KEEP chronological order MUST: Default to the original recording order for all\u003cbr\u003e  substantive discussion; do not re-sequence just to ‘improve flow’ if the flow is already\u003cbr\u003e  coherent.\u003cbr\u003e- KEEP lead host explainer chain MUST: When the lead host is delivering a structured\u003cbr\u003e  explanation (definitions → pros\u002fcons → risks → examples), preserve the full chain even\u003cbr\u003e  if it’s long; only cut true duplication or aborted takes.\u003cbr\u003e- KEEP brief rapport at top PREFER: In the opening minutes, keep a short human beat\u003cbr\u003e  between hosts if it explains the premise or builds rapport quickly; trim if it becomes\u003cbr\u003e  an extended tangent.\u003cbr\u003e- KEEP meta context for listener PREFER: When a brief meta note (e.g., a mishap\u003cbr\u003e  explanation) directly clarifies why the episode sounds\u002flooks different or frames\u003cbr\u003e  expectations, keep it short rather than removing it entirely.\u003cbr\u003e- MUTE lead host stumble under patch PREFER: When inserting a replacement line\u002fphrase for\u003cbr\u003e  clarity (external pick-up), mute only the minimum overlapping words from the lead host\u003cbr\u003e  needed to make the patch seamless, rather than cutting the whole surrounding paragraph.\u003cbr\u003e- REORDER misplaced micro segment AVOID: Only when a short passage is clearly recorded\u003cbr\u003e  out-of-sequence (e.g., a later clarification required for understanding an earlier\u003cbr\u003e  section) and trimming cannot restore clarity, move the smallest possible block.","\u003cb\u003eUnBeatled\u003c\u002fb\u003e\u003cbr\u003eEP 21: Hey Bulldog\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro blocks dropped, not shredded, low pause tolerance, keeps long\u003cbr\u003e  explanation runs\u003cbr\u003eCUT_CRITERIA: hard-cut recording logistics and shop talk, retake-and-replace over leaving\u003cbr\u003e  flubs, keeps analysis; trims commentary padding\u003cbr\u003eAUTHENTICITY_POLICY: polished delivery, minimal meta, cleans stumbles inside sentences,\u003cbr\u003e  allows some conversational texture\u003cbr\u003eSTRUCTURE_TEMPLATE: produced sponsor-led cold open, hosted timeline-style intro framing,\u003cbr\u003e  clean cta outro, no chatter\u003cbr\u003eREORDER_ASSEMBLY: chronology-first, near-zero reorders, uses inserts instead of\u003cbr\u003e  reshuffling\u003cbr\u003eSPEAKER_TREATMENT: symmetric tightening of both hosts, backchannels muted under narration,\u003cbr\u003e  protects the explainer’s long turns\u003cbr\u003eRULES:\u003cbr\u003e- CUT episode planning next topic MUST: When the conversation shifts to choosing the next\u003cbr\u003e  episode, scheduling, or “what should we do next,” especially near the end of the\u003cbr\u003e  session.\u003cbr\u003e- CUT production logistics MUST: Any time the hosts discuss recording status, mic levels,\u003cbr\u003e  monitoring, muting, or edit plans, even if it interrupts a topic, unless the moment is\u003cbr\u003e  essential to understand an upcoming audible artifact.\u003cbr\u003e- CUT self-interruptions without payoff MUST: When a host stops mid-thought to restart\u003cbr\u003e  (“I’m going to come back… sorry”) and the restart does not introduce new information\u003cbr\u003e  beyond the clean continuation.\u003cbr\u003e- CUT host ramble PREFER: When a host adds extra characterization or aside commentary\u003cbr\u003e  after the point is already made, unless it introduces a new factual detail or sets up\u003cbr\u003e  the other host’s next explanation.\u003cbr\u003e- CUT redundant hype lines PREFER: When enthusiasm\u002fcharacterization repeats without adding\u003cbr\u003e  a new angle (e.g., multiple adjacent “energy\u002fattitude” descriptions), unless it lands as\u003cbr\u003e  a distinct comedic beat.\u003cbr\u003e- KEEP chronological order MUST: Default to session order for all main discussion\u003cbr\u003e  segments; do not rearrange topic blocks for thematic grouping.\u003cbr\u003e- KEEP continuous explanation block PREFER: When a speaker is in a structured walkthrough\u003cbr\u003e  (history context, chord progression, lyric motif) with clear forward motion, even if\u003cbr\u003e  it’s longer than typical and includes a few minor rough edges.\u003cbr\u003e- KEEP explainer technical run PREFER: When the explainer is demonstrating or describing\u003cbr\u003e  musical\u002ftechnical content with step-by-step logic, even if it’s dense or slightly\u003cbr\u003e  repetitive.\u003cbr\u003e- KEEP in place transitions PREFER: When a transition is slightly clunky but\u003cbr\u003e  understandable, prefer trimming the clunk over relocating the surrounding material.\u003cbr\u003e- MUTE backchannel overlap MUST: When a short agreement (“yeah,” “mm”) overlaps a primary\u003cbr\u003e  sentence and does not change meaning or add a new point.\u003cbr\u003e- REORDER out of order reference fix AVOID: Only if a later clarification is required for\u003cbr\u003e  the immediately preceding kept segment to make sense, and the moved piece is short and\u003cbr\u003e  self-contained.","\u003cb\u003ePolitics Weekly UK\u003c\u002fb\u003e\u003cbr\u003eMajor changes to the Send system - can the government win over MPs and parents?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between turns, keeps long explainers intact, low\u003cbr\u003e  tolerance for dead air, macro blocks dropped wholesale\u003cbr\u003eCUT_CRITERIA: cuts newsroom\u002fmeta conversation hard, keeps complex policy scaffolding,\u003cbr\u003e  removes hedging in framing lines, time-context retained for news\u003cbr\u003eAUTHENTICITY_POLICY: highly cleaned conversational surface, backchannels selectively\u003cbr\u003e  preserved, invisible fixes via mutes\u002fpickups, polish over ‘in-room’ messiness\u003cbr\u003eSTRUCTURE_TEMPLATE: branded cold open montage, music-backed mid-break return, host-led\u003cbr\u003e  signposted segments, formal credits plus tag\u003cbr\u003eREORDER_ASSEMBLY: chronology is strongly protected, no thematic reshuffling, continuity\u003cbr\u003e  fixed by patch lines\u003cbr\u003eSPEAKER_TREATMENT: one host protected as main explainer, other host heavily tightened,\u003cbr\u003e  frequent muting of interjections, questions\u002fhand-offs prioritized\u003cbr\u003eRULES:\u003cbr\u003e- CUT behind scenes editorial or logistics MUST: When the talk is about recording,\u003cbr\u003e  turnaround timing, levels\u002fWi‑Fi, who said what to whom internally, or how the piece will\u003cbr\u003e  be covered, unless it is immediately reframed into listener-relevant context.\u003cbr\u003e- CUT repeated restart or second take MUST: When a speaker asks to re-say a line, restarts\u003cbr\u003e  a sentence, or the pair negotiate wording; keep only the best single clean take.\u003cbr\u003e- CUT speaker self-repair about audio or mic MUST: When speakers comment on mic distance,\u003cbr\u003e  glitches, background noise, or recording artifacts; replace with a clean take or remove\u003cbr\u003e  entirely.\u003cbr\u003e- CUT cohost overlong framing PREFER: When a framing question or setup becomes multi-\u003cbr\u003e  clause and repetitive; compress to a single clean question that hands off to the\u003cbr\u003e  explainer.\u003cbr\u003e- CUT duplicate resets instead of reorder PREFER: When there are multiple attempts at a\u003cbr\u003e  reset\u002fsegue; choose the best one and cut the rest rather than reordering to accommodate\u003cbr\u003e  them.\u003cbr\u003e- CUT host speculation without payoff PREFER: When a tangent becomes vibes\u002finside-baseball\u003cbr\u003e  prognostication that doesn’t add a new reported detail or sharpen the argument; keep\u003cbr\u003e  only the punchline sentence if it advances the narrative.\u003cbr\u003e- KEEP chronological topic flow MUST: When topics naturally progress (setup → explainer →\u003cbr\u003e  reaction), even if some later lines could make a stronger hook; preserve the original\u003cbr\u003e  build.\u003cbr\u003e- KEEP minimal acknowledgments PREFER: When brief acknowledgments (‘mm-hmm’, ‘yeah’) help\u003cbr\u003e  conversational rhythm and do not collide with key information; otherwise mute them.\u003cbr\u003e- KEEP news time anchor PREFER: When the speakers clarify timing (e.g., ‘as of now’, ‘a\u003cbr\u003e  couple hours after’, ‘before the statement’) to prevent the episode sounding out-of-date\u003cbr\u003e  or misleading.\u003cbr\u003e- KEEP policy explainer block PREFER: When a speaker is laying out definitions,\u003cbr\u003e  mechanisms, or a multi-step process (even if long), provided it stays on-topic; compress\u003cbr\u003e  only with micro-cuts that remove repetition and verbal clutter.\u003cbr\u003e- KEEP reporting authority details PREFER: When the explainer references reporting process\u003cbr\u003e  in a listener-relevant way (documents, briefings, who said what publicly) that supports\u003cbr\u003e  credibility, not production mechanics.\u003cbr\u003e- KEEP time sensitive references in place PREFER: When speakers reference ‘today\u002fthis\u003cbr\u003e  afternoon\u002fbefore the statement’; avoid moving these lines away from their surrounding\u003cbr\u003e  context to prevent implied timeline errors.\u003cbr\u003e- MUTE cohost interjection during explainer MUST: When the non-speaking host adds short\u003cbr\u003e  prompts (‘thanks’, ‘the second reason’, ‘you reply’) over an active explanation; remove\u003cbr\u003e  the interruption unless it introduces a necessary structural signpost.\u003cbr\u003e- REORDER segment blocks AVOID: Only if a section is clearly recorded out of sequence\u003cbr\u003e  (e.g., accidental early ‘welcome back’ or duplicated reset) and a move would restore an\u003cbr\u003e  obvious intended structure without creating timestamp\u002f‘as of now’ inconsistencies.","\u003cb\u003eTalk innovation: patent professional edition\u003c\u002fb\u003e\u003cbr\u003eFrom USB to 5G: the power of standards\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro blocks removed for clarity, micro-shaves between clauses, low pause\u003cbr\u003e  tolerance; trims tight, runtime targets over completeness\u003cbr\u003eCUT_CRITERIA: cuts meta-production talk aggressively, prioritizes clean, didactic\u003cbr\u003e  explanations, replaces weak reads with alternates, keeps only minimal small-talk\u003cbr\u003eAUTHENTICITY_POLICY: highly polished, script-forward delivery, retakes embraced; errors\u003cbr\u003e  erased, editorial hand stays invisible, clarity over conversational roughness\u003cbr\u003eSTRUCTURE_TEMPLATE: produced hook + narrated framing, interleaves narration with sourced\u003cbr\u003e  clips, music-bedded transitions between beats, cta-heavy, produced outro\u003cbr\u003eREORDER_ASSEMBLY: narrative arc over chronology, front-loads premise and framing, moves\u003cbr\u003e  blocks to cluster topics, comfortable with large time shifts\u003cbr\u003eSPEAKER_TREATMENT: narrator\u002fhost track heavily controlled, secondary voices treated as\u003cbr\u003e  inserts, aggressive muting to preserve continuity, non-essential participants dropped\u003cbr\u003eRULES:\u003cbr\u003e- CUT duplicate explanations MUST: When the same concept is explained more than once\u003cbr\u003e  (including partial restarts), keep a single best pass and remove the rest unless the\u003cbr\u003e  second pass adds a genuinely new angle or definition.\u003cbr\u003e- CUT production meta MUST: Whenever the speakers discuss recording logistics, retakes,\u003cbr\u003e  script notes, or performance\u002fintonation feedback, even if it briefly references the\u003cbr\u003e  episode’s topic.\u003cbr\u003e- CUT host or guest stumble block PREFER: When a stumble triggers a restart or re-read,\u003cbr\u003e  remove the entire stumble-to-restart span rather than trying to salvage fragments.\u003cbr\u003e- CUT low-contribution speaker PREFER: When a speaker appears only in brief, non-essential\u003cbr\u003e  interjections that don’t carry an explanation or usable quote, remove them entirely from\u003cbr\u003e  the cut.\u003cbr\u003e- KEEP chronology MUST: Within a single explanation or definition sequence, avoid\u003cbr\u003e  reordering individual sentences; reorder at paragraph\u002fblock granularity instead.\u003cbr\u003e- KEEP definition breakdown PREFER: When the script shifts into term-by-term definition or\u003cbr\u003e  a structured breakdown, keep the full scaffold even if it’s slightly formal, because it\u003cbr\u003e  carries the listener’s comprehension.\u003cbr\u003e- KEEP expert quote core PREFER: When an external\u002fsecondary voice delivers a self-\u003cbr\u003e  contained expert point, keep the quote’s internal logic intact and trim only lead-\u003cbr\u003e  ins\u002flead-outs.\u003cbr\u003e- MUTE off-track host audio MUST: When the host audio contains side chatter, scratch\u003cbr\u003e  narration, or transitional mess while another element is being featured (e.g., a\u003cbr\u003e  clip\u002fsegment), suppress the host track to keep the foreground clean.\u003cbr\u003e- REORDER framing blocks PREFER: When a later-recorded section contains the strongest\u003cbr\u003e  episode framing or stakes-setting, move it to the beginning to function as the\u003cbr\u003e  listener’s entry point.\u003cbr\u003e- REORDER topic clusters PREFER: When related explanations are separated in the session by\u003cbr\u003e  logistics, retakes, or unrelated beats, cluster the explanations together even if it\u003cbr\u003e  requires a major temporal shift.","\u003cb\u003eThe Money To The Masses Podcast\u003c\u002fb\u003e\u003cbr\u003eEp 534 - HMRC tax return glitch warning & 2026 Housing market update\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high compression, macro-block pruning, retake-heavy sections cut wholesale,\u003cbr\u003e  moderate micro-shaving between phrases\u003cbr\u003eCUT_CRITERIA: cut meta-recording and coaching talk, keep actionable advice, cut rehearsal,\u003cbr\u003e  personal color kept, streamlined\u003cbr\u003eAUTHENTICITY_POLICY: polish-first: remove swearing and self-talk, hide most stumbles via\u003cbr\u003e  replacement, conversational tone, not ‘raw’\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music bookends, early agenda: ‘what’s on today’, topic blocks\u003cbr\u003e  + practical wrap-up cta\u003cbr\u003eREORDER_ASSEMBLY: topic-first assembly over chronology, intro\u002ftease built from later\u003cbr\u003e  takes, reorders used to ‘find the clean read’\u003cbr\u003eSPEAKER_TREATMENT: heavy trimming on both hosts, mute interjections during dense\u003cbr\u003e  explanation, protect the ‘expert run’ uninterrupted\u003cbr\u003eRULES:\u003cbr\u003e- CUT host prompting other host MUST: When one host coaches the other (“do that again”,\u003cbr\u003e  “that was good”, “come in here”), unless the prompt is repurposed into a natural handoff\u003cbr\u003e  line.\u003cbr\u003e- CUT on mic production process MUST: When speakers discuss takes, scripts, where to\u003cbr\u003e  splice, camera\u002fscreen setup, or congratulate\u002fcritique delivery, unless it directly sets\u003cbr\u003e  up the next on-air line.\u003cbr\u003e- CUT repeated explanations and duplicate stats MUST: When the same fact or definition is\u003cbr\u003e  stated again to ‘get it right’ (including corrected numbers) and a cleaner version\u003cbr\u003e  exists elsewhere in the session.\u003cbr\u003e- KEEP procedural order MUST: Within step-by-step guidance (deadlines → calculation →\u003cbr\u003e  where to enter it → what to write), preserve the original step order unless there is\u003cbr\u003e  clear confusion.\u003cbr\u003e- KEEP clean handoffs between hosts PREFER: When a short exchange clearly transitions\u003cbr\u003e  between segments or adds context that frames the next block (e.g., why the data matters,\u003cbr\u003e  what to watch next).\u003cbr\u003e- KEEP procedural steps and user actions PREFER: When a segment contains concrete\u003cbr\u003e  instructions, thresholds, deadlines, form fields\u002fboxes, or ‘how to avoid the mistake’\u003cbr\u003e  guidance, even if the cadence is slightly less polished.\u003cbr\u003e- KEEP short personal hook PREFER: During the opening minutes, when the anecdote creates\u003cbr\u003e  rapport and cleanly hands off into the episode agenda; trim for clarity but don’t remove\u003cbr\u003e  entirely.\u003cbr\u003e- MUTE host interjections PREFER: When a brief interjection overlaps or distracts from the\u003cbr\u003e  other host’s technical explanation (dates, thresholds, instructions), and it isn’t\u003cbr\u003e  necessary for meaning.\u003cbr\u003e- REORDER best take selection MUST: When multiple takes cover the same setup line or\u003cbr\u003e  transition, choose the cleanest take and relocate it to the canonical position (segment\u003cbr\u003e  start), cutting the surrounding rehearsal.\u003cbr\u003e- REORDER chapter openers and teases PREFER: When a later, cleaner summary\u002ftease exists\u003cbr\u003e  that can function as the intro or a segment lead-in, even if it requires a large\u003cbr\u003e  timeline shift.","\u003cb\u003eCONFLICTED\u003c\u002fb\u003e\u003cbr\u003eTrump, Netanyahu, and the Iran Endgame\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between clauses, moderate macro cuts; keeps long arcs,\u003cbr\u003e  low tolerance for dead air, fast-paced turn transitions\u003cbr\u003eCUT_CRITERIA: cuts process talk and self-editing, prunes banter once premise set, removes\u003cbr\u003e  redundancy; keeps first clean pass, protects analytic specificity over vibes\u003cbr\u003eAUTHENTICITY_POLICY: polished clarity over rawness, stumbles removed; meaning preserved,\u003cbr\u003e  selective laughter\u002fcrosstalk kept for warmth\u003cbr\u003eSTRUCTURE_TEMPLATE: produced mid-break with recap, music beds to mark beats, intro sets\u003cbr\u003e  context, then dives in\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with tiny repairs, micro-reorders to fix logic, avoids\u003cbr\u003e  thematic reshuffles\u003cbr\u003eSPEAKER_TREATMENT: heavy use of muting for interjections, symmetric tightening of\u003cbr\u003e  host\u002fguest, guest monologues protected; host scaffolding trimmed\u003cbr\u003eRULES:\u003cbr\u003e- CUT redundant rephrases MUST: When the same point is restated within ~1–3 turns, keep\u003cbr\u003e  the most fluent\u002fprecise instance and remove the rest, even if the removed version\u003cbr\u003e  contains minor extra color.\u003cbr\u003e- CUT self-editing process talk MUST: When a speaker flags a restart\u002fcorrection (“I’ll\u003cbr\u003e  repeat,” “let me say that again,” “can we keep going”), unless the meta-moment itself\u003cbr\u003e  becomes a purposeful joke that cleanly tees up the next beat.\u003cbr\u003e- CUT extended banter block PREFER: After the episode has clearly pivoted into the main\u003cbr\u003e  topic, cut banter that delays the next substantive question\u002fanswer, unless it creates a\u003cbr\u003e  crisp tonal reset right before a heavy segment.\u003cbr\u003e- CUT host restatement PREFER: When the host summarizes or rephrases the guest’s point\u003cbr\u003e  without adding a new angle or a clarifying question, especially mid-flow within a\u003cbr\u003e  technical explanation.\u003cbr\u003e- KEEP chronological conversation spine MUST: Default to preserving the recorded sequence\u003cbr\u003e  for major beats (setup → explanation → implications), using reorders only as last-mile\u003cbr\u003e  coherence fixes.\u003cbr\u003e- KEEP guest long form explanation MUST: When the guest is in a multi-paragraph analytic\u003cbr\u003e  build, preserve the full arc and only remove internal clutter (restarts, filler,\u003cbr\u003e  duplicate adjectives).\u003cbr\u003e- KEEP brief shared laughter PREFER: When laughter cleanly punctuates a beat and does not\u003cbr\u003e  overlap key words, keep a short fragment to preserve rapport before returning to\u003cbr\u003e  substance.\u003cbr\u003e- KEEP dense explanatory run PREFER: When a speaker is laying out a multi-step causal\u003cbr\u003e  explanation with named actors\u002fconditions, keep the run intact and tighten internally\u003cbr\u003e  rather than removing whole steps.\u003cbr\u003e- MUTE reactive interjection MUST: When the non-primary speaker is making short\u003cbr\u003e  noises\u002fwords (laughs, “yeah,” “well,” small corrections) over a sustained explanation,\u003cbr\u003e  mute those interjections instead of cutting the primary speaker’s run.\u003cbr\u003e- REORDER topic blocks AVOID: If a reorder would materially change the timeline of how the\u003cbr\u003e  discussion unfolds (topic clustering, highlight front-loading), avoid it; solve pacing\u003cbr\u003e  with cuts\u002fbridges instead.\u003cbr\u003e- REORDER clarifying clause PREFER: When a short clause (1–2 sentences) resolves an\u003cbr\u003e  ambiguity created by a cut or by pronoun\u002fantecedent confusion, move it earlier within\u003cbr\u003e  the same topic block to restore logical flow."],"x":{"dtype":"f4","bdata":"jU35QEyS9UC+oulA+IrtQB2j7kDgB\u002fBApQLwQIUl5UD6uv1A"},"y":{"dtype":"f4","bdata":"eExXQcvRXUH0UFVBvGlTQWz0VEFR0lVBlIJTQfISWUE48ltB"},"type":"scatter"},{"hoverinfo":"skip","line":{"color":"#1f77b4","dash":"dot","width":1.5},"mode":"lines","showlegend":false,"x":{"dtype":"f4","bdata":"TJL1QIUl5UC+oulA+IrtQKUC8ECNTflA+rr9QEyS9UA="},"y":{"dtype":"f4","bdata":"y9FdQfISWUH0UFVBvGlTQZSCU0F4TFdBOPJbQcvRXUE="},"type":"scatter"},{"hoverinfo":"skip","mode":"text","showlegend":false,"text":["Macro-Block Pruning"],"textfont":{"color":"#1f77b4","size":9},"x":[7.526418209075928],"y":[13.452457427978516],"type":"scatter"},{"hoverinfo":"text","marker":{"color":"#ff7f0e","line":{"color":"white","width":0.5},"size":8},"mode":"markers","name":"Micro-Trim Strategy","text":["\u003cb\u003eBook Riot - The Podcast\u003c\u002fb\u003e\u003cbr\u003eA Proposed Nationwide Book Ban, The NYPL's Most Checked Out Books of All-Time, and more\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaving between turns, keeps macro blocks largely intact,\u003cbr\u003e  willing to lengthen with inserts, low tolerance for dead air\u003cbr\u003eCUT_CRITERIA: cut micro-stumbles, keep the riff, tolerant of meandering banter,\u003cbr\u003e  housekeeping gets replaced by copy, clarity beats verbatim completeness\u003cbr\u003eAUTHENTICITY_POLICY: polished but not sterilized, selective roughness kept for voice,\u003cbr\u003e  edits aim to be invisible, minor repetition sometimes tolerated\u003cbr\u003eSTRUCTURE_TEMPLATE: sponsor-forward produced open, frequent midroll ad blocks, music beds\u003cbr\u003e  as separators, cta\u002fshow-notes before wrap\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved; inserts interleaved, no thematic re-assembly\u003cbr\u003e  impulse, transitions solved with stitching, reorder only if necessary\u003cbr\u003eSPEAKER_TREATMENT: aggressively manage overlap via mute, lead speaker continuity\u003cbr\u003e  protected, backchannels reduced under narration, co-host interruptions softened, not\u003cbr\u003e  erased\u003cbr\u003eRULES:\u003cbr\u003e- CUT function word clutter MUST: When a sentence is already syntactically clear, remove\u003cbr\u003e  stray connectors and starter fragments (e.g., extra “and\u002fbut\u002fof\u002fabout”) that only slow\u003cbr\u003e  pacing.\u003cbr\u003e- CUT duplicate acknowledgments PREFER: When multiple consecutive acknowledgments\u003cbr\u003e  (“yeah\u002fmmm\u002fright”) accumulate without adding meaning, reduce to one representative beat.\u003cbr\u003e- CUT live housekeeping PREFER: When scheduling notes, recaps, or feed reminders can be\u003cbr\u003e  delivered more cleanly as produced copy (or are already covered elsewhere), remove the\u003cbr\u003e  in-conversation version.\u003cbr\u003e- KEEP banter run PREFER: When the hosts are in an entertaining back-and-forth that builds\u003cbr\u003e  rapport or comedic payoff, preserve the run even if it’s off the main news agenda.\u003cbr\u003e- KEEP chronological topic progression PREFER: When the segment naturally escalates from\u003cbr\u003e  setup → examples → takeaway, preserve that progression even if it’s slightly long.\u003cbr\u003e- KEEP strong reaction beats PREFER: Keep emphatic reactions and opinionated lines that\u003cbr\u003e  define the hosts’ stance, even if they’re slightly messy or repetitive, unless they\u003cbr\u003e  derail comprehension.\u003cbr\u003e- KEEP supportive backchannel PREFER: When a backchannel lands in a gap or reinforces an\u003cbr\u003e  emotional\u002fstance beat without masking content words, keep it for conversational energy.\u003cbr\u003e- MUTE secondary overlap MUST: When one speaker talks over another during an explanatory\u003cbr\u003e  or narrative line and the overlap is non-essential (clarifying, finishing, or side-\u003cbr\u003e  commentary), mute the overlapping speaker instead of cutting the lead’s line.\u003cbr\u003e- REORDER topic blocks AVOID: Avoid moving full discussion blocks to create a new thematic\u003cbr\u003e  arc; use chronological order unless a block is unusably confusing in-place.\u003cbr\u003e- REORDER ad break boundaries PREFER: If needed to support a clean sponsor insertion,\u003cbr\u003e  shift only the minimum surrounding lines to create a clear pre-break button and a clean\u003cbr\u003e  post-break re-entry.","\u003cb\u003eCoaches Panel | Fantasy AFL Podcasts\u003c\u002fb\u003e\u003cbr\u003eHawthorn Vs Western Bulldogs Community Series Review\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: minimal runtime reduction overall, relentless sub-second micro-shaves, tight\u003cbr\u003e  pause trimming, not block cuts\u003cbr\u003eCUT_CRITERIA: word-level cleanup over topic removal, protects full analytical reasoning\u003cbr\u003e  arcs, promo\u002fcta copy largely left intact\u003cbr\u003eAUTHENTICITY_POLICY: meaning-first over verbal polish, surgical cleanup stays invisible,\u003cbr\u003e  run-on, solo-monologue feel retained\u003cbr\u003eSTRUCTURE_TEMPLATE: branded cold open stinger(s), long single-host intro roll-in, single\u003cbr\u003e  midroll ad interruption\u003cbr\u003eREORDER_ASSEMBLY: chronology protected end-to-end, no thematic reshuffle, assembly edits\u003cbr\u003e  limited to inserts\u003cbr\u003eSPEAKER_TREATMENT: single-voice clarity is the priority, micro-mutes used to repair\u003cbr\u003e  phrasing, edits preserve the host’s cadence\u003cbr\u003eRULES:\u003cbr\u003e- CUT reorder opportunities AVOID: When a reorder would merely improve energy or tighten\u003cbr\u003e  the arc but is not required for comprehension.\u003cbr\u003e- CUT host micro stumbles MUST: When the host has quick verbal hiccups (single-word\u003cbr\u003e  repeats, clipped starts) that can be removed without altering emphasis.\u003cbr\u003e- CUT micro function words MUST: When a single word (articles, pronouns, tiny\u003cbr\u003e  interjections) causes a cadence snag or creates a double-start, and removing it\u003cbr\u003e  preserves grammatical sense.\u003cbr\u003e- CUT self-referential asides PREFER: When the host briefly comments on their own wording\u003cbr\u003e  or tone (e.g., meta commentary about phrasing) and it doesn’t add a new takeaway.\u003cbr\u003e- KEEP extended host monologue PREFER: When the host is in a sustained rundown or list-\u003cbr\u003e  format analysis, even if the delivery is dense, provided the through-line remains clear.\u003cbr\u003e- KEEP promo cta block PREFER: When the host transitions into show announcements, live-\u003cbr\u003e  event plugs, or audience calls-to-action, unless it becomes clearly outdated or off-\u003cbr\u003e  topic for the episode’s purpose.\u003cbr\u003e- KEEP reasoning chain PREFER: When the host is building a multi-step explanation (cause →\u003cbr\u003e  implication → fantasy takeaway), even if it includes mild repetition or restatement.\u003cbr\u003e- MUTE host fragment PREFER: When a very short fragment inside a sentence creates\u003cbr\u003e  confusion or a grammatical dead-end, and muting it avoids a more noticeable splice.\u003cbr\u003e- REORDER external insert placement PREFER: When necessary to place a branded intro sting\u003cbr\u003e  before the first in-session line or to position an ad break cleanly between complete\u003cbr\u003e  thoughts.","\u003cb\u003eA Touch More with Sue Bird & Megan Rapinoe\u003c\u002fb\u003e\u003cbr\u003eGold Standard: USA Women Olympians and the WNBA's First Rev Share in History\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro cuts over micro-sanding, keeps long emotional\u002fargument arcs, low-to-\u003cbr\u003e  moderate pause tightening, willing to drop whole subtopics\u003cbr\u003eCUT_CRITERIA: cuts on-mic producing and resets, protects personality bits and banter,\u003cbr\u003e  redundancy collapsed to one clean pass, avoids platforming objectionable quotes\u003cbr\u003eAUTHENTICITY_POLICY: produced-clean, not raw, conversational looseness still allowed,\u003cbr\u003e  swearing retained when emphatic, pickup\u002fvo patches accepted\u003cbr\u003eSTRUCTURE_TEMPLATE: chaptered 'topic' progression, recurring mailbag + signature segment,\u003cbr\u003e  music stings as separators, frequent mid-episode ad blocks\u003cbr\u003eREORDER_ASSEMBLY: theme-first assembly over timeline, open built from late-recorded\u003cbr\u003e  pieces, reorders used continuously, not rarely, transitions rebuilt with inserts\u003cbr\u003eSPEAKER_TREATMENT: aggressive micro-mutes inside sentences, protects emotional condolences\u003cbr\u003e  intact, minimal crosstalk emphasis, host voice is the spine\u003cbr\u003eRULES:\u003cbr\u003e- CUT on mic producing MUST: Whenever speakers discuss how to run the segment (what to\u003cbr\u003e  cover, what to cut, who will explain, whether to redo), including count-ins and reset\u003cbr\u003e  attempts.\u003cbr\u003e- CUT platforming clip or quote MUST: When the content is referenced as\u003cbr\u003e  widespread\u002favailable elsewhere and repeating it would amplify it; summarize the impact\u003cbr\u003e  instead of playing\u002freading it.\u003cbr\u003e- CUT redundant restatement MUST: When the same factual setup or anecdote is delivered\u003cbr\u003e  again later (or reappears via pickup), keep only one version unless the second adds a\u003cbr\u003e  clearly new detail or emotional turn.\u003cbr\u003e- CUT speaker self editing MUST: When the speaker narrates their own restart ('let me say\u003cbr\u003e  that again', 'start over') and a clean take follows; keep only the clean take.\u003cbr\u003e- CUT overlong example detail PREFER: When a story starts drifting into optional minutiae\u003cbr\u003e  (dates, side explanations, second-order digressions) that don’t change the point;\u003cbr\u003e  preserve the headline and the best line(s).\u003cbr\u003e- KEEP emotional peak MUST: When the speaker is expressing grief, tribute, or heartfelt\u003cbr\u003e  stakes-setting at the top of the episode; prioritize continuity over tightness.\u003cbr\u003e- KEEP banter as segment PREFER: When the banter is structured as a recurring bit\u003cbr\u003e  (listener prompt, call-in ask, signature segment) and has a clear beginning\u002fend beat.\u003cbr\u003e- KEEP chronology within story PREFER: Within a single emotional story or argument arc,\u003cbr\u003e  keep internal chronology intact; only reorder around the edges (setup before, reactions\u003cbr\u003e  after).\u003cbr\u003e- MUTE single word bumps PREFER: When a stray word\u002fpartial phrase disrupts a line but the\u003cbr\u003e  surrounding sentence is strong; mute the intrusion rather than cutting the whole\u003cbr\u003e  sentence or forcing a jump cut.\u003cbr\u003e- REORDER segment frames MUST: When a cleaner introduction, tease, or segment label exists\u003cbr\u003e  later in the session, move it earlier to serve as the functional entry point for that\u003cbr\u003e  section.\u003cbr\u003e- REORDER ads and promos PREFER: Place sponsor\u002fpromo reads at chapter boundaries or energy\u003cbr\u003e  dips, even if that means breaking chronological order; avoid inserting them mid-\u003cbr\u003e  emotional beat unless unavoidable.\u003cbr\u003e- REORDER topic blocks PREFER: When a topic is discussed in multiple scattered bursts,\u003cbr\u003e  cluster the strongest continuous stretch into one block and relocate brief leftovers\u003cbr\u003e  only if they add a missing beat.","\u003cb\u003eSports Cards Nonsense\u003c\u002fb\u003e\u003cbr\u003eThe European Sports Card Market is BOOMING: What We Learned in 18 Days\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high-retention, light tightening, long turns mostly unbroken, few silence\u003cbr\u003e  trims; pacing stays natural, micro-cuts used sparingly\u003cbr\u003eCUT_CRITERIA: cuts friction only when derailing, keeps spicy\u002firreverent banter, prefers\u003cbr\u003e  surgical deletions over dropping topics, removes tiny stray fragments\u003cbr\u003eAUTHENTICITY_POLICY: overlap and interruptions left in, rough conversational edges\u003cbr\u003e  preserved, polish is mostly invisible, cleans only obvious clunk\u003cbr\u003eSTRUCTURE_TEMPLATE: cold open teaser from outside, ads dropped into main flow, minimal\u003cbr\u003e  segment labeling, short, casual wrap\u003cbr\u003eREORDER_ASSEMBLY: chronology protected, no thematic reshuffling, insertions used instead\u003cbr\u003e  of reorders\u003cbr\u003eSPEAKER_TREATMENT: secondary host minimized via muting, primary host kept as through-line,\u003cbr\u003e  crosstalk tolerated as texture, backchannels suppressed under speech\u003cbr\u003eRULES:\u003cbr\u003e- CUT micro derails MUST: When a speaker starts a thought, abandons it, or produces a\u003cbr\u003e  dangling fragment that doesn’t get paid off in the next line and only adds verbal\u003cbr\u003e  clutter.\u003cbr\u003e- CUT self-referential show management PREFER: When the conversation slips into meta about\u003cbr\u003e  how to run the show (who should lead, whether to monologue, etc.), unless it reveals\u003cbr\u003e  real stakes or tees up a topic transition.\u003cbr\u003e- KEEP chronological flow MUST: Throughout the main conversation, even when topics drift,\u003cbr\u003e  unless chronology itself creates a clear continuity error that cannot be solved with a\u003cbr\u003e  small cut.\u003cbr\u003e- KEEP detailed example runs PREFER: When a speaker is stacking concrete examples\u003cbr\u003e  (numbers, comps, named items) to make a market point, even if it’s repetitive, unless it\u003cbr\u003e  becomes purely list-reading without commentary.\u003cbr\u003e- KEEP edgy banter PREFER: When the banter is part of the hosts’ chemistry and lands as a\u003cbr\u003e  punchline or framing beat, even if it’s abrasive, unless it blocks the next substantive\u003cbr\u003e  point for more than a brief exchange.\u003cbr\u003e- KEEP guest interruption energy PREFER: When the guest interrupts with a punchy reaction\u003cbr\u003e  or quick clarification that sharpens the beat, even if it creates brief overlap.\u003cbr\u003e- KEEP host laughs reactions PREFER: When laughter\u002freaction is the payoff to a joke or\u003cbr\u003e  signals rapport, unless it piles up and delays the next line.\u003cbr\u003e- MUTE tertiary host asides MUST: When a tertiary\u002fsecondary voice jumps in with commentary\u003cbr\u003e  during an established host–guest exchange, unless the primary host explicitly hands them\u003cbr\u003e  the floor for a full contribution.\u003cbr\u003e- MUTE overlapping backchannels PREFER: When a speaker is actively delivering a longer\u003cbr\u003e  point and another speaker’s ‘yeah \u002f mm-hmm \u002f correct’ sits on top of it without adding\u003cbr\u003e  new information.\u003cbr\u003e- REORDER ad blocks AVOID: Only if needed to move an external ad read to the nearest clean\u003cbr\u003e  topic boundary (between beats), without changing the order of the surrounding\u003cbr\u003e  discussion.\u003cbr\u003e- REORDER story blocks MUST: Do not relocate a narrative\u002frecap block (travel recap, show\u003cbr\u003e  recap, etc.) earlier just to ‘hook’ the listener—use a teaser insert instead.","\u003cb\u003eCoaches Panel | Fantasy AFL Podcasts\u003c\u002fb\u003e\u003cbr\u003eAdelaide vs Fremantle Community Series Review\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: very high retention, light touch, relentless micro-shaves, not macro cuts,\u003cbr\u003e  cadence-first trimming over rewrite, runtime can grow via inserts\u003cbr\u003eCUT_CRITERIA: cuts mostly single-word clutter, keeps repetitive emphasis for conviction,\u003cbr\u003e  protects long uninterrupted argument runs, avoids removing whole topic blocks\u003cbr\u003eAUTHENTICITY_POLICY: polished but not over-sanitized, some 'uh' cadence survives, edits\u003cbr\u003e  aim to be invisible, minimal rewriting of voice\u003cbr\u003eSTRUCTURE_TEMPLATE: produced stinger cold open, single continuous main monologue, midroll\u003cbr\u003e  ad as a drop-in, cta-heavy outro preserved\u003cbr\u003eREORDER_ASSEMBLY: chronology respected almost absolutely, no thematic reshuffling,\u003cbr\u003e  assembly relies on inserts, not reorders\u003cbr\u003eSPEAKER_TREATMENT: single-speaker pacing cleanup, occasional mid-sentence word-mutes,\u003cbr\u003e  protects the host’s momentum\u003cbr\u003eRULES:\u003cbr\u003e- CUT single word hesitations connectors MUST: When a one-word tic (e.g., a stray\u003cbr\u003e  starter\u002fconnector) delays the next substantive clause without adding emphasis.\u003cbr\u003e- CUT host restart tokens PREFER: When the host re-approaches a clause with a fresh start\u003cbr\u003e  and the first start adds no distinct meaning (keep the cleaner second pass).\u003cbr\u003e- CUT micro repeats inside sentence PREFER: When a phrase restarts mid-sentence (or\u003cbr\u003e  doubles a noun\u002fverb) and the meaning is fully preserved by removing the restart.\u003cbr\u003e- KEEP chronological sequence MUST: For the main discussion, unless a local swap is\u003cbr\u003e  required to restore basic clarity (e.g., a reference that otherwise lacks context).\u003cbr\u003e- KEEP calls to action and housekeeping outro PREFER: When the host transitions into\u003cbr\u003e  audience CTAs and show housekeeping as a clear closing beat\u003cbr\u003e  (subscribe\u002fcomment\u002fsocials\u002fmerch\u002flive show), even if it’s dense.\u003cbr\u003e- KEEP long analysis run PREFER: When the host is in a multi-sentence\u003cbr\u003e  evaluation\u002fexplanation run, even if it contains minor redundancy or rhetorical re-\u003cbr\u003e  stating.\u003cbr\u003e- KEEP rhetorical intensity PREFER: When heightened language (imperatives, strong\u003cbr\u003e  recommendations, repeated certainty) is central to the segment’s purpose, even if it’s a\u003cbr\u003e  bit verbose.\u003cbr\u003e- MUTE mid sentence word artifact PREFER: When a single word\u002ffragment is clearly redundant\u003cbr\u003e  or an artifact and muting it preserves the sentence’s timing better than cutting a\u003cbr\u003e  larger span.\u003cbr\u003e- REORDER topic blocks AVOID: Avoid reordering topic\u002fplayer blocks for thematic grouping\u003cbr\u003e  when the original flow already follows a coherent rundown.\u003cbr\u003e- REORDER ad break positioning PREFER: If an insert must be moved, place it only at a\u003cbr\u003e  sentence\u002fsection boundary where the host is already pivoting topics (never mid-thought).","\u003cb\u003eMotley Fool Money\u003c\u002fb\u003e\u003cbr\u003eMailbag, incl: Is government really to blame for inflation? March 1, 2026\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-full-session retention, micro-shaves between words, natural pacing over\u003cbr\u003e  tightness, allows long uninterrupted turns\u003cbr\u003eCUT_CRITERIA: banter and rabbit-holes stay in, cut only for clarity\u002fcompliance, protect\u003cbr\u003e  full reasoning arcs, very light punchline cleanup\u003cbr\u003eAUTHENTICITY_POLICY: crosstalk left largely intact, laughs and rough edges preserved,\u003cbr\u003e  minimal cleanup is audible, conversational messiness tolerated\u003cbr\u003eSTRUCTURE_TEMPLATE: branded cold open + music, live hosty intro stays loose, mailbag\u003cbr\u003e  blocks run long, cta\u002flegal stacked in outro\u003cbr\u003eREORDER_ASSEMBLY: chronological order is preserved, no thematic reshuffling, external bits\u003cbr\u003e  act as separators\u003cbr\u003eSPEAKER_TREATMENT: protects the active speaker’s runway, non-active speaker often muted,\u003cbr\u003e  overlap allowed when it lands, airtime balance not force-fixed\u003cbr\u003eRULES:\u003cbr\u003e- CUT micro stumble or single word repeat MUST: When a stumble\u002frestart can be removed\u003cbr\u003e  without changing tone or sentence structure (sub-second to ~2s trims).\u003cbr\u003e- CUT host interruption attempt PREFER: When an interjection starts to redirect the topic\u003cbr\u003e  but the other speaker is mid-argument and continuing; prefer removing the interruption\u003cbr\u003e  over breaking the argument arc.\u003cbr\u003e- CUT post-insert adlib tagline PREFER: Immediately after a produced promo\u002fCTA line, if an\u003cbr\u003e  improvised tag could be mistaken as part of the official message or muddies the read.\u003cbr\u003e- KEEP chronological sequence MUST: For the main conversation and Q&A blocks, unless a\u003cbr\u003e  continuity problem cannot be solved with a cut\u002fmute and would otherwise confuse a first-\u003cbr\u003e  time listener.\u003cbr\u003e- KEEP crosstalk punch in PREFER: When the overlap completes a joke, supplies a key word,\u003cbr\u003e  or clearly sharpens the point (not just agreement).\u003cbr\u003e- KEEP story block PREFER: When a speaker is building an extended explanation\u002fargument\u003cbr\u003e  (even if repetitive or long-winded), unless it fully derails into a new topic with no\u003cbr\u003e  payoff.\u003cbr\u003e- MUTE host backchannel under monologue MUST: When one host is in a sustained explanation\u003cbr\u003e  and the other host’s interjections are purely affirmations or partial words that\u003cbr\u003e  distract in transcript\u002faudio.\u003cbr\u003e- MUTE supportive backchannels MUST: When the non-leading speaker’s “yeah\u002fmm-hmm\u002fyou”\u003cbr\u003e  overlays the leading speaker’s long turn and adds no new information.\u003cbr\u003e- REORDER external insert PREFER: Only to relocate produced elements (bumper\u002fCTA\u002flegal)\u003cbr\u003e  into standard intro\u002foutro positions without changing the conversational timeline.","\u003cb\u003eYou Are Not Broken\u003c\u002fb\u003e\u003cbr\u003e360. ISSWSH 2026 Review\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between words, near-zero pause tolerance, keeps full\u003cbr\u003e  blocks, trims inside, runtime tightened without reshaping\u003cbr\u003eCUT_CRITERIA: cuts tiny connectors aggressively, protects substantive, info-dense lists,\u003cbr\u003e  removes uncertainty to avoid errors, keeps spicy\u002fvoicey emphasis intact\u003cbr\u003eAUTHENTICITY_POLICY: cleans mechanics, not personality, profanity and strong opinions\u003cbr\u003e  remain, rough spontaneity tolerated, polish achieved via invisible trims\u003cbr\u003eSTRUCTURE_TEMPLATE: produced intro, then straight in, sponsor\u002fads dropped mid-flow,\u003cbr\u003e  minimal segmentation beyond ad breaks, produced outro with cta\u002fdisclaimer\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved end-to-end, no thematic reshuffle, assembly relies\u003cbr\u003e  on cuts, not moves\u003cbr\u003eSPEAKER_TREATMENT: single-speaker pacing surgery, mutes stray words under inserts, host\u003cbr\u003e  allowed to be blunt\u003cbr\u003eRULES:\u003cbr\u003e- CUT host connector words MUST: When a sentence remains grammatical and meaning-identical\u003cbr\u003e  without brief connectors (e.g., leading 'and\u002fso\u002fthat said\u002fjust'), especially in rapid\u003cbr\u003e  list sections.\u003cbr\u003e- CUT host self-referential process talk PREFER: When the host narrates their own process\u003cbr\u003e  ('I’ll apologize if…', 'this isn’t comprehensive', 'what else do I want to talk about')\u003cbr\u003e  and it doesn’t add substantive context.\u003cbr\u003e- CUT host uncertain fact asides PREFER: When the host expresses uncertainty or starts\u003cbr\u003e  guessing (names, places, exact details) and it does not materially affect the takeaway.\u003cbr\u003e- KEEP emphatic voice lines PREFER: When profanity, strong phrasing, or punchy framing\u003cbr\u003e  provides motivational energy or clarifies stance, even if it’s slightly rough around the\u003cbr\u003e  edges.\u003cbr\u003e- KEEP numbered housekeeping updates PREFER: When the host is clearly moving through a\u003cbr\u003e  sequence of announcements or key points (even if promotional), unless the section\u003cbr\u003e  becomes repetitive without new information.\u003cbr\u003e- MUTE host spillover under external MUST: When the host continues speaking into an\u003cbr\u003e  inserted external segment or a duplicated phrase overlaps the insert boundary.\u003cbr\u003e- REORDER topic blocks AVOID: Only when a chronological segment creates clear listener\u003cbr\u003e  confusion that cannot be resolved with micro-cuts or a short clarifying line."],"x":{"dtype":"f4","bdata":"XMLcQI+70UDVA9FAVAPkQMpd1kAet9dAz5nQQA=="},"y":{"dtype":"f4","bdata":"OlyFQWIqh0E8MYNBdA+GQRDOhkHfdYRB0h6HQQ=="},"type":"scatter"},{"hoverinfo":"skip","line":{"color":"#ff7f0e","dash":"dot","width":1.5},"mode":"lines","showlegend":false,"x":{"dtype":"f4","bdata":"z5nQQNUD0UBUA+RAj7vRQM+Z0EA="},"y":{"dtype":"f4","bdata":"0h6HQTwxg0F0D4ZBYiqHQdIeh0E="},"type":"scatter"},{"hoverinfo":"skip","mode":"text","showlegend":false,"text":["Micro-Trim Strategy"],"textfont":{"color":"#ff7f0e","size":9},"x":[6.724117755889893],"y":[16.717220306396484],"type":"scatter"},{"hoverinfo":"text","marker":{"color":"#2ca02c","line":{"color":"white","width":0.5},"size":8},"mode":"markers","name":"Anchor-Block Rule Editing","text":["\u003cb\u003eCommSec Market Update\u003c\u002fb\u003e\u003cbr\u003eMorning Report 02 Mar 26: ASX set for rocky start after strikes on Iran\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between words, macro blocks cut in chunks, low pause\u003cbr\u003e  tolerance, but padded, brief episode-length target\u003cbr\u003eCUT_CRITERIA: off-air process removed completely, redundancy collapsed mid-sentence,\u003cbr\u003e  function-word trims to de-stumble, keeps core market rundown intact\u003cbr\u003eAUTHENTICITY_POLICY: heavily cleaned, lightly human, allows minor rough pronunciations,\u003cbr\u003e  edits stay mostly invisible, no on-mic meta commentary\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music bookends, straight-to-markets after title, recurring\u003cbr\u003e  closing segment retained, compliance disclaimer appended\u003cbr\u003eREORDER_ASSEMBLY: chronological assembly strongly preferred, retakes solved by\u003cbr\u003e  substitution, not shuffle, no thematic re-chaptering\u003cbr\u003eSPEAKER_TREATMENT: on-air hosts only, non-talent voices removed entirely, word-level mutes\u003cbr\u003e  permitted, host narration protected over chatter\u003cbr\u003eRULES:\u003cbr\u003e- CUT off air process MUST: When the talk is about recording logistics, practicing lines,\u003cbr\u003e  restarting, directing eye-line, or praising the take (pre-roll or post-roll), even if\u003cbr\u003e  it’s lively.\u003cbr\u003e- CUT producer or third party speech MUST: When a non-on-air participant speaks (coaching,\u003cbr\u003e  confirming, giving directions, reacting), regardless of whether they are labeled as a\u003cbr\u003e  guest in the session metadata.\u003cbr\u003e- CUT redundant phrase repeat MUST: When a speaker restates the same clause or statistic\u003cbr\u003e  back-to-back (e.g., repeated timeframe or descriptor), keep only one clean version even\u003cbr\u003e  if it requires cutting through a sentence.\u003cbr\u003e- CUT back and forth acknowledgments PREFER: When brief interjections (e.g., quick\u003cbr\u003e  affirmations) interrupt a host’s continuous explanatory run and do not add information.\u003cbr\u003e- CUT micro stumble words PREFER: When a stumble can be fixed by removing one or two small\u003cbr\u003e  words (articles, interjections, partial lead-ins) without changing meaning or audibility\u003cbr\u003e  of the surrounding sentence.\u003cbr\u003e- KEEP original rundown order MUST: When the episode follows a predictable news\u002fmarkets\u003cbr\u003e  rundown (lead → commodities → FX → global wrap → week ahead → closing beat).\u003cbr\u003e- KEEP market fact blocks PREFER: When the content is a structured run of market\u003cbr\u003e  moves\u002fdata (commodities, FX, US leads, week-ahead diary), unless it is clearly\u003cbr\u003e  superseded by a cleaner retake.\u003cbr\u003e- MUTE single word glitch or unwanted word PREFER: When removing one word fixes a\u003cbr\u003e  slip\u002frepetition without forcing a larger recut of the sentence.\u003cbr\u003e- REORDER topic blocks AVOID: Only when a later retake is clearly intended to replace an\u003cbr\u003e  earlier failed pass and can be swapped in without changing surrounding references;\u003cbr\u003e  otherwise avoid reordering.","\u003cb\u003eThe Rest Is Politics: US\u003c\u002fb\u003e\u003cbr\u003e164. Iran’s Leader Dead: What’s Trump’s Next Move?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between clauses, macro-cut full pre\u002fpost blocks, lets\u003cbr\u003e  long analysis breathe, low silence-editing emphasis\u003cbr\u003eCUT_CRITERIA: cuts meta talk, keeps substance, prunes repetition more than nuance, keeps\u003cbr\u003e  pointed banter as texture, protects careful caveats\u002fdisclaimers\u003cbr\u003eAUTHENTICITY_POLICY: cleans transcript without sterilizing, leaves some interruptions and\u003cbr\u003e  texture, prefers invisible edits over retakes\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music bed open, hard topic pivot after break, on-air tease\u003cbr\u003e  lines recorded clean, promo-driven produced outro\u003cbr\u003eREORDER_ASSEMBLY: heavy thematic re-assembly, reorders to keep logic linear, builds\u003cbr\u003e  segments from fragments\u003cbr\u003eSPEAKER_TREATMENT: primary host narration protected, secondary host backchannels heavily\u003cbr\u003e  muted, tolerates brief crosstalk for energy\u003cbr\u003eRULES:\u003cbr\u003e- CUT duplicate bridges created by reorder MUST: After reordering, if transitional phrases\u003cbr\u003e  now repeat (‘so anyway’, ‘as we said earlier’) or refer to removed material, trim or\u003cbr\u003e  remove those bridges.\u003cbr\u003e- CUT production meta MUST: When speakers discuss rundown planning, timing, how long to\u003cbr\u003e  go, transitions, or post-show tasks (newsletter, subscribe prompts, editorial notes),\u003cbr\u003e  unless it is re-recorded as an on-air line meant for listeners.\u003cbr\u003e- CUT host over-clarification PREFER: When a host adds an extra clause that restates what\u003cbr\u003e  the other host just said (especially ‘politically’\u002f‘directionally’ type re-labelling),\u003cbr\u003e  unless it introduces a genuinely new angle or question.\u003cbr\u003e- CUT redundant restatements PREFER: When a speaker repeats the same claim\u002fqualifier in\u003cbr\u003e  adjacent sentences (e.g., ‘I’m not saying X’ loops, repeated scene-setting), unless the\u003cbr\u003e  repetition is being used for a deliberate rhetorical punchline.\u003cbr\u003e- KEEP responsible caveats MUST: When allegations\u002funcertain reporting is discussed and the\u003cbr\u003e  speaker includes explicit uncertainty, attribution, or ‘we don’t know’ language that\u003cbr\u003e  limits the claim.\u003cbr\u003e- KEEP banter as release valve PREFER: When a joke\u002faside lands quickly and functions as a\u003cbr\u003e  pressure-release without derailing the topic for more than a beat.\u003cbr\u003e- KEEP brief supportive crosstalk PREFER: When overlap is very short and functions as\u003cbr\u003e  affirmation or conversational momentum without obscuring key words.\u003cbr\u003e- MUTE non lead backchannel MUST: When one host is delivering a continuous explanation and\u003cbr\u003e  the other adds short acknowledgments (‘mm’, ‘right’, quick asides) that compete with\u003cbr\u003e  clarity.\u003cbr\u003e- REORDER topic blocks MUST: When the session jumps between topics or returns to earlier\u003cbr\u003e  points, cluster material into clean topical runs (e.g., keep one story coherent before\u003cbr\u003e  pivoting).\u003cbr\u003e- REORDER explanations before references PREFER: When a later passage contains key context\u003cbr\u003e  (definitions, timeline, premise) needed to understand an earlier exchange, move that\u003cbr\u003e  context earlier within the same segment.","\u003cb\u003eBreaking Points with Krystal and Saagar\u003c\u002fb\u003e\u003cbr\u003e3\u002f1\u002f26: BREAKING: 3 Americans KIA, Oil $ SPIKE, Ayatollah Killed\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-full-session retention, long uninterrupted monologue blocks, no silence\u003cbr\u003e  tightening\u003cbr\u003eCUT_CRITERIA: cuts target outro housekeeping loops, keeps dense detail and caveats,\u003cbr\u003e  preserves live, in-the-moment reactions\u003cbr\u003eAUTHENTICITY_POLICY: stumbles and verbal clutter tolerated, minimal polish on phrasing,\u003cbr\u003e  caveat language left intact\u003cbr\u003eSTRUCTURE_TEMPLATE: network ad pre-roll then straight start, single continuous main block,\u003cbr\u003e  network ad post-roll wrap\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved end-to-end, no thematic reshuffling to tighten,\u003cbr\u003e  only assemble via bookends\u003cbr\u003eSPEAKER_TREATMENT: uses muting for selective line removal, protects continuity over hard\u003cbr\u003e  cuts, single-speaker dominance left unbalanced\u003cbr\u003eRULES:\u003cbr\u003e- CUT host meta thanks and subscriber plugs PREFER: When they appear in multiple variants\u003cbr\u003e  within the same outro window; keep one clean sign-off at most.\u003cbr\u003e- CUT outro housekeeping repetition PREFER: When the host cycles through multiple versions\u003cbr\u003e  of sign-offs, thanks, caveats-about-fluidity, or tomorrow-promos after the main\u003cbr\u003e  substance has concluded.\u003cbr\u003e- KEEP chronological sequence MUST: Across the main briefing, even when later sections\u003cbr\u003e  would make a stronger hook than the opening.\u003cbr\u003e- KEEP host uncertainty markers MUST: When the host explicitly distinguishes confirmed vs\u003cbr\u003e  reported information; do not mute these as ‘waffling’ even if frequent.\u003cbr\u003e- KEEP live breaking update and emotional reaction MUST: When the host receives a major\u003cbr\u003e  update mid-recording and reacts in real time, even if the transition is abrupt or the\u003cbr\u003e  delivery is messy.\u003cbr\u003e- KEEP detail heavy context blocks PREFER: When the host is laying out a factual landscape\u003cbr\u003e  (who was hit, what systems, what locations, what sources), unless it becomes purely\u003cbr\u003e  speculative with no new claims.\u003cbr\u003e- MUTE host redundant phrases within running sentence PREFER: When the host repeats the\u003cbr\u003e  same idea in stacked clauses (especially during closing remarks) and removing the line\u003cbr\u003e  won’t break grammatical continuity of the surrounding audio.\u003cbr\u003e- REORDER topic blocks AVOID: Only when a later clarification is necessary for\u003cbr\u003e  understanding an earlier claim and cannot be solved with a small cut.","\u003cb\u003eThe DSR Daily Brief\u003c\u002fb\u003e\u003cbr\u003eMarch 2: War with Iran Expands Across the Region\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-complete take retention, micro-shaves over macro cuts, light silence\u003cbr\u003e  tightening, pacing follows live cadence\u003cbr\u003eCUT_CRITERIA: trim only flow-breaking fragments, long host riffs stay intact, fix tiny\u003cbr\u003e  awkward wordings, overlap cleaned surgically\u003cbr\u003eAUTHENTICITY_POLICY: profanity left in for emphasis, minimal de-umming overall, rough\u003cbr\u003e  edges tolerated, edits kept largely invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: standardized produced promo open, rundown-style host handoffs, midroll\u003cbr\u003e  sponsor break in main, produced sponsor close-out\u003cbr\u003eREORDER_ASSEMBLY: chronology is effectively locked, no thematic reshuffling, no cold-open\u003cbr\u003e  rearranging\u003cbr\u003eSPEAKER_TREATMENT: primary host airtime protected, secondary hosts minimally trimmed,\u003cbr\u003e  selective muting instead of cutting turns, crosstalk mostly tolerated\u003cbr\u003eRULES:\u003cbr\u003e- CUT stray tail words MUST: When a speaker adds a trailing word\u002fhalf-phrase that doesn’t\u003cbr\u003e  change meaning and makes the line land awkwardly (often at the end of a joke, aside, or\u003cbr\u003e  emphatic statement).\u003cbr\u003e- CUT quote cleanup micro PREFER: When reading\u002fparaphrasing a quote or attribution and\u003cbr\u003e  there’s a tiny extraneous insert that muddies comprehension without adding color.\u003cbr\u003e- KEEP chronological sequence MUST: Throughout the main rundown, even when a later line\u003cbr\u003e  might ‘hook’ better earlier or when an aside could be relocated to improve momentum.\u003cbr\u003e- KEEP extended host analysis PREFER: When a host is laying out a multi-sentence argument,\u003cbr\u003e  critique, or context block, even if it’s rhetorically heated or repetitive at the\u003cbr\u003e  sentence level.\u003cbr\u003e- KEEP headline reads PREFER: When a host is delivering the prepared headline\u002fstory text;\u003cbr\u003e  avoid trimming within the read except for obvious micro-stumbles.\u003cbr\u003e- KEEP primary host monologue blocks PREFER: When the primary host is building a critique\u003cbr\u003e  or framing context across many sentences; do not break it up for tightness unless there\u003cbr\u003e  is a clear factual\u002fstructural problem.\u003cbr\u003e- MUTE secondary underbed comment MUST: When a secondary host speaks briefly under another\u003cbr\u003e  speaker in a way that competes with intelligibility and isn’t essential to preserve as\u003cbr\u003e  crosstalk energy.\u003cbr\u003e- MUTE unacknowledged interjection PREFER: When a secondary speaker interjects under\u003cbr\u003e  another speaker and it is not picked up, responded to, or necessary for the beat to\u003cbr\u003e  work.\u003cbr\u003e- REORDER clarity fix only AVOID: Only if a section is out of place due to a recording-\u003cbr\u003e  order mistake and the move is necessary to restore basic narrative\u002flogic; otherwise\u003cbr\u003e  avoid.","\u003cb\u003eFEAR & GREED | Business News\u003c\u002fb\u003e\u003cbr\u003eOil, gold set to surge after US strike; house prices flatline; PM take popularity hit\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro-block pruning over micro-shaving, tight opener; hard-roll into show,\u003cbr\u003e  light silence trimming; occasional padding, lets some overlap ride\u003cbr\u003eCUT_CRITERIA: kills behind-the-scenes talk completely, drops duplicate reads \u002f second\u003cbr\u003e  versions, keeps brief personality digressions, micro-cuts only for snags\u003cbr\u003eAUTHENTICITY_POLICY: allows some repetitions for realism, minimal cleanup of crosstalk\u003cbr\u003e  energy, polish focuses on clarity, not perfection\u003cbr\u003eSTRUCTURE_TEMPLATE: music-bedded headline bulletin framing, quick mid-episode reset sting,\u003cbr\u003e  outro routes to next show segment\u003cbr\u003eREORDER_ASSEMBLY: chronology strongly preserved, no thematic reshuffles, assembly relies\u003cbr\u003e  on cuts, not moves\u003cbr\u003eSPEAKER_TREATMENT: host scaffolding protected; host fluff trimmed, guest answers largely\u003cbr\u003e  intact, mutes used to protect sign-offs\u003cbr\u003eRULES:\u003cbr\u003e- CUT duplicate take or alt version MUST: When a full story rundown or intro is re-\u003cbr\u003e  recorded later in the session and is clearly an alternate\u002fsecond version rather than\u003cbr\u003e  additional content.\u003cbr\u003e- CUT post roll banter MUST: When the conversation shifts to self-review, texting\u002fjoking\u003cbr\u003e  between participants, logistics, or anything not meant for the audience (typically after\u003cbr\u003e  the formal sign-off).\u003cbr\u003e- CUT host redundant restarts PREFER: When the host repeats a phrase multiple times\u003cbr\u003e  ('it’s, it’s, it’s…') without adding emphasis or meaning and the guest turn is already\u003cbr\u003e  set up.\u003cbr\u003e- CUT single word speedbumps PREFER: When a one-word interjection (e.g., 'okay', 'right?',\u003cbr\u003e  stray 'uh') sits between two otherwise clean turns and doesn’t add meaning.\u003cbr\u003e- KEEP guest dense information PREFER: When the guest is delivering figures, market\u003cbr\u003e  implications, or explanatory context; do not over-compress unless it becomes a separate\u003cbr\u003e  tangent.\u003cbr\u003e- KEEP short banter digression PREFER: When the aside is brief, adds personality, and the\u003cbr\u003e  speakers naturally steer back to the main story without needing editorial narration.\u003cbr\u003e- KEEP topic progression PREFER: When the conversation follows a host-led rundown;\u003cbr\u003e  preserve that sequence even if a later item feels more 'exciting' as a hook.\u003cbr\u003e- MUTE guest under host outro or cta PREFER: When the guest’s closing words overlap the\u003cbr\u003e  host’s formal sign-off\u002fCTA and the host line needs to land cleanly.\u003cbr\u003e- MUTE unhelpful interjection under other speaker PREFER: When a speaker’s partial\u003cbr\u003e  word\u002ffalse start or background comment lands under the other speaker’s sentence and\u003cbr\u003e  would distract from the lead line or question.\u003cbr\u003e- REORDER segment blocks AVOID: Only when two blocks are clearly independent\u003cbr\u003e  versions\u002funits (e.g., two full rundowns) and selecting one requires placing it into the\u003cbr\u003e  standard slot; otherwise keep recorded order.","\u003cb\u003eX-Ray Vision\u003c\u002fb\u003e\u003cbr\u003eNEWS: Paramounts Wins Warner Bros Bidding War, BAFTAs Racial Slur Controversy, Pokemon Wind & Waves First Look & Disney CEO Josh D'Amaro Profile\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light-touch trim of core talk, micro-shaves over macro deletions, lets long\u003cbr\u003e  explanation runs stand, adds breathing room with pads\u003cbr\u003eCUT_CRITERIA: protects substantive, contextual monologues, cuts only the messiest lead-\u003cbr\u003e  ins, housekeeping dies; commentary lives, keeps spicy tone, not sanitized\u003cbr\u003eAUTHENTICITY_POLICY: profanity and bite preserved, overlap and mess tolerated, polish\u003cbr\u003e  focused on clarity, not perfection\u003cbr\u003eSTRUCTURE_TEMPLATE: heavy external ad bookends, mid-episode break with host button, news-\u003cbr\u003e  item runway, then hard insert, produced outro credits + ads\u003cbr\u003eREORDER_ASSEMBLY: chronology stays intact, no thematic reshuffle, uses inserts instead of\u003cbr\u003e  reordering\u003cbr\u003eSPEAKER_TREATMENT: scripted reads get protected lanes, aggressive muting of interjections,\u003cbr\u003e  some crosstalk kept for energy, non-core mic can vanish entirely\u003cbr\u003eRULES:\u003cbr\u003e- CUT host meta housekeeping MUST: When a host references internal process (chat, notes,\u003cbr\u003e  producers, linking later) after the audience-facing point has already been made.\u003cbr\u003e- CUT pre roll hyp
