erted\u003cbr\u003eCUT_CRITERIA: cuts meta-struggle and transcript talk, keeps punchy banter and bits,\u003cbr\u003e  protects clean explanation runs, trims jokes that overrun\u003cbr\u003eAUTHENTICITY_POLICY: polished delivery, raw tone intact, profanity and laughter left in,\u003cbr\u003e  stumbles cleaned, personalities kept\u003cbr\u003eSTRUCTURE_TEMPLATE: produced theme-led cold open, housekeeping before main recap, chapter-\u003cbr\u003e  by-chapter with epigraphs, winner\u002floser, then cta outro\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with tiny reorders, reorders only to reduce repetition,\u003cbr\u003e  local cohesion beats exact timeline\u003cbr\u003eSPEAKER_TREATMENT: symmetric tightening of both hosts, aggressive backchannel muting,\u003cbr\u003e  protects main speaker’s floor\u003cbr\u003eRULES:\u003cbr\u003e- CUT host interrupt to self correct MUST: When a host interrupts themselves to re-phrase\u003cbr\u003e  or re-read, keeping only the final clean phrasing.\u003cbr\u003e- CUT meta editing talk MUST: When either host references deleting, cutting, re-reading,\u003cbr\u003e  searching notes, or being on the 'struggle bus', unless it directly sets up an immediate\u003cbr\u003e  on-topic punchline.\u003cbr\u003e- CUT redundant restate MUST: When a speaker repeats the same sentence\u002fidea with only\u003cbr\u003e  minor wording changes (especially right after a stumble), keeping the cleanest single\u003cbr\u003e  pass.\u003cbr\u003e- CUT long pop culture tangent PREFER: When comparisons\u002fside references expand past a\u003cbr\u003e  quick analogy and stop serving the chapter explanation or interpretation beat.\u003cbr\u003e- KEEP recorded sequence AVOID: When the conversation is already coherent and progressing,\u003cbr\u003e  avoid reordering just for style or emphasis.\u003cbr\u003e- KEEP banter that tags the point PREFER: When the joke\u002fbit functions as a succinct label\u003cbr\u003e  for the story beat (a comedic metaphor that clarifies what just happened) and the\u003cbr\u003e  conversation returns to the recap immediately after.\u003cbr\u003e- KEEP emotional insight run PREFER: When the hosts are in a sustained\u003cbr\u003e  interpretation\u002fcharacter-motivation explanation, even if it includes mild rough edges,\u003cbr\u003e  as long as the thought is coherent and progressing.\u003cbr\u003e- KEEP well-timed interjection PREFER: When a brief interjection lands as the button on a\u003cbr\u003e  point or provides a quick clarification without derailing the current explanation.\u003cbr\u003e- MUTE backchannel while other speaks MUST: When a host gives short acknowledgments (mm-\u003cbr\u003e  hmm, yeah, laughter starts) during the other host’s uninterrupted explanation, unless\u003cbr\u003e  the interjection is part of a joke tag or necessary overlap.\u003cbr\u003e- REORDER duplicate or cleaner take PREFER: When two adjacent passes cover the same beat,\u003cbr\u003e  move the cleaner, more complete version into place and remove the rough\u002fpartial lead-in\u003cbr\u003e  so the thought reads once, cleanly.\u003cbr\u003e- REORDER missing context tidbit PREFER: When a clarifying line (scope, timeline,\u003cbr\u003e  implication) is spoken later but is needed earlier to prevent confusion, and the shift\u003cbr\u003e  is small enough not to create new continuity problems.","\u003cb\u003eAirplane Geeks Podcast\u003c\u002fb\u003e\u003cbr\u003e883 Lockheed Constellation\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high retention, heavy micro-shaving, occasional big tangent excisions,\u003cbr\u003e  actively manages pauses with pads\u003cbr\u003eCUT_CRITERIA: host digressions are expendable, guest technical narrative protected, keep\u003cbr\u003e  playful debate that lands, bio\u002fnews copy: shave repetitions\u003cbr\u003eAUTHENTICITY_POLICY: cleans clutter, keeps personality, laughter and rough edges survive,\u003cbr\u003e  polish achieved via invisible mutes\u003cbr\u003eSTRUCTURE_TEMPLATE: produced show open + headlines, magazine format: feature + news, mid-\u003cbr\u003e  episode inserted field interview, listener mail then wrap\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with tiny fixes, reorders only for continuity, no\u003cbr\u003e  thematic reshuffling\u003cbr\u003eSPEAKER_TREATMENT: guest words preserved; hosts tightened, one host heavily muted\u002fcleaned,\u003cbr\u003e  redundant interjections suppressed\u003cbr\u003eRULES:\u003cbr\u003e- CUT host ramble MUST: When a host launches into a personal anecdote or travel\u002fdriving\u003cbr\u003e  story that does not advance the current aviation topic within ~1–2 turns.\u003cbr\u003e- CUT host self editing chain MUST: When a host cycles through multiple phrasing attempts\u003cbr\u003e  (‘I mean… the… you know…’) before landing the point; retain only the final clean\u003cbr\u003e  version.\u003cbr\u003e- CUT host bio overwrite PREFER: During guest introductions and credential recaps, remove\u003cbr\u003e  repeated lead-ins, timeline filler, and extra qualifiers while preserving the credential\u003cbr\u003e  list and one clean handoff to the guest.\u003cbr\u003e- CUT host redundant interjection PREFER: When a host restates what was just said\u003cbr\u003e  (‘right\u002fyes\u002fexactly’) during an active explanation and it doesn’t change meaning or add\u003cbr\u003e  humor.\u003cbr\u003e- CUT meta about future discussion PREFER: When a speaker says they’ll ‘talk about that\u003cbr\u003e  later\u002fwhen X is here’ and it doesn’t immediately tee up the next on-air point.\u003cbr\u003e- KEEP chronological topic flow MUST: Across major segments (intro → feature → news →\u003cbr\u003e  feature → mail\u002foutro), unless chronology creates an explicit continuity error.\u003cbr\u003e- KEEP guest full answer MUST: Even if the guest’s answer contains minor stumbles,\u003cbr\u003e  provided the content is substantive and the stumbles don’t obscure meaning.\u003cbr\u003e- KEEP guest story block MUST: When the guest is recounting a chronological\u003cbr\u003e  experience\u002fhistory and each step is causally connected (even if it runs long).\u003cbr\u003e- KEEP banter disagreement PREFER: When the disagreement\u002fjoke is self-contained, gets a\u003cbr\u003e  clear laugh\u002fbeat, and reinforces group chemistry without derailing the guest’s main\u003cbr\u003e  thread.\u003cbr\u003e- KEEP host question setup PREFER: When host framing is needed for listener context (why\u003cbr\u003e  this topic matters \u002f what the upcoming segment is).\u003cbr\u003e- MUTE host side mutter MUST: When a host’s under-the-breath commentary overlaps or\u003cbr\u003e  distracts from the main speaker, but the overlap is brief and cutting would create a\u003cbr\u003e  jump in the primary speaker’s sentence.\u003cbr\u003e- REORDER segment boundary AVOID: Avoid moving large topic blocks to ‘improve pacing’ if\u003cbr\u003e  it would change the recorded narrative arc or references like ‘as we\u003cbr\u003e  record’\u002f‘earlier’\u002f‘today’.\u003cbr\u003e- REORDER clarification fragment PREFER: When a short phrase\u002fsentence resolves confusion\u003cbr\u003e  created by an interruption, and it can be moved a few seconds earlier\u002flater to sit next\u003cbr\u003e  to the question it answers.","\u003cb\u003eDeep State Radio\u003c\u002fb\u003e\u003cbr\u003eDSR Daily March 2: War with Iran Expands Across the Region\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light-touch runtime compression, micro-shaves between clauses, long\u003cbr\u003e  monologues kept intact\u003cbr\u003eCUT_CRITERIA: protects rant intensity and profanity, cuts only the awkward micro-tail,\u003cbr\u003e  keeps political\u002fanalysis digressions in-flow\u003cbr\u003eAUTHENTICITY_POLICY: leaves rough edges audible, minimal de-ums beyond essentials, keeps\u003cbr\u003e  conversational interrupt energy\u003cbr\u003eSTRUCTURE_TEMPLATE: produced promo-led cold open, host-led headline rundown format, short\u003cbr\u003e  outro button\u003cbr\u003eREORDER_ASSEMBLY: strictly chronological assembly, no thematic reshuffling\u003cbr\u003eSPEAKER_TREATMENT: primary host dominance protected, secondary host asides muted\u003cbr\u003e  selectively, intro exchange kept mostly intact\u003cbr\u003eRULES:\u003cbr\u003e- CUT crosstalk micro overlap AVOID: Only when overlap muddies the key phrase; otherwise\u003cbr\u003e  allow brief overlap as conversational texture.\u003cbr\u003e- CUT awkward turn ending words MUST: When a line lands cleanly without the final\u003cbr\u003e  word\u002fphrase and the remainder reads like a conversational tail (e.g., a single trailing\u003cbr\u003e  word after a completed thought).\u003cbr\u003e- CUT banter fragments PREFER: When short intro banter is already understood and a\u003cbr\u003e  fragment creates a stumble or dead-end rather than setting up the next beat.\u003cbr\u003e- KEEP chronological order MUST: Across the main discussion, unless a segment is clearly\u003cbr\u003e  standalone and its current placement actively harms comprehension.\u003cbr\u003e- KEEP host commentary blocks MUST: When a host is building a multi-step case (context →\u003cbr\u003e  example → takeaway), even if it includes reiteration for emphasis.\u003cbr\u003e- KEEP primary host long turns MUST: When they are carrying the analysis or framing the\u003cbr\u003e  stakes; do not break them up just to equalize talk-time.\u003cbr\u003e- KEEP emphatic language profanity PREFER: When it heightens urgency, conveys judgment, or\u003cbr\u003e  functions as the punch of a critique rather than as idle shock value.\u003cbr\u003e- MUTE secondary speaker aside PREFER: When a secondary host speaks under\u002falongside the\u003cbr\u003e  main flow without being addressed and it distracts from the active line.\u003cbr\u003e- REORDER segment blocks AVOID: Only if needed to repair a broken setup\u002fpayoff caused by\u003cbr\u003e  an edit; do not reorder simply to create a stronger hook.","\u003cb\u003ePolitics Weekly UK\u003c\u002fb\u003e\u003cbr\u003eNo more safe seats: the Greens take Gorton and Denton\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between clauses, moderate overall runtime compression,\u003cbr\u003e  long analytical runs left intact, low tolerance for dead air\u003cbr\u003eCUT_CRITERIA: cuts meta\u002fnewsroom self-consciousness, removes reputationally risky\u003cbr\u003e  admissions, protects substantive political analysis, prefers clarity over completeness\u003cbr\u003eAUTHENTICITY_POLICY: polished transcript, not sterile, backchannels suppressed more than\u003cbr\u003e  deleted, occasional rough overlaps tolerated, corrections handled via clean patches\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open montage lead-in, clear mid-episode act break, host-\u003cbr\u003e  led framing, then panel analysis, produced outro with forward promo\u003cbr\u003eREORDER_ASSEMBLY: chronology mostly respected, small reorders to repair coherence,\u003cbr\u003e  reorders used to dodge interruptions, max-shift stays near-topic\u003cbr\u003eSPEAKER_TREATMENT: host backchannels heavily muted, primary host interruptions minimized,\u003cbr\u003e  guest turns largely protected, overtalk cleaned by muting, not cutting\u003cbr\u003eRULES:\u003cbr\u003e- CUT host competing interruption MUST: When a host interjects with production\u002froom\u003cbr\u003e  comments or derails the speaker’s sentence; remove entirely unless it’s essential to\u003cbr\u003e  meaning.\u003cbr\u003e- CUT internal process talk MUST: Any time speakers discuss recording logistics, studio\u003cbr\u003e  issues, or what should\u002fshouldn’t be included, even if it’s lively banter; exceptions\u003cbr\u003e  only if it cleanly sets up the next on-topic question in one line.\u003cbr\u003e- CUT self-retracted claims MUST: When a speaker corrects themselves because a claim is\u003cbr\u003e  wrong\u002fmisremembered or explicitly asks to remove it (especially internal votes\u002fpolls or\u003cbr\u003e  editorial positioning).\u003cbr\u003e- CUT over-extended comparisons PREFER: When analogies\u002freference points start to sprawl or\u003cbr\u003e  become repetitive; keep one sharp comparison and remove the extra scaffolding unless it\u003cbr\u003e  introduces a new claim.\u003cbr\u003e- KEEP act break position PREFER: When a host is clearly teeing up a pause\u002freturn line;\u003cbr\u003e  keep the break where it naturally lands and shape surrounding audio to make the handoff\u003cbr\u003e  clean.\u003cbr\u003e- KEEP guest reasoning chain PREFER: When the guest is laying out a structured explanation\u003cbr\u003e  (numbers, causal logic, political mechanism); only trim for duplication, not for\u003cbr\u003e  brevity.\u003cbr\u003e- KEEP light banter tags PREFER: When a brief joke or aside lands and releases tension\u003cbr\u003e  without extending the segment; keep if it doesn’t delay the next substantive turn.\u003cbr\u003e- KEEP listener orientation lines PREFER: When a line defines\u002fclarifies a term or\u003cbr\u003e  reference likely to be insider jargon; retain or add a short clarifier rather than\u003cbr\u003e  leaving ambiguity.\u003cbr\u003e- KEEP long argument arc PREFER: When a speaker is building a multi-step political\u003cbr\u003e  explanation (cause → evidence → implication), even if there are minor verbal rough\u003cbr\u003e  edges; tighten locally rather than collapsing the arc.\u003cbr\u003e- MUTE host backchannels MUST: When a host is making short affirmations or verbal tics\u003cbr\u003e  under another speaker’s main point; mute the backchannel while keeping the primary\u003cbr\u003e  speaker’s line intact.\u003cbr\u003e- MUTE single-word overlaps PREFER: When overlap is just a clipped word\u002fhalf-word that\u003cbr\u003e  doesn’t carry meaning but muddies the transcript; mute rather than creating a jump cut\u003cbr\u003e  in the main voice.\u003cbr\u003e- REORDER topic blocks AVOID: Avoid moving entire topic blocks across segment boundaries\u003cbr\u003e  (e.g., across the act break) unless the original order creates factual confusion.\u003cbr\u003e- REORDER sentence fragments PREFER: When an interruption or cut leaves a sentence\u003cbr\u003e  fragment or dangling reference; move the nearest adjacent clause (within ~1–2 minutes)\u003cbr\u003e  to restore a complete thought.","\u003cb\u003eComplexified\u003c\u002fb\u003e\u003cbr\u003eFrom Purity Rings to Shooting Your Dog: How Christian Womanhood Went MAGA\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro-block pruning for pace, relentless micro-shaves between turns, keeps\u003cbr\u003e  argument spine, trims echoes, low tolerance for meandering setups\u003cbr\u003eCUT_CRITERIA: cuts meta-production and process talk, trims self-referential plugging,\u003cbr\u003e  compresses lists and name-checking, keeps vivid examples that land\u003cbr\u003eAUTHENTICITY_POLICY: polished clarity over verbatim texture, keeps laughter and reactions,\u003cbr\u003e  allows brief natural overlap, uses mutes for cleanliness\u003cbr\u003eSTRUCTURE_TEMPLATE: produced intro with music bed, hard chapter breaks into ads,\u003cbr\u003e  standardized scripted outro credits, topic blocks separated by trims\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, no thematic reshuffling, external pickups\u003cbr\u003e  over reorders\u003cbr\u003eSPEAKER_TREATMENT: backchannels muted under substance, host tightened to prompts and\u003cbr\u003e  bridges, multi-guest clarity prioritized, short crosstalk kept for rapport\u003cbr\u003eRULES:\u003cbr\u003e- CUT break mechanics meta MUST: When the speakers discuss how breaks\u002fsegments\u002fpromos work\u003cbr\u003e  (or comment on the awkwardness of doing them), unless it is essential to understanding\u003cbr\u003e  an upcoming inserted segment.\u003cbr\u003e- CUT host restatement of guest point PREFER: When the host repeats what the guest just\u003cbr\u003e  said as agreement or paraphrase, unless it functions as a necessary pivot to the next\u003cbr\u003e  topic\u002fquestion.\u003cbr\u003e- CUT overlong example list PREFER: When a speaker stacks multiple examples\u002fnames\u002fbooks to\u003cbr\u003e  make one point; keep one representative example and remove the rest unless each item\u003cbr\u003e  adds a new claim.\u003cbr\u003e- CUT show or guest self plug PREFER: When a plug is framed as a wink or aside (e.g., “a\u003cbr\u003e  plug,” prompting listeners to subscribe), unless it provides minimal necessary\u003cbr\u003e  attribution for who the guest is.\u003cbr\u003e- KEEP brief overlap that lands PREFER: When crosstalk is short and adds energy\u002fclarity\u003cbr\u003e  (finishing a phrase, shared laugh) without masking key words.\u003cbr\u003e- KEEP chronological turn taking PREFER: When the flow is already coherent; prefer cuts\u003cbr\u003e  within blocks over relocating blocks.\u003cbr\u003e- KEEP vivid anecdote punchline PREFER: When a story has a sharp reveal or highly specific\u003cbr\u003e  image that crystallizes the theme, even if it includes a little laughter, interruption,\u003cbr\u003e  or messiness on the way in.\u003cbr\u003e- MUTE backchannel under answer MUST: When a non-primary speaker is doing affirmations\u003cbr\u003e  (mm-hmm, yeah, oh) during another speaker’s substantive explanation; mute unless it\u003cbr\u003e  changes meaning or delivers a punchline.\u003cbr\u003e- REORDER topic block AVOID: Only when a brief move fixes a comprehension issue created by\u003cbr\u003e  trims (e.g., an answer now precedes the question it responds to); otherwise preserve\u003cbr\u003e  session chronology.","\u003cb\u003eDigital Disruption with Geoff Nielson\u003c\u002fb\u003e\u003cbr\u003eEx-Ancestry CEO: AI Will Wipe Out Businesses\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high retention, light overall pruning, relentless micro-shaves between words,\u003cbr\u003e  adds pauses to restore breath, macro cuts mostly bookends\u003cbr\u003eCUT_CRITERIA: protects guest’s full reasoning chain, pre\u002fpost logistics fully stripped,\u003cbr\u003e  single-word trims for fluency, keeps host framing, trims excess\u003cbr\u003eAUTHENTICITY_POLICY: natural conversation, lightly polished, rough edges kept if human,\u003cbr\u003e  edits aim to be invisible, cadence protected with added space\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open with music, immediate jump into first question,\u003cbr\u003e  sponsor midroll dropped into flow, produced sponsor-led outro\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved end-to-end, no thematic reshuffling, assembly\u003cbr\u003e  driven by trims, not moves\u003cbr\u003eSPEAKER_TREATMENT: guest protected, host tightened, producer voice fully excluded,\u003cbr\u003e  backchannels suppressed for clarity, guest interruptions cleaned, not featured\u003cbr\u003eRULES:\u003cbr\u003e- CUT producer intervention MUST: Any producer\u002fassistant participation (framing checks,\u003cbr\u003e  background-noise notes, timing, naming\u002fpronunciation checks), even if it contains\u003cbr\u003e  personable rapport.\u003cbr\u003e- CUT producer or third voice MUST: Whenever a non-on-mic producer\u002fassistant voice appears\u003cbr\u003e  (even if helpful), unless it is essential to understand an audio issue that remains in\u003cbr\u003e  the episode.\u003cbr\u003e- CUT host question padding PREFER: When the host stacks multiple versions of the same\u003cbr\u003e  question or adds long personal asides before handing the floor back to the guest.\u003cbr\u003e- CUT host ramble PREFER: When the host’s commentary restates the guest’s point without\u003cbr\u003e  adding a new question, sharper framing, or a transition into a new topic.\u003cbr\u003e- CUT micro connectors PREFER: When a single word\u002fshort fragment (e.g., trailing\u003cbr\u003e  conjunctions, duplicated starters) creates a stumble or awkward join and can be removed\u003cbr\u003e  without changing meaning.\u003cbr\u003e- KEEP chronological order MUST: Throughout the main conversation, unless a reorder is\u003cbr\u003e  required to repair a clear continuity\u002frecording mistake.\u003cbr\u003e- KEEP guest argument arc MUST: When the guest is building an analogy, precedent, or\u003cbr\u003e  multi-part explanation, even if it includes minor detours, unless it becomes purely\u003cbr\u003e  repetitive.\u003cbr\u003e- KEEP guest laughter or reaction PREFER: When it punctuates a host line and helps the\u003cbr\u003e  conversation feel reciprocal, as long as it doesn’t step on key words.\u003cbr\u003e- MUTE guest backchannel PREFER: When the guest interjects brief words\u002fsyllables during\u003cbr\u003e  the host’s speech that add no new information and muddy the host’s line.\u003cbr\u003e- REORDER produced open close MUST: When introducing a produced intro\u002foutro that is not\u003cbr\u003e  part of the session recording and must bookend the episode.","\u003cb\u003eThe Chef's Cut\u003c\u002fb\u003e\u003cbr\u003ePadma Takes On Top Chef, Judging Secrets, and the Evolution of Food TV!!\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-tightening between turns, macro blocks cut over nibbling\u003cbr\u003e  middles, adds pause pads for timing, low tolerance for redundancies\u003cbr\u003eCUT_CRITERIA: cut meta and process talk hard, keep long story arcs intact, protect\u003cbr\u003e  industry-insider mechanics, tolerate edge\u002fprofanity for punch\u003cbr\u003eAUTHENTICITY_POLICY: polished flow, not ‘overclean’, profanity kept when honest, crosstalk\u003cbr\u003e  energy selectively preserved, repetitions trimmed mid-sentence\u003cbr\u003eSTRUCTURE_TEMPLATE: produced promo-style cold open, early rate\u002freview cta, branded\u003cbr\u003e  ‘confession’ segment centerpiece, produced music-bed outro\u003cbr\u003eREORDER_ASSEMBLY: heavy thematic assembly over chronology, best-take stitching for intros,\u003cbr\u003e  front-load hook lines from later, tiny patch inserts to smooth edits\u003cbr\u003eSPEAKER_TREATMENT: primary host gets the runway, cohost backchannels heavily suppressed,\u003cbr\u003e  key cohost explanations preserved, overlap cleaned via targeted mutes\u003cbr\u003eRULES:\u003cbr\u003e- CUT duplicate take versions MUST: When speakers re-do the same intro\u002ftease or restate\u003cbr\u003e  the same setup, keep only the best\u002fmost energetic version and assemble it as if it were\u003cbr\u003e  one continuous read.\u003cbr\u003e- CUT extended mutual-agreement loops MUST: When both speakers trade repeated\u003cbr\u003e  confirmations (‘right, right, totally’) without adding new information; leave only\u003cbr\u003e  enough to maintain warmth and coherence.\u003cbr\u003e- CUT process meta (planning, line checks, what-to-say-next) MUST: Any time speakers\u003cbr\u003e  discuss the recording itself, what to call something, how to phrase the intro, or ask\u003cbr\u003e  production for approvals—unless it is intentionally used as a punchy teaser line.\u003cbr\u003e- CUT name list \u002f credential-roll PREFER: When conversation becomes a long run of proper\u003cbr\u003e  nouns, resumes, or ‘who’s on the cast’ listing without adding a new takeaway; keep only\u003cbr\u003e  the 1–2 names needed to anchor the point.\u003cbr\u003e- CUT primary host filler clauses PREFER: When the primary host repeats the same\u003cbr\u003e  connective clause multiple times within one thought (‘you know what I mean’ \u002f repeated\u003cbr\u003e  lead-ins); tighten while keeping the sentence’s spine.\u003cbr\u003e- CUT role-confusing banter PREFER: When joking interruptions derail a point mid-setup and\u003cbr\u003e  don’t pay off within the next beat; keep the clean setup-to-payoff path.\u003cbr\u003e- KEEP narrative order داخل story block AVOID: Inside a single anecdote\u002fconfession,\u003cbr\u003e  preserve internal chronology; only reorder around the story, not within it, unless\u003cbr\u003e  required to fix clarity.\u003cbr\u003e- KEEP cohost longform take MUST: When the cohost shifts into a structured explanation\u003cbr\u003e  (process details, comparison, personal anecdote) that advances the topic rather than\u003cbr\u003e  reacting.\u003cbr\u003e- KEEP crosstalk as energy PREFER: When brief overlap communicates excitement or comedic\u003cbr\u003e  timing without obscuring intelligibility; otherwise resolve by muting the less essential\u003cbr\u003e  speaker.\u003cbr\u003e- KEEP micro ext bridge words PREFER: When a hard cut or reorder creates a grammatical\u003cbr\u003e  gap, allow very short external\u002fpickup inserts to bridge (single words\u002fphrases) rather\u003cbr\u003e  than leaving a jump cut.\u003cbr\u003e- KEEP salacious or emphatic quote PREFER: When a blunt, high-energy line functions as a\u003cbr\u003e  hook or button (including profanity), even if it’s a tonal spike; use it to punctuate or\u003cbr\u003e  tease rather than sanding it down.\u003cbr\u003e- KEEP story block PREFER: When a speaker enters a chronological anecdote with rising\u003cbr\u003e  stakes and clear payoff (injury\u002fmishap\u002fbehind-the-scenes reveal), even if it’s longer\u003cbr\u003e  than surrounding discussion; compress only by removing minor side-branches.\u003cbr\u003e- MUTE cohost backchannels MUST: When the cohost contributes short affirmations or echoing\u003cbr\u003e  phrases during the other host’s uninterrupted explanation; preserve only occasional\u003cbr\u003e  reactions that meaningfully heighten humor or stakes.\u003cbr\u003e- REORDER opening hook \u002f premise MUST: When a stronger framing, bolder line, or clearer\u003cbr\u003e  premise exists later in the session, pull it forward into the opening minutes even if it\u003cbr\u003e  creates a large timeline shift.\u003cbr\u003e- REORDER topic cluster PREFER: When the same idea is discussed in multiple scattered\u003cbr\u003e  places, consolidate into one clean run by selecting the clearest pass and moving\u003cbr\u003e  supporting beats adjacent.","\u003cb\u003eAmicus With Dahlia Lithwick | Law, justice, and the courts\u003c\u002fb\u003e\u003cbr\u003eYes, Supreme Court Decisions Really Matter\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless sub-second micro-shaving, moderate overall session compression,\u003cbr\u003e  tiny pads to conceal joins, low tolerance for dead air\u003cbr\u003eCUT_CRITERIA: cuts hedging without changing meaning, protects long-form substantive arcs,\u003cbr\u003e  prefers clarity over conversational sprawl, host exposition more expendable\u003cbr\u003eAUTHENTICITY_POLICY: polished, transcript-clean delivery, keeps occasional rough edges for\u003cbr\u003e  emphasis, minimal overlap preserved, visible hand kept mostly invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: heavy produced bookends around interview, mid-episode sponsor break\u003cbr\u003e  insertion, credits and calls-to-action in outro, optional postscript\u002fextra segment slot\u003cbr\u003eREORDER_ASSEMBLY: topic-clustered over strict chronology, frequent block reorders to\u003cbr\u003e  tighten logic, large temporal shifts tolerated, reorders used to maintain momentum\u003cbr\u003eSPEAKER_TREATMENT: host trimmed harder than guest, guest arguments protected end-to-end,\u003cbr\u003e  affirmations muted under active speech, back-and-forth kept brisk\u003cbr\u003eRULES:\u003cbr\u003e- CUT dangling reference after reorder MUST: After any reorder, remove or rewrite (via\u003cbr\u003e  cut) lines that point to now-missing 'earlier\u002flater' context (e.g., 'as I said a minute\u003cbr\u003e  ago') unless you can preserve the referenced material.\u003cbr\u003e- CUT guest micro tics MUST: When the guest inserts small verbal tics mid-sentence that\u003cbr\u003e  can be removed without flattening tone or changing a quoted\u002flegal phrase.\u003cbr\u003e- CUT hedge stack MUST: When a speaker piles on qualifiers (e.g., repeated softeners like\u003cbr\u003e  'I think\u002fI mean\u002fyou know') that do not alter the factual claim or the logic of the\u003cbr\u003e  sentence.\u003cbr\u003e- CUT host preface PREFER: When the host begins an answer with extended self-positioning\u003cbr\u003e  (credentials, disclaimers, 'I hesitate\u002fI'm loathe') before landing the substantive\u003cbr\u003e  point.\u003cbr\u003e- CUT host ramble PREFER: When the host expands a point with extra color after the core\u003cbr\u003e  claim is already made, unless the expansion introduces a new concrete fact\u002fexample the\u003cbr\u003e  guest will use.\u003cbr\u003e- CUT meta process talk PREFER: When speakers comment on the conversation process itself\u003cbr\u003e  (e.g., narrating that a question is 'big brain', 'hard to explain', or 'outside\u003cbr\u003e  wheelhouse') and it does not change the next substantive exchange.\u003cbr\u003e- CUT redundant setup PREFER: When a speaker states the same setup twice (previewing the\u003cbr\u003e  point and then re-stating it) before delivering the substantive claim.\u003cbr\u003e- KEEP crosstalk agreement AVOID: When brief overlap signals strong agreement at a key\u003cbr\u003e  point and does not obscure intelligibility.\u003cbr\u003e- KEEP substantive example chain MUST: When a speaker moves through a multi-step example\u003cbr\u003e  or history (case-to-case, event-to-consequence) that is doing real explanatory work,\u003cbr\u003e  even if it runs long.\u003cbr\u003e- KEEP chronology for personal narrative PREFER: When a speaker is recounting a personal\u003cbr\u003e  timeline or career sequence and reordering would blur sequence-dependent meaning.\u003cbr\u003e- KEEP guest emphasis repetition PREFER: When the guest repeats a phrase for rhetorical\u003cbr\u003e  emphasis and it heightens the argument rather than reflecting uncertainty.\u003cbr\u003e- MUTE host backchannel MUST: When the host is affirming (yeah\u002fright\u002fokay) under the\u003cbr\u003e  guest’s active sentence and it does not change the guest’s delivery or meaning.\u003cbr\u003e- REORDER qa pairing MUST: When a question and its best answer are separated by\u003cbr\u003e  intervening commentary, move the answer block adjacent to the question and cut the\u003cbr\u003e  duplicative bridge.\u003cbr\u003e- REORDER definition first PREFER: When a later passage provides a crisp\u003cbr\u003e  definition\u002fgrounding that would reduce confusion if heard earlier, move that grounding\u003cbr\u003e  ahead of downstream analysis.\u003cbr\u003e- REORDER momentum preservation PREFER: When a high-energy or high-clarity block can\u003cbr\u003e  replace a slower transitional stretch and keep the segment moving without breaking\u003cbr\u003e  references.","\u003cb\u003eAsk NT Wright Anything\u003c\u002fb\u003e\u003cbr\u003eThe death of Judas, Biblical Inerrancy and how to avoid being too \"heavenly minded\"?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: ultra-high retention, micro-shaves only, long answer blocks stay intact, low\u003cbr\u003e  silence-trim aggression, will add micro-pads for flow\u003cbr\u003eCUT_CRITERIA: protect substance; shave chatter, banter trimmed only when redundant,\u003cbr\u003e  clarity beats completeness at transitions, prefer muting interjections over cutting\u003cbr\u003e  turns\u003cbr\u003eAUTHENTICITY_POLICY: light cleanup; conversational texture remains, selective stumbles\u003cbr\u003e  kept for humanity, audible overlap tolerated in small doses, edits aim to feel ‘uncut’\u003cbr\u003eSTRUCTURE_TEMPLATE: produced sponsor\u002fpromo cold open, music-stung section boundaries,\u003cbr\u003e  midroll ad bundle with rejoin, standardized outro call-to-action\u003cbr\u003eREORDER_ASSEMBLY: chronology is effectively locked, no thematic reshuffling, edits happen\u003cbr\u003e  within turns, assembly relies on stitching, not moving\u003cbr\u003eSPEAKER_TREATMENT: guest speech is sacrosanct, host tightened more aggressively, mutes\u003cbr\u003e  used to suppress interjections, host prompts preserved for clarity\u003cbr\u003eRULES:\u003cbr\u003e- CUT ad break double welcome MUST: When a return-from-break line repeats itself due to ad\u003cbr\u003e  stitching (e.g., duplicated ‘welcome back’\u002freset phrases).\u003cbr\u003e- CUT host housekeeping PREFER: When it’s episode metadata, lineup listing, or routine\u003cbr\u003e  framing that doesn’t add a fresh hook beyond the standardized intro\u002foutro structure.\u003cbr\u003e- CUT host ramble PREFER: When the host extends a joke\u002faside beyond its first payoff or\u003cbr\u003e  repeats a setup already implied by the upcoming question.\u003cbr\u003e- CUT host under-guest interruption PREFER: When the host starts to jump in during the\u003cbr\u003e  guest’s flow but the guest continues the thought; preserve the guest’s line as the\u003cbr\u003e  primary track.\u003cbr\u003e- CUT repeated restart apology PREFER: When a restart is purely mechanical and does not\u003cbr\u003e  add emphasis or human stakes; leave it only if it supports a natural, candid tone.\u003cbr\u003e- KEEP chronological order MUST: For the full Q&A progression, even when a later comment\u003cbr\u003e  might ‘hook’ better earlier; rely on the intro structure rather than rearranging\u003cbr\u003e  content.\u003cbr\u003e- KEEP guest expansions MUST: When the guest pauses the flow to add a ‘more important\u003cbr\u003e  point’ or a zoomed-out interpretive frame, even if it delays the next question.\u003cbr\u003e- KEEP guest longform answer MUST: When the guest is building a multi-step argument or\u003cbr\u003e  pastoral reassurance; do not intercut for pace unless there is clear redundancy.\u003cbr\u003e- MUTE backchannel under other speaker MUST: When the non-speaking person laughs, affirms,\u003cbr\u003e  or interjects under an active line and removing it won’t change meaning or timing of the\u003cbr\u003e  lead speaker.\u003cbr\u003e- MUTE guest laughter or aside MUST: When it interrupts the host’s line (or vice versa)\u003cbr\u003e  and functions as a backchannel rather than a content-bearing interruption.\u003cbr\u003e- REORDER cold open highlight AVOID: Do not pull mid-episode highlights forward; use\u003cbr\u003e  external produced openers\u002fpromos instead of narrative cold opens.\u003cbr\u003e- REORDER segment blocks AVOID: Only when necessary to repair a structural error (e.g.,\u003cbr\u003e  mis-placed break\u002freturn) that cannot be made coherent with trims and narration.","\u003cb\u003eThe Rest Is History\u003c\u002fb\u003e\u003cbr\u003e648. The Fall of the Incas: Battle for the Sacred City (Part 5)\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: aggressive micro-tightening between phrases, moderate overall runtime\u003cbr\u003e  compression, low tolerance for dead air, occasional pace-restoring padding\u003cbr\u003eCUT_CRITERIA: protect story\u002fnarration over meta-chat, keep vivid brutality; don't\u003cbr\u003e  sanitize, compress host commentary before guest continues, remove studio\u002fprocess talk\u003cbr\u003e  completely\u003cbr\u003eAUTHENTICITY_POLICY: polished transcript, conversational feel retained, clean stumbles;\u003cbr\u003e  keep personality edges, lightly visible editorial hand, profanity kept when part of bit\u003cbr\u003eSTRUCTURE_TEMPLATE: produced sponsor-heavy open, on-topic start after ads, cliffhanger-to-\u003cbr\u003e  midroll break, short membership\u002fpromo outro\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, reorder only for micro-clarity, tiny shifts\u003cbr\u003e  to fix setups\u003cbr\u003eSPEAKER_TREATMENT: guest narrative strongly protected, host reduced to prompts and\u003cbr\u003e  punchlines, use mutes to prune overlaps, non-essential third voice removed\u003cbr\u003eRULES:\u003cbr\u003e- CUT reorder for drama AVOID: If the only benefit is heightened drama\u002fteasing rather than\u003cbr\u003e  clarity; prefer keeping the original narrative progression.\u003cbr\u003e- CUT non story third speaker turns MUST: When an additional participant’s lines are\u003cbr\u003e  logistical, prompting, or otherwise not part of the on-air host\u002fguest conversation.\u003cbr\u003e- CUT recording process chatter MUST: Any mic checks, line-reads, claps, voice-choice\u003cbr\u003e  discussion, or performance coaching, even if it’s funny, unless it directly sets up the\u003cbr\u003e  first on-topic line that follows.\u003cbr\u003e- CUT agreement ladders PREFER: Back-to-back affirmations, shared laughter tags, or\u003cbr\u003e  ‘yes\u002fexactly’ ladders that delay returning to the narrative beat.\u003cbr\u003e- CUT host redundant restate PREFER: When the host restates what the guest just\u003cbr\u003e  established (or narrates alongside the guest) and it doesn’t introduce a new\u003cbr\u003e  angle\u002fquestion that changes the next beat.\u003cbr\u003e- CUT host self argument loop PREFER: When the host persists in a speculative loop\u003cbr\u003e  (pressing the same doubt) and the guest has already answered the thrust; keep only the\u003cbr\u003e  strongest single challenge\u002fclarifier.\u003cbr\u003e- KEEP dark humor release valve PREFER: Brief gallows-humor lines that relieve tension\u003cbr\u003e  after violent material, as long as they don’t derail the next factual step.\u003cbr\u003e- KEEP host bridge questions PREFER: When the host question cleanly advances chronology\u003cbr\u003e  (where\u002fwhen\u002fwho-next) or tees the guest into the next set-piece.\u003cbr\u003e- KEEP primary source quote block PREFER: When a long quotation or close paraphrase is\u003cbr\u003e  doing the core storytelling work (including graphic material), even if it runs long,\u003cbr\u003e  unless it becomes repetitious within the same quote.\u003cbr\u003e- MUTE overlap backchannel MUST: When a secondary speaker’s short reaction (‘yes’, ‘yeah’,\u003cbr\u003e  ‘exactly’, quick joke) lands on top of the main speaker’s sentence and removing it won’t\u003cbr\u003e  change meaning.\u003cbr\u003e- REORDER setup clarification line PREFER: When a short explanatory phrase needs to\u003cbr\u003e  precede a reference (name\u002fplace\u002fterm) to prevent a brief listener ‘wait, what?’ moment,\u003cbr\u003e  and the move is under ~10 seconds.","\u003cb\u003eBrian Windhorst & The Hoop Collective\u003c\u002fb\u003e\u003cbr\u003eWemby & Spurs Not Playoff Ready? Concerned About Jokic? + Dort Foul Reaction & Watch Out For Hornets\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaving between turns, high session-to-episode topic\u003cbr\u003e  retention, low tolerance for rambly connective tissue, silence trimmed, not sterilized\u003cbr\u003eCUT_CRITERIA: excise fact-check spirals and confusion, keep the debate, lose the wobble,\u003cbr\u003e  banter stays if it advances, remove meta about the edit\u003cbr\u003eAUTHENTICITY_POLICY: polish the confusion, keep personality, allows audible overlap and\u003cbr\u003e  reactions, cleans stumbles invisibly, not formally, leaves mild imperfection for flow\u003cbr\u003eSTRUCTURE_TEMPLATE: sponsor-heavy, embedded ad breaks, topic blocks separated by ads,\u003cbr\u003e  host-led open, quick roll-in, short produced stingers as joins\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, no thematic reshuffling, bridge gaps with\u003cbr\u003e  inserts, not moves\u003cbr\u003eSPEAKER_TREATMENT: hosts more cut than guest, mutes used to manage overlaps, protects\u003cbr\u003e  guest’s long answers, keeps multi-host friction readable\u003cbr\u003eRULES:\u003cbr\u003e- CUT editorial meta MUST: When participants reference the edit\u002fproducer decisions (asking\u003cbr\u003e  to cut something, commenting on protection\u002fcoverage) and it’s not essential to\u003cbr\u003e  understanding the discussion.\u003cbr\u003e- CUT fact check spiral MUST: When the group gets stuck in a multi-turn back-and-forth\u003cbr\u003e  trying to verify a detail (dates, records, who-beat-who) and no new insight is being\u003cbr\u003e  produced beyond the correction itself.\u003cbr\u003e- CUT callback that requires reorder PREFER: When a throwaway line would require moving\u003cbr\u003e  large material to preserve context; prefer removing the line over rearranging the\u003cbr\u003e  episode.\u003cbr\u003e- CUT connective tissue phrases PREFER: When a speaker uses repeated openers and glue\u003cbr\u003e  phrases (e.g., stacked 'um\u002fyou know\u002fright\u002fso') that don’t change meaning and the next\u003cbr\u003e  sentence stands without them.\u003cbr\u003e- CUT host meander PREFER: When a host circles a point with repeated qualifiers or re-\u003cbr\u003e  phrases before landing the actual question\u002ftake, unless the circling itself is the joke.\u003cbr\u003e- KEEP argument arc MUST: When a speaker is building a multi-sentence reasoning chain\u003cbr\u003e  (setup → example → implication), even if there are minor rough edges that would require\u003cbr\u003e  many cuts to clean.\u003cbr\u003e- KEEP chronological order MUST: By default, keep discussion blocks in the same sequence\u003cbr\u003e  as recorded, even when there are cleaner thematic groupings available.\u003cbr\u003e- KEEP guest full take MUST: When the guest is delivering a sustained explanation, even if\u003cbr\u003e  another speaker interjects; preserve the guest’s continuity and trim\u002fmute the\u003cbr\u003e  interruption if needed.\u003cbr\u003e- KEEP crosstalk reactions PREFER: When short interjections ('yeah', laughter, quick\u003cbr\u003e  corrections) improve pace\u002fenergy and do not derail the current speaker’s sentence.\u003cbr\u003e- KEEP high energy crosstalk banter PREFER: When overlap\u002fbanter is short and heightens the\u003cbr\u003e  moment (a punchline lands, a challenge is made, a collective reaction), even if it’s\u003cbr\u003e  slightly messy.\u003cbr\u003e- MUTE side comment under intro PREFER: When a secondary speaker undercuts or riffs during\u003cbr\u003e  a formal intro\u002ftransition and the main line should remain uninterrupted for clarity.\u003cbr\u003e- REORDER topic block AVOID: Only if a recorded-order mistake creates an explicit\u003cbr\u003e  reference to something the listener hasn’t heard yet and a simple cut cannot remove the\u003cbr\u003e  forward-reference cleanly.","\u003cb\u003eMick Unplugged\u003c\u002fb\u003e\u003cbr\u003eComedy & Courage: Breaking Stigmas with Kym Whitley\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between turns, low pause tolerance, near-full\u003cbr\u003e  conversation retained, no macro-block deletions\u003cbr\u003eCUT_CRITERIA: trim praise and pleasantries quickly, protect narrative anecdotes with\u003cbr\u003e  payoff, sponsor\u002fpartner talk kept, tightened hard, remove redundant qualifiers and\u003cbr\u003e  repeats\u003cbr\u003eAUTHENTICITY_POLICY: conversational, but cadence-cleaned, backchannels kept only when\u003cbr\u003e  clean, rough phrasing tolerated inside stories\u003cbr\u003eSTRUCTURE_TEMPLATE: produced pre-roll promo + show open, midroll sponsor blocks in main,\u003cbr\u003e  short produced outro cta, music bed ties bookends\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved end-to-end, no thematic reshuffling, assembly\u003cbr\u003e  relies on trims, not moves\u003cbr\u003eSPEAKER_TREATMENT: mute interjections under answers, host affirmations minimized, guest\u003cbr\u003e  gets uninterrupted runway\u003cbr\u003eRULES:\u003cbr\u003e- CUT sponsor cta repetition MUST: When the guest\u002fhost repeats the same call-to-action\u003cbr\u003e  (website\u002fdoctor\u002fshow notes) multiple times in close proximity; retain one complete,\u003cbr\u003e  coherent instance and remove the rest.\u003cbr\u003e- CUT guest false start informational PREFER: During informational\u002fsponsor-heavy passages,\u003cbr\u003e  when the guest loops, restarts, or inserts multiple hedges; compress to the cleanest\u003cbr\u003e  single pass that maintains the required message.\u003cbr\u003e- CUT host overpraise PREFER: When the host is complimenting\u002fcelebrating the guest without\u003cbr\u003e  introducing a new question, topic, or fresh information (especially in the intro and\u003cbr\u003e  between questions).\u003cbr\u003e- CUT tag end asides PREFER: When a closing line is immediately followed by meta\u003cbr\u003e  commentary about the line itself (e.g., self-congratulation, \"that was good\"), unless it\u003cbr\u003e  is the emotional button of the episode.\u003cbr\u003e- KEEP chronological flow MUST: Across the main interview content, unless a section is\u003cbr\u003e  clearly misplaced due to an in-session recording error (e.g., a repeated question later\u003cbr\u003e  answered earlier).\u003cbr\u003e- KEEP guest story block PREFER: When the guest is telling a personal anecdote that builds\u003cbr\u003e  toward a point (stakes, lesson, or perspective), even if the setup includes some rough\u003cbr\u003e  phrasing.\u003cbr\u003e- MUTE host backchannel MUST: When the host says short affirmations (\"yeah,\" \"mm-hmm,\"\u003cbr\u003e  \"amen\") over the guest’s active sentence, unless the overlap is a deliberate comedic\u003cbr\u003e  beat.\u003cbr\u003e- MUTE guest quick yes under host PREFER: When the guest gives a short interjection while\u003cbr\u003e  the host is delivering a setup\u002fquestion and it doesn’t change meaning; preserve only if\u003cbr\u003e  it creates a clear laugh\u002fbeat.\u003cbr\u003e- REORDER external insert placement AVOID: Only when needed to relocate an external insert\u003cbr\u003e  (ad\u002fpromo\u002foutro) to a cleaner boundary between topics; do not reorder the conversational\u003cbr\u003e  content to accommodate it.","\u003cb\u003eSaturday Morning Muse\u003c\u002fb\u003e\u003cbr\u003eWhat Bond Markets Reveal About Economic Health\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-full-session retention, micro-shaves, not restructures, lets\u003cbr\u003e  explanations run long\u003cbr\u003eCUT_CRITERIA: cuts pre-roll personal chatter, protects the full lesson spine, only trims\u003cbr\u003e  speed-bumps\u003cbr\u003eAUTHENTICITY_POLICY: light polish; voice stays natural, leaves minor imperfections\u003cbr\u003e  audible, avoids over-cleaning cadence\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music bed bookends, scripted intro with date\u002frecap, outro\u003cbr\u003e  includes cta and credits\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved end-to-end, no thematic reshuffling, assembly\u003cbr\u003e  changes are minimal\u003cbr\u003eSPEAKER_TREATMENT: host-centered; minimal intervention, single-word mutes to smooth, no\u003cbr\u003e  aggressive turn-tightening\u003cbr\u003eRULES:\u003cbr\u003e- CUT pre roll personal asides MUST: When the host is speaking to family\u002fcrew or doing a\u003cbr\u003e  private countdown\u002faffection before the on-air start.\u003cbr\u003e- CUT duplicate lead in words PREFER: When a transition begins with a repeated starter\u003cbr\u003e  word\u002fphrase that doesn’t add emphasis (e.g., a redundant 'Now,' 'First,' or similar\u003cbr\u003e  reset).\u003cbr\u003e- KEEP multi-step explanations and lists PREFER: When the host is building a concept with\u003cbr\u003e  a sequence (definition → intuition → examples → caveats), even if it runs long.\u003cbr\u003e- MUTE stray transition starters PREFER: When the host inserts a standalone transition\u003cbr\u003e  word at a paragraph boundary that creates a tiny bump but the surrounding content should\u003cbr\u003e  remain continuous.\u003cbr\u003e- REORDER out of order explanation blocks AVOID: Only when a later clarification is\u003cbr\u003e  required for an earlier definition to make sense (i.e., the timeline creates confusion\u003cbr\u003e  that trimming cannot solve).","\u003cb\u003eThe Opinions\u003c\u002fb\u003e\u003cbr\u003eWill Trump’s Failures Cost the G.O.P. in Texas?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: cut-to-argument density pacing, relentless micro-shaves between turns, macro\u003cbr\u003e  trims of long digressions, low tolerance for dead air\u003cbr\u003eCUT_CRITERIA: argument-first, anecdote-second, tolerates edge only if useful, banter kept\u003cbr\u003e  only as garnish, removes listy, meandering buildup\u003cbr\u003eAUTHENTICITY_POLICY: polished transcript, not sterile, selective stumbles left for\u003cbr\u003e  cadence, overlap allowed in lively moments, edits kept mostly invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: produced open before host intro, fast context-setting host lead-in,\u003cbr\u003e  main discussion then recommendations, produced credits over music bed\u003cbr\u003eREORDER_ASSEMBLY: coherence over strict chronology, pull forward thesis before detail,\u003cbr\u003e  reorders stay within topic blocks, uses reorders to tighten pivots\u003cbr\u003eSPEAKER_TREATMENT: aggressive muting of backchannels, interruptions trimmed to clarity, no\u003cbr\u003e  speaker is ‘sacred’ from cuts, allows brief crosstalk as texture\u003cbr\u003eRULES:\u003cbr\u003e- CUT extended tangent MUST: When a speaker launches into a historical\u002fcultural excursus\u003cbr\u003e  or secondary theory that doesn’t pay off into the current question within ~1–2 turns.\u003cbr\u003e- CUT intra-turn repetition MUST: When emphasis is achieved through immediate repeats\u003cbr\u003e  (\"the thing… the thing…\") rather than through a new idea; keep only one instance unless\u003cbr\u003e  the repetition is the rhetorical point.\u003cbr\u003e- CUT enumeration scaffold PREFER: When a speaker sets up numbered points\u003cbr\u003e  (\"first\u002fsecond\u002fthird\") but spends time on the counting, forgetting, or meta-joking\u003cbr\u003e  rather than delivering the points.\u003cbr\u003e- CUT host restate PREFER: When the host echoes or rephrases a guest’s point immediately\u003cbr\u003e  after it’s made, unless it functions as a necessary pivot into the next question.\u003cbr\u003e- KEEP clean pivot line PREFER: When the host (or a guest) provides a crisp pivot that\u003cbr\u003e  explicitly names the next segment topic and makes the transition feel intentional, even\u003cbr\u003e  if it’s slightly produced-sounding.\u003cbr\u003e- KEEP guest long run PREFER: When a guest is in a sustained explanatory arc (premise →\u003cbr\u003e  mechanism → implication), preserve continuity even if it means leaving minor roughness\u003cbr\u003e  or light overlap.\u003cbr\u003e- MUTE backchannel affirmations MUST: When a non-primary speaker interjects quick\u003cbr\u003e  acknowledgments (\"yeah,\" \"mm-hmm,\" greetings) over someone else’s sentence, unless the\u003cbr\u003e  interjection changes meaning or prompts a turn.\u003cbr\u003e- MUTE speaker tangent under other kept audio PREFER: When one speaker’s aside can be\u003cbr\u003e  removed without losing the other speaker’s usable line in the same region; prefer muting\u003cbr\u003e  the tangent rather than cutting the whole exchange.\u003cbr\u003e- REORDER cross-topic material AVOID: If moving audio would require carrying references\u003cbr\u003e  that only make sense in the original moment (callbacks, “as you just said,” time\u002fplace\u003cbr\u003e  markers), keep chronological order and cut instead.\u003cbr\u003e- REORDER host question stub PREFER: When the host’s setup is split by side commentary,\u003cbr\u003e  consolidate the essential question earlier and relocate\u002ftrim the commentary so the guest\u003cbr\u003e  answer attaches to a single, clear prompt.\u003cbr\u003e- REORDER thesis sentence PREFER: When a later line cleanly summarizes the point of a\u003cbr\u003e  longer passage, move that line earlier to lead the block, then follow with only the most\u003cbr\u003e  necessary support.","\u003cb\u003eMAFS Afterparty with Lauren Dunn\u003c\u002fb\u003e\u003cbr\u003eWeek 4: Incel Grooms, Insecure Brides + Intruder Weddings!\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro blocks removed for pace, relentless micro-shaves between turns, keeps\u003cbr\u003e  long rants intact, low tolerance for dead air\u003cbr\u003eCUT_CRITERIA: cut production coordination completely, protect high-heat commentary blocks,\u003cbr\u003e  avoid heavy\u002fdefamatory speculation, trim off-topic name-drops fast\u003cbr\u003eAUTHENTICITY_POLICY: profanity and bluntness preserved, leaves some overlap and mess,\u003cbr\u003e  polish focused on clarity, not perfection\u003cbr\u003eSTRUCTURE_TEMPLATE: produced intro with music bed, segmented show with named bits, mid-\u003cbr\u003e  show reset before rant, long produced outro + cta\u002fpromo\u003cbr\u003eREORDER_ASSEMBLY: mostly chronological, tiny repairs, reorder only to fix flow\u003cbr\u003eSPEAKER_TREATMENT: secondary\u002fproducer voice nearly removed, host interjections selectively\u003cbr\u003e  muted, one lead voice continuity protected\u003cbr\u003eRULES:\u003cbr\u003e- CUT defamation risk rumor block MUST: When discussion pivots into unverified claims,\u003cbr\u003e  sexual rumors, drug-use gossip, or naming third parties in a way that could be construed\u003cbr\u003e  as outing or defamatory—even if it’s entertaining.\u003cbr\u003e- CUT logistics meta talk MUST: Any time either speaker discusses mic status, doc links,\u003cbr\u003e  segment instructions, or how to phrase the next line (including multiple takes).\u003cbr\u003e- CUT third speaker production presence MUST: When a non-host\u002fproducer voice gives\u003cbr\u003e  instructions, reacts from off-mic, or otherwise intrudes into the on-air chemistry.\u003cbr\u003e- CUT repetitive agreement pile on PREFER: When both speakers loop on the same point with\u003cbr\u003e  repeated affirmations that don’t add a new angle (especially mid-rant).\u003cbr\u003e- CUT too heavy framing PREFER: When someone proposes a substantially heavier label\u002fframe\u003cbr\u003e  (e.g., clinical\u002fabuse terminology) and the group explicitly flags it as ‘too heavy for\u003cbr\u003e  right now’ or tone-breaking for the segment.\u003cbr\u003e- KEEP chronological topic progression PREFER: When the conversation is naturally building\u003cbr\u003e  point-to-point within a segment; avoid rearranging multi-minute discussions just to\u003cbr\u003e  ‘tighten’ if it risks breaking cause\u002feffect.\u003cbr\u003e- KEEP high energy rant PREFER: When the conversation is delivering the episode’s main\u003cbr\u003e  opinionated payoff (sustained critique, comedic escalation, or decisive take), unless it\u003cbr\u003e  veers into unverifiable personal allegations about real people.\u003cbr\u003e- KEEP host host banter PREFER: When the exchange is doing character work (chemistry,\u003cbr\u003e  shared outrage, comedic timing) and supports the segment’s energy rather than derailing\u003cbr\u003e  it.\u003cbr\u003e- MUTE host overlap tag PREFER: When one host’s quick overlap (single\u003cbr\u003e  word\u002fphrase\u002fbackchannel) lands on top of the other host’s point and doesn’t add meaning.\u003cbr\u003e- REORDER single bridge line PREFER: When one short line functions as a cleaner wrap\u002fsetup\u003cbr\u003e  and can be moved slightly earlier\u002flater to eliminate an ordering hiccup or to tee up the\u003cbr\u003e  next beat.","\u003cb\u003eThe Money To The Masses Podcast\u003c\u002fb\u003e\u003cbr\u003eEp 538 - The worst stealth wealth destroyers\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: aggressive runtime halving, macro blocks removed over nibbling, micro-shaves\u003cbr\u003e  inside sentences, occasional pause padding added\u003cbr\u003eCUT_CRITERIA: cut meta-recording and draft-talk, protect actionable tips and numbers, keep\u003cbr\u003e  banter only when it lands, remove uncertainty and on-air fact-checking\u003cbr\u003eAUTHENTICITY_POLICY: polish-first, retakes removed, swearing and rough edges cleaned,\u003cbr\u003e  keeps light laughter and warmth, minimal tolerance for audible indecision\u003cbr\u003eSTRUCTURE_TEMPLATE: produced sponsor open upfront, rapid framing then list format,\u003cbr\u003e  frequent embedded ctas and links, music-led sign-off close\u003cbr\u003eREORDER_ASSEMBLY: mostly chronological preservation, small reorders to fix logic, reorders\u003cbr\u003e  used for tighter adjacency, bridges rebuilt with inserts\u003cbr\u003eSPEAKER_TREATMENT: primary host protected and extended, secondary host reduced to sharp\u003cbr\u003e  interjections, strategic muting to de-clutter, personal examples kept over chatter\u003cbr\u003eRULES:\u003cbr\u003e- CUT fact checking and number hunting MUST: When a host stalls to verify a figure, re-\u003cbr\u003e  open tools, or debate precision; keep only the final decided stat and the\u003cbr\u003e  interpretation.\u003cbr\u003e- CUT host self direction MUST: When either host instructs the other how to deliver a line\u003cbr\u003e  or where to edit (‘do that again’, ‘cut here’), unless it’s a very quick joke with\u003cbr\u003e  payoff.\u003cbr\u003e- CUT meta production talk MUST: Any time hosts discuss titles, ordering, what to cut, or\u003cbr\u003e  how they’ll edit it later, unless it is a quick joke that cleanly resolves into the next\u003cbr\u003e  topic.\u003cbr\u003e- CUT prior episode callbacks MUST: When referencing a previous episode without restating\u003cbr\u003e  the necessary context in the current episode; replace with a self-contained sentence or\u003cbr\u003e  remove.\u003cbr\u003e- CUT repetitive rephrasing MUST: When a host restates the same point multiple ways back-\u003cbr\u003e  to-back (especially during transitions); keep the cleanest version and move on.\u003cbr\u003e- CUT secondary host ramble MUST: When the secondary host adds commentary that doesn’t\u003cbr\u003e  introduce a new example, stat, or question that advances the point.\u003cbr\u003e- CUT timeline dependent references MUST: If a reorder would make ‘as we said earlier\u002flast\u003cbr\u003e  week’ or similar temporal references confusing and they aren’t essential, remove or\u003cbr\u003e  rewrite via pickup\u002finsert.\u003cbr\u003e- KEEP call and response banter PREFER: When a short back-and-forth creates energy and\u003cbr\u003e  then clearly returns to the agenda within a couple of turns.\u003cbr\u003e- KEEP relatable anecdote PREFER: When a personal example concretely illustrates a\u003cbr\u003e  financial principle in under ~30–60 seconds and provides a memorable ‘why it matters’\u003cbr\u003e  payoff.\u003cbr\u003e- KEEP secondary host personal example PREFER: When the secondary host tells a compact\u003cbr\u003e  real-world story that demonstrates the principle and gives the segment a ‘human proof’\u003cbr\u003e  moment.\u003cbr\u003e- MUTE overlapping interjections PREFER: When interjections occur during the primary\u003cbr\u003e  host’s explanation and don’t materially change meaning; preserve only the strongest\u003cbr\u003e  laugh\u002fresponse beat.\u003cbr\u003e- REORDER clarifier block PREFER: When a later line cleanly defines\u002fqualifies a concept\u003cbr\u003e  that the episode uses earlier, and moving it earlier prevents confusion without changing\u003cbr\u003e  meaning.\u003cbr\u003e- REORDER research stat leadin PREFER: When a setup sentence is separated from its\u003cbr\u003e  statistic\u002fexample by a digression; move the setup to sit directly adjacent to the stat.\u003cbr\u003e- REORDER transition sentence PREFER: When a transition better serves as a capstone to the\u003cbr\u003e  prior point than as an intro to the next, and the move is under a few minutes.","\u003cb\u003eTheWillPowerPodcast\u003c\u002fb\u003e\u003cbr\u003eEyes Shutting Was the Best Part of My Day – Dan’s Brutal Path to Liver Transplant & Sobriety\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: micro-shaves between almost every turn, macro cuts for digression blocks, low\u003cbr\u003e  tolerance for host ramble\u003cbr\u003eCUT_CRITERIA: guest story protected; host expendable, cuts host side-tangents\u003cbr\u003e  aggressively, keeps raw, graphic recovery detail\u003cbr\u003eAUTHENTICITY_POLICY: guest kept raw and profane, host cleaned to polished lines, heavy\u003cbr\u003e  invisible stitching via pickups\u003cbr\u003eSTRUCTURE_TEMPLATE: cold open hook with music, produced intro framing the stakes,\u003cbr\u003e  cta\u002foutro often rebuilt from inserts\u003cbr\u003eREORDER_ASSEMBLY: chronological core with tiny nudges, reorder only to sharpen setup\u003cbr\u003eSPEAKER_TREATMENT: mute host to protect guest flow, host interruptions removed, not\u003cbr\u003e  shared, guest uninterrupted long answers\u003cbr\u003eRULES:\u003cbr\u003e- CUT host flubbed read MUST: When the host botches a bio\u002fhandle read, restarts, or\u003cbr\u003e  apologizes mid-read; replace with a clean version or remove entirely.\u003cbr\u003e- CUT host side tangent MUST: When the host starts an explanatory or reference tangent\u003cbr\u003e  (documentaries, broad culture, neurochemistry) that doesn’t immediately tee up a sharper\u003cbr\u003e  guest answer or new question.\u003cbr\u003e- CUT host clarification loops PREFER: When the host gets stuck clarifying a\u003cbr\u003e  term\u002fmeasurement mid-story and the meaning is already inferable from context or can be\u003cbr\u003e  preserved by keeping just the guest’s final clarified version.\u003cbr\u003e- CUT host redundant empathy PREFER: When the host repeats validation\u002frelatability beats\u003cbr\u003e  already made (goosebumps, ‘I relate,’ ‘my wife saved me’) without adding a new question\u003cbr\u003e  or clarifying the guest’s point.\u003cbr\u003e- KEEP chronological story arc MUST: When the guest is recounting medical\u002faddiction events\u003cbr\u003e  in sequence; do not reorder across major life-event boundaries (diagnosis → relapse →\u003cbr\u003e  listing → transplant → recovery).\u003cbr\u003e- KEEP guest emotional peak MUST: When the guest articulates a defining ‘bottom’ moment,\u003cbr\u003e  fear-of-death moment, or vivid lived-detail that raises the stakes, even if it contains\u003cbr\u003e  profanity or is uncomfortable.\u003cbr\u003e- KEEP guest run on delivery PREFER: When the guest is ‘rambling’ but still advancing a\u003cbr\u003e  coherent emotional or factual arc; only trim if it becomes a true side-topic with no\u003cbr\u003e  payoff.\u003cbr\u003e- KEEP guest self awareness framework PREFER: When the guest shifts from events into a\u003cbr\u003e  concise personal framework (ego, honesty, identity, behavior-change) that can function\u003cbr\u003e  as a takeaway for listeners.\u003cbr\u003e- MUTE host overtalk MUST: When the host interjects during a guest’s active explanation\u003cbr\u003e  and the interjection is not required for meaning (agreement words, partial question\u003cbr\u003e  starts).\u003cbr\u003e- REORDER single setup line PREFER: When moving one short guest sentence earlier cleanly\u003cbr\u003e  clarifies the psychological premise of the next story beat without creating timeline\u003cbr\u003e  confusion.","\u003cb\u003eFEAR & GREED | Business News\u003c\u002fb\u003e\u003cbr\u003eThe Saturday Edition | 28 Feb 2026\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between turns, big block excisions over slow-build,\u003cbr\u003e  willing to add pause pads\u003cbr\u003eCUT_CRITERIA: cut sprawling explanations, keep punchlines, protect the segment game\u003cbr\u003e  mechanics, trim meta-talk unless it heightens\u003cbr\u003eAUTHENTICITY_POLICY: keeps messy overlap for energy, cleans without sterilizing cadence,\u003cbr\u003e  uses mutes to hide side-comments\u003cbr\u003eSTRUCTURE_TEMPLATE: category-by-category game structure, music bookends + brief sting\u003cbr\u003e  break, cta outro kept tight\u003cbr\u003eREORDER_ASSEMBLY: chronology-first, almost no reshuffle, continuity fixed via micro-\u003cbr\u003e  patches, avoids thematic re-assembly\u003cbr\u003eSPEAKER_TREATMENT: hosts drive; guest is optional, mute stray interjections mid-monologue,\u003cbr\u003e  crosstalk tolerated if intelligible\u003cbr\u003eRULES:\u003cbr\u003e- CUT analysis ramble MUST: When a speaker extends an explanation past the first clear\u003cbr\u003e  takeaway (e.g., repeats the same rationale with extra examples), unless a new fact or a\u003cbr\u003e  sharper framing arrives.\u003cbr\u003e- CUT guest catchup or process talk PREFER: When the guest is being ‘caught up,’\u003cbr\u003e  coordinating, or commenting on being absent\u002flate in a way that doesn’t advance the\u003cbr\u003e  current category outcome.\u003cbr\u003e- CUT host question restarts PREFER: When a host re-asks or re-frames the same prompt\u003cbr\u003e  multiple times while the other host is already answering, unless the restart creates a\u003cbr\u003e  clearer ‘headline’ line.\u003cbr\u003e- CUT host self congratulation or victory lap PREFER: When a speaker celebrates, recaps,\u003cbr\u003e  or elongates a win\u002floss moment beyond a quick capper, unless it pivots into the next\u003cbr\u003e  segment cleanly.\u003cbr\u003e- CUT hyper specific asides PREFER: When a tangent becomes a personal memory lane or niche\u003cbr\u003e  detail that doesn’t pay off as a joke and doesn’t serve the stated category.\u003cbr\u003e- CUT redundant recap before next category PREFER: When a speaker re-summarizes what the\u003cbr\u003e  listener just heard right before the next category begins, rather than reordering\u003cbr\u003e  earlier material to make it smoother.\u003cbr\u003e- KEEP chronological progression MUST: When the conversation naturally ‘discovers’ the\u003cbr\u003e  segment outcome (setup → entries → judging), even if some parts are rough or\u003cbr\u003e  overlapping.\u003cbr\u003e- KEEP guest final judgment MUST: When the guest delivers the decisive ‘winner’ line or\u003cbr\u003e  rationale, even if the surrounding banter is trimmed.\u003cbr\u003e- KEEP segment scoring beats MUST: When the talk establishes the category, stakes, who\u003cbr\u003e  ‘wins,’ or why the judge decided, even if it includes light bickering or playful\u003cbr\u003e  accusations.\u003cbr\u003e- KEEP clean one-liner interruptions PREFER: When an interruption is a crisp comedic jab\u003cbr\u003e  that reads clearly under crosstalk and doesn’t derail the current speaker’s main point.\u003cbr\u003e- KEEP host host sparring PREFER: When the hosts’ back-and-forth reinforces the\u003cbr\u003e  competitive\u002fjudging premise and remains understandable despite overlap.\u003cbr\u003e- MUTE under-the-breath asides MUST: When a non-primary speaker makes a quick side comment\u003cbr\u003e  during another speaker’s explanation and it doesn’t add a clear joke or essential fact.\u003cbr\u003e- REORDER topic block AVOID: Only when needed to restore category logic\u003cbr\u003e  (announcement\u002fsetup must precede entries and judging) and the move can be done without\u003cbr\u003e  audible time-jumps.","\u003cb\u003eCONFLICTED\u003c\u002fb\u003e\u003cbr\u003e🚨 Emergency Episode: The Iran War Has Begun 🚨\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between turns, keeps full argument blocks intact, low\u003cbr\u003e  tolerance for dead air\u003cbr\u003eCUT_CRITERIA: ruthless on on-mic production, tightens wording inside sentences, keeps\u003cbr\u003e  humor and heated color\u003cbr\u003eAUTHENTICITY_POLICY: polished flow, not sanitized tone, leaves overlap and momentum,\u003cbr\u003e  cleans only obvious flubs\u003cbr\u003eSTRUCTURE_TEMPLATE: produced bookends around raw core, host-led framing into main topic,\u003cbr\u003e  minimal chaptering, continuous run\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with tiny fixes, micro-reorders to repair sentences,\u003cbr\u003e  avoids thematic reshuffling\u003cbr\u003eSPEAKER_TREATMENT: symmetric polish across hosts, uses mute to manage interjections,\u003cbr\u003e  overlap often preserved as energy\u003cbr\u003eRULES:\u003cbr\u003e- CUT host self correction loops MUST: When a host gets stuck in repeated corrections\u003cbr\u003e  (terminology, ‘overt\u002fcovert’, counting, phrasing) and a clean take is available\u003cbr\u003e  immediately after.\u003cbr\u003e- CUT on mic production coaching MUST: Any time speakers troubleshoot audio, instruct each\u003cbr\u003e  other, negotiate how to start, or comment on the intro\u002fstructure, even if it’s brief and\u003cbr\u003e  even if it occurs after the episode has already ‘started’.\u003cbr\u003e- CUT meta discourse about answering PREFER: When a speaker comments on the conversation\u003cbr\u003e  mechanics (e.g., ‘that’s not the question I asked’, ‘let’s move on’, ‘don’t go too much\u003cbr\u003e  into things’) and it doesn’t add necessary framing for the listener.\u003cbr\u003e- CUT redundant rephrasings inside sentence PREFER: When a speaker repeats a phrase to\u003cbr\u003e  find the ‘right’ wording (including repeated articles\u002flead-ins) and the second version\u003cbr\u003e  cleanly replaces the first without changing meaning.\u003cbr\u003e- KEEP chronological topic development MUST: When the discussion naturally escalates via\u003cbr\u003e  Q&A and follow-ups, even if there are minor redundancies; do not reorder just to ‘front-\u003cbr\u003e  load’ conclusions.\u003cbr\u003e- KEEP crosstalk backchannel PREFER: When overlap is short and functions as\u003cbr\u003e  agreement\u002flaughter that maintains pace, rather than obscuring key nouns, names, or\u003cbr\u003e  numbers.\u003cbr\u003e- KEEP humor aside or colorful phrase PREFER: When a joke\u002faside punctuates a dense\u003cbr\u003e  explanatory run and does not require a long tangent to land (even if it’s a bit edgy or\u003cbr\u003e  messy).\u003cbr\u003e- MUTE supportive interjection over primary line PREFER: When one host says brief\u003cbr\u003e  confirmations\u002fpartial starts during the other host’s uninterrupted explanation and\u003cbr\u003e  removing it won’t create an unnatural gap or timing issue.\u003cbr\u003e- REORDER sentence repair block PREFER: Only when a short phrase from nearby context\u003cbr\u003e  cleanly restores a speaker’s intended sentence (lost start, swapped clause, or\u003cbr\u003e  misordered thought) and the temporal shift is small enough to be imperceptible.","\u003cb\u003eThe Grandstand Cricket Podcast\u003c\u002fb\u003e\u003cbr\u003e“I would hate it”: The possible BBL flow on of The Hundred’s Pakistan issue\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between clauses, keeps most macro content intact,\u003cbr\u003e  actively smooths turn transitions, willing to add tiny pads\u003cbr\u003eCUT_CRITERIA: cuts meta-production and coordination, keeps banter if it’s character-\u003cbr\u003e  building, protects long analytical answer arcs, trims repetition inside explanations\u003cbr\u003eAUTHENTICITY_POLICY: conversational texture mostly preserved, cleans only the ‘messy’\u003cbr\u003e  stumbles, allows informal phrasing to stand, edits kept largely invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: produced network bookends, soft banter-led warm open, listener\u003cbr\u003e  messages as on-ramp, clean music-supported close\u003cbr\u003eREORDER_ASSEMBLY: chronology treated as default truth, no thematic reshuffling for punch,\u003cbr\u003e  only patch locally, not globally\u003cbr\u003eSPEAKER_TREATMENT: active-speaker priority via muting, backchannels suppressed more than\u003cbr\u003e  cut, host parity, but cleaner floor, overlap mostly removed, not featured\u003cbr\u003eRULES:\u003cbr\u003e- CUT editing meta talk MUST: When speakers explicitly discuss how the edit will be\u003cbr\u003e  assembled (e.g., ‘I’ll cut it together’, ‘from the top’, ‘easy cut’), unless it is being\u003cbr\u003e  used as an intentional comedic beat for the audience.\u003cbr\u003e- CUT production logistics MUST: Any time speakers reference levels, countdowns, recording\u003cbr\u003e  setup, or ‘ready to go’ coordination rather than content, especially in the first minute\u003cbr\u003e  of the session.\u003cbr\u003e- CUT momentary confusion loop PREFER: When a misunderstanding causes a short back-and-\u003cbr\u003e  forth that doesn’t add insight (seedings\u002fclarity checks), compress to the resolved line\u003cbr\u003e  and continue.\u003cbr\u003e- CUT mutual stumble exchange PREFER: When both hosts briefly derail into clarifying what\u003cbr\u003e  was just said; reduce to the cleanest restated line and continue.\u003cbr\u003e- CUT repetitive hedging phrases PREFER: Within a substantive explanation, trim stacked\u003cbr\u003e  hedges\u002frestarts (‘I think… you know… kind of…’) and redundant re-statements, but do not\u003cbr\u003e  remove the core reasoning chain.\u003cbr\u003e- KEEP chronological sequence MUST: Across the main discussion, even when there are\u003cbr\u003e  tangents; prefer cutting within the tangent over moving it elsewhere.\u003cbr\u003e- KEEP banter block PREFER: When the banter is listener-facing (feedback, running jokes,\u003cbr\u003e  personal anecdote) and it cleanly bridges into the agenda or establishes rapport before\u003cbr\u003e  the main topics.\u003cbr\u003e- KEEP host question to set answer PREFER: When a host prompt clearly tees up the other\u003cbr\u003e  host’s substantive answer; keep the full prompt even if slightly wordy.\u003cbr\u003e- KEEP natural reaction PREFER: When quick reactions (laughter, surprise, short agreement)\u003cbr\u003e  are part of the beat and don’t mask intelligibility.\u003cbr\u003e- MUTE backchannel under other host MUST: When one host is mid-explanation and the other\u003cbr\u003e  adds affirmations (‘
