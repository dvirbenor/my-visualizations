n talk, ads as discrete block breaks, brief\u003cbr\u003e  guest crediting outro, no highlight-driven cold open\u003cbr\u003eREORDER_ASSEMBLY: chronology treated as default, no thematic reshuffling, only fixes\u003cbr\u003e  obvious restart points\u003cbr\u003eSPEAKER_TREATMENT: guest flow protected first, host backchannels muted selectively,\u003cbr\u003e  airtime kept fairly balanced, host framing largely preserved\u003cbr\u003eRULES:\u003cbr\u003e- CUT host restart flub MUST: When the host calls out a mistake (mic bump, 'let’s do that\u003cbr\u003e  again') and immediately restarts cleanly.\u003cbr\u003e- CUT meaning light words MUST: When a clause remains grammatical and the cut does not\u003cbr\u003e  change attribution or emphasis (e.g., articles, 'of the', stray 'this\u002fthat', standalone\u003cbr\u003e  'uh\u002fah').\u003cbr\u003e- CUT host meta asides PREFER: When the host comments on their own process\u002ffeeds\u002fsources\u003cbr\u003e  in a way that does not advance the guest’s answer or the episode’s core explanation.\u003cbr\u003e- CUT outro distribution plug PREFER: During the closing thanks\u002fwhere-to-find-us section,\u003cbr\u003e  unless the guest’s handle\u002flocation info is being delivered.\u003cbr\u003e- KEEP chronological order MUST: For all substantive Q&A and explanatory sequences, unless\u003cbr\u003e  a reorder is required to resolve a clear continuity error created by a retake.\u003cbr\u003e- KEEP explanatory run PREFER: When a speaker is laying out chronology, definitions, or\u003cbr\u003e  stakes in a continuous run, even if it includes mild ramble or repeated framing.\u003cbr\u003e- KEEP guest qualification language PREFER: When the guest uses hedges\u002fqualifiers to\u003cbr\u003e  maintain reporting accuracy (uncertainty, sourcing limits, definitions), even if it\u003cbr\u003e  slightly slows pace.\u003cbr\u003e- MUTE host backchannel MUST: When the host offers short affirmations during a guest’s\u003cbr\u003e  uninterrupted explanation and removing them will not require cutting the guest’s audio.\u003cbr\u003e- REORDER intro restart take PREFER: When the host explicitly restarts an intro\u002fopen\u003cbr\u003e  (e.g., after a mic bump) and a clean second take exists; place the clean take as the\u003cbr\u003e  true start.","\u003cb\u003eThe Political Scene | The New Yorker\u003c\u002fb\u003e\u003cbr\u003eSpecial Episode: War in Iran\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between clauses, low tolerance for dead air, keeps\u003cbr\u003e  long analytic runs intact, macro cuts mostly pre-roll blocks\u003cbr\u003eCUT_CRITERIA: cut inside-baseball and production talk, host redundancy trimmed harder,\u003cbr\u003e  keeps blunt, vivid character lines, protects policy\u002fanalysis specificity\u003cbr\u003eAUTHENTICITY_POLICY: natural cadence, not fully de-ummed, profanity allowed when honest,\u003cbr\u003e  clean restarts, invisible stitching, leaves some spoken roughness\u003cbr\u003eSTRUCTURE_TEMPLATE: produced sponsor-heavy open, music-backed act breaks, scripted time-\u003cbr\u003e  stamp narration, credits plus forward promo close\u003cbr\u003eREORDER_ASSEMBLY: chronology largely sacrosanct, no thematic reshuffle, bridges via added\u003cbr\u003e  narration\u003cbr\u003eSPEAKER_TREATMENT: guest protected, host compressed, host questions tightened to thrust,\u003cbr\u003e  tiny overlaps muted not cut, agreement crosstalk kept minimal\u003cbr\u003eRULES:\u003cbr\u003e- CUT host self interruptions MUST: When the host’s interjections (asides, commentary,\u003cbr\u003e  embellishments) do not change the question being asked or the information conveyed.\u003cbr\u003e- CUT pre interview logistics MUST: When the conversation is still in setup mode (travel\u003cbr\u003e  chat, scheduling, tech checks, editing instructions, camera framing), even if it\u003cbr\u003e  contains topical references.\u003cbr\u003e- CUT host backchannels PREFER: When host affirmations stack or repeat during the guest’s\u003cbr\u003e  key explanatory sentence rather than serving as a single well-placed encourager.\u003cbr\u003e- CUT inside baseball collaboration PREFER: When hosts reference headlines,\u003cbr\u003e  writing\u002fediting the guest’s piece, or newsroom workflow, unless it directly supplies\u003cbr\u003e  essential context the listener can’t infer.\u003cbr\u003e- CUT redundant hedging PREFER: When hedges stack (e.g., repeated qualifiers, duplicated\u003cbr\u003e  words) without adding nuance, especially inside host questions or transitions.\u003cbr\u003e- KEEP guest argument arc MUST: When the guest is building a multi-sentence causal chain\u003cbr\u003e  or listing concrete stakes; compress only by removing obvious restarts, not by\u003cbr\u003e  summarizing.\u003cbr\u003e- KEEP candid blunt language PREFER: When blunt phrasing functions as a precise\u003cbr\u003e  characterization (not gratuitous) and advances the analytic point.\u003cbr\u003e- KEEP chronological question answer flow PREFER: When a host question clearly tees up the\u003cbr\u003e  guest’s answer; preserve adjacency even if the question could be tightened further.\u003cbr\u003e- KEEP host precision paraphrase PREFER: When the host restates the guest’s point to\u003cbr\u003e  sharpen a distinction or set up the next question cleanly (i.e., it functions as an\u003cbr\u003e  organizing move, not filler).\u003cbr\u003e- KEEP tone boundary markers PREFER: When a speaker briefly flags comfort\u002fappropriateness\u003cbr\u003e  (e.g., apologizing for language) and it helps calibrate the conversation’s seriousness\u003cbr\u003e  rather than derailing it.\u003cbr\u003e- MUTE guest micro overlaps PREFER: When brief guest spillover (single words, short\u003cbr\u003e  affirmations) lands on top of the host’s line and does not add meaning; mute to reduce\u003cbr\u003e  clutter while keeping the host line intact.\u003cbr\u003e- REORDER main conversation blocks AVOID: Only when a recording-order artifact makes the\u003cbr\u003e  listener’s understanding worse (e.g., reference to an unstated premise), and a short\u003cbr\u003e  narration bridge cannot resolve it.","\u003cb\u003eInterpreting India\u003c\u002fb\u003e\u003cbr\u003eDeciphering the “Mother of All Trade Deals”: The India–EU FTA\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high retention, light overall trimming, micro-shaves for cadence polish, rare\u003cbr\u003e  macro cuts for logistics, adds pause padding for readability\u003cbr\u003eCUT_CRITERIA: protects substantive guest exposition, cuts meta-talk and negotiation setup,\u003cbr\u003e  cleans word-fragment repetition aggressively, keeps topic breadth if relevant\u003cbr\u003eAUTHENTICITY_POLICY: smooth, broadcast-ready transcript feel, edits kept mostly invisible,\u003cbr\u003e  allows light natural overlap, formal tone preserved, not loosened\u003cbr\u003eSTRUCTURE_TEMPLATE: music-bedded open and close, no cold-open highlight montage, single\u003cbr\u003e  uninterrupted interview body, cta outro kept produced\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, reorders essentially avoided, edits fix flow\u003cbr\u003e  without reshuffling\u003cbr\u003eSPEAKER_TREATMENT: guest protected; host tightened, mutes used to suppress intrusions,\u003cbr\u003e  backchannels kept but minimized, overlap cleaned only when messy\u003cbr\u003eRULES:\u003cbr\u003e- CUT pre roll coordination MUST: When the host is talking about how the recording will\u003cbr\u003e  proceed (format, timing, instructions to the guest) before the on-mic intro begins.\u003cbr\u003e- CUT word fragment loops MUST: When any speaker gets stuck repeating partial\u003cbr\u003e  words\u002fletters or rapid restarts (e.g., staccato repeats) that don’t add emphasis or\u003cbr\u003e  meaning.\u003cbr\u003e- CUT host ramble PREFER: When the host adds extra framing after the question is already\u003cbr\u003e  clear and the guest is ready to answer.\u003cbr\u003e- CUT host scaffolding words PREFER: When the host uses disposable connectors that don’t\u003cbr\u003e  change the question (single words like 'I', 'thing', 'done', etc.), especially right\u003cbr\u003e  before handing the floor to the guest.\u003cbr\u003e- KEEP chronological qna progression MUST: When each host question clearly motivates the\u003cbr\u003e  next guest answer and the topic progression is already coherent.\u003cbr\u003e- KEEP guest full sentences MUST: When trimming would require removing clauses that\u003cbr\u003e  qualify or nuance the guest’s claim (hedges, conditions, definitions).\u003cbr\u003e- KEEP brief affirmations PREFER: When quick acknowledgments help the guest continue\u003cbr\u003e  smoothly and they do not mask key words.\u003cbr\u003e- KEEP guest argument arc PREFER: When the guest is building a multi-step explanation\u003cbr\u003e  (definitions → stakes → mechanisms → implications), even if it includes side context,\u003cbr\u003e  unless it fully exits the episode topic.\u003cbr\u003e- KEEP relevant macro context PREFER: When the discussion widens into adjacent domains\u003cbr\u003e  (geopolitics, defense-tech alignment, domestic reforms) but is explicitly tied back to\u003cbr\u003e  the core deal and its consequences.\u003cbr\u003e- MUTE interjection during other floor PREFER: When one speaker’s short utterance lands on\u003cbr\u003e  top of the other’s sentence and does not add unique information (quick confirmations,\u003cbr\u003e  stray words).\u003cbr\u003e- REORDER content block AVOID: Only when a cut creates a reference-without-setup problem\u003cbr\u003e  that can be fixed by moving a nearby explanatory line; otherwise keep strict session\u003cbr\u003e  order.","\u003cb\u003eLiftoff Journeys with Jeanniey Walden\u003c\u002fb\u003e\u003cbr\u003eLetao Wang Was Supposed to Be a Banker…Then Astrology Intervened\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: minimal compression; near-full session kept, micro-shaves, not segment\u003cbr\u003e  surgery, adds tiny pauses for flow\u003cbr\u003eCUT_CRITERIA: host polish prioritized over tightness, guest explanations protected end-to-\u003cbr\u003e  end, cuts only when wording derails\u003cbr\u003eAUTHENTICITY_POLICY: light cleanup; rough edges tolerated, keeps natural 'uh\u002fum' in\u003cbr\u003e  answers, prefers invisible edits over rewrites\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open with music bed, mid-episode break stinger, produced\u003cbr\u003e  reflective outro monologue\u003cbr\u003eREORDER_ASSEMBLY: chronological conversation preserved, no thematic reshuffling, assembly\u003cbr\u003e  uses bridges, not moves\u003cbr\u003eSPEAKER_TREATMENT: guest content protected; host tightened, backchannels often suppressed,\u003cbr\u003e  allows brief supportive crosstalk\u003cbr\u003eRULES:\u003cbr\u003e- CUT host misread or redo MUST: When the host flubs a proper noun\u002flist or explicitly\u003cbr\u003e  restarts a line (e.g., 'I’m going to do that again'), unless the redo contains new\u003cbr\u003e  information not present elsewhere.\u003cbr\u003e- CUT post outro logistics MUST: After the final thanks\u002fclose, remove recording-management\u003cbr\u003e  talk and hang-up instructions.\u003cbr\u003e- CUT guest micro tagline PREFER: When a short trailing phrase after a greeting\u002fthanks is\u003cbr\u003e  redundant and doesn’t add tone or information (e.g., a generic 'to be here').\u003cbr\u003e- CUT host overexcited word-salad PREFER: When the host’s enthusiasm becomes\u003cbr\u003e  fractured\u002fduplicative and does not add a new prompt or useful framing for the guest’s\u003cbr\u003e  next response.\u003cbr\u003e- KEEP chronological topic progression MUST: Throughout the main conversation, even when a\u003cbr\u003e  later point could make a stronger 'hook' earlier.\u003cbr\u003e- KEEP guest longform framework MUST: When the guest is building a conceptual scaffold\u003cbr\u003e  (definitions, contrasts, historical\u002fpsychological framing), even if it’s detailed or\u003cbr\u003e  contains mild disfluency.\u003cbr\u003e- KEEP rapport crosstalk PREFER: When overlap is brief and functions as supportive\u003cbr\u003e  agreement without masking the primary speaker’s key words.\u003cbr\u003e- MUTE non primary backchannel MUST: When one speaker is delivering a full question or\u003cbr\u003e  explanation and the other is only providing 'yeah\u002fmm-hmm\u002fhow' interjections that don’t\u003cbr\u003e  steer content.\u003cbr\u003e- REORDER topic block AVOID: Only if the session contains an out-of-order correction that\u003cbr\u003e  causes listener confusion (e.g., a reference to something not yet introduced) and cannot\u003cbr\u003e  be solved with a small cut or bridge line.","\u003cb\u003eAmerican History Hit\u003c\u002fb\u003e\u003cbr\u003eLife and Death on the Oregon Trail | The Frontier\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaving between clauses, macro structure left largely\u003cbr\u003e  intact, low tolerance for meanders in questions, prefers continuous, unbroken answers\u003cbr\u003eCUT_CRITERIA: remove meta-conversation and on-mic resets, cut host self-interruptions more\u003cbr\u003e  than guest, preserve substantive historical context, keep banter only if it lands\u003cbr\u003eAUTHENTICITY_POLICY: broadcast-polished conversational realism, interruptions removed\u003cbr\u003e  rather than acknowledged, stumbles cleaned; tone kept natural\u003cbr\u003eSTRUCTURE_TEMPLATE: cinematic cold open soundscape, act-break framing with music stings,\u003cbr\u003e  host-led topic resets after breaks, branded cta outro tag\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, no thematic reshuffle, continuity fixed with\u003cbr\u003e  tiny patches\u003cbr\u003eSPEAKER_TREATMENT: guest floor protected; host minimized, host backchannels muted under\u003cbr\u003e  answers, overlaps lightly tolerated, then cleaned, host questions streamlined to\u003cbr\u003e  essentials\u003cbr\u003eRULES:\u003cbr\u003e- CUT recording process meta MUST: Any talk that coordinates the recording (fake breaks,\u003cbr\u003e  redo instructions, tech\u002fsound comfort, ‘say that again’), even if it’s brief and\u003cbr\u003e  conversational.\u003cbr\u003e- CUT host question ramble PREFER: When the host adds extended framing, personal musings,\u003cbr\u003e  or multiple lead-ins before landing the question; keep only the minimum setup required\u003cbr\u003e  for the guest’s answer to make sense.\u003cbr\u003e- CUT host self-disclaimer PREFER: When the host qualifies or apologizes for a line of\u003cbr\u003e  thought (e.g., ‘I’m lost,’ ‘not making a political statement’) unless the disclaimer is\u003cbr\u003e  required to prevent a genuine misunderstanding of the history being discussed.\u003cbr\u003e- CUT in-turn repetition PREFER: When a speaker restates the same clause or label twice in\u003cbr\u003e  close proximity without adding a new detail or emphasis beat.\u003cbr\u003e- KEEP chronological transitions PREFER: When the host naturally pivots (‘when we come\u003cbr\u003e  back…’, ‘I want to circle back…’), keep the pivot and tighten around it rather than\u003cbr\u003e  relocating the destination topic earlier.\u003cbr\u003e- KEEP guest contextual caveats PREFER: When the guest adds nuance, scope limits, or\u003cbr\u003e  corrective framing (numbers, misconceptions, timeline shifts), even if it slightly slows\u003cbr\u003e  pace.\u003cbr\u003e- KEEP guest longform answer PREFER: When the guest is building an argument with\u003cbr\u003e  examples\u002ftimelines; compress internally but avoid breaking the logic chain into overly\u003cbr\u003e  short fragments.\u003cbr\u003e- KEEP guest response to host joke PREFER: If the guest engages with the host’s humor and\u003cbr\u003e  it acts as a clean bridge back into substance; otherwise trim the host joke.\u003cbr\u003e- KEEP light banter tags PREFER: Short humor\u002fbanter lines that clearly set up or release\u003cbr\u003e  tension before returning directly to the next substantive question\u002fanswer.\u003cbr\u003e- KEEP micro insert bridges PREFER: When a missing word\u002fname or grammatical bridge is\u003cbr\u003e  required for continuity, use a minimal insert\u002fpickup instead of reordering adjacent\u003cbr\u003e  material.\u003cbr\u003e- MUTE host backchannels MUST: When the guest is delivering a continuous explanation;\u003cbr\u003e  suppress the host’s ‘mm-hmm\u002fyeah\u002fright’ rather than cutting the guest or creating choppy\u003cbr\u003e  turn-taking.\u003cbr\u003e- MUTE secondary reactions PREFER: When a speaker’s laughter or quick interjection sits on\u003cbr\u003e  top of a narrated reading\u002fquotation or a key factual clause from the other speaker.\u003cbr\u003e- REORDER topic blocks AVOID: Only if a chronological assembly creates explicit confusion\u003cbr\u003e  that cannot be fixed with a local trim or short bridging line; otherwise preserve\u003cbr\u003e  timeline.","\u003cb\u003e7am\u003c\u002fb\u003e\u003cbr\u003eBeer, gas and capital gains tax\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro cuts over micro-shaving, runtime aggressively tightened, silences\u003cbr\u003e  mostly left alone, keeps long takes when pointed\u003cbr\u003eCUT_CRITERIA: cuts supporting evidence before thesis, prunes policy-lists and examples,\u003cbr\u003e  protects strong, quotable assertions, removes meta talk and hedges\u003cbr\u003eAUTHENTICITY_POLICY: polish via rewrite, not sanitizing, some ums and grit remain, visible\u003cbr\u003e  hand through narration stitches\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold-open style intro, narrated context between qs, credits-\u003cbr\u003e  heavy produced outro, music-bed bookends and bridges\u003cbr\u003eREORDER_ASSEMBLY: small reorders to sharpen logic, chronology mostly respected, answer\u003cbr\u003e  beats pulled under cleaner prompts\u003cbr\u003eSPEAKER_TREATMENT: guest becomes primary narrator-voice, host presence minimized or\u003cbr\u003e  replaced, heavy guest condensation tolerated, occasional mid-sentence guest muting\u003cbr\u003eRULES:\u003cbr\u003e- CUT guest supporting lists MUST: When the guest shifts into long enumerations of\u003cbr\u003e  examples\u002fnames\u002finstitutions after the main point is already clear, unless a specific\u003cbr\u003e  example is required to understand the next question.\u003cbr\u003e- CUT host on-mic questions MUST: When the host’s on-mic question can be equivalently\u003cbr\u003e  delivered as a scripted\u002fnarrated setup (especially for topic pivots or context), keeping\u003cbr\u003e  only the cleanest essential prompts.\u003cbr\u003e- CUT host question wander MUST: When a question contains multiple false starts or\u003cbr\u003e  duplicative framing and can be replaced by a single clean prompt or a narrated bridge\u003cbr\u003e  without losing meaning.\u003cbr\u003e- CUT guest meta apologies and self-commentary PREFER: When the guest comments on being\u003cbr\u003e  rambly, apologizes for being an economist, or otherwise steps outside the argument,\u003cbr\u003e  unless it sets up a genuinely clarifying reframing.\u003cbr\u003e- KEEP guest confident claims MUST: When the guest makes a strong evaluative or predictive\u003cbr\u003e  statement that functions as a headline takeaway, even if it’s politically sharp or\u003cbr\u003e  rhetorically styled.\u003cbr\u003e- KEEP guest thesis lines MUST: When the guest delivers a crisp definition of the problem\u003cbr\u003e  (what the policy does, who it benefits, why it matters), even if the delivery contains\u003cbr\u003e  minor roughness.\u003cbr\u003e- MUTE guest phrase fragment PREFER: When a brief guest fragment is redundant (e.g.,\u003cbr\u003e  repeated institution names, half-starts) and muting preserves the surrounding sentence\u003cbr\u003e  and timing better than a hard cut.\u003cbr\u003e- REORDER answer block PREFER: When an answer contains a clean payoff that better resolves\u003cbr\u003e  a later\u002fearlier prompt, and shifting it reduces explanation required from narration\u003cbr\u003e  without changing the meaning of the exchange.\u003cbr\u003e- REORDER question prompt PREFER: When the recorded question is messy or interrupted,\u003cbr\u003e  replace it with a narrated prompt and reposition the best-matching answer beat to sit\u003cbr\u003e  immediately beneath that prompt.","\u003cb\u003eComplexified\u003c\u002fb\u003e\u003cbr\u003eAbortions Rose After Dobbs—And the March for Life Knows It\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between clauses, macro cuts remove whole setup\u003cbr\u003e  blocks, near-zero tolerance for dead air, runtime density over conversational drift\u003cbr\u003eCUT_CRITERIA: retakes\u002flogistics excised without mercy, host thoughts compressed to\u003cbr\u003e  scaffolding, keep characterful moments inside reporting, political\u002fissue detail kept,\u003cbr\u003e  chatter trimmed\u003cbr\u003eAUTHENTICITY_POLICY: polished take preferred over rawness, natural rapport kept when\u003cbr\u003e  brief, minimal tolerance for on-mic uncertainty, clean transcript feel, not messy talk\u003cbr\u003eSTRUCTURE_TEMPLATE: produced host-led intro framing, act break into 'part two', explicit\u003cbr\u003e  mid-break toss to ads, credits\u002foutro are tightly scripted\u003cbr\u003eREORDER_ASSEMBLY: chronology is the default truth, fix by cutting, not reshuffling,\u003cbr\u003e  assembly favors clean contiguous blocks\u003cbr\u003eSPEAKER_TREATMENT: guest protected; host heavily carved, host backchannels routinely\u003cbr\u003e  muted, interruptions minimized, not showcased, host exists to set questions\u003cbr\u003eRULES:\u003cbr\u003e- CUT host fact uncertainty MUST: When the host searches for numbers\u002fnames or narrates not\u003cbr\u003e  having a fact ready, replacing with a clean restated question or corrected line.\u003cbr\u003e- CUT host ramble MUST: When the host elaborates beyond what’s needed to set up the next\u003cbr\u003e  question or transition, especially after the guest has already made the point.\u003cbr\u003e- CUT retake block MUST: When anyone restarts, apologizes, or discusses how to read\u002fphrase\u003cbr\u003e  a line, unless the moment itself is later referenced as part of the story.\u003cbr\u003e- CUT guest meander preface PREFER: When the guest circles with hedges\u002fprefaces before\u003cbr\u003e  landing the claim, but only if the landing sentence remains intact and coherent.\u003cbr\u003e- CUT guest wording cleanup PREFER: Avoid heavy rewriting of the guest’s phrasing; trim\u003cbr\u003e  only what’s necessary for clarity\u002fpacing while preserving the guest’s cadence and\u003cbr\u003e  qualifiers.\u003cbr\u003e- CUT redundant host reflection PREFER: When the host restates the guest’s point as\u003cbr\u003e  agreement or amazement, unless it sets up the next, more specific question.\u003cbr\u003e- CUT setup that requires reorder PREFER: When a kept section would need a major reorder\u003cbr\u003e  to make sense; prefer dropping the confusing setup and keeping the clearest version\u003cbr\u003e  later.\u003cbr\u003e- KEEP chronological order MUST: Across the main conversation, unless a reorder is\u003cbr\u003e  required to resolve a hard continuity\u002fconfusion issue.\u003cbr\u003e- KEEP guest scene detail PREFER: When the guest describes concrete observed moments\u003cbr\u003e  (crowd reactions, specific characters, a person crying), even if it runs longer than the\u003cbr\u003e  surrounding exposition.\u003cbr\u003e- KEEP host joke button PREFER: When a short host interjection lands as a clean comedic or\u003cbr\u003e  tonal button that reinforces (not derails) the guest’s point.\u003cbr\u003e- MUTE host backchannel PREFER: When the host’s 'mm-hmm\u002fyeah\u002fwow' overlaps or distracts\u003cbr\u003e  during a guest’s substantive explanation.\u003cbr\u003e- REORDER clarifying definition AVOID: Only when a short definition\u002fprimer exists\u003cbr\u003e  elsewhere and can be moved forward to prevent listener confusion without changing\u003cbr\u003e  meaning or creating timeline contradictions.","\u003cb\u003eTheWillPowerPodcast\u003c\u002fb\u003e\u003cbr\u003eRewire Addicted Brain: Kill Cravings & Heal Fog | Dr. Tiff Thompson\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light-touch, near-full runtime, micro-shaves between turns, macro cuts\u003cbr\u003e  reserved for meta\u003cbr\u003eCUT_CRITERIA: protects substantive teaching blocks, cuts repetitive agreement scaffolding,\u003cbr\u003e  keeps long vulnerability intact\u003cbr\u003eAUTHENTICITY_POLICY: cleans glitches, keeps humanity, permits some slang\u002fedge, doesn't\u003cbr\u003e  over-sanitize cadence\u003cbr\u003eSTRUCTURE_TEMPLATE: story\u002fquote cold open with music, fast host welcome, then dive, outro\u003cbr\u003e  is functional, not produced\u003cbr\u003eREORDER_ASSEMBLY: chronology is the default, assembly via trims, not reshuffle, hooks\u003cbr\u003e  added without rearranging core\u003cbr\u003eSPEAKER_TREATMENT: guest backchannels heavily muted, host trimmed slightly more, guest\u003cbr\u003e  long turns protected\u003cbr\u003eRULES:\u003cbr\u003e- CUT tech or audio meta MUST: Any time either speaker comments on audio problems,\u003cbr\u003e  glitches, or recording logistics, unless it is essential to understand a missing line.\u003cbr\u003e- CUT host affirmation run PREFER: When the host stacks multiple agreements\u002fpraise\u002frecaps\u003cbr\u003e  without adding a new question, insight, or a clear transition into the next topic.\u003cbr\u003e- CUT host self-interruptions PREFER: When the host breaks their own question with\u003cbr\u003e  asides\u002fapologies\u002fextra framing that doesn’t change what’s being asked.\u003cbr\u003e- CUT microparticles inside sentences PREFER: Single-word hiccups or tiny connector\u003cbr\u003e  fragments that don’t change meaning (e.g., clipped starters\u002fextra conjunctions) within\u003cbr\u003e  otherwise clean sentences.\u003cbr\u003e- KEEP chronological topic flow MUST: For the main interview section, unless chronology\u003cbr\u003e  creates a clear comprehension problem that cannot be solved with trims.\u003cbr\u003e- KEEP guest explanation block MUST: When the guest is in a continuous teaching\u002fexplaining\u003cbr\u003e  mode (even if dense\u002ftechnical), unless it becomes purely list-like repetition without a\u003cbr\u003e  takeaway.\u003cbr\u003e- KEEP guest long answer MUST: When the guest is progressing through a coherent\u003cbr\u003e  explanation (setup→mechanism→example→takeaway), even if it runs long.\u003cbr\u003e- KEEP host vulnerability arc PREFER: When the host is articulating an internal\u003cbr\u003e  conflict\u002fshame\u002fgrief arc that advances the episode’s emotional stakes, even if it\u003cbr\u003e  includes imperfect phrasing.\u003cbr\u003e- MUTE guest backchannel under host MUST: When the guest is only affirming (mm-\u003cbr\u003e  hmm\u002fyeah\u002fright) while the host is asking a question or setting context, unless the\u003cbr\u003e  affirmation is content-bearing (e.g., a quick correction).\u003cbr\u003e- REORDER clarity fix only AVOID: Only when a brief swap is required to restore\u003cbr\u003e  cause→effect understanding (e.g., definition must precede the example), and keep the\u003cbr\u003e  shift minimal.","\u003cb\u003eInterpreting India\u003c\u002fb\u003e\u003cbr\u003eScarcity, Sovereignty, Strategy: Mapping the Political Geography of AI Compute\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high retention, micro-shave pacing, macro cuts rare but decisive, uses pads\u003cbr\u003e  to smooth joins\u003cbr\u003eCUT_CRITERIA: guest substance protected end-to-end, host framing tightened aggressively,\u003cbr\u003e  surgical single-word cleanups\u003cbr\u003eAUTHENTICITY_POLICY: light-touch cleanup; some ums remain, edits aim to be invisible,\u003cbr\u003e  tightening via mute over rewrites\u003cbr\u003eSTRUCTURE_TEMPLATE: long produced, music-bed intro, conversation starts after setup,\u003cbr\u003e  produced outro with subscribe cta\u003cbr\u003eREORDER_ASSEMBLY: strong chronological fidelity, assembly over rearrangement, continuity\u003cbr\u003e  preserved over novelty\u003cbr\u003eSPEAKER_TREATMENT: guest protected; host expendable, guest tightened subtly (mutes), host\u003cbr\u003e  interruptions minimized\u003cbr\u003eRULES:\u003cbr\u003e- CUT host backchannel during guest PREFER: When host interjections do not steer the guest\u003cbr\u003e  or add a needed clarification.\u003cbr\u003e- CUT host framing ramble PREFER: When the host is extending context-setting or repeating\u003cbr\u003e  premises, unless it directly sets up a new, sharper question for the guest.\u003cbr\u003e- CUT host repetition between guest answers PREFER: When the host paraphrases what the\u003cbr\u003e  guest just said or restates shared context before asking the next question.\u003cbr\u003e- CUT single word clutter in questions PREFER: When a host question contains stray\u003cbr\u003e  connector words or partial starts that do not change meaning (e.g., isolated\u003cbr\u003e  prepositions\u002fpartials).\u003cbr\u003e- KEEP chronological q and a flow MUST: Across the main interview, unless the recording\u003cbr\u003e  order creates direct confusion that cannot be resolved with a brief trim.\u003cbr\u003e- KEEP guest argument arc MUST: When the guest is building a multi-step explanation\u003cbr\u003e  (definitions, classifications, or trade-off reasoning), even if it includes hedging or\u003cbr\u003e  scene-setting.\u003cbr\u003e- KEEP guest long turns MUST: When the guest is explaining frameworks, numbers, or policy\u003cbr\u003e  trade-offs; avoid breaking these turns into smaller fragments unless necessary for\u003cbr\u003e  clarity.\u003cbr\u003e- MUTE guest parenthetical asides PREFER: When the guest briefly detours into\u003cbr\u003e  citations\u002fcredits or side-qualifiers that don’t affect the core answer and can be\u003cbr\u003e  removed without leaving a logical gap.\u003cbr\u003e- MUTE guest redundant phrases within turn PREFER: When the guest repeats short qualifiers\u003cbr\u003e  or list-connectors inside an otherwise-valuable long answer and muting can tighten\u003cbr\u003e  without breaking the thought structure.\u003cbr\u003e- REORDER topic blocks AVOID: Only when a later clarification is required to make an\u003cbr\u003e  earlier segment intelligible and the move will not introduce new references to missing\u003cbr\u003e  context.","\u003cb\u003eTheWillPowerPodcast\u003c\u002fb\u003e\u003cbr\u003eBlackout Knife Night & Suicide Attempt: Ryan Barrett's Dark Redemption (2+ Years Sober)\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: aggressive runtime tightening, macro-block pruning over micro-shaves, low\u003cbr\u003e  tolerance for circular q&a, keeps pace even in heavy topics\u003cbr\u003eCUT_CRITERIA: cuts reflective host monologues, keeps only the strongest beat, context\u003cbr\u003e  trimmed if later restated, protects vivid story spine\u003cbr\u003eAUTHENTICITY_POLICY: content-first, continuity-second, allows stitched phrasing and jump\u003cbr\u003e  cuts, selective cleanup; not ultra-polished, keeps some overlap for energy\u003cbr\u003eSTRUCTURE_TEMPLATE: cold open from peak moment, produced host intro as hook, fast ramp\u003cbr\u003e  into trauma timeline, outro kept straightforward and long-form\u003cbr\u003eREORDER_ASSEMBLY: narrative arc over chronology, front-loads the highest stakes, reorders\u003cbr\u003e  in multi-minute blocks, assembles answers from fragments\u003cbr\u003eSPEAKER_TREATMENT: host trimmed more aggressively, guest protected for story clarity,\u003cbr\u003e  mutes used to de-clutter turns, allows short reactive interjections\u003cbr\u003eRULES:\u003cbr\u003e- CUT guest self-interruption and restarts MUST: When the guest begins a sentence,\u003cbr\u003e  restarts, and the restart is cleaner; keep only the clean pass even if it requires\u003cbr\u003e  stitching.\u003cbr\u003e- CUT redundant setup question MUST: When the host asks a question that is immediately re-\u003cbr\u003e  asked more cleanly, or when the guest has already begun answering the same point.\u003cbr\u003e- CUT host multi-sentence empathy PREFER: When empathy becomes a paragraph (apologies,\u003cbr\u003e  praise, extended validation), unless it clearly heightens a vulnerable guest disclosure.\u003cbr\u003e- CUT host reflection block PREFER: When the host summarizes, moralizes, or relates a\u003cbr\u003e  personal parallel for more than a couple sentences, unless it directly provokes a new,\u003cbr\u003e  specific guest detail.\u003cbr\u003e- CUT name and logistics asides PREFER: When personal-name clarifications, employment\u003cbr\u003e  minutiae, or procedural explanations don’t change the emotional or factual arc of the\u003cbr\u003e  story.\u003cbr\u003e- KEEP chronological micro sequence AVOID: Inside a guest’s step-by-step incident\u003cbr\u003e  recounting, avoid reordering individual steps unless needed to fix a clear\u003cbr\u003e  contradiction.\u003cbr\u003e- KEEP clean turning point line MUST: When a single sentence crystallizes a turning point\u003cbr\u003e  (e.g., fear, decision, surrender), even if it requires cutting surrounding lead-in\u002fout\u003cbr\u003e  to isolate it.\u003cbr\u003e- KEEP graphic or vulnerable detail PREFER: When the detail is central to the episode’s\u003cbr\u003e  stakes (injury, shame, turning point) and advances the timeline, even if the surrounding\u003cbr\u003e  language is rough.\u003cbr\u003e- KEEP single-word host reactions PREFER: When brief reactions (e.g., disbelief,\u003cbr\u003e  acknowledgment) punctuate a heavy story beat without interrupting it.\u003cbr\u003e- MUTE host backchannel during guest PREFER: When the host’s affirmations or partial\u003cbr\u003e  interjections sit on top of the guest’s sentence and don’t change meaning.\u003cbr\u003e- REORDER bio and credential intro MUST: When the recorded intro contains long\u003cbr\u003e  pleasantries; replace\u002frelocate them with a tighter, pre-written framing section before\u003cbr\u003e  the first substantive question.\u003cbr\u003e- REORDER peak story block PREFER: When a later high-stakes incident can function as a\u003cbr\u003e  cold open that makes the listener want the backstory immediately.\u003cbr\u003e- REORDER question then answer pairing PREFER: When the strongest version of the host’s\u003cbr\u003e  question occurs in a different place than the guest’s clearest answer; assemble them\u003cbr\u003e  adjacent if it reduces repetition.","\u003cb\u003eThe Richard Robbins Show\u003c\u002fb\u003e\u003cbr\u003eFrom Data to Deals: Agent Strategies From The CEO of Canada’s Top Real Estate Board, John DiMichele\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high-retention, light-touch pacing, micro-shaves between words and breaths,\u003cbr\u003e  lets full answers run long\u003cbr\u003eCUT_CRITERIA: cuts logistics; keeps substance, keeps long anecdotes if illustrative,\u003cbr\u003e  removes only flow-breaking hiccups\u003cbr\u003eAUTHENTICITY_POLICY: conversational roughness stays audible, laughs and natural reactions\u003cbr\u003e  kept, edits aim to be invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold-open style intro, minimal intervention in main body,\u003cbr\u003e  hard cut before off-air chatter\u003cbr\u003eREORDER_ASSEMBLY: chronology is essentially sacred, no thematic reshuffling\u003cbr\u003eSPEAKER_TREATMENT: backchannels suppressed during answers, guest protected more than host,\u003cbr\u003e  crosstalk largely de-emphasized\u003cbr\u003eRULES:\u003cbr\u003e- CUT post roll production talk MUST: When the conversation has clearly ended and the\u003cbr\u003e  speakers switch to wrap-up logistics, compliments about the recording, or notes about\u003cbr\u003e  editing\u002fredoing parts.\u003cbr\u003e- CUT host turn redundancy PREFER: When the host repeats a just-stated fact\u002fquestion setup\u003cbr\u003e  without adding a new angle, especially right before a guest response.\u003cbr\u003e- CUT single word hiccups PREFER: When a lone word\u002frestart\u002fconnector briefly interrupts\u003cbr\u003e  grammar or momentum but its removal does not change meaning.\u003cbr\u003e- KEEP chronological sequence MUST: Throughout the main conversation; avoid moving\u003cbr\u003e  segments even if another ordering might be ‘tighter’ thematically.\u003cbr\u003e- KEEP guest argument arc MUST: When the guest is building a multi-step explanation; do\u003cbr\u003e  not carve it down into soundbites unless it becomes redundant.\u003cbr\u003e- KEEP guest cadence continuity MUST: When an edit choice would create audible choppiness\u003cbr\u003e  in the guest’s phrasing; accept slightly longer runtime instead.\u003cbr\u003e- KEEP illustrative story block PREFER: When a story\u002fanecdote concretely supports the\u003cbr\u003e  point being made (e.g., explains market psychology, personal experience, or a concept-\u003cbr\u003e  by-example), even if it runs long.\u003cbr\u003e- MUTE guest backchannel PREFER: When the guest’s brief interjections overlap the host\u003cbr\u003e  mid-sentence and don’t add meaning beyond agreement.\u003cbr\u003e- MUTE host backchannel PREFER: When the host is interjecting short affirmations (‘right,’\u003cbr\u003e  ‘yeah,’ etc.) over a guest’s ongoing explanation.\u003cbr\u003e- REORDER main topic blocks AVOID: Only if the original order creates clear confusion\u003cbr\u003e  (references to something not yet introduced) that cannot be solved with a micro-cut or a\u003cbr\u003e  brief bridging line.","\u003cb\u003eHBR IdeaCast\u003c\u002fb\u003e\u003cbr\u003eThe Cognitive Science Behind Sudden Change\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro excisions over constant shaving, moderate micro-trims inside sentences,\u003cbr\u003e  low tolerance for stalled momentum, keeps intact idea-runs when flowing\u003cbr\u003eCUT_CRITERIA: cut retakes, self-editing, meta, prune interviewer throat-clearing framing,\u003cbr\u003e  protect research-backed explanation blocks, avoid unnecessary specificity\u002fname-drops\u003cbr\u003eAUTHENTICITY_POLICY: broadcast-polished, minimal rough edges, candid admissions kept when\u003cbr\u003e  insightful, hedging cleaned more than preserved, profanity\u002fcontent-risk avoided\u003cbr\u003eSTRUCTURE_TEMPLATE: produced wrapper around raw interview, sponsor messaging woven into\u003cbr\u003e  runtime, scripted outro with next-week tease, host\u002fannouncer bridges for continuity\u003cbr\u003eREORDER_ASSEMBLY: reorder to improve question-answer fit, save single takeaway for the\u003cbr\u003e  end, small time-shifts, not radical reshuffles\u003cbr\u003eSPEAKER_TREATMENT: interviewer tightened more than guest, guest cadence protected; micro-\u003cbr\u003e  fixes inside, crosstalk minimized, not celebrated, surgical mutes for repeats\u003cbr\u003eRULES:\u003cbr\u003e- CUT recording logistics and tech interruptions MUST: Any platform\u002fecho\u002fcall\u002fconnection\u003cbr\u003e  issues and the recovery chatter around them, even if it briefly shows personality.\u003cbr\u003e- CUT retakes and self restarts MUST: When a speaker says they’ll ‘retake\u002ftry again\u002fthink\u003cbr\u003e  for a second’ or delivers multiple versions of the same answer, unless the first version\u003cbr\u003e  contains a uniquely strong line not repeated.\u003cbr\u003e- CUT speaker negotiation about editing MUST: Any ‘you can cut this \u002f do you want to keep\u003cbr\u003e  it’ negotiation between speakers, even if it’s friendly or humorous.\u003cbr\u003e- CUT interviewer asides and extra clauses PREFER: When the interviewer adds commentary,\u003cbr\u003e  qualifiers, or multiple lead-ins that don’t materially change the guest’s target\u003cbr\u003e  question.\u003cbr\u003e- CUT interviewer proverbial framing PREFER: When the interviewer uses tropey framing\u003cbr\u003e  (‘philosophers\u002fconsultants say…’) or long scene-setting that doesn’t change the question\u003cbr\u003e  the guest answers.\u003cbr\u003e- CUT overly specific examples about third parties PREFER: When a guest reaches for\u003cbr\u003e  workplace- or person-specific examples that aren’t necessary to land the general\u003cbr\u003e  principle (especially if they start negotiating how specific to be).\u003cbr\u003e- KEEP guest personal stakes PREFER: When the guest shares a first-person moment that\u003cbr\u003e  explains their motivation or stakes and directly supports the episode’s thesis, even if\u003cbr\u003e  it’s emotionally exposed.\u003cbr\u003e- KEEP guest vulnerability lines PREFER: When candid self-assessment or insecurity serves\u003cbr\u003e  as a setup for a research insight (rather than being mere uncertainty about the\u003cbr\u003e  recording).\u003cbr\u003e- MUTE guest micro repeats MUST: When the guest repeats a short phrase mid-sentence (‘the\u003cbr\u003e  way you do this… do this’) and the meaning is unchanged.\u003cbr\u003e- REORDER large thematic rebuild AVOID: If a reorder would require moving many\u003cbr\u003e  interdependent sections or changing the apparent progression of the conversation beyond\u003cbr\u003e  a few minutes, prefer cutting and bridging instead.\u003cbr\u003e- REORDER closing takeaway block PREFER: When there is a compact ‘one piece of advice \u002f\u003cbr\u003e  final message’ exchange recorded earlier, place it near the end as the closing button.\u003cbr\u003e- REORDER supporting anecdote PREFER: When the guest offers a practical workplace\u002fmanager\u003cbr\u003e  anecdote that clarifies an abstract point, move it to immediately follow the relevant\u003cbr\u003e  question or claim.","\u003cb\u003eThinking Crypto News & Interviews\u003c\u002fb\u003e\u003cbr\u003eThe Unexpected Reality of Crypto Market Cycles! with William Quigley\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high session retention, light trimming, micro-shaves over heavy rewrite, long\u003cbr\u003e  expert runs left intact, pads inserted to smooth joins\u003cbr\u003eCUT_CRITERIA: cut redundancy, keep substance, filler cleaned selectively, not sterilized,\u003cbr\u003e  host narration tightened more than guest, occasional macro cuts at transitions\u003cbr\u003eAUTHENTICITY_POLICY: conversational polish, not scripted, some ums and repeats remain,\u003cbr\u003e  edits kept mostly invisible, rough edges tolerated in monologues\u003cbr\u003eSTRUCTURE_TEMPLATE: cold-open tease before intro, ad-heavy bookends and midrolls, host\u003cbr\u003e  intro after external blocks, cta\u002fpromo interruptions permitted\u003cbr\u003eREORDER_ASSEMBLY: mostly chronological, tiny reorders, reorder mainly to place intro\u003cbr\u003e  cleanly, assembly serves sponsor\u002fsegment placement\u003cbr\u003eSPEAKER_TREATMENT: guest protected, host tightened, backchannels muted rather than cut,\u003cbr\u003e  host prompts kept functional, guest holds the floor\u003cbr\u003eRULES:\u003cbr\u003e- CUT fragmented stumble MUST: When a phrase becomes garbled\u002ffragmentary (half-words,\u003cbr\u003e  clipped restarts) and removing it does not change meaning or continuity.\u003cbr\u003e- CUT redundant phrase MUST: When a point is immediately restated with no added nuance\u003cbr\u003e  (often at the end or beginning of a turn), especially around transitions into the next\u003cbr\u003e  question\u002fsegment.\u003cbr\u003e- CUT host extra words in question PREFER: When the host question contains add-on hedges\u003cbr\u003e  and side-phrases that don’t change what’s being asked (especially right before yielding\u003cbr\u003e  the floor).\u003cbr\u003e- CUT transitional ramp PREFER: When a speaker uses placeholder lead-ins like “so to speak\u003cbr\u003e  \u002f again \u002f kind of” as a bridge and the next sentence stands on its own cleanly.\u003cbr\u003e- KEEP chronological main conversation MUST: For the main discussion once the first\u003cbr\u003e  question begins, unless a small move is required to repair a broken transition caused by\u003cbr\u003e  an inserted external segment.\u003cbr\u003e- KEEP guest full answer arc MUST: When the guest is answering a host question directly\u003cbr\u003e  and building a multi-part response; do not carve it down to highlights unless it becomes\u003cbr\u003e  clearly repetitive.\u003cbr\u003e- KEEP guest long explanation PREFER: When the guest is in a multi-sentence reasoning\u003cbr\u003e  chain (definitions, causal steps, historical framing), even if there are some\u003cbr\u003e  ums\u002fhedges, unless it fully loops back and repeats.\u003cbr\u003e- KEEP opinionated edge PREFER: When a speaker delivers a strong, character-revealing\u003cbr\u003e  stance (even if blunt), as long as it directly supports the topic being discussed.\u003cbr\u003e- MUTE host backchannel MUST: When the host interjects short affirmations during an active\u003cbr\u003e  guest explanation and removing it would avoid stepping on the guest without disrupting\u003cbr\u003e  meaning.\u003cbr\u003e- MUTE incidental overlap PREFER: When brief crosstalk\u002foverlap occurs and one speaker is\u003cbr\u003e  clearly carrying the informational thread; suppress the non-essential interjection\u003cbr\u003e  instead of restructuring the exchange.\u003cbr\u003e- REORDER hook tease PREFER: When there is a strong single-sentence guest line that can\u003cbr\u003e  function as a cold open without needing additional context.\u003cbr\u003e- REORDER show intro block PREFER: When needed to place the host’s formal welcome\u002fguest\u003cbr\u003e  intro immediately after external openers (ads\u002fpromos) while keeping the first\u003cbr\u003e  substantive question intact.","\u003cb\u003eLiftoff Journeys with Jeanniey Walden\u003c\u002fb\u003e\u003cbr\u003eWe Just Vibe-Authored A Book! Blank Page to Author with Keith & Vanessa Bell\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro-block pruning over micro-shaves, adds breathing room with pads, very\u003cbr\u003e  light silence trimming, keeps long answers intact\u003cbr\u003eCUT_CRITERIA: cuts alternate takes and off-format bits, host framing kept; redundancy\u003cbr\u003e  shaved, selective micro-cuts for emphasis stutters, core story beats protected\u003cbr\u003eAUTHENTICITY_POLICY: light-clean, not hyper-polished, leaves casual speech patterns, edits\u003cbr\u003e  repeats more than tone, uses added pads instead of hard snaps\u003cbr\u003eSTRUCTURE_TEMPLATE: produced narrated cold open, host-led framing into conversation, short\u003cbr\u003e  stinger before wrap, produced branded outro\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved; no reshuffle, assembly via removal, not rearrange,\u003cbr\u003e  transitions handled with inserts, avoids theme-clustering\u003cbr\u003eSPEAKER_TREATMENT: host content prioritized as main arc, guest kept as\u003cbr\u003e  questioner\u002fvalidator, strategic muting of interjections, low tolerance for overlap\u003cbr\u003e  clutter\u003cbr\u003eRULES:\u003cbr\u003e- CUT closing meta production talk MUST: When speakers discuss having ‘enough content’,\u003cbr\u003e  what the editor will do, or stopping\u002fstarting recording after the narrative conclusion\u003cbr\u003e  has already landed.\u003cbr\u003e- CUT micro repetition single word MUST: When a word\u002fphrase is immediately repeated for no\u003cbr\u003e  added meaning (e.g., doubled affirmations or a restarted fragment) and the sentence\u003cbr\u003e  survives cleanly without it.\u003cbr\u003e- CUT off format performance takes MUST: When the recording shifts into making\u003cbr\u003e  promo\u002fTV\u002fsocial reactions, multiple takes, or scripted call-and-response lines intended\u003cbr\u003e  for other platforms.\u003cbr\u003e- CUT guest redundant emphasis PREFER: When the guest repeats a short intensifier or\u003cbr\u003e  closing phrase that doesn’t add information (especially right after an already-complete\u003cbr\u003e  thought).\u003cbr\u003e- KEEP guest affirmation that lands PREFER: When the guest’s reaction functions as a clear\u003cbr\u003e  validation\u002fsummary beat that helps ‘seal’ the host’s point and improves the ending\u003cbr\u003e  energy.\u003cbr\u003e- KEEP long reflective answer PREFER: When a speaker is explaining the personal turning\u003cbr\u003e  point, the ‘why’, or the conceptual takeaway—even if it runs long and includes a few\u003cbr\u003e  rough edges.\u003cbr\u003e- MUTE host backchannel during guest question PREFER: When the guest is setting up or\u003cbr\u003e  asking a question and the host adds short interjections that don’t change meaning (e.g.,\u003cbr\u003e  ‘you’, ‘I love that’) and would muddy the handoff.\u003cbr\u003e- REORDER conversation blocks AVOID: Only if a section is unusable in-place due to missing\u003cbr\u003e  context; otherwise keep the original sequence and fix flow with trims or external\u003cbr\u003e  narration.","\u003cb\u003eTFTC: A Bitcoin Podcast\u003c\u002fb\u003e\u003cbr\u003e#721: The Human Skills That Matter Now That AI Can Code with Calle\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro pruning over micro-shaving, long guest runs stay intact, low silence-\u003cbr\u003e  trim aggressiveness\u003cbr\u003eCUT_CRITERIA: cut confusion; protect clarity arcs, host trims before guest trims, keep\u003cbr\u003e  philosophical wrap-up beats, kill repeated setup, keep payoff\u003cbr\u003eAUTHENTICITY_POLICY: conversational rough edges tolerated, light-touch overlap\u003cbr\u003e  preservation, polish focused on intelligibility\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open teaser, mid-episode sponsor blocks, produced cta\u003cbr\u003e  outro\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, no thematic reshuffling, only surgical\u003cbr\u003e  continuity fixes\u003cbr\u003eSPEAKER_TREATMENT: guest floor prioritized, lightly cleaned, host as connective tissue,\u003cbr\u003e  backchannels mostly expendable\u003cbr\u003eRULES:\u003cbr\u003e- CUT confusing or garbled block MUST: When a section reads as scrambled\u002flow-coherence\u003cbr\u003e  (e.g., broken phrasing, missing connective tissue, or hard-to-parse advice), even if\u003cbr\u003e  it’s on-topic.\u003cbr\u003e- CUT host agreement echo PREFER: When the host repeats the guest’s point, adds a second\u003cbr\u003e  metaphor for the same idea, or says a non-essential agreement line during the guest’s\u003cbr\u003e  momentum.\u003cbr\u003e- CUT host outro farewell tag PREFER: When a casual extra sign-off trails after the\u003cbr\u003e  episode’s intended closing\u002foutro structure.\u003cbr\u003e- CUT host ramble question PREFER: When the host question becomes a long multi-part\u003cbr\u003e  monologue or re-litigates context the guest already established, unless it directly tees\u003cbr\u003e  up a new, concrete guest answer.\u003cbr\u003e- CUT repetition within example PREFER: When the same example is re-stated with near-\u003cbr\u003e  identical framing (repeated setup lines, duplicate qualifiers), keeping only the\u003cbr\u003e  cleanest statement and the payoff.\u003cbr\u003e- KEEP chronological sequence MUST: By default across the main conversation, even when\u003cbr\u003e  tightening for pacing.\u003cbr\u003e- KEEP guest explanation arc PREFER: When the guest is building a staged argument (levels,\u003cbr\u003e  steps, progression, or a worked example) with clear forward motion, even if it runs\u003cbr\u003e  long.\u003cbr\u003e- KEEP guest longform answer PREFER: When the guest is in a strong uninterrupted run and\u003cbr\u003e  the host interjections are not needed for clarity—preserve the run and remove the\u003cbr\u003e  interjection instead.\u003cbr\u003e- KEEP philosophical closing reflection PREFER: During the final segment, when the\u003cbr\u003e  discussion shifts to meaning\u002fvalues and provides a satisfying thesis-like ending for the\u003cbr\u003e  episode.\u003cbr\u003e- MUTE guest micro filler word PREFER: Only as a surgical fix when a single word creates\u003cbr\u003e  an audible snag or redundancy inside an otherwise-keepable sentence; do not broadly de-\u003cbr\u003e  filler the guest.\u003cbr\u003e- REORDER micro continuity patch AVOID: Only when a small swap is required to restore\u003cbr\u003e  referents (who\u002fwhat is being discussed) after a cut; avoid moving full topic blocks.","\u003cb\u003eThe News Agents\u003c\u002fb\u003e\u003cbr\u003eAre World Cup fans in danger after Mexico cartel violence? - The Sports Agents\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between clauses, hosts compressed far more than guest,\u003cbr\u003e  low pause\u002fsilence intervention, will add runtime via produced bookends\u003cbr\u003eCUT_CRITERIA: host banter expendable; guest analysis protected, cuts hedges\u002fsofteners,\u003cbr\u003e  keeps claims and facts, removes host meta asides mid-answer, keeps brief levity inside\u003cbr\u003e  topic\u003cbr\u003eAUTHENTICITY_POLICY: polished transcript-forward cleanliness, backchannels managed via\u003cbr\u003e  selective muting, some rough edges tolerated for pace\u003cbr\u003eSTRUCTURE_TEMPLATE: produced headline opener before session, session interview as the core\u003cbr\u003e  block, branded promo-heavy outro\u003cbr\u003eREORDER_ASSEMBLY: topic coherence over strict chronology, reorders used to de-tangle\u003cbr\u003e  interruptions, block-level reshaping, not sentence remixing\u003cbr\u003eSPEAKER_TREATMENT: guest largely sacred; hosts heavily sculpted, mute interruptions\u003cbr\u003e  instead of cutting answers, host questions kept, host color minimized\u003cbr\u003eRULES:\u003cbr\u003e- CUT host ramble MUST: When a host digresses into personal anecdotes, meta commentary, or\u003cbr\u003e  comedic elaboration while the guest is building an explanation, unless the digression\u003cbr\u003e  directly sets up a sharper guest response within the next turn.\u003cbr\u003e- CUT guest hedging phrases PREFER: When the guest uses repeated softeners (e.g., ‘I\u003cbr\u003e  mean’, ‘you know’, ‘kind of’) that do not change meaning, especially at the start of\u003cbr\u003e  sentences or before key points.\u003cbr\u003e- CUT host interruption question stack PREFER: When hosts layer multiple follow-ups or\u003cbr\u003e  clarifications over the guest’s ongoing point; keep only the single question that best\u003cbr\u003e  tees up the next answer.\u003cbr\u003e- KEEP topic bound levity AVOID: When a quick joke\u002fbeat lands and reinforces the\u003cbr\u003e  conversation’s premise (rather than opening a new tangent), and it does not interrupt a\u003cbr\u003e  critical factual explanation.\u003cbr\u003e- KEEP guest turn continuity MUST: When choosing between trimming the guest’s sentence vs\u003cbr\u003e  trimming host speech around it, preserve the guest’s full sentence and remove\u002fmute host\u003cbr\u003e  material instead.\u003cbr\u003e- KEEP guest explanatory run PREFER: When the guest is laying out multi-step context\u003cbr\u003e  (timeline, stakeholders, implications), even if it includes minor hedging or repetition,\u003cbr\u003e  unless it becomes purely circular.\u003cbr\u003e- MUTE host backchannel MUST: When hosts affirm or react over the guest during an active\u003cbr\u003e  explanation, unless the reaction is necessary to establish tone or a transition.\u003cbr\u003e- REORDER guest block PREFER: When a guest’s explanation is split by host\u003cbr\u003e  interjections\u002ftangents and the guest later resumes the same point, assemble the guest\u003cbr\u003e  material into one continuous block and relocate the interruption elsewhere or remove it.\u003cbr\u003e- REORDER new subtopic block PREFER: When the conversation naturally shifts into a\u003cbr\u003e  secondary subtopic (e.g., logistics\u002ffunding\u002fsafety operations), cluster that subtopic\u003cbr\u003e  into a single segment rather than revisiting it in fragments throughout.\u003cbr\u003e- REORDER question answer pairing PREFER: When a host asks a specific question and the\u003cbr\u003e  most direct guest answer occurs later after a detour, move the answer closer to the\u003cbr\u003e  question to preserve clarity.","\u003cb\u003eThe Liz Earle Wellbeing Show\u003c\u002fb\u003e\u003cbr\u003e5 easy wins to reduce microplastics and forever chemicals – with Dr Sabine Donnai\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaving between turns, low overall runtime compression,\u003cbr\u003e  near-zero pause tolerance, macro answers stay intact\u003cbr\u003eCUT_CRITERIA: cuts friction, keeps substance, keeps high-stakes personal evidence, prunes\u003cbr\u003e  repeated affirmations\u002fvocatives, protects practical “easy wins” lists\u003cbr\u003eAUTHENTICITY_POLICY: cleaned transcript, warm reactions kept, stumbles minimized, not\u003cbr\u003e  sterilized, uses muting to preserve flow\u003cbr\u003eSTRUCTURE_TEMPLATE: produced, music-backed narrated intro, single uninterrupted interview\u003cbr\u003e  core, mid-episode reset into protocols, long produced outro: recap + cta\u003cbr\u003eREORDER_ASSEMBLY: intro assembled from later material, front-loads framing before deep\u003cbr\u003e  detail, reorders to tighten q→a continuity\u003cbr\u003eSPEAKER_TREATMENT: backchannels heavily suppressed, primary guest protected, host\u003cbr\u003e  tightened, producer\u002fsecondary voice kept off-air\u003cbr\u003eRULES:\u003cbr\u003e- CUT on air logistics MUST: Any scheduling, tech latency, \"are we recording\" talk, or\u003cbr\u003e  producer coordination, even if it contains light banter, unless it is explicitly\u003cbr\u003e  reframed as part of the episode premise.\u003cbr\u003e- CUT secondary speaker presence MUST: Any non-primary participant\u002fprofessional\u003cbr\u003e  facilitation voice (producer\u002fco-host not presented to audience), unless the show format\u003cbr\u003e  for that episode explicitly includes them on-mic.\u003cbr\u003e- CUT host repeat or echo PREFER: When the host restates the guest’s just-said point or\u003cbr\u003e  stacks multiple lead-ins before a question; keep only the shortest version that tees up\u003cbr\u003e  the guest’s next, new information.\u003cbr\u003e- CUT micro reassurances and vocatives PREFER: Standalone names, quick affirmations, and\u003cbr\u003e  partial phrases (\"sure\", \"sabine\", \"mm\") that don’t change meaning, especially when they\u003cbr\u003e  interrupt a guest’s explanatory run.\u003cbr\u003e- KEEP actionable checklists MUST: When the conversation shifts into specific\u003cbr\u003e  household\u002fbehavior swaps and clear protocols; only cut tangential examples, not the core\u003cbr\u003e  list structure.\u003cbr\u003e- KEEP chronological core conversation MUST: Within a coherent explanation run (multi-\u003cbr\u003e  minute guest reasoning), avoid reordering internal steps unless the original order\u003cbr\u003e  causes clear confusion.\u003cbr\u003e- KEEP guest personal origin story MUST: When the guest provides a personal experience\u003cbr\u003e  that establishes credibility\u002fstakes (diagnosis, discovery, turning point), even if it\u003cbr\u003e  includes emotional reactions or a longer setup.\u003cbr\u003e- KEEP brief crosstalk as energy PREFER: Very short overlaps that communicate rapport and\u003cbr\u003e  don’t obscure words; only clean if it harms intelligibility.\u003cbr\u003e- KEEP host reaction on key reveal PREFER: When the host’s reaction marks a genuine\u003cbr\u003e  emotional\u002fcomedic peak or signals listener-relevant surprise (e.g., a startling\u003cbr\u003e  example); allow it to land, then return quickly to the guest.\u003cbr\u003e- MUTE host backchannel during guest run MUST: When the guest is in an extended\u003cbr\u003e  explanation and the host is only offering affirmations (\"yeah\", \"sure\", \"mm-hmm\") or\u003cbr\u003e  brief reactions that interrupt readability.\u003cbr\u003e- MUTE guest interjection under host question PREFER: When the guest interjects while the\u003cbr\u003e  host is framing a question or transition and the interjection doesn’t add new\u003cbr\u003e  information.\u003cbr\u003e- REORDER clarifying question then answer PREFER: When a guest begins answering before the\u003cbr\u003e  host’s full question lands (or cross-talk fragments the setup); move the cleanest\u003cbr\u003e  question formulation immediately before the answer.\u003cbr\u003e- REORDER host intro block PREFER: When the session begins with pre-roll or slow ramp;\u003cbr\u003e  build\u002fposition a concise host-led framing\u002fwelcome segment at the start, even if it\u003cbr\u003e  originally occurred later.\u003cbr\u003e- REORDER topic pivot marker PREFER: When the conversation naturally shifts from\u003cbr\u003e  problem\u002fscare to practical solutions; place an explicit pivot line (break\u002fcircle\u003cbr\u003e  back\u002freset) at the boundary, even if recorded earlier\u002flater."],"x":{"dtype":"f4","bdata":"6hoUQaulHkGdciJBs+MrQTIuJkGPnyZBYKMdQQ8pGEFUEjBB1MEsQa6iJUFK7y9BiREgQV0HH0G44CBB5\u002fImQfcGHkEOhCpBsAEdQcO5LUHGFitB5eUhQXyUJUH4Zy5BNxYjQRX5LkHooRxBovkaQe\u002ffJkGGRC9BxEodQbKyHEH7sRxBCEgtQU2hJkFHFSxBTgkoQdhzMEHdaCVBNi8uQVRZK0FS8SRBuc8XQUOIFkGZqypBtr4iQRYsIUHBlSlBA+wvQY8\u002fKEHkkitBa7QkQXF1LUHzTSRBtO0xQalrLkHl+BpBhlAeQegDKEG6\u002fChB"},"y":{"dtype":"f4","bdata":"5Bp5QTmJeUEnO4NBagtlQfs0a0HWtn1B27N4QbtaY0G8JHBBkCSAQaSwaUHrc3RB1cl1QSguX0FrhGBBjzVkQRyEcEHocXlB4H5yQTB0f0HRz3dBPiVhQX1geEF1EHJBpExjQYsdfEFgk3hBkE+BQXGsZUHmXn1BdrxyQVVNeUEqOIFBF9RoQRapZUEX5GtBac1xQcazckE6CXVBJalrQUeebkE+S2hB4ZxrQQSYe0Gu+2pBj9ZuQQMVdEHXE3VBBF9pQYFSYkG+C3BBN5JwQRf+YkH+8n5BbYRqQYYefkGQomFBdxptQURjcEF7RWdB"},"type":"scatter"},{"hoverinfo":"skip","line":{"color":"#e377c2","dash":"dot","width":1.5},"mode":"lines","showlegend":false,"x":{"dtype":"f4","bdata":"6hoUQQ8pGEHl+BpBXQcfQXF1LUG07TFBhkQvQcO5LUHUwSxBnXIiQaL5GkHqGhRB"},"y":{"dtype":"f4","bdata":"5Bp5QbtaY0GQomFBKC5fQRf+YkFthGpB5l59QTB0f0GQJIBBJzuDQZBPgUHkGnlB"},"type":"scatter"},{"hoverinfo":"skip","mode":"text","showlegend":false,"text":["Guest-Forward Reordering"],"textfont":{"color":"#e377c2","size":9},"x":[10.349474906921387],"y":[15.055004119873047],"type":"scatter"},{"hoverinfo":"text","marker":{"color":"#bcbd22","line":{"color":"white","width":0.5},"size":8},"mode":"markers","name":"Hyper-Dense Micro Tightening","text":["\u003cb\u003eAussie FIRE | Financial Independence Retire Early\u003c\u002fb\u003e\u003cbr\u003e63. FI case study: Should I buy my first home with a 5% deposit, or wait until I have 20%?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaving inside sentences, keeps most full topic arcs, low\u003cbr\u003e  tolerance for verbal softeners, only light pause trimming\u003cbr\u003eCUT_CRITERIA: cuts meta-talk about recording itself, trims hedges more than content, keeps\u003cbr\u003e  detailed option walkthroughs, removes logistics even mid-flow\u003cbr\u003eAUTHENTICITY_POLICY: cleaned conversation, not scripted, allows some rough edges to\u003cbr\u003e  breathe, polish focuses on clarity, not personality\u003cbr\u003eSTRUCTURE_TEMPLATE: produced bookends around raw core, front-loaded disclaimer and\u003cbr\u003e  framing, clear host-led close with cta\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with tiny repairs, micro-reorders to fix coherence\u003cbr\u003eSPEAKER_TREATMENT: symmetric polish across speakers, hosts not minimized; kept\u003cbr\u003e  substantive, backchannels selectively muted\u003cbr\u003eRULES:\u003cbr\u003e- CUT in-session logistics and tech MUST: When logistics\u002ftech interruptions occur inside\u003cbr\u003e  the main discussion (noise, video issues, call drops), and the surrounding content can\u003cbr\u003e  reconnect cleanly with a simple cut.\u003cbr\u003e- CUT meta commentary about editing or reading MUST: When a speaker references the act of\u003cbr\u003e  recording, reading a disclaimer\u002fscript, or how the edit will work, unless it directly\u003cbr\u003e  sets up the next substantive point.\u003cbr\u003e- CUT guest gratitude loop PREFER: When thanks\u002fpraise repeats at the end of the\u003cbr\u003e  conversation beyond what’s needed to land a warm closing; keep a single clean expression\u003cbr\u003e  of appreciation.\u003cbr\u003e- CUT verbal hedges and softeners PREFER: When hedges ('pretty much', 'sort of', 'like',\u003cbr\u003e  'um\u002fah' as pacing crutches) can be removed without changing meaning or breaking grammar;\u003cbr\u003e  keep only when they convey genuine uncertainty that matters to the advice.\u003cbr\u003e- KEEP detailed financial reasoning block PREFER: When the segment lays out options,\u003cbr\u003e  trade-offs, or ballpark numbers that help the listener make a decision, even if it runs\u003cbr\u003e  long or repeats the conclusion in a calmer framing.\u003cbr\u003e- KEEP host longform explanation PREFER: When the host is translating the decision into\u003cbr\u003e  steps, ballparks, or contingency plans; do not cut down to just questions if the\u003cbr\u003e  explanation is the value.\u003cbr\u003e- KEEP personal anecdote as reframe PREFER: When a host anecdote functions as an\u003cbr\u003e  emotional\u002fpsychological reframe that reduces decision anxiety (e.g., “cost of\u003cbr\u003e  unwinding,” “calm\u002fhedge” framing), even if it’s not strictly necessary for the numeric\u003cbr\u003e  answer.\u003cbr\u003e- MUTE backchannel during other speaker point PREFER: When a speaker interjects brief\u003cbr\u003e  agreement\u002flaughter while another speaker is delivering an uninterrupted explanation, and\u003cbr\u003e  the interjection doesn’t change meaning.\u003cbr\u003e- REORDER topic blocks AVOID: When the reorder would meaningfully change the discussion’s\u003cbr\u003e  timeline or cause callbacks\u002fanswers to precede their setup; prefer cutting instead of\u003cbr\u003e  assembling a new narrative order.\u003cbr\u003e- REORDER short question fragment PREFER: When a speaker’s question is split by a cut or\u003cbr\u003e  interruption and a nearby fragment can be moved a few seconds to restore a single\u003cbr\u003e  coherent sentence.","\u003cb\u003eShe's On The Money\u003c\u002fb\u003e\u003cbr\u003eShe Bought Her First Home With a 2% Deposit on an $86k Salary\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaving between clauses, moderate runtime reduction overall,\u003cbr\u003e  rarely deletes full story beats, low tolerance for dead air\u003cbr\u003eCUT_CRITERIA: brand-safe: sanitize heat + swearing, keep relatable life-color if it pays\u003cbr\u003e  off, cut self-referential asides without lesson, protect the money-step walkthroughs\u003cbr\u003eAUTHENTICITY_POLICY: polished conversational realism, profanity largely removed, stumbles\u003cbr\u003e  cleaned; laughter kept, invisible stitching for continuity\u003cbr\u003eSTRUCTURE_TEMPLATE: standardized pre-roll + theme bed, hook via listener message framing,\u003cbr\u003e  mid-episode reset into deep dive, formal sponsor\u002flegal bookend outro\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, no thematic reshuffle, only tighten within-\u003cbr\u003e  scene\u003cbr\u003eSPEAKER_TREATMENT: backchannels frequently suppressed, both leads kept near-equal share,\u003cbr\u003e  interjections trimmed to keep flow, crosstalk mostly minimized\u003cbr\u003eRULES:\u003cbr\u003e- CUT identity reveals MUST: When a speaker nearly says or does say a participant’s real\u003cbr\u003e  name or other identifying detail, unless there is explicit framing that it’s intended\u003cbr\u003e  for publication.\u003cbr\u003e- CUT third party callout rant MUST: When a speaker starts naming or dunking on specific\u003cbr\u003e  companies\u002findividuals or escalates into profane outrage, unless the detail is essential\u003cbr\u003e  and can be stated neutrally.\u003cbr\u003e- CUT host personal aside PREFER: When hosts pivot into personal backstory, credentials,\u003cbr\u003e  or workplace context that doesn’t set up a question or clarify the listener takeaway.\u003cbr\u003e- CUT interjection restart PREFER: When a host interrupts to agree\u002fecho and it does not\u003cbr\u003e  introduce a new question, clarification, or punchline.\u003cbr\u003e- KEEP chronological sequence MUST: For the main conversation, unless the recording order\u003cbr\u003e  causes a clear comprehension problem (missing context, unanswered reference).\u003cbr\u003e- KEEP step by step process MUST: When the conversation enumerates concrete steps,\u003cbr\u003e  numbers, constraints, and decision criteria that listeners can copy (schemes, deposit\u003cbr\u003e  math, buying process).\u003cbr\u003e- KEEP relatable example PREFER: When lifestyle\u002frelationship anecdotes directly illustrate\u003cbr\u003e  a financial mechanism (e.g., spending creep, convenience spending, housing trade-offs),\u003cbr\u003e  even if it’s a little indulgent.\u003cbr\u003e- KEEP supportive reaction PREFER: When the reaction is the emotional button of the beat\u003cbr\u003e  (celebration, empathy, comedic topper) and helps land the listener takeaway.\u003cbr\u003e- MUTE backchannel MUST: When a speaker is delivering a full explanation and the other\u003cbr\u003e  speaker is only affirming (mm-hmm\u002fyeah\u002fshort laughs) that would clutter the line.\u003cbr\u003e- REORDER macro blocks AVOID: Only if needed to restore logical setup→answer flow (e.g., a\u003cbr\u003e  question appears after its answer due to recording artifacts).","\u003cb\u003eSomething About the Beatles\u003c\u002fb\u003e\u003cbr\u003e321: Beatles Comic-Con with Glenn Greenberg and Stephen DeStefano\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless sub-second tightening, big runtime cuts via macro blocks, lets\u003cbr\u003e  dense expert runs breathe, very low silence tolerance\u003cbr\u003eCUT_CRITERIA: pre-roll chatter removed wholesale, off-topic post-talk does not survive,\u003cbr\u003e  profanity softened inside kept beats, keeps ‘audience surrogate’ questions\u003cbr\u003eAUTHENTICITY_POLICY: highly polished, invisible hand, some overlap left for energy, cleans\u003cbr\u003e  stumbles into fluent clauses, uses surgical mutes over rewrites\u003cbr\u003eSTRUCTURE_TEMPLATE: long narrated, produced intro, topical framing before session audio,\u003cbr\u003e  mid-episode sponsor stack, produced, music-heavy outro\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with small swaps, reorders used to de-tangle, moves are\u003cbr\u003e  minute-scale only\u003cbr\u003eSPEAKER_TREATMENT: backchannels frequently muted, non-core participant can be excised,\u003cbr\u003e  asymmetric protection of best explainer, allows brief crosstalk to remain\u003cbr\u003eRULES:\u003cbr\u003e- CUT post interview hangout MUST: After the formal wrap\u002fthanks begin, unless it contains\u003cbr\u003e  a uniquely valuable recommendation or a clean, on-topic closing takeaway.\u003cbr\u003e- CUT pre roll smalltalk MUST: Before the topic is explicitly introduced, unless a remark\u003cbr\u003e  directly tees up the premise or establishes why the guest is authoritative.\u003cbr\u003e- CUT meta about recording platform workflow PREFER: When the conversation shifts to\u003cbr\u003e  recording\u002fediting tools, distribution logistics, or process commentary, unless it is\u003cbr\u003e  essential context for the audience to understand an upcoming segment.\u003cbr\u003e- CUT profanity in otherwise keep sentence PREFER: When a single profane phrase is\u003cbr\u003e  decorative rather than meaning-bearing; prefer removing just the phrase over dropping\u003cbr\u003e  the whole surrounding idea.\u003cbr\u003e- CUT secondary speaker threads PREFER: When a participant’s contributions don’t\u003cbr\u003e  materially advance the chosen narrative\u002ftopic for the episode (even if they were part of\u003cbr\u003e  the original session).\u003cbr\u003e- KEEP expert longform answer PREFER: When the guest is delivering a coherent,\u003cbr\u003e  information-dense run; prefer trimming only micro-hesitations rather than breaking the\u003cbr\u003e  run into many short intercuts.\u003cbr\u003e- KEEP naive question then definition PREFER: When the host admits ignorance and prompts a\u003cbr\u003e  guest to define a term or explain continuity\u002fcontext for general listeners; tighten but\u003cbr\u003e  keep the full question→answer payoff.\u003cbr\u003e- MUTE laughter backchannel MUST: When a speaker’s laugh\u002faffirmation sits under another\u003cbr\u003e  speaker’s substantive explanation; keep the lead speaker uninterrupted.\u003cbr\u003e- REORDER major topic blocks AVOID: When the move would shift a section more than a few\u003cbr\u003e  minutes or change the episode’s perceived timeline; preserve chronology instead.\u003cbr\u003e- REORDER clarification block PREFER: When a definition\u002fanswer appears shortly after the\u003cbr\u003e  question but was originally separated by side-comments; move the answer adjacent to the\u003cbr\u003e  question to prevent listener confusion.\u003cbr\u003e- REORDER repeat explanation fragments PREFER: When multiple near-duplicate explanations\u003cbr\u003e  occur within a couple minutes; consolidate by moving the best\u002fclearest version forward\u003cbr\u003e  and cutting the rest.","\u003cb\u003eWe Study Billionaires - The Investor’s Podcast Network\u003c\u002fb\u003e\u003cbr\u003eTIP795: Mastermind Q1, 2026: Berkshire, Moody's, & BellRing Brands w\u002f Stig Brodersen, Tobias Carlisle, and Hari Ramachandra\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaving between clauses, near-zero pause tolerance, prefers\u003cbr\u003e  density over breathiness\u003cbr\u003eCUT_CRITERIA: cuts meta-talk and self-commentary, trims host setup to the question,\u003cbr\u003e  protects core analytical frameworks, reduces repeated valuation caveats\u003cbr\u003eAUTHENTICITY_POLICY: polished transcript, minimal stumbles, cleans rough starts\u003cbr\u003e  aggressively, allows personality only if concise\u003cbr\u003eSTRUCTURE_TEMPLATE: produced summary intro + disclaimer, frequent midroll sponsor breaks,\u003cbr\u003e  clean bookended outro script\u003cbr\u003eREORDER_ASSEMBLY: mostly chronological with micro-reorders, reorders only to clarify\u003cbr\u003e  logic, very small temporal shifts\u003cbr\u003eSPEAKER_TREATMENT: host tightened more than guests, mutes stray interjections mid-answer,\u003cbr\u003e  lets guests complete full thoughts\u003cbr\u003eRULES:\u003cbr\u003e- CUT meta conversation management MUST: When speakers comment on the structure (handoffs,\u003cbr\u003e  cliffhangers, ‘let me not prime you’, ‘we should talk about this later’) and it doesn’t\u003cbr\u003e  add a substantive investing constraint or new information.\u003cbr\u003e- CUT deep personal portfolio process detail PREFER: When discussion shifts into granular\u003cbr\u003e  portfolio mechanics (position sizing, rebalance rules, fund process) unless it directly\u003cbr\u003e  changes the listener’s interpretation of the specific pick.\u003cbr\u003e- CUT host extended preface PREFER: When the host prefaces a question with multiple\u003cbr\u003e  hedges, apologies, or self-characterization; reduce to the cleanest single lead-in that\u003cbr\u003e  preserves intent.\u003cbr\u003e- CUT redundant restatements of same point PREFER: When a speaker repeats a claim\u003cbr\u003e  (valuation, risk, expected return) in multiple adjacent phrasings; keep the sharpest\u003cbr\u003e  phrasing plus one supporting detail.\u003cbr\u003e- CUT speaker name miscues and addressing noise PREFER: When speakers address each other\u003cbr\u003e  in ways that don’t advance meaning (greetings, repeated names, minor mis-addressing),\u003cbr\u003e  unless it sets up the next response.\u003cbr\u003e- KEEP adversarial pushback on risks MUST: When another speaker challenges the thesis with\u003cbr\u003e  a concrete risk (distribution concentration, cyclicality, valuation compression); keep\u003cbr\u003e  the pushback and the direct response even if it slightly slows pace.\u003cbr\u003e- KEEP chronological topic blocks MUST: When the conversation is moving pitch-by-pitch; do\u003cbr\u003e  not interleave later picks or later risk discussions into earlier picks.\u003cbr\u003e- KEEP guest thesis risk return arc MUST: When a guest is laying out the main thesis → key\u003cbr\u003e  risks → base\u002fbull\u002fbear math; avoid fragmenting that arc with cuts that force the\u003cbr\u003e  listener to infer missing steps.\u003cbr\u003e- KEEP simple mental models and bucket frameworks PREFER: When a speaker uses a compact\u003cbr\u003e  mental model (e.g., bucket valuation, toll-bridge\u002foligopoly framing) that helps\u003cbr\u003e  listeners remember the thesis even if it includes light repetition for clarity.\u003cbr\u003e- MUTE overlapping backchannels MUST: When a short ‘yeah\u002fmm’ or partial word overlaps a\u003cbr\u003e  substantive line from another speaker; mute the interjection rather than cutting the\u003cbr\u003e  main speaker’s sentence.\u003cbr\u003e- REORDER clarifying followup sentence PREFER: When a speaker’s clarification resolves\u003cbr\u003e  confusion created in the immediately preceding lines; move it earlier if it prevents a\u003cbr\u003e  listener from misreading the point.\u003cbr\u003e- REORDER punchline or payoff clause PREFER: When a short payoff line is stranded after\u003cbr\u003e  removable filler; pull it forward only within the same micro-beat (seconds), not across\u003cbr\u003e  topics.","\u003cb\u003eAfford Anything\u003c\u002fb\u003e\u003cbr\u003eQ&A: Should My Teen Go to College?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between turns, macro sections condensed, not just\u003cbr\u003e  cleaned, low silence tolerance; occasional pads, runtime favors density over hangout\u003cbr\u003eCUT_CRITERIA: cuts meta chatter and counting-in, banter kept only if it pays off, prefers\u003cbr\u003e  clean topic handoffs, protects substantive frameworks and examples\u003cbr\u003eAUTHENTICITY_POLICY: heavily de-ums and de-ramble, leaves some laughs and warmth, overlap\u003cbr\u003e  not fully sterilized, edits are mostly invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: produced open with tight tease, listener-question blocks separated by\u003cbr\u003e  scripted ramps, sponsor breaks are explicit and frequent, outro includes community ctas\u003cbr\u003eREORDER_ASSEMBLY: small reorders to sharpen logic, chronology mostly preserved within\u003cbr\u003e  answers, reorders used to remove redundancy, max shifts stay local\u003cbr\u003eSPEAKER_TREATMENT: both speakers tightened, not just host, primary speaker’s sentence\u003cbr\u003e  protected, backchannels often muted vs cut, crosstalk minimized, not eliminated\u003cbr\u003eRULES:\u003cbr\u003e- CUT extended riff or side story MUST: When a story\u002friff becomes self-entertaining\u003cbr\u003e  (songs, off-topic invitations, long reminiscence) without adding a concrete decision\u003cbr\u003e  tool for the listener; keep only the shortest beat needed for personality or a\u003cbr\u003e  punchline.\u003cbr\u003e- CUT production scaffolding MUST: Whenever the speakers are resetting, counting in,\u003cbr\u003e  commenti
