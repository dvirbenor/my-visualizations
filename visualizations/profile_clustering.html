UTE host interjection over guest MUST: When the host begins reacting mid-guest sentence\u003cbr\u003e  and the overlap risks masking the guest’s key clause.\u003cbr\u003e- MUTE guest fragment over host question PREFER: When a guest’s brief fragment overlaps a\u003cbr\u003e  host’s question\u002ftransition and does not add standalone information.\u003cbr\u003e- REORDER misordered clarification AVOID: Only if a short clarification is required\u003cbr\u003e  earlier to prevent immediate listener confusion, and the move is small and clearly non-\u003cbr\u003e  disruptive."],"x":{"dtype":"f4","bdata":"X4YTQWl2DkEmwRBBOOwTQcbQEEGLyQxB9VUNQQ=="},"y":{"dtype":"f4","bdata":"9TiEQfHIg0Ea64NBN16CQfdAhUFWdIJBAnGCQQ=="},"type":"scatter"},{"hoverinfo":"skip","line":{"color":"#8c564b","dash":"dot","width":1.5},"mode":"lines","showlegend":false,"x":{"dtype":"f4","bdata":"OOwTQV+GE0HG0BBBaXYOQYvJDEH1VQ1BOOwTQQ=="},"y":{"dtype":"f4","bdata":"N16CQfU4hEH3QIVB8ciDQVZ0gkECcYJBN16CQQ=="},"type":"scatter"},{"hoverinfo":"skip","mode":"text","showlegend":false,"text":["Produced-Frame Linear Editing"],"textfont":{"color":"#8c564b","size":9},"x":[9.014314651489258],"y":[16.436491012573242],"type":"scatter"},{"hoverinfo":"text","marker":{"color":"#e377c2","line":{"color":"white","width":0.5},"size":8},"mode":"markers","name":"Guest-Forward Reordering","text":["\u003cb\u003eMotley Fool Money\u003c\u002fb\u003e\u003cbr\u003eNASA Doubles Down on the Moon\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro blocks dropped; micro shaved, moderate overall tightening (~80% kept),\u003cbr\u003e  long explanations generally left intact\u003cbr\u003eCUT_CRITERIA: hard cut logistics and retakes, protect data-rich explanatory runs, trim\u003cbr\u003e  turn openers and soft lead-ins, keep quick on-topic banter\u003cbr\u003eAUTHENTICITY_POLICY: cleaned takes, not raw tape, retakes removed; natural cadence kept,\u003cbr\u003e  light roughness allowed in-flow\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music bookends, topic-block show with break tees, midrolls\u003cbr\u003e  placed between segments, standard compliance outro retained\u003cbr\u003eREORDER_ASSEMBLY: strict chronology preserved, no thematic reshuffling, only trims, not\u003cbr\u003e  reassembly\u003cbr\u003eSPEAKER_TREATMENT: host tightened more than guests, guest answer arcs protected, questions\u003cbr\u003e  cleaned to a single take\u003cbr\u003eRULES:\u003cbr\u003e- CUT host question resets MUST: When the host repeats a question due to a restart, flub,\u003cbr\u003e  or slate, keeping only the clean final question.\u003cbr\u003e- CUT pre roll planning MUST: When the group is discussing notes, handoffs, timing, or how\u003cbr\u003e  they will cover topics before the official start.\u003cbr\u003e- CUT retake setup and countdowns MUST: When speakers call out a restart, do a verbal\u003cbr\u003e  slate\u002fcountdown, or narrate that they will re-ask\u002fre-answer a question.\u003cbr\u003e- CUT host extra setup PREFER: When the host adds redundant framing after the guest\u003cbr\u003e  already has the context, unless it introduces a genuinely new constraint or angle for\u003cbr\u003e  the guest to answer.\u003cbr\u003e- CUT turn leadin words PREFER: When a turn begins with softeners like 'well\u002fso\u002fyeah\u002fokay'\u003cbr\u003e  that do not change meaning or set up a contrast.\u003cbr\u003e- KEEP chronological topic sequence MUST: Across major topic blocks, unless the timeline\u003cbr\u003e  creates a clear continuity error that cannot be fixed with a trim.\u003cbr\u003e- KEEP explanatory lists and numbers MUST: When a speaker is enumerating key figures,\u003cbr\u003e  drivers, or causal steps that form the backbone of the analysis, even if the delivery is\u003cbr\u003e  slightly rough.\u003cbr\u003e- KEEP guest long form explanation MUST: When a guest is building a multi-step argument\u003cbr\u003e  (numbers → drivers → implications), even if it includes minor verbal roughness.\u003cbr\u003e- KEEP brief tone banter PREFER: When a joke or playful line is short and directly tied to\u003cbr\u003e  the topic framing or a smooth transition into the next question.\u003cbr\u003e- MUTE host backchannel under guest PREFER: When the host’s short acknowledgments overlap\u003cbr\u003e  or compete with an in-progress guest explanation.\u003cbr\u003e- REORDER clarity fix only AVOID: Only when a question\u002fanswer pairing is separated by an\u003cbr\u003e  avoidable interruption and moving a contiguous chunk will restore immediate\u003cbr\u003e  comprehension.","\u003cb\u003eFEAR & GREED | Business News\u003c\u002fb\u003e\u003cbr\u003eQ+A: The Week Ahead | 2 Mar 2026\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light-touch, high-retention edit, micro-shaves over big removals, allows full\u003cbr\u003e  answer run-ups\u003cbr\u003eCUT_CRITERIA: cuts logistics and meta-talk hard, trims tiny word-level hiccups, protects\u003cbr\u003e  substantive economic detail\u003cbr\u003eAUTHENTICITY_POLICY: polished surface, natural core, leaves minor rough edges, doesn’t\u003cbr\u003e  over-sanitize overlaps\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music-backed intro\u002foutro, immediate jump into first question,\u003cbr\u003e  minimal segmentation beyond topics\u003cbr\u003eREORDER_ASSEMBLY: strictly chronological assembly, no thematic reshuffling, edits stay\u003cbr\u003e  inside turns\u003cbr\u003eSPEAKER_TREATMENT: guest protected; host tightened, backchannels often suppressed,\u003cbr\u003e  crosstalk kept when harmless\u003cbr\u003eRULES:\u003cbr\u003e- CUT edit meta requests MUST: Any on-mic requests to edit or references to ‘cut that bit’\u003cbr\u003e  that break the fourth wall.\u003cbr\u003e- CUT pre roll logistics MUST: Before the show proper begins (setup, camera\u002ftech, ‘we’re\u003cbr\u003e  rolling’), regardless of how short it is.\u003cbr\u003e- CUT host redundant words PREFER: When the host repeats a starter word\u002fphrase (‘yeah’,\u003cbr\u003e  ‘the’, partial restarts) without changing the question’s substance.\u003cbr\u003e- CUT micro resets inside answer PREFER: When a speaker briefly apologizes\u002fcorrects\u003cbr\u003e  themselves mid-thought but the surrounding sentence already makes the intended point\u003cbr\u003e  clear.\u003cbr\u003e- KEEP guest long form answer MUST: When the guest is mid-explanation and the ‘extra’\u003cbr\u003e  lines provide context, caveats, or interpretation that prevents misreading.\u003cbr\u003e- KEEP timeline order MUST: For all main conversation blocks, unless a reorder is the only\u003cbr\u003e  way to resolve a clear recording-order mistake.\u003cbr\u003e- KEEP dense explanatory blocks PREFER: When the guest is building a multi-sentence\u003cbr\u003e  explanation with qualifiers, numeric ranges, and causal links (even if it runs long).\u003cbr\u003e- MUTE backchannel overlap PREFER: When a brief affirmation (‘yeah’, ‘mm-hmm’) occurs\u003cbr\u003e  during the other speaker’s sentence and does not steer the content.\u003cbr\u003e- REORDER topic blocks AVOID: Only when the session contains an explicit mis-sequencing\u003cbr\u003e  that would confuse listeners in the published timeline.","\u003cb\u003eToday in Focus\u003c\u002fb\u003e\u003cbr\u003eThe assassination of Iran’s ayatollah – and fears for a wider conflict\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: micro-shaves between nearly every turn, macro blocks removed for focus, low\u003cbr\u003e  tolerance for redundancy, uses inserted pads when needed\u003cbr\u003eCUT_CRITERIA: pre-chat and process talk eliminated, questions reduced to clean prompts,\u003cbr\u003e  explanations kept, moral asides trimmed, documentary tape replaces recap\u003cbr\u003eAUTHENTICITY_POLICY: cleaned transcript feel, not raw, stumbles removed more than\u003cbr\u003e  showcased, overlap managed via muting, polish prioritized over spontaneity\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open montage, tape-heavy scene-setting in main, periodic\u003cbr\u003e  'coming up' style teases, promo\u002fcredits as produced outro\u003cbr\u003eREORDER_ASSEMBLY: thematic assembly over chronology, large block reorders are normal, best\u003cbr\u003e  phrasing pulled forward, tightened q\u002fa stitched across time\u003cbr\u003eSPEAKER_TREATMENT: single primary interview voice protected, secondary participants mostly\u003cbr\u003e  removed, interviewer compressed to essentials, overlaps suppressed to one lane\u003cbr\u003eRULES:\u003cbr\u003e- CUT pre roll logistics MUST: When the recording includes structure planning, tech\u003cbr\u003e  issues, pickups discussion, or mic\u002fcamera coordination, even if it contains light\u003cbr\u003e  banter.\u003cbr\u003e- CUT secondary speakers MUST: When additional participants appear in the recording\u003cbr\u003e  (producers, extra guests, off-mic helpers), remove them unless they deliver essential\u003cbr\u003e  reported audio or a required attribution.\u003cbr\u003e- CUT bridge detours between topics PREFER: When the session transitions topics through\u003cbr\u003e  meandering bridges; replace with a reorder jump (optionally supported by a short\u003cbr\u003e  external tape line).\u003cbr\u003e- CUT ethical aside or personal positioning PREFER: When the speaker’s personal feelings\u003cbr\u003e  or moral framing repeats the show’s already-established premise, unless it introduces a\u003cbr\u003e  distinct analytical lens (e.g., legality\u002fprecedent) that will be developed.\u003cbr\u003e- CUT interviewer meta questions PREFER: When the interviewer asks about the guest’s\u003cbr\u003e  feelings\u002fprocess rather than advancing the explanatory agenda, unless it yields a\u003cbr\u003e  distinct analytical framing.\u003cbr\u003e- CUT question redundancy PREFER: When a question is asked twice (or is restated inside\u003cbr\u003e  the answer), keep only the cleanest prompt that unlocks the next explanation.\u003cbr\u003e- KEEP causal chain explanation MUST: When the guest is laying out sequence, actors, and\u003cbr\u003e  decision logic (what happened → why it mattered → what could happen next), even if\u003cbr\u003e  delivery is slightly rough.\u003cbr\u003e- KEEP narrative escalation order MUST: When reordering would weaken the perceived\u003cbr\u003e  escalation of stakes (immediate events → regional response → domestic politics → long-\u003cbr\u003e  term implications).\u003cbr\u003e- KEEP guest long run explanation PREFER: When the guest is in a coherent multi-sentence\u003cbr\u003e  run that is advancing the argument; avoid fragmenting it with excessive intercutting.\u003cbr\u003e- MUTE interjections during answer PREFER: When brief affirmations or mid-question\u003cbr\u003e  overlaps would clutter a dense explanation; allow the primary speaker to run cleanly.\u003cbr\u003e- MUTE interviewer backchannels PREFER: When backchannels occur inside the guest’s\u003cbr\u003e  sentence or would compete with a fact-heavy passage.\u003cbr\u003e- REORDER clarifying answer block PREFER: When a later answer contains a cleaner\u003cbr\u003e  definition, stronger summary, or tighter causal explanation for a point already\u003cbr\u003e  introduced earlier.\u003cbr\u003e- REORDER question prompt PREFER: When the interviewer’s prompt can be moved to sit\u003cbr\u003e  immediately before the most relevant answer segment, even if the original session had\u003cbr\u003e  detours between them.","\u003cb\u003eTheWillPowerPodcast\u003c\u002fb\u003e\u003cbr\u003eMarine Vet's End-Stage Liver Disease: From 317 lbs to Transplant Fight (MELD 29)\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between turns, host-heavy runtime reduction, very low\u003cbr\u003e  pause tolerance, macro cuts target host blocks\u003cbr\u003eCUT_CRITERIA: guest story arcs protected intact, host self-talk and asides expendable,\u003cbr\u003e  cuts motivation\u002fsoapboxing when long, continuity patched with tiny pickups\u003cbr\u003eAUTHENTICITY_POLICY: polished host, rawer guest, cleans stumbles via replacement, keeps\u003cbr\u003e  emotional rough edges, doesn’t sanitize intensity\u003cbr\u003eSTRUCTURE_TEMPLATE: cold open from guest beat, music-supported produced intro, fast\u003cbr\u003e  arrival at first question, cta\u002fsocials confined to end\u003cbr\u003eREORDER_ASSEMBLY: mostly chronological, one hook reorder, reorder used to fix opening\u003cbr\u003e  flow, assembly favors early clarity\u003cbr\u003eSPEAKER_TREATMENT: guest speech essentially untouched, host backchannels muted not cut,\u003cbr\u003e  host reduced to prompts, minimize crosstalk artifacts\u003cbr\u003eRULES:\u003cbr\u003e- CUT host meta production MUST: Any on-mic restarting, apology, naming\u002fspelling\u003cbr\u003e  struggles, or ‘take two\u002fthree’ style housekeeping, unless it’s needed to justify an\u003cbr\u003e  inserted segment.\u003cbr\u003e- CUT host question padding MUST: Extra qualifiers and re-asks inside a single question;\u003cbr\u003e  compress to the sharpest version of the prompt.\u003cbr\u003e- CUT micro redundancy MUST: Single-word repeats and short connector words (e.g., ‘yeah,’\u003cbr\u003e  ‘like,’ ‘or less’) when they don’t change meaning and the sentence survives without\u003cbr\u003e  them.\u003cbr\u003e- CUT redundant opening attempts MUST: If multiple intro tries exist, keep the cleanest\u003cbr\u003e  single framing and discard the rest rather than stitching them together chronologically.\u003cbr\u003e- CUT host ramble PREFER: When the host shifts into extended personal monologue,\u003cbr\u003e  generalized philosophy, or commentary that doesn’t set up a specific next guest answer.\u003cbr\u003e- CUT host reaction phrases PREFER: Short host reactions that repeat what the guest just\u003cbr\u003e  said or stall the next question (e.g., ‘yeah man’, ‘right’) unless they land as a\u003cbr\u003e  meaningful emotional beat.\u003cbr\u003e- KEEP guest cadence run MUST: When the guest is on a roll (multi-sentence run), avoid\u003cbr\u003e  intercutting host confirmations; let it play cleanly even if it’s long.\u003cbr\u003e- KEEP guest story block MUST: When the guest is recounting symptoms\u002ftimeline, family\u003cbr\u003e  impact, or fears, even if repetitive or rough; only trim if it’s clearly duplicative\u003cbr\u003e  within the same beat.\u003cbr\u003e- KEEP main conversation order PREFER: After the opening sequence is established, avoid\u003cbr\u003e  thematic reshuffles; cut within-topic instead of moving whole answers around.\u003cbr\u003e- KEEP raw language PREFER: Profanity or blunt phrasing remains when it carries\u003cbr\u003e  honesty\u002femotional intensity rather than serving as filler.\u003cbr\u003e- MUTE host backchannel MUST: When the guest is mid-answer and the host interjects\u003cbr\u003e  affirmations (‘mm-hmm’, ‘yeah’) that add no new meaning.\u003cbr\u003e- REORDER opening block PREFER: When a later clean show-intro or framing line can be moved\u003cbr\u003e  earlier to sit after a cold open and before the first full story beat.","\u003cb\u003eAll About The Archers - A podcast about \"The Archers\".\u003c\u002fb\u003e\u003cbr\u003eThe Archers Interview: Susie Riddell on Tracy Horrobin, The Envelope Twist & Ambridge Drama\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between turns, big runtime halving is normal, low\u003cbr\u003e  tolerance for repeat phrasing, keeps only the clean beat\u003cbr\u003eCUT_CRITERIA: trim host scaffolding, keep guest payload, cut meta-chatter and self-\u003cbr\u003e  referential bits, one example, not three, comedy beats survive, then move on\u003cbr\u003eAUTHENTICITY_POLICY: polished transcript, not raw hangout, stumbles cleaned, laughter\u003cbr\u003e  selectively kept, crosstalk allowed in short bursts, invisible edits preferred\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music bookends, fast start, no long warmup, mid-episode\u003cbr\u003e  micro-bridges, signposted outro promo\u003cbr\u003eREORDER_ASSEMBLY: reorder for tighter q→a logic, punchlines pulled earlier, chronology is\u003cbr\u003e  flexible within topics, assembly serves flow, not time\u003cbr\u003eSPEAKER_TREATMENT: hosts heavily trimmed and tightened, mute interruptions under key\u003cbr\u003e  lines, guest remains dominant but pruned, backchannels minimized to essentials\u003cbr\u003eRULES:\u003cbr\u003e- CUT fan question bulk MUST: When listener-question segments drift into long multi-part\u003cbr\u003e  reads or tangential follow-ups; compress to the core question and the guest’s core\u003cbr\u003e  answer.\u003cbr\u003e- CUT host multi part question sprawl MUST: When a host asks a multi-part question with\u003cbr\u003e  extra commentary; retain the cleanest single formulation that yields the same guest\u003cbr\u003e  answer.\u003cbr\u003e- CUT host scaffolding MUST: When hosts explain the format, comment on timing\u002frecording\u003cbr\u003e  context, or narrate what they’re about to do, unless it directly tees up the next guest\u003cbr\u003e  answer.\u003cbr\u003e- CUT reorder explanations MUST: When a reorder would require audible explanation ('as I\u003cbr\u003e  said earlier…'); instead, cut or restructure so the moved audio stands on its own.\u003cbr\u003e- CUT guest qualification sprawl PREFER: When the guest circles a point with hedges and\u003cbr\u003e  side-clauses; retain the clearest assertion and one supporting reason, dropping the rest\u003cbr\u003e  unless it adds a new angle.\u003cbr\u003e- CUT redundant reaction loop PREFER: When multiple speakers stack\u003cbr\u003e  confirmations\u002flaughter\u002f‘well done’ after a punchline or reveal; keep only one clean\u003cbr\u003e  reaction and the funniest tag.\u003cbr\u003e- KEEP emotional reflection PREFER: When the guest expresses genuine feeling (e.g.,\u003cbr\u003e  crying, being moved, personal stakes), even if the phrasing is slightly rough, provided\u003cbr\u003e  the thread remains coherent.\u003cbr\u003e- KEEP shared laughter overlap PREFER: When brief overlap signals rapport right after a\u003cbr\u003e  joke or playful moment, and it doesn’t obscure the words that matter.\u003cbr\u003e- MUTE host interjections MUST: When hosts interject during a guest’s sentence and the\u003cbr\u003e  guest is carrying the substantive point; suppress the host rather than cutting the\u003cbr\u003e  guest.\u003cbr\u003e- MUTE guest noncontent noises PREFER: When the guest coughs\u002fclears throat\u002fgets stuck and\u003cbr\u003e  the hosts can continue bridging; mute the guest noise and keep the host’s continuity\u003cbr\u003e  line.\u003cbr\u003e- REORDER answer fragment PREFER: When a guest answer contains a strong concise line that\u003cbr\u003e  can be placed earlier to complete a setup (or rescue a dangling question) without\u003cbr\u003e  changing meaning.\u003cbr\u003e- REORDER micro anecdote tags PREFER: When small comedic tags or clarifiers occur later in\u003cbr\u003e  the session but clearly belong to the immediately preceding story beat; relocate them to\u003cbr\u003e  land directly after the relevant line.","\u003cb\u003eBigfoot Society\u003c\u002fb\u003e\u003cbr\u003eA First Nations Man From Vancouver Island Shares Decades Of Encounters With Sasquatch\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high retention, light trimming, cuts are short, surgical, long guest blocks\u003cbr\u003e  left intact\u003cbr\u003eCUT_CRITERIA: protect the guest’s full story-arc, remove host asides and meta, soften\u003cbr\u003e  spikes in crudeness\u002fprofanity, trim micro-redundancy, not topics\u003cbr\u003eAUTHENTICITY_POLICY: raw conversational texture stays, imperfect overlap tolerated,\u003cbr\u003e  minimal de-umming\u002fline-polish\u003cbr\u003eSTRUCTURE_TEMPLATE: scripted cold open narration, unbroken interview as core, long\u003cbr\u003e  promo\u002fcta outro block\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, reorders avoided entirely, bookends added\u003cbr\u003e  around session\u003cbr\u003eSPEAKER_TREATMENT: mute host backchannels under guest, guest floor protected from\u003cbr\u003e  interruptions, overlap kept when intelligible\u003cbr\u003eRULES:\u003cbr\u003e- CUT host meta editing MUST: Any time the host references the edit, pronunciation fixes,\u003cbr\u003e  or production notes (e.g., 'we’ll edit this out'), unless it is essential context for\u003cbr\u003e  the listener.\u003cbr\u003e- CUT spiky profanity or blasphemy PREFER: When phrasing escalates into unnecessary shock\u003cbr\u003e  value (especially religious exclamations used as intensifiers) and removing it does not\u003cbr\u003e  change the factual meaning of the moment.\u003cbr\u003e- CUT third party callout rant PREFER: When the guest veers into extended personal jabs or\u003cbr\u003e  industry gossip about other public figures that does not advance the main subject of\u003cbr\u003e  encounters\u002fculture.\u003cbr\u003e- KEEP chronological flow MUST: For the full main conversation, even when the guest jumps\u003cbr\u003e  topics, unless the timeline causes direct confusion that cannot be fixed with a small\u003cbr\u003e  cut.\u003cbr\u003e- KEEP guest story block MUST: When the guest is in a long, continuous account (encounter\u003cbr\u003e  story, cultural explanation, timeline), unless it becomes purely repetitive with no new\u003cbr\u003e  detail for several sentences.\u003cbr\u003e- KEEP crosstalk PREFER: When overlap signals engagement and does not obscure meaning;\u003cbr\u003e  only intervene when key nouns\u002fnumbers are being stepped on.\u003cbr\u003e- KEEP guest long turn PREFER: When the guest is building an argument or recounting an\u003cbr\u003e  event sequence, even if the host could be tightened to only questions.\u003cbr\u003e- MUTE host backchannel MUST: When the host interjects during a guest’s continuous\u003cbr\u003e  explanation (wow\u002fright\u002fyeah-type reactions) and the guest’s sentence remains clear\u003cbr\u003e  without the interjection.\u003cbr\u003e- REORDER external bookends PREFER: Only to place pre-recorded intro\u002foutro material\u003cbr\u003e  outside the session content; avoid moving session moments to create a cold open\u003cbr\u003e  highlight.","\u003cb\u003eInterpreting India\u003c\u002fb\u003e\u003cbr\u003eRecalibrating BRICS: India’s Moment in a Fragmented World\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-full session retention, micro-shaves between clauses, pause-tolerant\u003cbr\u003e  conversational pacing\u003cbr\u003eCUT_CRITERIA: protects long, technical explanations, cuts tiny dangling words\u002fnames,\u003cbr\u003e  redundancy trimmed, substance kept\u003cbr\u003eAUTHENTICITY_POLICY: leaves natural ‘uh’ texture, minimal smoothing of cadence, polish is\u003cbr\u003e  subtle, not rewritten\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music-bed intro, straight interview core, branded cta\u002fmusic\u003cbr\u003e  outro\u003cbr\u003eREORDER_ASSEMBLY: chronology is preserved, no thematic reshuffling, edits stay in-place\u003cbr\u003eSPEAKER_TREATMENT: guest narrative protected, host cleaned slightly more, uses muting as a\u003cbr\u003e  surgical tool\u003cbr\u003eRULES:\u003cbr\u003e- CUT dangling tail word PREFER: When a sentence lands cleanly and the following\u003cbr\u003e  word\u002fphrase is a trailing repeat or leftover connector (e.g., a final single word like\u003cbr\u003e  “time\u002fforward\u002fto”) that adds no meaning.\u003cbr\u003e- CUT host run on setup PREFER: When the host stacks multiple framings\u002fexamples before a\u003cbr\u003e  question; trim to the minimum that still preserves the question’s intent and context.\u003cbr\u003e- CUT nonessential proper noun PREFER: When a colleague name, place fragment, or specific\u003cbr\u003e  label is not required for comprehension and risks distraction or mis-citation; keep the\u003cbr\u003e  role\u002faffiliation instead.\u003cbr\u003e- KEEP chronological sequence MUST: Across the full episode, even when answers reference\u003cbr\u003e  earlier points; prefer in-place tightening over moving blocks to ‘improve’ narrative\u003cbr\u003e  flow.\u003cbr\u003e- KEEP guest explanation block MUST: When the guest is building a multi-step explanation\u003cbr\u003e  (history, mechanisms, caveats), even if verbose or list-heavy, as long as it stays on\u003cbr\u003e  the episode question.\u003cbr\u003e- KEEP guest full answer arc MUST: Even if the guest is repetitive in service of nuance\u003cbr\u003e  (caveats, calibration, step-by-step reasoning), unless repetition is purely word-level.\u003cbr\u003e- KEEP host backchannel support PREFER: When it functions as a clean handoff (“thank you…\u003cbr\u003e  so…”) that maintains interview momentum; don’t over-trim into abrupt topic changes.\u003cbr\u003e- MUTE guest midstream detour PREFER: When the guest veers into a brief aside that risks\u003cbr\u003e  derailing, over-claiming, or introducing unverifiable detail, but the surrounding\u003cbr\u003e  paragraph is valuable; mute only the detour and keep the main arc intact.\u003cbr\u003e- MUTE sensitive or uncertain detail PREFER: When a speaker moves into speculative, hard-\u003cbr\u003e  to-verify, or diplomatically sensitive specifics mid-thought; suppress that slice while\u003cbr\u003e  preserving the surrounding, more defensible framing.\u003cbr\u003e- REORDER segment block AVOID: Only if a recording-order artifact creates confusion that\u003cbr\u003e  cannot be resolved with a short bridge line; otherwise avoid reorders entirely.","\u003cb\u003eTheWillPowerPodcast\u003c\u002fb\u003e\u003cbr\u003eAmber Hollingsworth: No Tough Love – Early Intervention for Families\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro drops over micro-polish, host kept to tight prompts, low tolerance for\u003cbr\u003e  redundancy, adds pads to smooth jumps\u003cbr\u003eCUT_CRITERIA: host ramble is expendable, guest teaching blocks are protected, cuts\u003cbr\u003e  duplicated statements aggressively, tech\u002fprocess talk removed entirely\u003cbr\u003eAUTHENTICITY_POLICY: continuity over verbatim fidelity, rough edges tolerated in guest,\u003cbr\u003e  edits are meant to be invisible, selective muting instead of re-cutting\u003cbr\u003eSTRUCTURE_TEMPLATE: produced hook + formal intro, question-led teaching segments, minimal\u003cbr\u003e  bookend outro, frequent stitched transitions\u003cbr\u003eREORDER_ASSEMBLY: reorders to restore coherence, topical clustering over strict\u003cbr\u003e  chronology, large shifts are acceptable, uses reorders to fix callbacks\u003cbr\u003eSPEAKER_TREATMENT: guest is the centerpiece, host reduced to questions, host interjections\u003cbr\u003e  frequently muted, guest cadence preserved\u003cbr\u003eRULES:\u003cbr\u003e- CUT host meta editing or permission MUST: When the host references editing, apologizes\u003cbr\u003e  for phrasing, or comments on the recording process; remove entirely rather than leaving\u003cbr\u003e  a wink to the audience.\u003cbr\u003e- CUT host paraphrase question stack MUST: When the host asks multiple versions of the\u003cbr\u003e  same question or adds redundant paraphrase before the guest answers; keep the single\u003cbr\u003e  clearest question.\u003cbr\u003e- CUT host ramble MUST: When the host shifts from prompting to extended self-story or\u003cbr\u003e  multi-sentence restatement, unless it introduces a new, sharper question the guest\u003cbr\u003e  immediately answers.\u003cbr\u003e- CUT recording artifact block MUST: Any tech interruptions, reconnecting, or process\u003cbr\u003e  chatter, even if it briefly breaks the conversational flow; rebuild continuity via tight\u003cbr\u003e  joins or inserts.\u003cbr\u003e- CUT duplicate explanation PREFER: When either speaker repeats the same claim\u002fphrase\u003cbr\u003e  within the same beat (often from circling back after agreement), keeping only the most\u003cbr\u003e  complete\u002fclean version.\u003cbr\u003e- KEEP guest framework definition MUST: When the guest is defining a concept (roles,\u003cbr\u003e  boundaries, intervention logic) or giving a concrete example\u002fcontrast, even if the\u003cbr\u003e  delivery includes minor rough edges.\u003cbr\u003e- KEEP guest longform answer PREFER: When the guest is in a sustained explanatory run with\u003cbr\u003e  examples and causal logic, even if it runs longer than typical podcast pacing.\u003cbr\u003e- MUTE host backchannel PREFER: When the host’s affirmations land during the guest’s\u003cbr\u003e  sentence and do not change meaning or prompt a pivot.\u003cbr\u003e- MUTE supporting speaker overlap PREFER: When short affirmations\u002finterjections land on\u003cbr\u003e  top of the guest’s key sentence; preserve the guest line and suppress the overlap rather\u003cbr\u003e  than rewriting the beat.\u003cbr\u003e- REORDER host setup after guest point AVOID: When the host’s longer setup is weaker than\u003cbr\u003e  the guest’s core point, lead with the guest point and then place the host’s framing\u003cbr\u003e  immediately after (or remove it) to keep momentum.\u003cbr\u003e- REORDER premise before question MUST: When a later clarification\u002fdefinition is required\u003cbr\u003e  to understand an earlier question or reference, move the clarification earlier so the\u003cbr\u003e  listener never feels lost.\u003cbr\u003e- REORDER reconnected thread PREFER: When a topic is interrupted (by side discussion or\u003cbr\u003e  artifact removal), assemble the surrounding parts into one continuous block even if it\u003cbr\u003e  requires a large temporal shift.","\u003cb\u003eComplexified\u003c\u002fb\u003e\u003cbr\u003eWhen Trauma Becomes Identity: What Young Jews Are Learning After October 7\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: micro-shaves plus macro lifts, guest thought-runs stay long, low tolerance\u003cbr\u003e  for dead air, fast cleanup between turns\u003cbr\u003eCUT_CRITERIA: cut meta-talk and logistics hard, prune long historical preambles, remove\u003cbr\u003e  fact-check landmines, protect concrete lived examples\u003cbr\u003eAUTHENTICITY_POLICY: broadcast-polished, not raw, remove flubs and self-consciousness,\u003cbr\u003e  invisible stitching over authenticity, clean restarts without calling them\u003cbr\u003eSTRUCTURE_TEMPLATE: narrated, music-bedded open, mid-episode break via insert, tight\u003cbr\u003e  return into next question, formal credits-driven outro\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with one-off fixes, reorder only to repair clarity,\u003cbr\u003e  surgical moves, not reshuffles\u003cbr\u003eSPEAKER_TREATMENT: guest protected; host compressed, mute host backchannels under guest,\u003cbr\u003e  host questions rewritten for precision, minimize host verbal footprint\u003cbr\u003eRULES:\u003cbr\u003e- CUT host question stumble MUST: When the host flags or demonstrates that a question\u003cbr\u003e  ‘came out’ wrong and then restarts; cut the stumble and keep only the clean asking.\u003cbr\u003e- CUT recording process logistics MUST: Whenever the conversation shifts to how the\u003cbr\u003e  interview will run (intros, breaks, notes, re-takes, locating scripts), regardless of\u003cbr\u003e  where it occurs.\u003cbr\u003e- CUT redundant question versions MUST: When multiple takes of the same host question\u003cbr\u003e  exist (including on-mic admissions that it came out wrong); keep the cleanest single\u003cbr\u003e  version and remove the rest.\u003cbr\u003e- CUT extended background history PREFER: When a long historical\u002fcontext setup delays the\u003cbr\u003e  next present-tense point and can be replaced by a shorter bridge without losing the\u003cbr\u003e  guest’s argument.\u003cbr\u003e- CUT guest host praise chatter PREFER: When the guest shifts into compliments, ‘honor to\u003cbr\u003e  be here,’ or mutual-personal overlap after the substantive close, unless it reveals new\u003cbr\u003e  stakes or meaning.\u003cbr\u003e- CUT high-risk specific allegations PREFER: When a speaker introduces a specific\u003cbr\u003e  allegation or characterization that would require external fact-checking or invites a\u003cbr\u003e  side-debate, unless it is necessary for the episode’s central throughline.\u003cbr\u003e- CUT host reaction phrases PREFER: When the host’s interjections are purely evaluative\u003cbr\u003e  (gratitude, admiration, laughter at the question, trailing affirmations) and do not set\u003cbr\u003e  up a sharper next question.\u003cbr\u003e- KEEP overall chronological arc MUST: For the main thematic progression of the interview\u003cbr\u003e  (topic sequence and emotional build), unless chronology actively obscures comprehension.\u003cbr\u003e- KEEP guest longform explanation PREFER: When the guest is building a multi-sentence\u003cbr\u003e  argument or list of examples; avoid interrupting with host interjections or mid-thought\u003cbr\u003e  truncation unless it is clearly repetitive.\u003cbr\u003e- KEEP relational betrayal examples PREFER: When the guest provides concrete, human-scale\u003cbr\u003e  examples (friends, classmates, roommates, workplace\u002fcommunity dynamics) that make the\u003cbr\u003e  emotional stakes legible.\u003cbr\u003e- MUTE host backchannel MUST: When the host says short affirmations (e.g., ‘yeah,’ ‘mm-\u003cbr\u003e  hmm,’ ‘hmm’) over the guest’s continuing thought; mute instead of cutting the guest line\u003cbr\u003e  or forcing a hard interrupt.\u003cbr\u003e- REORDER question answer alignment PREFER: When the host’s question is restarted or\u003cbr\u003e  revised and the clean version exists elsewhere in the session; reorder only the minimal\u003cbr\u003e  portion needed to present one coherent question followed by the answer.","\u003cb\u003eThe Rubin Report\u003c\u002fb\u003e\u003cbr\u003eExposing How Totalitarian Mind Control Techniques Are Being Used on Us Right Now | Buck Sexton\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light overall compression, high micro-shave, adds pauses more than trims,\u003cbr\u003e  keeps long answers intact\u003cbr\u003eCUT_CRITERIA: cold-open with strongest thesis beat, keep banter that lands, cut logistics;\u003cbr\u003e  keep rapport, protect dense explanatory runs\u003cbr\u003eAUTHENTICITY_POLICY: conversational roughness tolerated, cleans clutter, not personality,\u003cbr\u003e  some overlap left in\u003cbr\u003eSTRUCTURE_TEMPLATE: cold open → music intro, hook-first, context second, minimal formal\u003cbr\u003e  sign-off\u003cbr\u003eREORDER_ASSEMBLY: chronological main conversation, no thematic reshuffling, hooking via\u003cbr\u003e  inserts, not moves\u003cbr\u003eSPEAKER_TREATMENT: mute affirmations under main speaker, guest floor protected, host\u003cbr\u003e  trimmed slightly harder\u003cbr\u003eRULES:\u003cbr\u003e- CUT pre roll logistics MUST: When conversation is about scheduling, setup, props, or\u003cbr\u003e  technical\u002freset talk before the episode properly starts.\u003cbr\u003e- CUT host tag ends PREFER: When the host adds trailing closures that don’t advance the\u003cbr\u003e  next question (e.g., extra wrap words after a joke has already landed).\u003cbr\u003e- CUT redundant restate PREFER: When the same point is restated immediately again without\u003cbr\u003e  adding a new example, escalation, or punchline (often visible as repeated phrases or\u003cbr\u003e  restart sentences).\u003cbr\u003e- KEEP chronological flow MUST: For the main interview section, unless chronology creates\u003cbr\u003e  clear confusion that cannot be fixed by a small trim or pickup line.\u003cbr\u003e- KEEP guest explanation block MUST: When the guest is in a multi-step explanation\u003cbr\u003e  (history\u002fdefinitions\u002fcausal chain); only trim internal repetition, not the steps that\u003cbr\u003e  make the reasoning trackable.\u003cbr\u003e- KEEP banter PREFER: When the tangent is mutually played (both speakers engaged) and\u003cbr\u003e  delivers a clear joke\u002frapport payoff within a short beat, even if not topic-essential.\u003cbr\u003e- KEEP crosstalk PREFER: When overlap is brief and adds energy (laughs, quick\u003cbr\u003e  acknowledgments) without obscuring key words.\u003cbr\u003e- KEEP thesis repetition PREFER: When repeating the core thesis functions as a deliberate\u003cbr\u003e  hook\u002fanchor (e.g., teaser up top, then the full conversation continues), even if it\u003cbr\u003e  duplicates later material.\u003cbr\u003e- MUTE backchannel MUST: When one speaker is delivering the primary sentence and the other\u003cbr\u003e  adds short affirmations or quips that step on intelligibility; mute the interjection\u003cbr\u003e  while preserving the main speaker’s continuous phrasing.\u003cbr\u003e- REORDER highlight to cold open PREFER: When there is a self-contained thesis paragraph\u003cbr\u003e  that can stand alone as a hook; move only that excerpt to the very top and keep the\u003cbr\u003e  subsequent discussion chronological.","\u003cb\u003eThe Twenty Minute VC (20VC): Venture Capital | Startup Funding | The Pitch\u003c\u002fb\u003e\u003cbr\u003e20VC: Why Cursor is Dead | An AI Tsunami is Coming & You Need to Prepare | Systems of Record Become Valueless Databases with Agents | Is This The End of Tech Private Equity with Jerry Murdock, Co-Founder of Insight Partners\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaving between clauses, low pause tolerance, big-picture\u003cbr\u003e  runtime only modestly reduced\u003cbr\u003eCUT_CRITERIA: host is highly compressible, protect guest argument continuity, remove setup\u003cbr\u003e  friction and logistics, trim jokes that delay thesis\u003cbr\u003eAUTHENTICITY_POLICY: polished transcript, not sterile, profanity kept when emphatic,\u003cbr\u003e  laughs\u002fenergy cues often retained\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open + sponsor stack, hard start after setup friction,\u003cbr\u003e  bookended sponsor reads, minimal in-episode segmentation\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, tiny reorders only for clarity\u003cbr\u003eSPEAKER_TREATMENT: guest protected, host sculpted, host interjections often removed or\u003cbr\u003e  muted, backchannels managed to spotlight guest\u003cbr\u003eRULES:\u003cbr\u003e- CUT timejump restructure AVOID: When the alternative would require moving large blocks\u003cbr\u003e  across topics to ‘improve’ narrative; prefer leaving it chronological and tightening\u003cbr\u003e  locally.\u003cbr\u003e- CUT host ramble MUST: When the host adds color (personal asides, extended agreement,\u003cbr\u003e  comedic riffs) that does not set up a new, specific question for the guest.\u003cbr\u003e- CUT host redundant agreement MUST: When the host repeats agreement (‘totally’, ‘yeah’,\u003cbr\u003e  restating the guest’s premise) without adding a sharper follow-up or constraint.\u003cbr\u003e- CUT name drop detour PREFER: When a host reference to third parties serves as social\u003cbr\u003e  color rather than clarifying the point, unless it produces an immediate, concrete guest\u003cbr\u003e  response.\u003cbr\u003e- CUT prelude story block PREFER: When a story appears before the first substantive topic\u003cbr\u003e  beat and does not become a referenced callback later in the episode.\u003cbr\u003e- KEEP guest explanation run PREFER: When the guest is building a multi-step model\u002fanalogy\u003cbr\u003e  (even with minor rough edges), unless the section becomes repetitive or contradicts\u003cbr\u003e  itself.\u003cbr\u003e- KEEP guest response entry PREFER: When the guest begins answering (even with a rough\u003cbr\u003e  start); cut the host around it rather than trimming the guest’s launch.\u003cbr\u003e- KEEP rapport laughter PREFER: When brief laughter\u002fcrosstalk signals warmth or stakes and\u003cbr\u003e  does not derail the next question.\u003cbr\u003e- MUTE host mid turn addon PREFER: When the host appends extra clauses onto a question\u003cbr\u003e  while the guest is already answering or clearly ready to answer; preserve the guest’s\u003cbr\u003e  entry and remove the host overlap.\u003cbr\u003e- REORDER adjacent answer setup PREFER: Only when a short nearby phrase must be moved to\u003cbr\u003e  restore a clean question→answer flow after cutting an interruption or false start; keep\u003cbr\u003e  the shift local (same topic beat).","\u003cb\u003eMorning Wire\u003c\u002fb\u003e\u003cbr\u003eWill Iranians Seize the Moment? | 3.1.26\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: guest answers run long intact, macro cuts for off-topic blocks, light touch\u003cbr\u003e  on silence, micro-shaves inside host lines\u003cbr\u003eCUT_CRITERIA: host verbosity is expendable, protect the expert’s argument arc, questions\u003cbr\u003e  simplified, not expanded, cut repeats around transitions\u003cbr\u003eAUTHENTICITY_POLICY: guest left comparatively unpolished, polish focuses on\u003cbr\u003e  intelligibility, some rough handoffs tolerated\u003cbr\u003eSTRUCTURE_TEMPLATE: produced news+sponsor lead-in, interview begins after packaged intro,\u003cbr\u003e  branded sign-off plus ad outro\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved inside interview, no thematic reshuffling, edits\u003cbr\u003e  fix clarity, not narrative\u003cbr\u003eSPEAKER_TREATMENT: primary speaker protected heavily, secondary host reduced to\u003cbr\u003e  essentials, host interjections muted over cutting, questioner role enforced in edit\u003cbr\u003eRULES:\u003cbr\u003e- CUT host followup meander MUST: When a follow-up contains multiple starts, embedded\u003cbr\u003e  commentary, or speculative asides before the actual question emerges.\u003cbr\u003e- CUT host housekeeping outro chat MUST: When the host shifts into post-interview wrap\u003cbr\u003e  logistics (uploading, scheduling, off-air compliments) after the formal sign-off beat is\u003cbr\u003e  available.\u003cbr\u003e- CUT host ramble MUST: When the host prefaces a question with multiple clauses, hedges,\u003cbr\u003e  or repeated framing that doesn’t change what the guest is being asked.\u003cbr\u003e- CUT on-mic production or logistics MUST: When conversation shifts to recording\u003cbr\u003e  logistics, timing, camera\u002ftech issues, or name\u002ftitle coordination before the ‘real’\u003cbr\u003e  interview begins.\u003cbr\u003e- CUT redundant question versions MUST: When a host asks the same question twice in\u003cbr\u003e  slightly different wording; keep only the most concrete\u002fanswerable phrasing.\u003cbr\u003e- CUT transition filler phrases PREFER: When short interstitial words\u002fphrases (“a lot,”\u003cbr\u003e  “probably,” partial re-starts) don’t add meaning and sit between a question and the\u003cbr\u003e  guest’s response.\u003cbr\u003e- KEEP chronological order MUST: During the main interview, unless a reorder is required\u003cbr\u003e  to resolve an otherwise confusing reference caused by a cut.\u003cbr\u003e- KEEP guest context block PREFER: When the guest is building a multi-step explanation\u003cbr\u003e  (history → current conditions → implication), even if it runs long or includes a few\u003cbr\u003e  verbal stumbles.\u003cbr\u003e- KEEP guest long form answer PREFER: When the guest is in a sustained explanation and the\u003cbr\u003e  host’s next turn would only lightly redirect; let the guest complete the thought first.\u003cbr\u003e- MUTE host overlap interjection MUST: When the host talks through or steps on the guest\u003cbr\u003e  during an active answer; preserve the guest’s uninterrupted sentence whenever possible.\u003cbr\u003e- REORDER show wrapper elements PREFER: When using pre-produced intro\u002foutro, place them\u003cbr\u003e  outside the interview rather than rearranging interview content to ‘fit’ them.","\u003cb\u003eThe Times of Israel Daily Briefing\u003c\u002fb\u003e\u003cbr\u003eIDF adds Hezbollah to decapitation campaign after it joins war\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light-to-moderate runtime compression, relentless micro-shaves between turns,\u003cbr\u003e  occasional big block removals, brief pause trimming, not extreme\u003cbr\u003eCUT_CRITERIA: pre-roll logistics fully removed, host framing trimmed harder than guest,\u003cbr\u003e  cuts extra commentary around transitions, protects guest’s explanatory arcs\u003cbr\u003eAUTHENTICITY_POLICY: mostly clean, not hyper-sanitized, allows some ‘ums’ in long answers,\u003cbr\u003e  fixes obvious on-air stumbles, edits kept largely invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: produced open with music bed, frequent ‘and we’re back’ bumpers, topic\u003cbr\u003e  blocks separated by breaks, standardized host sign-off retained\u003cbr\u003eREORDER_ASSEMBLY: chronological assembly preserved, no thematic reshuffling, reorders\u003cbr\u003e  avoided even for tightening\u003cbr\u003eSPEAKER_TREATMENT: guest protected; host compressed, host cleaned to crisp questions,\u003cbr\u003e  minor muting to fix interruptions, guest gets uninterrupted long turns\u003cbr\u003eRULES:\u003cbr\u003e- CUT pre roll logistics MUST: When the talk is about scheduling, camera\u002ftech setup, what\u003cbr\u003e  to cover, or correcting the recording process, even if it contains a usable-sounding\u003cbr\u003e  intro attempt.\u003cbr\u003e- CUT host editorial aside PREFER: When the host adds a broad evaluative statement that\u003cbr\u003e  doesn’t materially change the next question (e.g., ‘this affects the war effort as a\u003cbr\u003e  whole’), unless it introduces a new factual constraint the guest answers.\u003cbr\u003e- CUT host repetition and qualifiers PREFER: When the host repeats timing, wording, or\u003cbr\u003e  adds multiple qualifiers before landing the question, unless the repetition is needed\u003cbr\u003e  for accuracy or to correct a misunderstanding.\u003cbr\u003e- CUT redundant transition phrasing PREFER: When a transition is repeated in multiple ways\u003cbr\u003e  (‘let’s turn…’ + another setup line) and one clean line can carry the listener to the\u003cbr\u003e  next topic.\u003cbr\u003e- CUT single word snags PREFER: When stray syllables\u002fone-word echoes (‘time’, ‘correctly’,\u003cbr\u003e  short replies) interrupt cadence at the end of a sentence or before the next speaker\u003cbr\u003e  turn.\u003cbr\u003e- KEEP chronological order MUST: Across the main conversation, unless a section is truly\u003cbr\u003e  out-of-sequence due to an interruption that makes the topic unintelligible.\u003cbr\u003e- KEEP guest technical explanation MUST: When the guest is laying out a step-by-step\u003cbr\u003e  account, technical mechanism, quantities, or timeline, even if the delivery includes a\u003cbr\u003e  few verbal stumbles.\u003cbr\u003e- KEEP guest longform turn PREFER: When the guest is in an extended explanation and the\u003cbr\u003e  host interjection is only a backchannel or a minor steer that can be removed without\u003cbr\u003e  changing the question being answered.\u003cbr\u003e- MUTE guest micro overlap during host fix PREFER: When the guest speaks briefly while the\u003cbr\u003e  host is correcting\u002fclarifying a detail (numbers, timing, pronunciation) and the guest\u003cbr\u003e  audio is nonessential to the meaning.","\u003cb\u003ePower User with Taylor Lorenz\u003c\u002fb\u003e\u003cbr\u003eThey Want to Ban Abortion Info Online\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves within sentences, big macro blocks removed for focus,\u003cbr\u003e  little-to-no pause surgery\u003cbr\u003eCUT_CRITERIA: cut meta-recording chaos without mercy, keep thesis-first political framing,\u003cbr\u003e  platform-safe language prioritized\u003cbr\u003eAUTHENTICITY_POLICY: transcript-level polish over rawness, retakes hidden, not showcased,\u003cbr\u003e  some rough edges kept as proof\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open via narration, mid-episode external ad block,\u003cbr\u003e  scripted fundraising outro\u003cbr\u003eREORDER_ASSEMBLY: chronology is effectively locked, assembly via deletes, not rearrange,\u003cbr\u003e  external patches instead of reorders\u003cbr\u003eSPEAKER_TREATMENT: host gets the heavy tightening, guest points preserved, cleaned by\u003cbr\u003e  patching, mute\u002freplace risky host phrasing\u003cbr\u003eRULES:\u003cbr\u003e- CUT host coaching guest retake MUST: When the host asks the guest to repeat, rephrase,\u003cbr\u003e  avoid specific words, or otherwise ‘directs’ the guest mid-thought; remove the coaching\u003cbr\u003e  and keep only the clean restated line.\u003cbr\u003e- CUT host guest management MUST: When the host manages the guest (apologies for talking\u003cbr\u003e  too much, asking if they’re contributing enough, instructing pacing\u002fwording); remove\u003cbr\u003e  unless it sets up an immediate guest point that would otherwise feel abrupt.\u003cbr\u003e- CUT recording troubleshooting MUST: Any time the conversation shifts to connectivity\u003cbr\u003e  issues, camera\u002faudio problems, platform instructions, or panic about losing the\u003cbr\u003e  recording, even if it carries strong emotion.\u003cbr\u003e- CUT host overexplaining loops PREFER: When the host reiterates the same claim with new\u003cbr\u003e  examples but no new information; keep one strong formulation and delete the rest.\u003cbr\u003e- CUT name dropping aside PREFER: When a proper-noun aside or throwaway reference doesn’t\u003cbr\u003e  advance the core argument (e.g., tangential celebrity\u002fmedia mentions) and can be removed\u003cbr\u003e  without breaking comprehension.\u003cbr\u003e- KEEP chronological flow MUST: When tightening a section, prefer cutting within the\u003cbr\u003e  existing sequence rather than rearranging turns to ‘improve’ rhetoric.\u003cbr\u003e- KEEP guest stakes and examples MUST: When the guest gives concrete real-world\u003cbr\u003e  implications (who is harmed, how access works, what laws do); keep even if the cadence\u003cbr\u003e  is imperfect, trimming only true detours.\u003cbr\u003e- KEEP long host context run PREFER: When the host is building historical\u002flegal context\u003cbr\u003e  that directly supports the episode’s central claim, even if it’s a multi-minute\u003cbr\u003e  monologue; compress internally but keep the through-line intact.\u003cbr\u003e- KEEP platform compliance explanation PREFER: When the speakers explicitly justify\u003cbr\u003e  euphemisms\u002f‘algo-speak’ as evidence of censorship pressure; keep a minimal version to\u003cbr\u003e  support the episode’s thesis, but avoid extended back-and-forth about it.\u003cbr\u003e- MUTE host flaggable terms PREFER: When the host says words likely to trigger platform\u003cbr\u003e  moderation and the meaning is preserved around it (or immediately restated safely); mute\u003cbr\u003e  the term rather than derailing the segment.\u003cbr\u003e- REORDER topic blocks AVOID: Only when the recording order creates an unavoidable\u003cbr\u003e  comprehension break after necessary cuts and a short external bridge cannot repair it.","\u003cb\u003eEmpire\u003c\u002fb\u003e\u003cbr\u003e338.Chairman Mao: Birth of A Dictator (Ep 1)\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: micro-shaves between nearly every turn, big off-topic blocks removed\u003cbr\u003e  wholesale, guest monologues breathe, hosts tightened, low tolerance for preamble\u003cbr\u003eCUT_CRITERIA: meta-recording talk never survives, tangents cut unless they pay off,\u003cbr\u003e  redundancy pruned inside host narration, keep the expert’s reasoning chain\u003cbr\u003eAUTHENTICITY_POLICY: clean transcript feel, not raw, light overlap preserved when natural,\u003cbr\u003e  stumbles removed, laughter kept, meaning over verbatim exactness\u003cbr\u003eSTRUCTURE_TEMPLATE: produced ad-heavy bookends, host-led thesis intro, then expert, mid-\u003cbr\u003e  episode reset after break, clear episode-end cta\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with tiny repairs, micro-reorders to remove\u003cbr\u003e  interruptions, no thematic reshuffling\u003cbr\u003eSPEAKER_TREATMENT: guest protected; hosts highly compressed, backchannels often muted\u003cbr\u003e  under guest, crosstalk selectively cleaned, not sterilized, one host can be removed\u003cbr\u003e  entirely\u003cbr\u003eRULES:\u003cbr\u003e- CUT host self correction or retake MUST: When hosts re-run a line, workshop phrasing, or\u003cbr\u003e  comment on performance; keep only the cleanest single version that sets up the guest.\u003cbr\u003e- CUT off topic tangent block MUST: When the conversation leaves the episode subject for a\u003cbr\u003e  story\u002faside and does not return with a clear historical or thematic payoff within the\u003cbr\u003e  same beat.\u003cbr\u003e- CUT recording logistics MUST: Any mic\u002fcamera fixes, claps, re-takes, pacing targets, or\u003cbr\u003e  ‘we’ll pick up here’ talk, regardless of whether it contains humorous banter.\u003cbr\u003e- CUT confusing backtrack after reorder opportunity PREFER: If fixing the flow would\u003cbr\u003e  require a large reorder, prefer cutting the confusing backtrack\u002faside instead of\u003cbr\u003e  relocating big sections.\u003cbr\u003e- CUT host overwrite in intro PREFER: When host framing repeats the same claim in multiple\u003cbr\u003e  phrasings (e.g., stacked descriptors, duplicated stakes) without adding a new angle or\u003cbr\u003e  necessary clarity.\u003cbr\u003e- CUT name check or future tease PREFER: When a host references other content\u002fbonus\u003cbr\u003e  material in a way that interrupts the current narrative flow (unless it functions as the\u003cbr\u003e  actual CTA or break lead-in).\u003cbr\u003e- CUT secondary host presence PREFER: When a speaker’s contributions are non-essential to\u003cbr\u003e  the Q→A spine for this episode and removing them improves clarity and pacing without\u003cbr\u003e  creating continuity problems.\u003cbr\u003e- KEEP chronological topic progression MUST: When the conversation is advancing\u003cbr\u003e  historically\u002fbiographically through time, preserve that progression even if some later\u003cbr\u003e  lines would be punchier as an earlier hook.\u003cbr\u003e- KEEP guest contextual explanation PREFER: When the guest is building a multi-step\u003cbr\u003e  explanation (dates → causes → consequences), even if it includes brief hedges or scene-\u003cbr\u003e  setting that a tighter edit could technically remove.\u003cbr\u003e- KEEP host clarifying question PREFER: When a host question pins down a concrete fact\u003cbr\u003e  (date\u002fplace\u002fdefinition) or explicitly steers back from myth to verifiable biography.\u003cbr\u003e- MUTE host backchannel PREFER: When the guest is mid-explanation and a host’s ‘mm\u002fyeah’\u003cbr\u003e  or partial overlap does not change meaning or prompt a necessary pivot.\u003cbr\u003e- REORDER micro fragment PREFER: When a short clause\u002fsentence is displaced by an\u003cbr\u003e  interruption and moving it slightly earlier\u002flater restores a single coherent thought\u003cbr\u003e  without changing topic order.","\u003cb\u003eUnpacking Israeli History\u003c\u002fb\u003e\u003cbr\u003eEmergency Episode: Inside the Attack on Iran with Avi Melamed\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between turns, near-zero pause tolerance, macro\u003cbr\u003e  chunks removed, not rewritten, guest long takes largely intact\u003cbr\u003eCUT_CRITERIA: host setup trimmed to essentials, cuts meta-discussion and self-editing,\u003cbr\u003e  keeps dense expert history intact, streamlines list formatting and signposting\u003cbr\u003eAUTHENTICITY_POLICY: polished host, natural guest, removes most host stumbles, leaves\u003cbr\u003e  expert cadence unflattened\u003cbr\u003eSTRUCTURE_TEMPLATE: produced intro before conversation, host context block then interview,\u003cbr\u003e  clean, produced credits outro, music beds to frame segments\u003cbr\u003eREORDER_ASSEMBLY: narrative logic over session chronology, heavy re-assembly of the\u003cbr\u003e  opening, reorders to fix clarity and flow\u003cbr\u003eSPEAKER_TREATMENT: guest protected; host expendable, host reduced to prompts and framing,\u003cbr\u003e  backchannels often suppressed\u003cbr\u003eRULES:\u003cbr\u003e- CUT host meta process MUST: When the host is negotiating phrasing, restarting reads,\u003cbr\u003e  commenting on the recording, or asking the producer for feedback, unless a single line\u003cbr\u003e  is needed to justify a sharp topic shift.\u003cbr\u003e- CUT host followup restate PREFER: When the host repeats the guest’s point back at length\u003cbr\u003e  before asking the next question, unless the restatement introduces a genuinely new angle\u003cbr\u003e  or needed translation for lay listeners.\u003cbr\u003e- CUT host pronunciation detours PREFER: When pronunciation coaching or name-correction\u003cbr\u003e  becomes a side-conversation rather than directly serving comprehension of the next\u003cbr\u003e  substantive point.\u003cbr\u003e- CUT host rhetorical repetition PREFER: When the host restates the same moral framing or\u003cbr\u003e  contextual premise in adjacent sentences, unless the second pass adds a new fact or a\u003cbr\u003e  sharper question for the guest.\u003cbr\u003e- CUT host signposting words PREFER: When the host uses list mechanics and verbal\u003cbr\u003e  formatting (e.g., 'number two', 'as I said', 'and this is a quote') that don’t add new\u003cbr\u003e  information beyond the next sentence.\u003cbr\u003e- KEEP guest caution and hedging PREFER: When the guest signals uncertainty\u002flimits of\u003cbr\u003e  knowledge ('I can’t verify', 'we must be cautious') in a way that affects\u003cbr\u003e  interpretation, even if it slightly slows pace.\u003cbr\u003e- KEEP guest long explanation PREFER: When the guest is laying out historical\u002ftheological\u003cbr\u003e  context in a continuous arc, even if dense or multi-minute, unless it repeats a point\u003cbr\u003e  already made verbatim.\u003cbr\u003e- KEEP stakes setting framing PREFER: When the host delivers a concise stakes\u002fzoom-out\u003cbr\u003e  framing that clarifies why the episode exists right now, even if it is more narrated\u003cbr\u003e  than conversational.\u003cbr\u003e- MUTE host backchannel PREFER: During guest monologues\u002fexplanations, when the host’s 'mm-\u003cbr\u003e  hmm\u002fyeah\u002fright' does not change direction or add a clarifying question.\u003cbr\u003e- REORDER guest exposition internal AVOID: Within a multi-minute guest explanation, avoid\u003cbr\u003e  reordering sentences\u002fparagraphs unless it resolves a clear contradiction or removes a\u003cbr\u003e  digression that breaks the argument spine.\u003cbr\u003e- REORDER opening blocks MUST: When the session begins with tech checks, warm-up, or\u003cbr\u003e  later-recorded setup exists, assemble a clean opening by pulling the first strong\u003cbr\u003e  framing\u002fquestion earlier even if it requires a large temporal shift.\u003cbr\u003e- REORDER host fact list items PREFER: When the host’s contextual points are recorded out\u003cbr\u003e  of order or interrupted by discussion, reorder to restore a logical\u002fnumbered progression\u003cbr\u003e  that a listener can follow without hearing the production process.","\u003cb\u003eMick Unplugged\u003c\u002fb\u003e\u003cbr\u003eMisfortunes To Purpose: The Carnivore Leader with CZ Lopez\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high session retention mindset, micro-shaves between turns, rare but chunky\u003cbr\u003e  macro removals\u003cbr\u003eCUT_CRITERIA: host verbosity is expendable, guest narrative arcs are protected,\u003cbr\u003e  compliments\u002fpreamble trimmed first, keep story; drop the padding\u003cbr\u003eAUTHENTICITY_POLICY: conversational roughness tolerated, not obsessed with perfect\u003cbr\u003e  grammar, cleans clutter without sterilizing\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open + intro, bookended produced outro, mid-episode\u003cbr\u003e  sponsor breaks at pivots\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, no thematic reshuffling\u003cbr\u003eSPEAKER_TREATMENT: guest protected; host tightened harder, backchannels muted more than\u003cbr\u003e  cut, keep host questions; reduce host runway\u003cbr\u003eRULES:\u003cbr\u003e- CUT host hype intro PREFER: When the host delivers a long, ceremonial introduction that\u003cbr\u003e  repeats what a produced intro or later framing already covers.\u003cbr\u003e- CUT host redundant reinforcement PREFER: When the host repeats agreement or re-explains\u003cbr\u003e  the guest’s point without adding a new question or new information.\u003cbr\u003e- CUT host side comment PREFER: When the host adds a brief aside that doesn’t set up the\u003cbr\u003e  next guest response or advance the current point.\u003cbr\u003e- CUT tiny interjection PREFER: When a standalone interjection (e.g., a single ‘mm-hmm’)\u003cbr\u003e  doesn’t materially change meaning or timing of the adjacent guest sentence.\u003cbr\u003e- KEEP guest story block MUST: When the guest is in a continuous career\u002fstorytelling run\u003cbr\u003e  that has a clear setup→challenge→lesson progression, even if it’s long.\u003cbr\u003e- MUTE host backchannel MUST: When the guest is mid-answer and the host’s affirmations\u003cbr\u003e  overlap or distract, especially during long monologues.\u003cbr\u003e- MUTE guest filler in self-interruption PREFER: When the guest momentarily self-\u003cbr\u003e  interrupts inside an otherwise strong sentence and muting preserves the sentence without\u003cbr\u003e  breaking cadence.\u003cbr\u003e- REORDER topic block AVOID: Only when a recording-order issue creates confusion that\u003cbr\u003e  cannot be fixed with a brief external bridge or a trim.","\u003cb\u003eMorning Wire\u003c\u002fb\u003e\u003cbr\u003eThe State Of Law Enforcement & The PR Crisis Facing Police Today\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-full interview retention, micro-shaves over macro cuts, low silence-trim\u003cbr\u003e  intensity, prefers intact answer arcs\u003cbr\u003eCUT_CRITERIA: cuts logistics, keeps substance, removes host clutter around guest, tiny\u003cbr\u003e  repeat-word cleanups, avoids trimming nuanced caveats\u003cbr\u003eAUTHENTICITY_POLICY: natural cadence left intact, minimal de-umming beyond essentials,\u003cbr\u003e  edits kept mostly invisible, allows mild rough edges\u003cbr\u003eSTRUCTURE_TEMPLATE: long produced\u002fsponsor cold open, clean handoff into interview, no mid-\u003cbr\u003e  interview ad breaks, brief produced outro recap\u003cbr\u003eREORDER_ASSEMBLY: strict chronological interview flow, no thematic reshuffling, uses tiny\u003cbr\u003e  inserts as stitches\u003cbr\u003eSPEAKER_TREATMENT: guest protected, host tightened, host backchannels suppressed under\u003cbr\u003e  guest, allows brief overlap for realism\u003cbr\u003eRULES:\u003cbr\u003e- CUT micro repeats MUST: When a speaker repeats a short phrase\u002fstarter (e.g., 'so, so' or\u003cbr\u003e  'from uh') without adding meaning and the sentence still reads cleanly without it.\u003cbr\u003e- CUT post interview wrap tech MUST: When the host switches from closing thanks into file-\u003cbr\u003e  transfer\u002fupload\u002fcheck statements.\u003cbr\u003e- CUT pre roll logistics MUST: When the talk is about starting the recording, being\u003cbr\u003e  'rolling', or production\u002ftech coordination rather than content.\u003cbr\u003e- CUT host tagline or push question PREFER: When the host adds a short rhetorical push\u003cbr\u003e  (e.g., a punchy 'so what do you have?') that is immediately redundant with the guest’s\u003cbr\u003e  ongoing point.\u003cbr\u003e- KEEP chronological topic progression MUST: Across the main conversation, unless a\u003cbr\u003e  reorder is required to fix a clear continuity error that would confuse a first-time\u003cbr\u003e  listener.\u003cbr\u003e- KEEP guest long form answer MUST: When the guest is building an argument or offering\u003cbr\u003e  nuanced distinctions, even if the host could be made to sound snappier by heavier\u003cbr\u003e  trimming.\u003cbr\u003e- KEEP brief crosstalk energy PREFER: When overlap is very short and does not obscure key\u003cbr\u003e  words; prioritize conversational realism over perfect isolation.\u003cbr\u003e- KEEP guest caveats and uncertainty PREFER: When the guest is qualifying claims ('we\u003cbr\u003e  don’t know yet', 'without the specifics') or setting evidentiary standards, even if it\u003cbr\u003e  slows pace.\u003cbr\u003e- KEEP micro stitch inserts PREFER: When a very short connector word\u002fphrase can bridge two\u003cbr\u003e  adjacent thoughts after a cut without changing meaning or timeline.\u003cbr\u003e- MUTE host backchannel MUST: When the host is affirming ('mm-hmm', 'yeah') during an\u003cbr\u003e  active guest answer and removing it will not change the meaning of the exchange.\u003cbr\u003e- MUTE host interjection mid guest PREFER: When the host starts to speak over the guest\u003cbr\u003e  (or alongside) and the guest’s sentence can run cleanly without acknowledging the\u003cbr\u003e  interruption.\u003cbr\u003e- REORDER segment blocks AVOID: Only if a question\u002fanswer is accidentally separated from\u003cbr\u003e  its setup in a way that breaks comprehension; otherwise avoid reorders entirely.","\u003cb\u003eAI Agents Podcast\u003c\u002fb\u003e\u003cbr\u003eScaling Revenue Teams with AI-Driven GTM Data – Jason Ambrose (People.ai) | EP120\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-full-session preservation, micro-shaves over macro cuts, silence\u003cbr\u003e  sculpting to smooth edits, lets long explanations breathe\u003cbr\u003eCUT_CRITERIA: cuts inside sentences, not segments, allows thoughtful philosophical\u003cbr\u003e  tangents, removes redundant connectors and resets, fixes grammar with tiny patches\u003cbr\u003eAUTHENTICITY_POLICY: invisible cleanup, not over-polish, crosstalk tolerated as natural,\u003cbr\u003e  uses muting to remove roughness, comfortable with minor imperfections\u003cbr\u003eSTRUCTURE_TEMPLATE: cold open + branded intro bed, intro packaged externally, then\u003cbr\u003e  conversation, minimal interruptions in main, simple closing cta wrap\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, no thematic reshuffling, continuity fixed via\u003cbr\u003e  micro edits\u003cbr\u003eSPEAKER_TREATMENT: guest protected; host tightened more, mutes within host turns heavily,\u003cbr\u003e  keeps guest long-form cadence, backchannels kept but managed\u003cbr\u003eRULES:\u003cbr\u003e- CUT redundant connectors MUST: When a speaker stacks brief link-words or restarts a\u003cbr\u003e  clause (e.g., repeated ‘we\u002fuh\u002fthen\u002flike’) without adding new meaning, especially inside\u003cbr\u003e  an otherwise solid answer or question.\u003cbr\u003e- CUT meta commentary about length or process PREFER: When a speaker comments on the\u003cbr\u003e  explanation itself (e.g., ‘a little longer than…’) and it doesn’t set up a meaningful\u003cbr\u003e  next question or joke payoff.\u003cbr\u003e- KEEP chronological order MUST: Throughout the main conversation, unless a reorder is\u003cbr\u003e  required to correct factual confusion that cannot be solved with a micro-cut.\u003cbr\u003e- KEEP concrete examples and walkthroughs MUST: When a speaker moves from abstraction to a\u003cbr\u003e  specific example\u002fuse-case sequence that makes the concept operational, even if it’s a\u003cbr\u003e  multi-step story.\u003cbr\u003e- KEEP guest explanatory run MUST: When the guest is building a multi-part explanation\u003cbr\u003e  (definition → context → example → implication); avoid interrupting with trims that could\u003cbr\u003e  remove steps in the logic.\u003cbr\u003e- KEEP original question answer pairing PREFER: When a host question directly tees up the\u003cbr\u003e  guest’s next explanation; preserve the adjacency even if the host wording is slightly\u003cbr\u003e  imperfect.\u003cbr\u003e- KEEP short overlaps and affirmations PREFER: When brief overlaps (‘yeah’, ‘mm-hmm’)\u003cbr\u003e  contribute to momentum and don’t obscure intelligibility; don’t fully sterilize the\u003cbr\u003e  interaction.\u003cbr\u003e- KEEP theme reinforcing tangent PREFER: When the tangent broadens context (industry\u003cbr\u003e  framing, adoption pace, societal impact) and still ladders back to the central\u003cbr\u003e  AI\u002fwork\u002fGT-Motion discussion, even if it runs long.\u003cbr\u003e- MUTE host intro housekeeping within turn MUST: In the opening minutes when the host adds\u003cbr\u003e  ‘in this episode’ framing, extra praise, or repeated setup before the first real\u003cbr\u003e  question; keep only what’s needed to land the guest prompt cleanly.\u003cbr\u003e- MUTE speaker tail phrases PREFER: When either speaker adds a dangling tail that doesn’t\u003cbr\u003e  complete a thought (e.g., ‘to bring that…’, ‘that piece…’) and removing it improves\u003cbr\u003e  sentence closure without changing meaning.\u003cbr\u003e- REORDER topic block AVOID: Only when an exchange is clearly out of sequence due to\u003cbr\u003e  recording artifacts (e.g., repeated question, accidental jump) and the shift improves\u003cbr\u003e  comprehension without changing meaning.","\u003cb\u003eThe Long Game with Jake Sullivan and Jon Finer\u003c\u002fb\u003e\u003cbr\u003eAI With a Western Soul (with Tyler Cowen)\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high retention, micro-shave only, near-zero dead-air tolerance, keeps long\u003cbr\u003e  answer arcs intact, runtime can expand via inserts\u003cbr\u003eCUT_CRITERIA: cuts discourse-management, not content, removes host handoffs and floor-\u003cbr\u003e  yielding, preserves exploratory tangents if payoff, prefers tiny de-duplication trims\u003cbr\u003eAUTHENTICITY_POLICY: light cleanup; not over-sanitized, keeps some ‘uh’ for tone,\u003cbr\u003e  preserves natural overlap bursts, edits stay mostly invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: sponsor+teaser cold open, straight interview core, multiple midroll ad\u003cbr\u003e  blocks, long produced recap\u002fcredits outro\u003cbr\u003eREORDER_ASSEMBLY: chronology is the default, reorders limited to cold-open hook, no\u003cbr\u003e  thematic reshuffling inside main\u003cbr\u003eSPEAKER_TREATMENT: guest protected more than hosts, hosts trimmed to clean prompts,\u003cbr\u003e  backchannels suppressed under answers, crosstalk kept when it lands\u003cbr\u003eRULES:\u003cbr\u003e- CUT host handoffs permissioning MUST: When hosts negotiate who goes next (e.g., ‘go\u003cbr\u003e  ahead’, ‘one more’, ‘should we move on’) and it doesn’t set up new information or a\u003cbr\u003e  needed tonal beat.\u003cbr\u003e- CUT continuity breaks created by reorder PREFER: When a potential reorder would require\u003cbr\u003e  additional narration to explain time jumps; prefer leaving content in place and\u003cbr\u003e  tightening instead.\u003cbr\u003e- CUT guest interrupted false entries PREFER: When the guest begins to respond but the\u003cbr\u003e  response is immediately superseded by a cleaner continuation (or a host paraphrase) and\u003cbr\u003e  removing it does not change the guest’s position.\u003cbr\u003e- CUT host meta commentary PREFER: When hosts comment on process\u002fstructure (‘we’ll close\u003cbr\u003e  with…’, ‘most important topic is…’) and it doesn’t create a necessary roadmap for\u003cbr\u003e  listeners.\u003cbr\u003e- CUT redundant micro repeats PREFER: When a phrase is immediately echoed (‘exactly,\u003cbr\u003e  exactly’) or a sentence restarts without new content; trim to a single clean instance\u003cbr\u003e  while preserving the conversational energy.\u003cbr\u003e- KEEP chronological main conversation MUST: Throughout the main interview, unless\u003cbr\u003e  chronology creates a clear continuity error that cannot be solved with a local trim.\u003cbr\u003e- KEEP guest long form answer arc MUST: When the guest is building a multi-step\u003cbr\u003e  explanation (even with minor roughness), unless there is direct repetition that can be\u003cbr\u003e  removed without breaking logic.\u003cbr\u003e- KEEP brief agreement crosstalk PREFER: When overlap is a short confirmation that\u003cbr\u003e  heightens rapport and the main speaker remains intelligible.\u003cbr\u003e- KEEP high-payoff tangent PREFER: When a tangent is unusual but is explicitly signposted\u003cbr\u003e  as a promised beat (or lands a distinctive insight\u002fcomedic payoff) and the conversation\u003cbr\u003e  returns cleanly afterward.\u003cbr\u003e- MUTE host acknowledgments under guest MUST: When the host’s ‘mm\u002fyeah\u002fthank\u002fright’ occurs\u003cbr\u003e  during the guest’s sentence and competes for space; leave it only if it meaningfully\u003cbr\u003e  signals stance or comedic timing.\u003cbr\u003e- MUTE overlapping backchannels PREFER: When a short ‘thank \u002f right \u002f correct \u002f\u003cbr\u003e  absolutely’ overlaps a longer answer and does not add meaning, to protect the primary\u003cbr\u003e  speaker’s intelligibility.\u003cbr\u003e- REORDER highlight teaser PREFER: Only to place a short, high-signal hook before the\u003cbr\u003e  intro (cold open), without altering the internal order of the subsequent discussion.","\u003cb\u003eIt's A Lot with Abbie Chatfield\u003c\u002fb\u003e\u003cbr\u003eMAFS RECAPS: MEL (Part 1)\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: big macro lifts, not constant nipping, light micro-shaves at turn edges, full\u003cbr\u003e  answer runs stay intact, pads added for timing\u003cbr\u003eCUT_CRITERIA: pre-interview chaos stripped aggressively, legal-risk specifics quietly\u003cbr\u003e  removed, keeps accountability and emotional framing, meta gags trimmed when timeboxed\u003cbr\u003eAUTHENTICITY_POLICY: profanity and bluntness retained, conversational messiness mostly\u003cbr\u003e  tolerated, cleanup focused on confusion points\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music-led land acknowledgement open, hard start into\u003cbr\u003e  interview, music button outro wrap\u003cbr\u003eREORDER_ASSEMBLY: chronology respected end-to-end, no thematic reshuffle, continuity fixed\u003cbr\u003e  via cuts, not moves\u003cbr\u003eSPEAKER_TREATMENT: guest airtime protected as primary, backchannels suppressed under\u003cbr\u003e  questions, host interruptions trimmed when redundant\u003cbr\u003eRULES:\u003cbr\u003e- CUT legal risk phrasing MUST: When a speaker references defamation constraints, hints at\u003cbr\u003e  unreleasable allegations, or says they ‘can’t say’ the key detail (unless the omission\u003cbr\u003e  itself is the point of the segment).\u003cbr\u003e- CUT pre roll logistics block MUST: In the opening stretch before the first real\u003cbr\u003e  question, especially if it’s greetings, tech setup, seating, scheduling, or off-mic\u003cbr\u003e  coordination.\u003cbr\u003e- CUT host false start before question PREFER: When the host\u002fsidekick stumbles into a\u003cbr\u003e  question with repeated starters or conversational clutter, unless it creates a\u003cbr\u003e  deliberate comedic beat.\u003cbr\u003e- CUT host or sidekick bit labeling PREFER: When a recurring ‘bit’ label or aside (e.g.,\u003cbr\u003e  announcing a segment persona) interrupts momentum without adding new information to the\u003cbr\u003e  question.\u003cbr\u003e- KEEP chronological flow MUST: For the main interview beats, even when a later answer\u003cbr\u003e  could ‘hook’ better earlier—favor conversational integrity over a manufactured arc.\u003cbr\u003e- KEEP guest long contextual answer PREFER: When the guest is building context that\u003cbr\u003e  explains motives, mental state, or relationships—even if it runs long—provided it’s\u003cbr\u003e  still on the asked topic.\u003cbr\u003e- KEEP guest self reflection accountability PREFER: When the guest is owning behavior,\u003cbr\u003e  correcting the record, or explaining emotional state, even if it adds some repetition or\u003cbr\u003e  softens the pace.\u003cbr\u003e- MUTE guest backchannel MUST: When the guest’s short affirmations (“yeah\u002fmmm”) land under\u003cbr\u003e  a host\u002fsidekick question or setup and don’t change meaning.\u003cbr\u003e- REORDER clarity rescue only AVOID: Only if a reference becomes unintelligible because\u003cbr\u003e  its setup was cut or never recorded cleanly, and a move is the least invasive fix.","\u003cb\u003eThe New Statesman Podcast\u003c\u002fb\u003e\u003cbr\u003eHistoric win for the Greens\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro-block pruning over micro-fussing, host runtime cut aggressively, fast\u003cbr\u003e  ramp into substance, low silence sensitivity\u003cbr\u003eCUT_CRITERIA: behind-the-scenes stripped completely, anecdotal color sacrificed for\u003cbr\u003e  analysis, political argument beats stay long, tone kept professionally restrained\u003cbr\u003eAUTHENTICITY_POLICY: cleaned of restarts and retakes, leaves some natural roughness,\u003cbr\u003e  process removed, conversation retained\u003cbr\u003eSTRUCTURE_TEMPLATE: produced headline intro with music, quick host-to-guest handoff, mid-\u003cbr\u003e  episode reset ('quick break'), formal credit\u002ftag outro\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, reorders avoided entirely, external lines\u003cbr\u003e  used as glue\u003cbr\u003eSPEAKER_TREATMENT: guest protected, host expendable, host reduced to clean questions,\u003cbr\u003e  micro-mutes for host phrasing fixes\u003cbr\u003eRULES:\u003cbr\u003e- CUT host bridge phrases MUST: When the host is using extended throat-clearing to get to\u003cbr\u003e  a question (stacked qualifiers, scene-setting repeats), unless it provides essential\u003cbr\u003e  listener context the guest will rely on.\u003cbr\u003e- CUT host ramble MUST: When the host is narrating at length (background, anecdotes,\u003cbr\u003e  scene-setting) and the guest can deliver or already delivered the core analytical point.\u003cbr\u003e- CUT production logistics MUST: Any time the speakers discuss filming\u002frecording, who will\u003cbr\u003e  say what, whether to redo a line, or other process talk, regardless of how brief or\u003cbr\u003e  funny it is.\u003cbr\u003e- CUT candidate bio color PREFER: When biographical or “character detail” passages don’t\u003cbr\u003e  clearly feed into the political analysis (e.g., personal anecdotes, social-media rumor\u003cbr\u003e  stories), unless they become the explicit peg for the next analytical point.\u003cbr\u003e- CUT guest sensitive personal detail PREFER: When the guest shifts into personal\u003cbr\u003e  relationships\u002femotion that isn’t necessary to the political analysis and risks becoming\u003cbr\u003e  the focal point of the segment.\u003cbr\u003e- CUT overly spicy asides PREFER: When a line is primarily a punchy slogan\u002fquip that\u003cbr\u003e  heightens heat more than it adds information, especially if it could distract from the\u003cbr\u003e  analytic posture of the segment.\u003cbr\u003e- CUT redundant recontextualization PREFER: When a later line restates context already\u003cbr\u003e  established earlier (trigger, what happened, who someone is), cut the repetition rather\u003cbr\u003e  than relocating it.\u003cbr\u003e- KEEP chronological order MUST: Default to pres
