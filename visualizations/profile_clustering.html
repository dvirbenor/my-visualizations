 similarly, backchannels kept only when clean\u003cbr\u003eRULES:\u003cbr\u003e- CUT hedge stack MUST: When a speaker piles qualifiers (e.g., repeated 'uh\u002fah\u002fI think\u002fyou\u003cbr\u003e  know') before making the substantive claim, unless the hedging signals a genuine\u003cbr\u003e  uncertainty that affects interpretation.\u003cbr\u003e- CUT host self-interrupt PREFER: When the host starts a thought and immediately restarts\u003cbr\u003e  or re-aims it mid-sentence, unless the restart clarifies a technical detail that would\u003cbr\u003e  otherwise be ambiguous.\u003cbr\u003e- CUT meta commentary PREFER: When speakers comment on the act of\u003cbr\u003e  speaking\u002freading\u002frecording (e.g., narrating their own process), unless it directly\u003cbr\u003e  motivates the next explanatory step or frames a key correction.\u003cbr\u003e- CUT micro repetition across turns PREFER: When two adjacent turns restate the same\u003cbr\u003e  premise or recap the question; retain only the version that best tees up the next new\u003cbr\u003e  detail.\u003cbr\u003e- KEEP chronological order MUST: Throughout the main conversation, unless a recording-\u003cbr\u003e  order error causes an explicit reference to something the listener has not yet heard.\u003cbr\u003e- KEEP guest full answer arc MUST: When a guest is building a multi-step explanation or\u003cbr\u003e  conclusion; only trim internal clutter and avoid truncating the setup that makes the\u003cbr\u003e  conclusion make sense.\u003cbr\u003e- KEEP technical explanation run MUST: When a guest or host is defining a concept or\u003cbr\u003e  laying out a multi-part mechanism; compress internally but preserve the full chain of\u003cbr\u003e  reasoning so the takeaway remains provable from what’s said.\u003cbr\u003e- KEEP topic pivot turn PREFER: When the host introduces the next topic; tighten the pivot\u003cbr\u003e  but retain enough context so the transition feels intentional rather than abrupt.\u003cbr\u003e- MUTE backchannel overlap MUST: When a secondary speaker’s brief interjection overlaps\u003cbr\u003e  the primary speaker’s sentence and does not add new information (e.g., 'okay', 'you',\u003cbr\u003e  'mm-hmm'), while the main speaker continues uninterrupted.\u003cbr\u003e- REORDER segment AVOID: Only when two neighboring blocks are clearly mislabeled or out of\u003cbr\u003e  sequence (e.g., callback precedes the setup) and the fix is a simple swap rather than a\u003cbr\u003e  thematic rebuild.","\u003cb\u003ePolitics Weekly UK\u003c\u002fb\u003e\u003cbr\u003eSend provision and student loans: will Labour’s changes backfire?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between turns, big chunks cut when meta, broadcast-\u003cbr\u003e  tight pacing over natural flow, high density; low meander tolerance\u003cbr\u003eCUT_CRITERIA: meta conversation stripped completely, redundant framing is expendable,\u003cbr\u003e  keeps the policy ‘meat’ intact, clarity beats complete verbatim\u003cbr\u003eAUTHENTICITY_POLICY: heavily cleaned, lightly ‘lived-in’, edits kept mostly invisible,\u003cbr\u003e  occasional casual beats survive, backchannels cleaned more than banter\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open montage, two-topic ‘act’ structure, mid-episode\u003cbr\u003e  reset with sting, produced outro with promos\u002fcredits\u003cbr\u003eREORDER_ASSEMBLY: chronology largely respected, bridges via narration, not reshuffle, no\u003cbr\u003e  thematic re-threading of answers\u003cbr\u003eSPEAKER_TREATMENT: backchannels aggressively muted, host framing protected; guest trimmed\u003cbr\u003e  harder, interruptions cleaned to single lane, keeps host questions as spine\u003cbr\u003eRULES:\u003cbr\u003e- CUT meta production talk MUST: Whenever the speakers discuss recording logistics,\u003cbr\u003e  timing, ‘redo this bit’, or how the edit will work, regardless of how brief.\u003cbr\u003e- CUT duplicate context reframing PREFER: When a speaker re-explains context (who they\u003cbr\u003e  are, what the topic is, why it matters) that has already been established in the\u003cbr\u003e  surrounding segment, unless the second pass adds a new angle needed to understand the\u003cbr\u003e  next question.\u003cbr\u003e- CUT guest long monologue without turn handoff PREFER: When the guest continues for\u003cbr\u003e  multiple beats without inviting the other speaker back in and the content has become\u003cbr\u003e  list-like or repetitive; preserve at least one clean handoff line into the next\u003cbr\u003e  question.\u003cbr\u003e- CUT softener phrases inside arguments PREFER: When hedges\u002fsofteners (‘sort of’, ‘on the\u003cbr\u003e  face of it’, ‘I would say’) slow a sentence without changing meaning or nuance.\u003cbr\u003e- KEEP chronological topic flow PREFER: When the conversation naturally progresses from\u003cbr\u003e  setup → explanation → implications, even if pacing is uneven; solve with trims instead\u003cbr\u003e  of re-sequencing.\u003cbr\u003e- KEEP external bridge instead of reorder PREFER: When something essential was said in a\u003cbr\u003e  cleaner retake or narration, insert that as a bridge rather than re-threading multiple\u003cbr\u003e  original turns.\u003cbr\u003e- KEEP host signposts and transitions PREFER: When the host cues structure (topic changes,\u003cbr\u003e  ‘let’s pause’, ‘when we come back’) even if slightly scripted, because it supports act\u003cbr\u003e  boundaries.\u003cbr\u003e- KEEP technical policy explanation PREFER: When the detail is doing explanatory work\u003cbr\u003e  (numbers, mechanisms, process, accountability routes), even if it feels ‘in the weeds’,\u003cbr\u003e  unless it becomes a second repetition of the same mechanism.\u003cbr\u003e- MUTE backchannel during other speaker point MUST: When a speaker is making a substantive\u003cbr\u003e  explanation and the other speaker is only offering affirmations (yeah\u002fmm-hmm\u002fokay) or\u003cbr\u003e  short agreement noises underneath or adjacent.\u003cbr\u003e- MUTE speaker overlap cleanup PREFER: When two speakers start at once and one line is\u003cbr\u003e  non-essential (reaction, agreement, throat-clear); preserve the essential line and\u003cbr\u003e  suppress the rest rather than cutting both and risking a jump.\u003cbr\u003e- REORDER short clarifying exchange AVOID: Only when a very small move would prevent\u003cbr\u003e  listener confusion (e.g., definition needed before a reference) and can be done without\u003cbr\u003e  creating audible jumps.","\u003cb\u003eThe Daily Beast Podcast\u003c\u002fb\u003e\u003cbr\u003eTrump Threw Secret Situation Room Tantrum: Wolff\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light-touch cut, high retention, micro-shaves over big removals, allows long\u003cbr\u003e  argumentative runs\u003cbr\u003eCUT_CRITERIA: cautious with unverifiable allegations, cuts self-referential edit talk,\u003cbr\u003e  keeps sharp banter despite friction, trims anecdote details, keeps point\u003cbr\u003eAUTHENTICITY_POLICY: messy overlap left audible, profanity kept when emphatic, polish via\u003cbr\u003e  invisible mutes\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open tease, conversation-first main block, long,\u003cbr\u003e  produced outro stack\u003cbr\u003eREORDER_ASSEMBLY: chronology is essentially sacred, assembly avoids thematic reshuffles,\u003cbr\u003e  fixes happen without reordering\u003cbr\u003eSPEAKER_TREATMENT: allows hosts to interrupt, mutes used to de-clutter monologues, one\u003cbr\u003e  speaker foregrounded at a time\u003cbr\u003eRULES:\u003cbr\u003e- CUT legal risk claims MUST: When a speaker makes an accusation that escalates to\u003cbr\u003e  criminal\u002ftreasonous framing or relies on unnamed sources\u002fspeculation, unless it is\u003cbr\u003e  directly supported in the same breath with concrete evidence or clearly labeled as\u003cbr\u003e  opinion.\u003cbr\u003e- CUT self retraction and edit meta MUST: When a speaker says they should edit\u002fcut what\u003cbr\u003e  they just said (or starts to retract mid-sentence), unless the retraction itself is\u003cbr\u003e  essential context for why the claim is unreliable.\u003cbr\u003e- CUT anecdote overgrowth PREFER: When an anecdote adds colorful but non-essential detail\u003cbr\u003e  that delays returning to the thesis\u002fquestion; keep the punchline or illustrative image\u003cbr\u003e  but trim extra setup.\u003cbr\u003e- KEEP chronological flow MUST: Throughout the main conversation, unless a recording-order\u003cbr\u003e  mistake makes the dialogue objectively confusing (missing premise before conclusion).\u003cbr\u003e- KEEP combative banter PREFER: When the hosts needle each other, correct each other, or\u003cbr\u003e  spar in a way that reveals stakes\u002fpoint-of-view, even if it includes mild insults or\u003cbr\u003e  tension.\u003cbr\u003e- KEEP crosstalk energy PREFER: When overlap functions as humor, sparring, or momentum\u003cbr\u003e  rather than obscuring key facts.\u003cbr\u003e- MUTE overlapping interjections MUST: When one speaker is delivering a dense explanation\u003cbr\u003e  and the other’s overlap is non-essential (agreement noises, partial restarts, small\u003cbr\u003e  side-comments) that competes with intelligibility.\u003cbr\u003e- MUTE speaker self clutter PREFER: Inside a single speaker’s long turn, when repeated\u003cbr\u003e  false-start fragments and placeholder phrases accumulate but the sentence can continue\u003cbr\u003e  cleanly without them.\u003cbr\u003e- REORDER topic blocks AVOID: Only if a necessary clarification cannot be achieved with a\u003cbr\u003e  short insert and the reorder is small enough that speakers’ references (time, ‘earlier’,\u003cbr\u003e  ‘as we said’) still read naturally."],"x":{"dtype":"f4","bdata":"jtbtQAhf3kBgWvBA7QfcQEHk8UCWaOJAoRbhQA=="},"y":{"dtype":"f4","bdata":"8al8QfzXckHAtXdBQC9+QdYwdkElN3ZBEQB4QQ=="},"type":"scatter"},{"hoverinfo":"skip","line":{"color":"#1f77b4","dash":"dot","width":1.5},"mode":"lines","showlegend":false,"x":{"dtype":"f4","bdata":"7QfcQAhf3kBB5PFAjtbtQO0H3EA="},"y":{"dtype":"f4","bdata":"QC9+QfzXckHWMHZB8al8QUAvfkE="},"type":"scatter"},{"hoverinfo":"skip","mode":"text","showlegend":false,"text":["Six Axioms Editing"],"textfont":{"color":"#1f77b4","size":9},"x":[7.2052764892578125],"y":[15.516146659851074],"type":"scatter"},{"hoverinfo":"text","marker":{"color":"#ff7f0e","line":{"color":"white","width":0.5},"size":8},"mode":"markers","name":"Template-Driven Editorial Rhythm","text":["\u003cb\u003eTailenders\u003c\u002fb\u003e\u003cbr\u003eRage to Riches\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaving between turns, macro cuts reserved for off-mission\u003cbr\u003e  blocks, low tolerance for dead air, keeps long set-piece bits intact\u003cbr\u003eCUT_CRITERIA: cuts logistics, meetings, edit-talk hard, protects playful chaos and riffs,\u003cbr\u003e  trims repetitive agreement stacks, removes off-mission side rants\u003cbr\u003eAUTHENTICITY_POLICY: leaves overlap for live energy, cleans without sterilizing cadence,\u003cbr\u003e  uses mutes to tidy timing, allows some mess inside bits\u003cbr\u003eSTRUCTURE_TEMPLATE: produced ad-heavy bookends, music-backed intro and transitions,\u003cbr\u003e  listener messages as recurring beats, closing ritualized shout-outs\u003cbr\u003eREORDER_ASSEMBLY: freely reorders to restore template, repairs segment flow over\u003cbr\u003e  chronology, assembles a clean closing sequence\u003cbr\u003eSPEAKER_TREATMENT: host setup is expendable, guests’ core content protected, mutes stray\u003cbr\u003e  interjections under beds, allows high-crosstalk group texture\u003cbr\u003eRULES:\u003cbr\u003e- CUT agreement pileups MUST: When multiple speakers stack short affirmations\u002frepeats\u003cbr\u003e  ('yeah', 'cheers', 'so') without adding a new joke, fact, or turn-direction.\u003cbr\u003e- CUT production logistics MUST: When the group is discussing timing, upcoming meetings,\u003cbr\u003e  who to bring in next, or how the edit will work, unless a line is itself a punchline\u003cbr\u003e  that lands cleanly.\u003cbr\u003e- CUT host ramble PREFER: When a host is circling a point, repeating context, or narrating\u003cbr\u003e  process rather than prompting the next beat—unless it’s actively building a joke.\u003cbr\u003e- CUT off mission rant PREFER: When the conversation veers into a heated aside not\u003cbr\u003e  connected to the episode’s comedic\u002fcricket spine and not used as a deliberate segment\u003cbr\u003e  beat.\u003cbr\u003e- KEEP guest explanation arc MUST: When a guest is delivering a structured\u003cbr\u003e  explanation\u002fstory, even if other speakers interject—trim around it rather than inside\u003cbr\u003e  it.\u003cbr\u003e- KEEP comedic set piece PREFER: When a structured bit (game\u002fconcept\u002fdocumentary-style\u003cbr\u003e  segment) is underway and escalating, even if it runs long or includes small stumbles.\u003cbr\u003e- KEEP crosstalk reaction PREFER: When overlap signals genuine group reaction (laughter,\u003cbr\u003e  quick tags) that heightens the moment and doesn’t obscure the main line.\u003cbr\u003e- MUTE underbed interjections MUST: When a speaker’s small noises\u002fone-word interjections\u003cbr\u003e  occur during music beds or a narrated passage and don’t add a clear joke or information.\u003cbr\u003e- REORDER closing segment MUST: When shout-outs\u002fgo-wells\u002fbirthdays were recorded earlier\u003cbr\u003e  as filler (e.g., while waiting for a guest), move them to the end to preserve the show’s\u003cbr\u003e  closing ritual.\u003cbr\u003e- REORDER segment salvage PREFER: When there are multiple attempts at the same beat (false\u003cbr\u003e  starts, ‘take two\u002fthree’ versions), assemble the cleanest pass as the primary and\u003cbr\u003e  optionally keep one quick meta-joke as a button.\u003cbr\u003e- REORDER waiting for guest material PREFER: When the transcript contains ‘stalling’ talk\u003cbr\u003e  that breaks momentum, jump forward to the next on-mission moment (guest arrival, next\u003cbr\u003e  topic) and backfill only what’s needed for comprehension.","\u003cb\u003eRude Tales of Magic\u003c\u002fb\u003e\u003cbr\u003eNight Trial Live!\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: aggressive half-length compression, relentless micro-shaves between turns,\u003cbr\u003e  macro blocks removed wholesale, silence trimmed, occasional pads added\u003cbr\u003eCUT_CRITERIA: hard cut of out-of-game chatter, confusion resolved via clean patches,\u003cbr\u003e  protects in-world narration momentum, jokes kept, but repetitions culled\u003cbr\u003eAUTHENTICITY_POLICY: polished continuity over raw session, seams tolerated if funny,\u003cbr\u003e  selective overlap left in, timing shaped with added pads\u003cbr\u003eSTRUCTURE_TEMPLATE: fully produced cold open + recap, music beds threaded through scenes,\u003cbr\u003e  diegetic ad breaks as comedy, produced credits + end tag\u003cbr\u003eREORDER_ASSEMBLY: surgical reorders for punchlines, tiny timeline shifts only, chronology\u003cbr\u003e  preserved by default\u003cbr\u003eSPEAKER_TREATMENT: scene-driver protected over interjector, host trimmed to prompts and\u003cbr\u003e  spikes, heavy muting to de-clutter, one clear foreground voice at a time\u003cbr\u003eRULES:\u003cbr\u003e- CUT housekeeping logistics MUST: Recording logistics, scheduling, tech checks, and “can\u003cbr\u003e  we redo that clean” conversations, even when they include mildly funny banter.\u003cbr\u003e- CUT multi speaker negotiation MUST: When multiple speakers negotiate\u003cbr\u003e  wording\u002fretakes\u002fdefinitions (especially around mechanics) rather than playing the scene;\u003cbr\u003e  keep only the clean in-world result.\u003cbr\u003e- CUT table talk MUST: Any out-of-game discussion (rules clarifications, how\u002fwhen to do a\u003cbr\u003e  moment, or meta about the episode\u002fedit), unless it produces a uniquely strong joke that\u003cbr\u003e  pays off immediately in the next beat.\u003cbr\u003e- CUT host interjection PREFER: When the host interjection is an aside, a clarification\u003cbr\u003e  request, or a tangent that doesn’t directly generate a guest response or a high-\u003cbr\u003e  confidence laugh line.\u003cbr\u003e- CUT repetitive riffing PREFER: When a bit is already established and subsequent\u003cbr\u003e  variations are just additional examples (e.g., multiple alternate lines on the same\u003cbr\u003e  premise) without escalation.\u003cbr\u003e- KEEP guest narration run MUST: When the guest is narrating action, describing the world,\u003cbr\u003e  or running a scene, even if it includes some ramble; only trim internal redundancies.\u003cbr\u003e- KEEP scene description block PREFER: Long in-world descriptive narration that\u003cbr\u003e  establishes setting, stakes, or the next actionable beat, even if it runs longer than a\u003cbr\u003e  typical conversational turn.\u003cbr\u003e- MUTE guest or host background bits PREFER: During moments where overlapping chatter\u003cbr\u003e  would compromise the main line (e.g., crowd noises, repeated acknowledgments, or mock-\u003cbr\u003e  dialogue while the scene continues).\u003cbr\u003e- MUTE side chatter during narration PREFER: When one speaker is carrying narrative\u002fscene-\u003cbr\u003e  driving exposition and the other speaker’s asides would muddy intelligibility or timing;\u003cbr\u003e  mute the aside rather than cutting the main narration.\u003cbr\u003e- REORDER large story block AVOID: If the shift would exceed a minute or materially change\u003cbr\u003e  narrative chronology; avoid big rearrangements unless the original order is genuinely\u003cbr\u003e  confusing.\u003cbr\u003e- REORDER callout or callback PREFER: When a callback lands better as a topper on the\u003cbr\u003e  preceding beat rather than where it occurred in-session (e.g., moving a one-liner to cap\u003cbr\u003e  a moment).\u003cbr\u003e- REORDER setup or context line PREFER: When a short line is needed to make the following\u003cbr\u003e  reaction\u002fpunchline intelligible after compression; move the setup adjacent to its\u003cbr\u003e  payoff.","\u003cb\u003eTailenders\u003c\u002fb\u003e\u003cbr\u003eThe Associates\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high session retention, micro-shaved, sub-second trims between phrases,\u003cbr\u003e  pauses shortened, not eliminated, allows long comedic run-ons\u003cbr\u003eCUT_CRITERIA: micro-cut verbal lint mid-sentence, keep chaotic banter if fun, trim over-\u003cbr\u003e  explained game mechanics, drop housekeeping, keep the vibe\u003cbr\u003eAUTHENTICITY_POLICY: rough edges left audible, profanity retained when natural, clean-up\u003cbr\u003e  is mostly invisible, mutes used as spot-fixes\u003cbr\u003eSTRUCTURE_TEMPLATE: external ad pre-roll bookend, long post-produced outro segment, main\u003cbr\u003e  body stays conversational, mid-episode promo stings allowed\u003cbr\u003eREORDER_ASSEMBLY: chronology is strongly protected, no thematic reshuffle in-body,\u003cbr\u003e  assembly changes via inserts, not moves\u003cbr\u003eSPEAKER_TREATMENT: crosstalk managed by mutes, primary guest protected for substance,\u003cbr\u003e  hosts lightly shaved, not rewritten, side voices can be fully removed\u003cbr\u003eRULES:\u003cbr\u003e- CUT intra turn redundancy MUST: When a speaker repeats a starter phrase or connective\u003cbr\u003e  tissue (e.g., 'um\u002fand\u002fso\u002fyou know' equivalents) without adding meaning, even if the\u003cbr\u003e  surrounding sentence is kept.\u003cbr\u003e- CUT incidental speaker turn PREFER: When a non-core participant appears briefly without\u003cbr\u003e  adding a beat that pays off later in the episode.\u003cbr\u003e- CUT rules explanation sprawl PREFER: During game\u002fquiz setup, when the mechanic is being\u003cbr\u003e  re-explained after it has already been stated once, unless the confusion itself is the\u003cbr\u003e  joke payoff.\u003cbr\u003e- KEEP chronological flow MUST: Throughout the main conversation, unless a chronological\u003cbr\u003e  placement creates direct confusion that cannot be fixed with trimming or a short\u003cbr\u003e  clarifying insert.\u003cbr\u003e- KEEP banter tangent PREFER: When the tangent is an active running bit with multiple\u003cbr\u003e  speakers building on it, unless it becomes purely circular with no new escalation.\u003cbr\u003e- KEEP guest long answer PREFER: When the guest is delivering a sustained explanation or\u003cbr\u003e  story with clear momentum, even if there are minor verbal stumbles or host\u003cbr\u003e  interjections.\u003cbr\u003e- KEEP messy overlap energy PREFER: When crosstalk reads as excitement\u002fchemistry rather\u003cbr\u003e  than obstruction of the key line (i.e., the main punchline or key fact still lands).\u003cbr\u003e- MUTE overlap intrusion MUST: When one speaker’s short interjection lands on top of\u003cbr\u003e  another speaker’s key line (setup, punchline, or factual detail), mute the intruding\u003cbr\u003e  words while keeping the underlying line.\u003cbr\u003e- REORDER content block AVOID: Only when a block is explicitly referenced as happening\u003cbr\u003e  earlier\u002flater and the mismatch breaks comprehension; otherwise avoid rearrangement and\u003cbr\u003e  trim instead.","\u003cb\u003eTalking Rubbish\u003c\u002fb\u003e\u003cbr\u003e83. Is climate collaboration illegal?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between clauses, fast cadence, few dead-air beats,\u003cbr\u003e  macro blocks mostly left intact, pads reintroduced after tightening\u003cbr\u003eCUT_CRITERIA: cuts meta production chatter hard, protects comedic\u002fself-aware bits, prefers\u003cbr\u003e  one clean phrasing, reduces hedging and throat-clearing\u003cbr\u003eAUTHENTICITY_POLICY: heavily cleaned, lightly lived-in, keeps laughter, loses mess,\u003cbr\u003e  crosstalk tolerated in sparks, stumbles removed inside sentences\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music-led open, segmented magazine-style format, mid-episode\u003cbr\u003e  sponsor integration, ritualized sign-off ending\u003cbr\u003eREORDER_ASSEMBLY: small reorders for clarity, front-load definitions and setup, chronology\u003cbr\u003e  mostly preserved\u003cbr\u003eSPEAKER_TREATMENT: primary narrator tightened hardest, backchannels frequently muted,\u003cbr\u003e  reactions preserved as punchlines, asymmetric polish by role\u003cbr\u003eRULES:\u003cbr\u003e- CUT meta production talk MUST: Any mentions of redoing lines, asking whether to keep\u003cbr\u003e  something, talking to the editor\u002fproducer, or commenting on structure\u002fclarity mid-flow.\u003cbr\u003e- CUT self editing questions MUST: When a speaker asks the other if they should\u003cbr\u003e  redo\u002fcontinue\u002fhand over, unless it smoothly sets up the next speaker’s contribution.\u003cbr\u003e- CUT duplicate explanations PREFER: When a speaker restates the same premise\u002fdefinition\u003cbr\u003e  within ~30–90 seconds, keep the strongest\u002fclearest pass and remove the rest unless the\u003cbr\u003e  repetition is the punchline.\u003cbr\u003e- CUT political hedge prefaces PREFER: Prefatory apologies\u002fhedges about being political or\u003cbr\u003e  about giving advice, unless the disclaimer is required for audience safety\u002fpositioning.\u003cbr\u003e- KEEP audience engagement payoffs PREFER: Listener messages, reviews, and sponsor-to-\u003cbr\u003e  community bridges that function as recurring show rituals, even if they briefly pause\u003cbr\u003e  the main topic.\u003cbr\u003e- KEEP reaction punchline PREFER: When the interrupting reaction is the comedic beat\u003cbr\u003e  (e.g., surprise, mock horror) or clearly heightens a joke.\u003cbr\u003e- KEEP sarcasm and bit commits PREFER: When the hosts commit to a comedic angle (dry\u003cbr\u003e  sarcasm, playful exaggeration) that frames the segment’s tone, even if it’s not strictly\u003cbr\u003e  informational.\u003cbr\u003e- MUTE backchannel during exposition MUST: When one host is delivering a multi-clause\u003cbr\u003e  explanation and the other adds short confirmations (yeah\u002foh\u002fmmm) that don’t change\u003cbr\u003e  meaning.\u003cbr\u003e- MUTE intro music crosslines PREFER: During produced intro\u002foutro beds, suppress throwaway\u003cbr\u003e  greetings so the scripted\u002fproduced copy stays dominant.\u003cbr\u003e- REORDER closing summary PREFER: When the segment ends with messy negotiation or multiple\u003cbr\u003e  attempts at a wrap-up, replace with the cleanest summary (even if recorded later) and\u003cbr\u003e  move it into the intended closing position.\u003cbr\u003e- REORDER definition block PREFER: When an acronym\u002fterm is used, then explained moments\u003cbr\u003e  later, move the explanation earlier so the first mention lands cleanly.\u003cbr\u003e- REORDER handoff lines PREFER: When a speaker’s ‘and now…’ handoff is followed by the\u003cbr\u003e  actual content, reorder so the substantive content leads and the handoff is removed or\u003cbr\u003e  minimized.","\u003cb\u003eTailenders\u003c\u002fb\u003e\u003cbr\u003eInternational Relations: Nepal and The Netherlands\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between turns, keeps long comedy games intact, low\u003cbr\u003e  tolerance for conversational drag, uses mutes to tighten pacing\u003cbr\u003eCUT_CRITERIA: protects the central comedic bit, cuts meta\u002flogistics and clarifications\u003cbr\u003e  hard, removes potentially harmful\u002foff-color lines, keeps running jokes and callbacks\u003cbr\u003eAUTHENTICITY_POLICY: leaves profanity and rough edges, polish is mostly invisible, cleans\u003cbr\u003e  confusion, not character, allows playful interruption energy\u003cbr\u003eSTRUCTURE_TEMPLATE: ad\u002fpromo bookends plus midrolls, produced sketch blocks with music,\u003cbr\u003e  conversational intro into match chat, ritualized ‘go wells’ outro\u003cbr\u003eREORDER_ASSEMBLY: willing to reorder for coherence, clusters setup → payoff contiguously,\u003cbr\u003e  chronology is flexible inside bits, uses small pickups as glue\u003cbr\u003eSPEAKER_TREATMENT: heavy muting of non-lead chatter, host trimmed to keep pace, secondary\u003cbr\u003e  contributor minimized, crosstalk kept only when it lands\u003cbr\u003eRULES:\u003cbr\u003e- CUT meta logistics MUST: When the conversation shifts into coordination (can you hear me\u003cbr\u003e  \u002f let them in \u002f pause while we fix \u002f explain the edit) rather than on-mic content.\u003cbr\u003e- CUT sensitive or punching down jokes MUST: When a joke or aside lands as socially\u003cbr\u003e  insensitive\u002fmean-spirited (even if participants flag it themselves), unless it is\u003cbr\u003e  immediately reframed into a clear apology\u002frepair that becomes the point of the moment.\u003cbr\u003e- CUT repeated explanations PREFER: When multiple speakers restate the same clarification\u003cbr\u003e  (scores, pronunciations, rule explanations) after it’s already clear once.\u003cbr\u003e- CUT tertiary speaker asides PREFER: When a non-core speaker adds trivia\u002fside facts that\u003cbr\u003e  don’t create a new laugh or advance the current segment.\u003cbr\u003e- KEEP brief crosstalk punchline PREFER: When the overlap itself is the joke (quick\u003cbr\u003e  interjection that heightens the moment) and remains intelligible.\u003cbr\u003e- KEEP guest story arc PREFER: When a guest is telling a personal anecdote that sets\u003cbr\u003e  tone\u002frapport; trim around it but preserve the narrative continuity.\u003cbr\u003e- KEEP minor time discontinuities PREFER: When a small time jump (within a few minutes)\u003cbr\u003e  improves clarity and doesn’t change meaning; do not over-explain the move.\u003cbr\u003e- KEEP running gag callback PREFER: When a callback reinforces an episode-long motif\u003cbr\u003e  (pronunciation theme, international-relations framing, recurring props), even if it’s a\u003cbr\u003e  small aside.\u003cbr\u003e- MUTE overlap adlib MUST: When two people talk at once and one line is clearly the\u003cbr\u003e  keeper; suppress the other speaker’s overlap instead of cutting the keeper short.\u003cbr\u003e- MUTE side chatter under main line PREFER: When a speaker riffs under another speaker’s\u003cbr\u003e  clean line without adding a new joke or necessary reaction; keep the lead line moving.\u003cbr\u003e- REORDER chronology outside bits AVOID: When the main conversation is flowing normally;\u003cbr\u003e  avoid reshuffling purely for topical grouping if it risks sounding unnaturally\u003cbr\u003e  assembled.\u003cbr\u003e- REORDER produced bit setup MUST: When instructions\u002fpremise\u002ftheme are scattered by\u003cbr\u003e  interruptions; assemble them into a single contiguous run before the gameplay\u002fbanter\u003cbr\u003e  continues.\u003cbr\u003e- REORDER context before reaction PREFER: When a reaction or joke lands before the\u003cbr\u003e  audience has the necessary information; move the minimal context earlier rather than\u003cbr\u003e  adding new narration.","\u003cb\u003eTailenders\u003c\u002fb\u003e\u003cbr\u003eTeam of the 21st Century\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves for cadence, macro cuts for derailments\u002ftech, keeps\u003cbr\u003e  long comedic blocks intact\u003cbr\u003eCUT_CRITERIA: cut meta about the edit, protect running gags and bits, trim repetition,\u003cbr\u003e  keep punchlines, tech disruption removed wholesale\u003cbr\u003eAUTHENTICITY_POLICY: profanity and laughter stay in, messy overlap tolerated for energy,\u003cbr\u003e  polish focuses on clarity, not perfection\u003cbr\u003eSTRUCTURE_TEMPLATE: produced ad-heavy bookends, segmented by recurring show bits, music\u003cbr\u003e  beds as glue, emails\u002fgo-wells as closing ritual\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with tiny fixes, reorder only to untangle context,\u003cbr\u003e  assembly favors conversational flow\u003cbr\u003eSPEAKER_TREATMENT: hosts get tighter trims than guests, mute used to de-clutter overlaps,\u003cbr\u003e  secondary interjections selectively suppressed\u003cbr\u003eRULES:\u003cbr\u003e- CUT tech glitch block MUST: When the conversation becomes troubleshooting (latency,\u003cbr\u003e  audio checks, restarts) and does not itself become a deliberate comedic beat that\u003cbr\u003e  advances the segment.\u003cbr\u003e- CUT editroom meta PREFER: When speakers discuss whether something should go in, how it\u003cbr\u003e  will be clipped, or negotiate the structure in real time, unless the meta-comment is the\u003cbr\u003e  punchline.\u003cbr\u003e- CUT host self interruptions PREFER: When a host interrupts themselves with add-ons that\u003cbr\u003e  don’t escalate the joke or add information; preserve the cleanest path to the next beat.\u003cbr\u003e- CUT redundant echoes PREFER: When multiple speakers repeat the same phrase\u002fidea (e.g.,\u003cbr\u003e  agreement loops) without adding escalation; keep the strongest\u002fclearest instance and\u003cbr\u003e  remove the rest.\u003cbr\u003e- KEEP chronological arc MUST: For substantive topic runs and full segments; avoid\u003cbr\u003e  thematic reassembly that would make reactions feel unearned.\u003cbr\u003e- KEEP emotional shoutouts MUST: During listener shout-outs\u002fhealth notes, preserve the\u003cbr\u003e  full sentiment and context; only trim for clarity, not for speed.\u003cbr\u003e- KEEP guest explanatory arc PREFER: When a guest is in a multi-sentence explanation or\u003cbr\u003e  list; avoid micro-cutting that would change their cadence or perceived confidence.\u003cbr\u003e- KEEP running gag PREFER: When a recurring call-and-response or catchphrase is in play;\u003cbr\u003e  even if it’s tangential, keep enough repetitions to make the motif feel intentional.\u003cbr\u003e- MUTE supportive murmurs PREFER: When a non-speaking participant adds low-value\u003cbr\u003e  backchannels (mm, yeah, laughter tags) under a primary line and it muddies the sentence.\u003cbr\u003e- REORDER micro context fix PREFER: When a short line or clarification resolves immediate\u003cbr\u003e  confusion and can be pulled slightly earlier\u002flater (sub-minute scale) without changing\u003cbr\u003e  the conversational beat.","\u003cb\u003eThat's Absurd Please Elaborate\u003c\u002fb\u003e\u003cbr\u003eAin't No Rule Says Bodily Fluids Can't Be Seasoning\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between words, high retention, tightened delivery,\u003cbr\u003e  low tolerance for dead air, macro blocks cut sparingly\u003cbr\u003eCUT_CRITERIA: keep the bit, cut the padding, running gag preserved; redundancy trimmed,\u003cbr\u003e  housekeeping minimized, not fetishized, explanations cleaned for clarity\u003cbr\u003eAUTHENTICITY_POLICY: messy overlap left audible, stumbles tolerated for character, edits\u003cbr\u003e  mostly invisible despite density, playful rough edges stay in\u003cbr\u003eSTRUCTURE_TEMPLATE: produced open into raw conversation, question-by-question core\u003cbr\u003e  structure, midroll break with re-entry, produced credits\u002foutro button\u003cbr\u003eREORDER_ASSEMBLY: chronological core, tiny reorders only, reorder to fix explanation flow,\u003cbr\u003e  no thematic reshuffling\u003cbr\u003eSPEAKER_TREATMENT: symmetric polish across co-hosts, mutes used to clear interjections,\u003cbr\u003e  crosstalk kept as energy signal, primary speaker protected per moment\u003cbr\u003eRULES:\u003cbr\u003e- CUT host housekeeping ramble MUST: When it’s pre-roll logistics or personal setup that\u003cbr\u003e  doesn’t create a future callback or set stakes for the question segment.\u003cbr\u003e- CUT micro repetition within turn MUST: When a speaker repeats a word\u002fphrase for rhythm\u003cbr\u003e  but it doesn’t add comedic timing (e.g., repeated confirmations, repeated connectors),\u003cbr\u003e  especially inside longer monologues.\u003cbr\u003e- CUT science explanation scaffolding PREFER: When a speaker narrates the act of\u003cbr\u003e  explaining (\"this is a tangent,\" \"you don’t need this\") or includes side-calculation\u003cbr\u003e  chatter; keep only the minimum lines that make the explanation coherent.\u003cbr\u003e- CUT self-repair name pronunciation PREFER: When a mis-said name\u002fword is immediately\u003cbr\u003e  corrected and the correction doesn’t become a joke; keep only the clean version.\u003cbr\u003e- KEEP segment chronology MUST: Across question segments and major beats, unless there is\u003cbr\u003e  a clear continuity error that confuses the listener.\u003cbr\u003e- KEEP comedic escalation block PREFER: When both hosts are building a joke together\u003cbr\u003e  (riffing, piling synonyms, playful pedantry) and the energy depends on the back-and-\u003cbr\u003e  forth, even if it runs longer than strictly informational needs.\u003cbr\u003e- KEEP crosstalk laughter agreement PREFER: When overlap is short and functions as comedic\u003cbr\u003e  timing, affirmation, or rhythm that sells the rapport.\u003cbr\u003e- KEEP primary monologue run PREFER: When one host is in a long informational run; only\u003cbr\u003e  interrupt it with the other host’s questions\u002fjokes that actively clarify or heighten.\u003cbr\u003e- KEEP running gag refrain PREFER: When the repetition is functioning as a shared\u003cbr\u003e  bit\u002fcallback that’s actively escalating, even if it’s technically redundant.\u003cbr\u003e- MUTE underbed interjection MUST: When the non-primary host talks under the primary host\u003cbr\u003e  in a way that muddies comprehension; keep it only if it’s the punchline or required for\u003cbr\u003e  the bit.\u003cbr\u003e- REORDER definition before elaboration PREFER: When an explanation becomes clearer by\u003cbr\u003e  moving a short definitional line ahead of a longer breakdown, without changing the topic\u003cbr\u003e  or segment boundary.\u003cbr\u003e- REORDER setup before numeric detail PREFER: When a speaker starts number-crunching\u003cbr\u003e  before stating the governing concept\u002fgoal; move the goal\u002fconcept earlier and keep the\u003cbr\u003e  math where it supports it.","\u003cb\u003eTooth & Claw: True Stories of Animal Attacks\u003c\u002fb\u003e\u003cbr\u003ePunch the Lonely Monkey and Other Recent Animal Encounter News Stories\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-tightening between turns, low tolerance for dead air, keeps\u003cbr\u003e  full story arcs intact, let jokes breathe when landing\u003cbr\u003eCUT_CRITERIA: cuts tangents that don’t pay off, protects episode premise explanations,\u003cbr\u003e  banter stays if it heightens, prunes repetition inside explanations\u003cbr\u003eAUTHENTICITY_POLICY: crosstalk energy left audible, cleans clunkiness, not personality,\u003cbr\u003e  lightly polished but still chatty\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music bookends and stings, premise\u002fformat stated early, story\u003cbr\u003e  blocks then categories\u002fq&a, short transitions, minimal framing\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, no thematic reshuffling, uses inserts over\u003cbr\u003e  reorders\u003cbr\u003eSPEAKER_TREATMENT: heavy use of mutes for cleanup, not guest-sacred; equal pruning,\u003cbr\u003e  primary speaker clarity prioritized, overlap tolerated, clutter muted\u003cbr\u003eRULES:\u003cbr\u003e- CUT topic tangent MUST: When the conversation leaves the current animal story\u002fcategory\u003cbr\u003e  and does not return with a clear punchline, payoff, or usable transition within a few\u003cbr\u003e  turns.\u003cbr\u003e- CUT meta conversation about show or edit PREFER: When speakers comment on cutting,\u003cbr\u003e  preparing, screenshots, checking the tape, or recording logistics, unless it is itself\u003cbr\u003e  the joke that caps the bit.\u003cbr\u003e- CUT overlong precision or list detail PREFER: When names\u002fplaces\u002fstats spiral into\u003cbr\u003e  exhaustive detail that doesn’t change the takeaway; keep one representative detail and\u003cbr\u003e  the core point.\u003cbr\u003e- CUT self-interruption repair chain PREFER: When a speaker repeatedly revises phrasing\u003cbr\u003e  (re-saying the same setup) without adding new information; keep the cleanest pass.\u003cbr\u003e- KEEP chronological sequence MUST: Across story presentations and category segments; do\u003cbr\u003e  not reorder just to improve pacing if the existing flow is coherent.\u003cbr\u003e- KEEP host explainer block MUST: When the host is laying out the mechanics\u002fbiology\u002fsafety\u003cbr\u003e  rationale of a story; trim inside the block but do not remove the explanatory spine.\u003cbr\u003e- KEEP guest reaction that raises stakes PREFER: When a reaction is the comedic button or\u003cbr\u003e  emotional mirror to a grim\u002fabsurd moment; allow it even if it overlaps lightly.\u003cbr\u003e- KEEP running gag callback PREFER: When a callback stitches segments together (e.g.,\u003cbr\u003e  recurring bets\u002fteases\u002flabels) and helps move into the next story or category.\u003cbr\u003e- KEEP speaker correction exchange PREFER: When the correction itself becomes a bit (a\u003cbr\u003e  short argument\u002fclarification that’s entertaining and self-contained); trim length but\u003cbr\u003e  preserve the beat.\u003cbr\u003e- KEEP transition setup lines PREFER: When a speaker explicitly hands off to the next\u003cbr\u003e  story\u002fcategory; preserve at least one clear handoff line even if surrounding banter is\u003cbr\u003e  cut.\u003cbr\u003e- MUTE backchannel stack MUST: When multiple quick affirmations\u002flaughs overlap the main\u003cbr\u003e  speaker’s sentence and don’t add a distinct joke.\u003cbr\u003e- MUTE host or guest single word interjection PREFER: When the interjection is purely\u003cbr\u003e  rhythmic (“yeah,” “mm-hmm,” “nice”) and the main speaker’s line stands alone without it.\u003cbr\u003e- REORDER segment block AVOID: Only when a segment is referenced before it is explained in\u003cbr\u003e  a way that would confuse a first-time listener and cannot be fixed with a short insert.","\u003cb\u003eRude Tales of Magic\u003c\u002fb\u003e\u003cbr\u003eUNLOCKED! Rude Talks of Chatting for Nethermurk 36 & Campaign Wrap-Up\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between turns, large pre-roll blocks removed, pacing\u003cbr\u003e  tightened but beats added, macro cuts for topic focus\u003cbr\u003eCUT_CRITERIA: cut digressive riff-stacks early, keep character\u002fbit payoffs intact, protect\u003cbr\u003e  campaign-wrap clarity over chatter, trim meta-industry talk unless payoff\u003cbr\u003eAUTHENTICITY_POLICY: leaves in prickly interpersonal energy, allows some messy overlap,\u003cbr\u003e  polish via invisible micro-cuts, keeps playful antagonism intact\u003cbr\u003eSTRUCTURE_TEMPLATE: produced bookends, raw core, explicit segment handoffs to q&a, music\u003cbr\u003e  beds to mark beats, listener-question block as pillar\u003cbr\u003eREORDER_ASSEMBLY: chronology respected almost absolutely, assembly by trimming, not\u003cbr\u003e  reshuffling, no thematic re-stitching\u003cbr\u003eSPEAKER_TREATMENT: reaction-laughter muted to reduce clutter, host interjections\u003cbr\u003e  frequently suppressed, guest content more compressible than host, some crosstalk kept\u003cbr\u003e  for energy\u003cbr\u003eRULES:\u003cbr\u003e- CUT meta logistics break chatter MUST: When the conversation switches into break\u003cbr\u003e  management, platform\u002flogistics, or ‘pause point’ negotiation, unless it immediately\u003cbr\u003e  produces a usable joke that returns to the main thread.\u003cbr\u003e- CUT pre roll banter block MUST: At the very top of the session, remove extended free-\u003cbr\u003e  association and room-talk until the moment the show explicitly ‘starts’ (welcome\u002froll\u003cbr\u003e  call\u002fepisode framing).\u003cbr\u003e- CUT guest side story detour PREFER: When the guest drifts into an extended unrelated\u003cbr\u003e  anecdote and the host has already signaled a return to the episode’s main topic.\u003cbr\u003e- CUT riff restarts after landing PREFER: When the same joke premise restarts multiple\u003cbr\u003e  times (new examples, re-phrases) after the strongest version has already landed.\u003cbr\u003e- KEEP chronological order MUST: By default, preserve the original timeline of the\u003cbr\u003e  conversation; prefer cutting intervening material over moving later explanations\u003cbr\u003e  earlier.\u003cbr\u003e- KEEP bit explanation that closes loop PREFER: When a running bit is explicitly\u003cbr\u003e  ‘explained’ to the audience as a capstone\u002ffarewell and the speakers mark it as finished,\u003cbr\u003e  even if it’s meta and could be seen as over-explaining.\u003cbr\u003e- KEEP character arc reflection PREFER: When discussion clarifies character motivations,\u003cbr\u003e  endgame intentions, or emotional stakes of the story, even if it’s less punchline-dense.\u003cbr\u003e- KEEP crosstalk as comedic signal PREFER: When brief overlap functions as the joke\u003cbr\u003e  (shared realization, simultaneous agreement, comedic pile-on) and remains intelligible.\u003cbr\u003e- KEEP host expectation setting PREFER: When the host explicitly sets listener\u003cbr\u003e  expectations (what’s coming next, why something is being shared\u002fcut, how the segment\u003cbr\u003e  will work), even if it’s slightly redundant.\u003cbr\u003e- KEEP segment boundaries PREFER: When the speakers declare a new segment (e.g., moving to\u003cbr\u003e  listener questions), preserve that boundary and don’t interleave earlier leftovers into\u003cbr\u003e  the new segment.\u003cbr\u003e- MUTE non speaking reactions MUST: When one speaker is delivering a sustained thought or\u003cbr\u003e  setup, mute the other speaker’s laughter\u002f‘yeah’\u002faside comments if they compete with the\u003cbr\u003e  line and don’t create a distinct punchline.\u003cbr\u003e- MUTE host background asides PREFER: When the host is talking over\u002funder the guest (or\u003cbr\u003e  vice versa) with short editorializing remarks that aren’t necessary to understand the\u003cbr\u003e  exchange.\u003cbr\u003e- REORDER only for comprehension fix AVOID: Only if a setup\u002fpunchline pair is separated by\u003cbr\u003e  an accidental interruption and the meaning is lost without adjacency; keep shifts\u003cbr\u003e  minimal and local.","\u003cb\u003ePodcast Is Broken\u003c\u002fb\u003e\u003cbr\u003eScience Explains How Trump Got Elected\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between clauses, tight pause control, then pad back,\u003cbr\u003e  keeps most long argument arcs, macro cuts only for true detours\u003cbr\u003eCUT_CRITERIA: off-topic warmup banter is expendable, long pop-culture digressions get\u003cbr\u003e  dropped, running bits kept when recurring, protects clarifying caveats on intent\u003cbr\u003eAUTHENTICITY_POLICY: conversational, not over-sanitized, selective cleanup of harsh\u003cbr\u003e  spikes, leaves some overlap for energy\u003cbr\u003eSTRUCTURE_TEMPLATE: produced branded cold open, early thesis + episode framing, end-of-\u003cbr\u003e  episode explicit summary, produced outro call-to-action\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with tiny nudges, reorders used for punch\u002fflow, no\u003cbr\u003e  thematic reshuffling\u003cbr\u003eSPEAKER_TREATMENT: suppress interjections during monologues, mutes more than hard-cuts\u003cbr\u003e  overlap, asymmetric pruning to reduce clutter\u003cbr\u003eRULES:\u003cbr\u003e- CUT pre-topic host banter MUST: When it’s personal chit-chat (weather, schedules,\u003cbr\u003e  hangout talk) and does not set up the episode’s first thesis beat.\u003cbr\u003e- CUT repetitive restarts inside point MUST: When a speaker circles the same sentence stem\u003cbr\u003e  repeatedly (e.g., stacked ‘I mean \u002f you know \u002f like’ starts) without adding a new claim.\u003cbr\u003e- CUT extended pop culture explainer PREFER: When a show\u002fbook\u002freference requires a multi-\u003cbr\u003e  step explanation for the co-host\u002faudience and the episode can proceed without it.\u003cbr\u003e- CUT split word interruption PREFER: When a short interjection breaks another speaker’s\u003cbr\u003e  phrase mid-thought and the episode reads better without acknowledging it.\u003cbr\u003e- KEEP values or intent clarification MUST: When a speaker explicitly distinguishes the\u003cbr\u003e  critique from education\u002fclass\u002fintelligence snobbery or otherwise narrows what they mean\u003cbr\u003e  to avoid unfair generalization.\u003cbr\u003e- KEEP crosstalk as energy PREFER: When the overlap is part of a shared laugh\u002fbit and does\u003cbr\u003e  not obscure key wording.\u003cbr\u003e- KEEP running gag callbacks PREFER: When a joke label\u002fbit is re-used across the segment\u003cbr\u003e  as a callback that helps the listener track the argument (even if it’s slightly silly).\u003cbr\u003e- MUTE backchannel overlap MUST: When the non-primary speaker’s quick agreement\u002fnoise\u003cbr\u003e  overlaps a continuous sentence and does not add new information or a joke.\u003cbr\u003e- REORDER topic blocks AVOID: When the move would materially change the conversation’s\u003cbr\u003e  timeline (new topic sequencing rather than a local fix).\u003cbr\u003e- REORDER micro block for comedic button PREFER: When moving a short exchange (seconds)\u003cbr\u003e  makes a punchline\u002ftag land cleanly or restores a smoother host-to-host handoff.","\u003cb\u003eFantasy FanFellas\u003c\u002fb\u003e\u003cbr\u003eEp 2: Well of Ascension Chapters 7-11\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between turns, moderate runtime reduction overall,\u003cbr\u003e  silence trimmed, not sterilized\u003cbr\u003eCUT_CRITERIA: cuts redo-takes and edit-room talk, protects running gags and bits, drops\u003cbr\u003e  riffs that stall analysis\u003cbr\u003eAUTHENTICITY_POLICY: keeps swearing and candid reactions, cleans heavy stumbling, not\u003cbr\u003e  texture, overlap allowed for momentum\u003cbr\u003eSTRUCTURE_TEMPLATE: music-bed open, then housekeeping, recap block before deep-dive, outro\u003cbr\u003e  includes awards\u002fpredictions, ends with a blooper stinger\u003cbr\u003eREORDER_ASSEMBLY: chronological core, strategic reorders, blooper snippets moved to\u003cbr\u003e  stinger, micro-reorders to fix continuity\u003cbr\u003eSPEAKER_TREATMENT: balanced treatment across co-hosts, mutes interjections during\u003cbr\u003e  narration, keeps energetic crosstalk when additive\u003cbr\u003eRULES:\u003cbr\u003e- CUT redo takes and mic fixups MUST: Whenever either speaker restarts a line due to\u003cbr\u003e  flubs, connection issues, or \"say that again\" logistics; keep only the clean best take\u003cbr\u003e  (especially in intro\u002foutro or epigraph reads).\u003cbr\u003e- CUT edit process meta PREFER: When speakers reference the edit itself (e.g., \"I’ll work\u003cbr\u003e  around it in the edit\", debating what to cut\u002fkeep) unless the meta-comment is itself the\u003cbr\u003e  punchline and immediately pays off.\u003cbr\u003e- CUT extended comedy riff PREFER: If a tangent\u002fanalogy runs past its first payoff and\u003cbr\u003e  starts delaying the next story beat, recap bullet, or textual explanation.\u003cbr\u003e- CUT role confusion back and forth PREFER: When a misunderstanding triggers a short loop\u003cbr\u003e  of repetitive clarification that doesn’t add a new insight (especially around minor\u003cbr\u003e  details).\u003cbr\u003e- KEEP crosstalk reaction overlap PREFER: When the overlap is\u003cbr\u003e  laughter\u002faffirmation\u002ftaglines that heighten energy or help land the bit, and\u003cbr\u003e  intelligibility remains acceptable.\u003cbr\u003e- KEEP running gag callback PREFER: When a recurring bit is invoked to frame the\u003cbr\u003e  discussion (e.g., a catchphrase used as a lens on the chapter) and it does not block the\u003cbr\u003e  next substantive beat.\u003cbr\u003e- KEEP scene quote plus interpretation PREFER: When a quote is used to set up the hosts’\u003cbr\u003e  interpretation; preserve enough lead-in and follow-through that the quote lands and the\u003cbr\u003e  takeaway is clear, even if minor side-comments around it are trimmed.\u003cbr\u003e- MUTE secondary interruption MUST: When one host is delivering a continuous\u003cbr\u003e  recap\u002fexplanation and the other interjects with a clarifying aside that derails timing\u003cbr\u003e  or creates clutter; mute the interjection rather than cutting the main line.\u003cbr\u003e- REORDER substantive topic blocks AVOID: If the change would significantly alter the\u003cbr\u003e  conversation timeline or argument build; prefer leaving it in place and trimming\u003cbr\u003e  instead.\u003cbr\u003e- REORDER continuity patch MUST: When a cut creates a logical or grammatical jump, shift a\u003cbr\u003e  nearby micro-phrase\u002fsentence to restore continuity rather than leaving an\u003cbr\u003e  audible\u002fsemantic seam.\u003cbr\u003e- REORDER blooper button PREFER: When there is a clean, funny flub\u002ffalse-start that would\u003cbr\u003e  bog down the main segment, move it to a short end-of-episode stinger after the formal\u003cbr\u003e  outro."],"x":{"dtype":"f4","bdata":"yd2XQMTBlUC9YaBA7rmdQKdxlUC6YptAlwqbQG4mpkDTPZ1AoTGhQHVwm0A="},"y":{"dtype":"f4","bdata":"QKB4QZxLfUForIBBQJR0QRn0fUHfhnlBTtV9Qa0ff0Es+HxBNgF8QbtDdUE="},"type":"scatter"},{"hoverinfo":"skip","line":{"color":"#ff7f0e","dash":"dot","width":1.5},"mode":"lines","showlegend":false,"x":{"dtype":"f4","bdata":"7rmdQG4mpkC9YaBAp3GVQMndl0B1cJtA7rmdQA=="},"y":{"dtype":"f4","bdata":"QJR0Qa0ff0ForIBBGfR9QUCgeEG7Q3VBQJR0QQ=="},"type":"scatter"},{"hoverinfo":"skip","mode":"text","showlegend":false,"text":["Template-Driven Editorial Rhythm"],"textfont":{"color":"#ff7f0e","size":9},"x":[4.885303974151611],"y":[15.718883514404297],"type":"scatter"},{"hoverinfo":"text","marker":{"color":"#2ca02c","line":{"color":"white","width":0.5},"size":8},"mode":"markers","name":"Continuity-Preserving Editing","text":["\u003cb\u003eSome Work, All Play\u003c\u002fb\u003e\u003cbr\u003e296. How To Use Electrolytes, Zone 2 Problems, Strange VO2 Max Measures, The Weird World of Probiotics, and AI Training Thoughts!\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: very high session retention, light-touch pacing, long takes, micro-shaves\u003cbr\u003e  over big lifts\u003cbr\u003eCUT_CRITERIA: keep riffs and messy humor, cut redundancy inside explanations, trim only\u003cbr\u003e  the unneeded clause\u003cbr\u003eAUTHENTICITY_POLICY: rough edges mostly stay in, profanity and candor retained, edits aim\u003cbr\u003e  to be invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: long cold open banter, loose topic rundown early, ads woven into the\u003cbr\u003e  flow\u003cbr\u003eREORDER_ASSEMBLY: chronology is essentially sacred, no thematic reshuffling, assembly\u003cbr\u003e  stays conversation-real\u003cbr\u003eSPEAKER_TREATMENT: single-voice continuity protected, mute beats cutting whole thought,\u003cbr\u003e  let the host run long\u003cbr\u003eRULES:\u003cbr\u003e- CUT redundant explanation clause MUST: When a scientific or practical point is\u003cbr\u003e  immediately restated with no added nuance (same claim, new wording).\u003cbr\u003e- CUT host self interrupt PREFER: When it’s a quick derail (“wait—actually…”) that doesn’t\u003cbr\u003e  add a new idea, and the main sentence reads clean without it.\u003cbr\u003e- CUT mini aside with no payoff PREFER: When an aside introduces a new study\u002fexample but\u003cbr\u003e  is not integrated into the current takeaway (i.e., it teases depth but doesn’t cash it).\u003cbr\u003e- CUT single word speedbump PREFER: When a lone connector word (“in\u002fway\u002fand…”) creates a\u003cbr\u003e  stumble or awkward cadence and removing it doesn’t change meaning.\u003cbr\u003e- KEEP chronological order MUST: By default across the full episode, even when tangents\u003cbr\u003e  are long; prefer trimming within the tangent over moving it elsewhere.\u003cbr\u003e- KEEP comedic ramble PREFER: When it reinforces the host’s voice or becomes a running\u003cbr\u003e  bit, even if it’s not advancing the main topic.\u003cbr\u003e- KEEP host long monologue PREFER: When it’s an explanation\u002fargument with internal buildup\u003cbr\u003e  (science primers, nuanced caveats), even if it’s dense.\u003cbr\u003e- MUTE host interjection PREFER: When a brief interjection would force a larger structural\u003cbr\u003e  cut, but silencing it preserves continuity of the surrounding thought.\u003cbr\u003e- MUTE single sentence fragment PREFER: When removing it improves safety\u002fcleanliness but\u003cbr\u003e  cutting around it would create an audible jump or require restructuring multiple\u003cbr\u003e  adjacent lines.\u003cbr\u003e- REORDER short clarifying block AVOID: Only if a cut creates a dangling reference that\u003cbr\u003e  cannot be solved by an external pickup line or a local trim.","\u003cb\u003eSome Work, All Play\u003c\u002fb\u003e\u003cbr\u003e300. A Shocking Disgrace at the US Half Marathon Champs and What Needs To Happen Next, Learning From Elite Cycling Training, and Optimism Science!\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-full-session retention, micro-shaves, not segment cuts, lets long rants\u003cbr\u003e  breathe, low silence-trim intensity\u003cbr\u003eCUT_CRITERIA: cuts are almost all micro-fixes, keeps spicy\u002firreverent banter, preserves\u003cbr\u003e  emotional\u002fpassionate stretches, trims meta-stumbles mid-thought\u003cbr\u003eAUTHENTICITY_POLICY: raw conversational texture stays, profanity left in for honesty,\u003cbr\u003e  minimal de-ummification footprint, edits aim to be invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: no cold-open; start in-scene, long lead topic before sponsor, loose\u003cbr\u003e  magazine-show back half, cta\u002fsponsor reads not compressed\u003cbr\u003eREORDER_ASSEMBLY: chronology is effectively sacred, no thematic reshuffling, assembly\u003cbr\u003e  fixes happen via micro-cuts, continuity over remixing\u003cbr\u003eSPEAKER_TREATMENT: aggressively ducks one speaker, prefers mute over crosstalk, protects\u003cbr\u003e  the other voice’s run, host side-comments are expendable\u003cbr\u003eRULES:\u003cbr\u003e- CUT duplicate opening exclamation PREFER: At the very top of the episode when an initial\u003cbr\u003e  exclamation is immediately repeated, leaving only one instance to start cleanly.\u003cbr\u003e- CUT host aside during serious point PREFER: When a quick aside undercuts clarity during\u003cbr\u003e  a serious\u002fexplanatory passage and can be removed without changing the message.\u003cbr\u003e- CUT speculation branch PREFER: When the speaker veers into short speculative side-\u003cbr\u003e  branches (e.g., guessing payment mechanics) that don’t advance the main point and can be\u003cbr\u003e  removed without harming coherence.\u003cbr\u003e- CUT train of thought derail PREFER: When a speaker explicitly loses the thread (“lost my\u003cbr\u003e  train of thought”) and the surrounding sentences don’t add new information or payoff.\u003cbr\u003e- KEEP chronological order MUST: Throughout the episode unless there is an explicit,\u003cbr\u003e  listener-facing continuity problem that cannot be solved with a local cut\u002fpatch.\u003cbr\u003e- KEEP primary speaker emotional arc PREFER: When the speaker is building an emotional or\u003cbr\u003e  persuasive argument; avoid chopping it into smaller pieces even if it runs long.\u003cbr\u003e- KEEP provane or risque banter PREFER: When it functions as an on-brand comedic beat or\u003cbr\u003e  relationship texture rather than pure filler.\u003cbr\u003e- MUTE host interjection MUST: When a secondary interjection overlaps the primary\u003cbr\u003e  speaker’s sentence and doesn’t add essential meaning; prioritize the uninterrupted main\u003cbr\u003e  line.\u003cbr\u003e- REORDER topic blocks AVOID: Only if a segment is clearly referenced before it occurs in\u003cbr\u003e  a way that becomes confusing after cuts; otherwise avoid.","\u003cb\u003eThis Week in Virology\u003c\u002fb\u003e\u003cbr\u003eTWiV 1301: Lost in giant virus translation\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-full-session retention, relentless micro-shaves, no macro cuts, tight\u003cbr\u003e  pacing without shortening arcs, silence trimmed, then re-padded\u003cbr\u003eCUT_CRITERIA: cuts for friction, not content, banter and tangents largely protected,\u003cbr\u003e  single-word deletions to de-duplicate, housekeeping excised, talk preserved\u003cbr\u003eAUTHENTICITY_POLICY: raw conversation feel preserved, crosstalk and laughter kept,\u003cbr\u003e  stumbles tolerated if intelligible, edits made mostly invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: lightly produced cold open, recorded intro follows immediately, long\u003cbr\u003e  unbroken main discussion blocks, minimal produced transitions\u003cbr\u003eREORDER_ASSEMBLY: chronology is effectively sacred, no thematic restructuring, assembly\u003cbr\u003e  changes avoided\u003cbr\u003eSPEAKER_TREATMENT: mute-over-cut to manage overlap, hosts shaved more than guests,\u003cbr\u003e  backchannels suppressed under leads, crosstalk energy selectively retained\u003cbr\u003eRULES:\u003cbr\u003e- CUT host housekeeping\u002fmeta MUST: When it is pre-roll coordination, scheduling, or\u003cbr\u003e  getting-started chatter that doesn’t serve as a listener-facing intro beat.\u003cbr\u003e- CUT single word redundancy MUST: When a word is repeated, restarted, or echoed in a way\u003cbr\u003e  that adds no meaning (including stray discourse tokens inside otherwise-kept sentences).\u003cbr\u003e- CUT host repetition\u002fself-edit PREFER: When the host repeats a phrase or restarts mid-\u003cbr\u003e  sentence without adding a new point, unless it is needed to tee up the next speaker.\u003cbr\u003e- KEEP chronological topic flow MUST: When the conversation naturally develops through\u003cbr\u003e  questions and follow-ups; protect the original causality of who responds to whom.\u003cbr\u003e- KEEP crosstalk laugh\u002frapport PREFER: When overlap communicates shared humor or momentum\u003cbr\u003e  and the main line remains understandable.\u003cbr\u003e- KEEP tangent\u002fbanter block PREFER: When it sustains conversational chemistry or sets up a\u003cbr\u003e  return to the main science topic within the same flow, even if it runs long.\u003cbr\u003e- KEEP technical detail density PREFER: When the detail is the point of the segment\u003cbr\u003e  (methods, mechanisms, numbers), even if it’s long-winded; only micro-trim for clarity.\u003cbr\u003e- MUTE backchannel\u002fside comment MUST: When a non-leading speaker interjects during another\u003cbr\u003e  speaker’s explanation and it competes with intelligibility (especially agreement noises\u003cbr\u003e  or short confirmations).\u003cbr\u003e- REORDER segment block AVOID: Only when required to repair a clear structural failure\u003cbr\u003e  (e.g., a false start intro) and the moved block remains contiguous and context-complete.","\u003cb\u003eSome Work, All Play\u003c\u002fb\u003e\u003cbr\u003e297. Long Runs Explained, The Training Shoe We Love, Black Canyon 100k Predictions, Shockwave Therapy, and Lindsey Vonn’s Courage!\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-full-session retention, macro trims over micro-shaves, long unbroken\u003cbr\u003e  riffs allowed, silence mostly left alone\u003cbr\u003eCUT_CRITERIA: cut meta resets and navigation, cut the messy first take, keep edgy candor\u003cbr\u003e  and bits, trim overspecific personal-medical detail\u003cbr\u003eAUTHENTICITY_POLICY: profanity and raw humor retained, messy conversational edges\u003cbr\u003e  tolerated, fix clarity via patches, not polish, minimal \"radio-host\" smoothing\u003cbr\u003eSTRUCTURE_TEMPLATE: recorded-order hang, lightly guided, in-convo topic pivots, not\u003cbr\u003e  chapters, promos embedded as spoken blocks, no produced bookend framing\u003cbr\u003eREORDER_ASSEMBLY: chronology respected almost absolutely, no thematic reshuffling,\u003cbr\u003e  assembly is trim-only\u003cbr\u003eSPEAKER_TREATMENT: mute interruptions to protect a run, let the active speaker finish,\u003cbr\u003e  asymmetric cleanup: interrupter loses, chemistry preserved over turn-taking purity\u003cbr\u003eRULES:\u003cbr\u003e- CUT meta navigation MUST: When speakers verbally negotiate the show flow (\"let’s get\u003cbr\u003e  onto the episode,\" \"we should\u002fshouldn’t cover X,\" \"give me your takeaways\") and the\u003cbr\u003e  actual next segment begins immediately anyway.\u003cbr\u003e- CUT first take explanation PREFER: When a point is made in a rambling\u002funclear way and\u003cbr\u003e  then re-stated cleanly right after; keep only the cleaner version even if it means\u003cbr\u003e  dropping the original emotional texture.\u003cbr\u003e- CUT interruption chain PREFER: When interruptions snowball into a side-thread that\u003cbr\u003e  delays the return to the promised segment (topic pivot, Q&A, news item).\u003cbr\u003e- CUT overspecific personal medical details PREFER: When the conversation shifts from\u003cbr\u003e  generalizable guidance\u002fexperience into brand\u002fmodel-level or blow-by-blow personal\u003cbr\u003e  medical specifics that don’t change the takeaway.\u003cbr\u003e- KEEP chronological order MUST: Across all core discussion segments, unless a reorder is\u003cbr\u003e  the only way to resolve a clear comprehension problem created by the cut.\u003cbr\u003e- KEEP off color banter PREFER: When the crude\u002fprofane joke is part of the hosts’\u003cbr\u003e  chemistry and does not interrupt a key informational sequence (e.g., it lands as a\u003cbr\u003e  button or quick back-and-forth).\u003cbr\u003e- KEEP overlap for comedy button PREFER: When the overlap functions as a quick\u003cbr\u003e  punchline\u002fback-and-forth tag at the end of a beat and does not obscure key words.\u003cbr\u003e- KEEP sponsor or promo block PREFER: When a sponsor\u002fpromo read is underway; only cut\u003cbr\u003e  obvious tangents or stumbles, otherwise let the read play as a coherent block.\u003cbr\u003e- MUTE interjecting speaker MUST: When an interjection overlaps a sustained explanation\u003cbr\u003e  and would force a choppy edit to maintain intelligibility; keep the primary speaker’s\u003cbr\u003e  uninterrupted arc.\u003cbr\u003e- REORDER clarifying line AVOID: Only when a single short line (definition\u002fidentifier)\u003cbr\u003e  recorded later is needed to prevent listener confusion in the moment, and can be moved\u003cbr\u003e  with minimal temporal disruption.","\u003cb\u003eSome Work, All Play\u003c\u002fb\u003e\u003cbr\u003e299. The Best Underdog Story, LT1 v. LT2 workouts, 3 Tips for Health, Science on Supershoes and Slower Paces, and Structuring Training Weeks!\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light-touch runtime compression, macro-snips over micro-shaves, long host\u003cbr\u003e  riffs usually intact, near-zero silence surgery\u003cbr\u003eCUT_CRITERIA: protects crude\u002fcomic authenticity, cuts only when a bit turns risky, keeps\u003cbr\u003e  earnest vulnerability adjacent to jokes, housekeeping trimmed when it bogs\u003cbr\u003eAUTHENTICITY_POLICY: leaves in messiness + meta-talk, profanity retained as voice,\u003cbr\u003e  stumbles only lightly cleaned, editing hand mostly invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: loose banter-heavy opening, agenda rundown before main topics,\u003cbr\u003e  news\u002fstudies block then q&a, promos embedded in main body\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with rare surgical reorder, reorders used to clarify,\u003cbr\u003e  not reshape, small shifts (\u003c~1 minute)\u003cbr\u003eSPEAKER_TREATMENT: single-voice episode: cadence protected, allows self-interruptions and\u003cbr\u003e  side-comments, minimal muting; trims are content-based\u003cbr\u003eRULES:\u003cbr\u003e- CUT politics or firearms escalation bit MUST: When a joke drifts into polarizing\u003cbr\u003e  political framing or violent imagery that could be clipped out of context, even if it is\u003cbr\u003e  tagged as satire.\u003cbr\u003e- CUT host spiral PREFER: When the host explicitly loses the thread and the bit continues\u003cbr\u003e  without payoff (restarts, ‘where was I going,’ repeated re-entries).\u003cbr\u003e- CUT overlong analogy or joke derail PREFER: When an extended analogy\u002fbit visibly loses\u003cbr\u003e  the thread (multiple self-admitted ‘where am I going’ moments) and delays return to the\u003cbr\u003e  promised segment.\u003cbr\u003e- CUT promo housekeeping ramble PREFER: When sponsor\u002fPatreon\u002ftool plugs sprawl into\u003cbr\u003e  unstructured tangents or duplicate information already stated in a cleaner plug\u003cbr\u003e  elsewhere in the episode.\u003cbr\u003e- KEEP chronological flow MUST: When the existing sequence already tracks emotionally and\u003cbr\u003e  logically, even if it includes minor detours or spontaneity.\u003cbr\u003e- KEEP self interruption and asides PREFER: When they add humor, warmth, or ‘thinking in\u003cbr\u003e  real time’ texture without breaking comprehension of the main point.\u003cbr\u003e- KEEP vulgar banter PREFER: When it is clearly part of the show’s comedic identity and is\u003cbr\u003e  interwoven with relationship\u002fcharacter beats, even if it runs long or includes\u003cbr\u003e  profanity.\u003cbr\u003e- KEEP vulnerability reflection PREFER: When a sincere emotional\u002fmeaning-making passage\u003cbr\u003e  follows or contrasts with humor (i.e., the ‘why it matters’ moment), unless it becomes\u003cbr\u003e  repetitive.\u003cbr\u003e- MUTE mic artifact or background noise PREFER: Only for brief, clearly non-speech\u003cbr\u003e  artifacts that distract under an otherwise kept line; do not broadly noise-gate natural\u003cbr\u003e  room tone.\u003cbr\u003e- REORDER study quote or definition AVOID: Only if the reorder is local (roughly within\u003cbr\u003e  the same segment) and does not change the meaning\u002ftone—aim for ‘same conversation,\u003cbr\u003e  cleaner logic.’\u003cbr\u003e- REORDER explanatory block PREFER: When a later clarifying sentence\u002fquote is required to\u003cbr\u003e  understand the surrounding commentary and moving it earlier resolves a comprehension\u003cbr\u003e  stumble.","\u003cb\u003eSome Work, All Play\u003c\u002fb\u003e\u003cbr\u003e298. Ultra Training Philosophy, What Shorter Distances Can Learn from Ultras, Black Canyon 100k Records, a Weird Brain Study, and Metabolic Flexibility!\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light-touch, high-retention edit, long riffs survive intact, low silence\u003cbr\u003e  intolerance\u003cbr\u003eCUT_CRITERIA: cuts for clarity, not cleanliness, keeps edgy jokes and profanity, minimal\u003cbr\u003e  pruning of tangents\u003cbr\u003eAUTHENTICITY_POLICY: very raw conversational texture, unfiltered tone stays in, polish\u003cbr\u003e  added only to fix\u003cbr\u003eSTRUCTURE_TEMPLATE: warm long intro banter, sponsor\u002fpromos woven mid-convo, roadmap then\u003cbr\u003e  free-flow chapters\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, no thematic reshuffling, fix with trims, not\u003cbr\u003e  reorders\u003cbr\u003eSPEAKER_TREATMENT: protect the main speaker’s run, mute interjections to preserve flow,\u003cbr\u003e  asymmetric cleanup during explanations\u003cbr\u003eRULES:\u003cbr\u003e- CUT structure confusion meta MUST: When speakers argue about the outline, numbering, or\u003cbr\u003e  episode organization in a way that doesn’t add a new insight for the listener.\u003cbr\u003e- CUT deep dive sidecorridor PREFER: When a technical aside (e.g., study\u002fprotocol\u003cbr\u003e  provenance) interrupts the main claim and can be removed without weakening the takeaway.\u003cbr\u003e- KEEP back and forth banter PREFER: During the intro\u002fpersonal segments, even when it’s\u003cbr\u003e  indulgent, as long as it sustains momentum and feels like the show’s identity.\u003cbr\u003e- KEEP emotional vulnerability PREFER: When the speaker connects performance talk to\u003cbr\u003e  mental health\u002finjury\u002frecovery in a way that raises stakes or explains motivation, even\u003cbr\u003e  if it runs long.\u003cbr\u003e- KEEP raunchy humor PREFER: When the humor is character-defining banter that reinforces\u003cbr\u003e  host\u002fco-host chemistry, even if it’s crude or could be considered ‘too much’.\u003cbr\u003e- MUTE speaker interjection PREFER: During sustained technical explanation, when an\u003cbr\u003e  interjection doesn’t change the point and would break the listener’s comprehension.\u003cbr\u003e- REORDER topic block AVOID: Only when a continuity error would otherwise confuse\u003cbr\u003e  listeners (e.g., referencing an explanation that was cut); prefer a pickup line over a\u003cbr\u003e  reorder when possible."],"x":{"dtype":"f4","bdata":"nLGxQKKau0C+SMhA2AHAQOf0rEAl67RA"},"y":{"dtype":"f4","bdata":"Nn2AQeqEgkGMjYBB776BQbaZgUHQKYJB"},"type":"scatter"},{"hoverinfo":"skip","line":{"color":"#2ca02c","dash":"dot","width":1.5},"mode":"lines","showlegend":false,"x":{"dtype":"f4","bdata":"vkjIQKKau0Al67RA5\u002fSsQJyxsUC+SMhA"},"y":{"dtype":"f4","bdata":"jI2AQeqEgkHQKYJBtpmBQTZ9gEGMjYBB"},"type":"scatter"},{"hoverinfo":"skip","mode":"text","showlegend":false,"text":["Continuity-Preserving Editing"],"textfont":{"color":"#2ca02c","size":9},"x":[5.788877010345459],"y":[16.188974380493164],"type":"scatter"},{"hoverinfo":"text","marker":{"color":"#d3d3d3","size":5,"symbol":"x"},"mode":"markers","name":"noise","text":["\u003cb\u003eThe Two-Minute Briefing\u003c\u002fb\u003e\u003cbr\u003eStarmer on the brink: What Greens' extremist victory means for Britain\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro sections cut for pace, frequent micro-shaves mid-thought, low focus on\u003cbr\u003e  silence trimming, targets sub-hour density\u003cbr\u003eCUT_CRITERIA: cuts meta-production talk aggressively, retakes removed, clean version kept,\u003cbr\u003e  keeps polemical through-lines intact, comedy asides survive when quick\u003cbr\u003eAUTHENTICITY_POLICY: polished content, not sterile, crosstalk left in for energy,\u003cbr\u003e  occasional filler tolerated, uses patched clean reads\u002fclips\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open with bed, evidence clips embedded throughout, early\u003cbr\u003e  facts, then interpretation, explicit q&a chapter\u003cbr\u003eREORDER_ASSEMBLY: narrative clarity over chronology, front-load the results\u002ffacts block,\u003cbr\u003e  chapter-like block shuffling, large temporal moves acceptable\u003cbr\u003eSPEAKER_TREATMENT: hosts heavily trimmed, content protected, mute used to hide off-mic\u003cbr\u003e  reads, backchannels often retained, balance time across co-hosts\u003cbr\u003eRULES:\u003cbr\u003e- CUT host retakes MUST: When a host explicitly resets a line (‘say it again’, ‘I’ll do\u003cbr\u003e  that again’) and a cleaner version exists elsewhere in the session or can be replaced by\u003cbr\u003e  an insert.\u003cbr\u003e- CUT production chatter MUST: Whenever speakers coordinate the show (what to say next,\u003cbr\u003e  how to link, asking for inserts, ‘do it again’), even if it occurs mid-conversation.\u003cbr\u003e- CUT real life interruption MUST: When an external interruption breaks the on-air stance\u003cbr\u003e  (phone calls, handling deliveries\u002fpeople in room), unless it is itself the intended\u003cbr\u003e  story beat.\u003cbr\u003e- CUT host ramble after peak PREFER: After a strong peak line or conclusion, remove\u003cbr\u003e  trailing reiteration that re-litigates the same point without adding a new fact or turn.\u003cbr\u003e- CUT overlong example stack PREFER: When multiple similar examples are used to make the\u003cbr\u003e  same point; keep the punchiest one and move on.\u003cbr\u003e- KEEP argument arc PREFER: When a speaker is building a multi-sentence claim with stakes\u003cbr\u003e  (diagnosis → examples → conclusion), even if the tone is ranty or repetitive; trim only\u003cbr\u003e  obvious resets without collapsing the spine.\u003cbr\u003e- KEEP local continuity PREFER: Within a given argument exchange (point → rebuttal →\u003cbr\u003e  resolution), avoid reordering that would separate the immediate response from what\u003cbr\u003e  triggered it.\u003cbr\u003e- KEEP overlap backchannel PREFER: When brief overlap (‘yeah’, ‘mm-hm’) adds momentum and\u003cbr\u003e  does not obscure intelligibility of the main speaker.\u003cbr\u003e- KEEP quick gag button PREFER: When a joke is a short button that releases tension or\u003cbr\u003e  caps a factual rundown, provided it doesn’t open a new tangent.\u003cbr\u003e- MUTE host side read MUST: When a host speaks as if to a producer or to themselves (note-\u003cbr\u003e  reading, insert instructions, ‘what do I say about that?’) while the other host’s on-air\u003cbr\u003e  thread should continue.\u003cbr\u003e- REORDER facts rundown MUST: When the raw session introduces commentary before the\u003cbr\u003e  numbers\u002fdefinitions, move the results\u002fdefinitions earlier so later claims have context.\u003cbr\u003e- REORDER section intro lines MUST: When speakers record multiple takes of a segment\u003cbr\u003e  handoff (e.g., moving into Q&A), select the cleanest handoff and relocate it to the true\u003cbr\u003e  start of that section.\u003cbr\u003e- REORDER listener questions block PREFER: When questions are used to broaden scope,\u003cbr\u003e  cluster them after the main narrative diagnosis so the episode doesn’t feel like it’s\u003cbr\u003e  zig-zagging.","\u003cb\u003eCall Me Back - with Dan Senor\u003c\u002fb\u003e\u003cbr\u003ePurim and Destiny - with Rachel Goldberg Polin\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between clauses, low pause tolerance, few pads,\u003cbr\u003e  macro-block drops for pacing, prefers dense, continuous forward motion\u003cbr\u003eCUT_CRITERIA: keeps the teaching; trims the banter, cuts uncertainty\u002fwaffling around\u003cbr\u003e  facts, removes end-of-episode hangout chatter, preserves vivid story beats and analogies\u003cbr\u003eAUTHENTICITY_POLICY: polished, broadcast-like cleanup, hedges removed more than preserved,\u003cbr\u003e  keeps personality, cuts clutter, minimal tolerance for messy phrasing\u003cbr\u003eSTRUCTURE_TEMPLATE: thematic cold open monologue hook, produced news\u002fcontext intro block,\u003cbr\u003e  long uninterrupted core conversation, produced cta\u002fcredits outro\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved inside the main, front-loads a highlight as hook,\u003cbr\u003e  reorders via produced framing, not shuffles\u003cbr\u003eSPEAKER_TREATMENT: guest\u002fteacher protected; host heavily reduced, backchannels suppressed\u003cbr\u003e  under long answers, host kept as guide-rail questions\u003cbr\u003eRULES:\u003cbr\u003e- CUT host self-repair or meta MUST: When the host comments on the recording\u002fediting\u003cbr\u003e  process or asks to include\u002fexclude something, unless it directly sets up the next\u003cbr\u003e  substantive question.\u003cbr\u003e- CUT outro hangout banter MUST: When the conversation has already delivered the main\u003cbr\u003e  takeaway and the speakers shift into casual riffing, personal updates, or extended\u003cbr\u003e  goodbye\u002fcoordination talk.\u003cbr\u003e- CUT fact uncertainty spiral PREFER: When a speaker begins a speculative answer and then\u003cbr\u003e  retreats into disclaimers (e.g., not sure \u002f don’t quote me) without landing a useful,\u003cbr\u003e  accurate point.\u003cbr\u003e- CUT host ramble PREFER: When the host is expanding on a point the guest has already made\u003cbr\u003e  (restating, over-framing, or adding a secondary tangent) and it does not prompt a new\u003cbr\u003e  guest explanation.\u003cbr\u003e- KEEP chronological main flow MUST: During the main discussion, unless reordering is\u003cbr\u003e  required to fix confusion created by an edit (e.g., a removed setup).\u003cbr\u003e- KEEP story block MUST: When the guest is in a structured, step-by-step teaching run\u003cbr\u003e  (timeline setup, chapter-by-chapter plot, list of practices) even if the pacing is fast\u003cbr\u003e  or the detail level is high.\u003cbr\u003e- KEEP host pinpoint question PREFER: When the host’s line sharpens the thesis, defines a\u003cbr\u003e  term for listeners, or forces a concrete answer that advances the teaching.\u003cbr\u003e- KEEP memorable analogy or line PREFER: When a metaphor\u002fone-liner cleanly crystallizes\u003cbr\u003e  the lesson and can serve as a future callback or thematic hook.\u003cbr\u003e- MUTE host backchannel MUST: When the guest is mid-explanation and the host’s\u003cbr\u003e  interjection is only affirmation (mm-hmm, right, wow) or overlapping encouragement.\u003cbr\u003e- REORDER highlight hook PREFER: When there is a later, self-contained thesis passage that\u003cbr\u00
