, host affirmations often muted, single-host interview feel preserved\u003cbr\u003eRULES:\u003cbr\u003e- CUT recording logistics MUST: When hosts are negotiating intros, drop dates, release\u003cbr\u003e  timing, or show-format logistics that don’t create a question for the guest.\u003cbr\u003e- CUT garbled stats or acronym runs PREFER: When a fact list, acronym string, or\u003cbr\u003e  transcript-garble interrupts momentum; replace with a short external bridge if the\u003cbr\u003e  information is needed for clarity.\u003cbr\u003e- KEEP cohost segment run PREFER: When the cohost is in a defined Q-run (a mini-\u003cbr\u003e  interview\u002frapid-fire), keep the cohost’s full questions and conversational framing even\u003cbr\u003e  if it adds length.\u003cbr\u003e- KEEP emotional arc chronology PREFER: When the guest is in the middle of a high-stakes\u003cbr\u003e  personal story, avoid chopping it into multiple reordered fragments; keep it as one\u003cbr\u003e  contiguous arc.\u003cbr\u003e- KEEP guest vulnerability story block PREFER: When the guest describes a consequential\u003cbr\u003e  personal\u002fbusiness decision or a formative hardship, even if it includes profanity or\u003cbr\u003e  rambling context, unless it becomes repetitive.\u003cbr\u003e- KEEP light banter detour PREFER: When the tangent is playful and builds rapport\u003cbr\u003e  (especially before\u002finside a designated side-segment), unless it prevents returning to\u003cbr\u003e  the next planned question.\u003cbr\u003e- MUTE cohost interjections MUST: During the main interview thread, unless the cohost is\u003cbr\u003e  asking a fully formed new question or explicitly taking over a designated segment.\u003cbr\u003e- MUTE host backchannel PREFER: When the host is only affirming (yes\u002fwow\u002fmm-hmm\u002fbeautiful)\u003cbr\u003e  during a guest’s continuing thought, unless the interjection changes the direction of\u003cbr\u003e  the answer.\u003cbr\u003e- REORDER clarifying context PREFER: When a moved block needs a missing fact (timeframe,\u003cbr\u003e  count, prior appearance), insert or relocate a short context line so the block can stand\u003cbr\u003e  alone cleanly.\u003cbr\u003e- REORDER question block PREFER: When a question will pay off better inside a later themed\u003cbr\u003e  segment (e.g., a rapid-fire\u002fside segment), move the whole exchange and bridge lightly\u003cbr\u003e  into it.","\u003cb\u003eLiftoff Journeys with Jeanniey Walden\u003c\u002fb\u003e\u003cbr\u003eI Dropped Big News In This Episode with The Snarketing Podcast\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-zero runtime compression, micro-shaves only, no blocks, long\u003cbr\u003e  conversational takes intact, allows messy, energetic pacing\u003cbr\u003eCUT_CRITERIA: cuts only for microscopic clarity, banter and side comments stay, leaves\u003cbr\u003e  conversational chaos intact\u003cbr\u003eAUTHENTICITY_POLICY: raw transcript feel preserved, keeps interruptions and laughter,\u003cbr\u003e  minimal polish; character over smoothness\u003cbr\u003eSTRUCTURE_TEMPLATE: straight-through session-to-episode, no produced bookends, ending\u003cbr\u003e  stays mostly untrimmed\u003cbr\u003eREORDER_ASSEMBLY: chronology protected, no thematic reshuffle\u003cbr\u003eSPEAKER_TREATMENT: uses mutes over cuts, preserves crosstalk as energy, prioritizes one\u003cbr\u003e  clear foreground voice\u003cbr\u003eRULES:\u003cbr\u003e- CUT single word duplication MUST: When a repeated connector word\u002ffragment (e.g., 'that',\u003cbr\u003e  'mean', 'would') is the only issue and removing it does not change meaning or require\u003cbr\u003e  rephrasing adjacent sentences.\u003cbr\u003e- KEEP chronological order MUST: Throughout the main conversation, even when speakers\u003cbr\u003e  reference earlier points or tease later topics; do not rearrange to 'improve' narrative\u003cbr\u003e  flow.\u003cbr\u003e- KEEP banter PREFER: When playful back-and-forth is occurring, even if it delays the next\u003cbr\u003e  question, unless it fully derails into logistics or a new unrelated topic.\u003cbr\u003e- KEEP crosstalk PREFER: When overlap functions as laughter, agreement, or conversational\u003cbr\u003e  momentum and the main line remains understandable.\u003cbr\u003e- KEEP tangent PREFER: When the tangent continues to illustrate the episode’s core theme\u003cbr\u003e  (e.g., trust\u002frelatability\u002fleadership) rather than purely switching subjects.\u003cbr\u003e- MUTE short interjection overlap MUST: When a speaker’s brief overlap (single words like\u003cbr\u003e  'you', 'mm-hmm', quick tags) lands on top of a longer foreground sentence and muddies\u003cbr\u003e  intelligibility.\u003cbr\u003e- MUTE guest or host overlap in questions PREFER: During host question setups, if another\u003cbr\u003e  speaker’s overlap interrupts the question’s clarity; preserve the question by muting the\u003cbr\u003e  overlap rather than truncating the setup.","\u003cb\u003eMotley Fool Money\u003c\u002fb\u003e\u003cbr\u003eInterview with IBM CFO Jim Kavanaugh\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro carve-outs to stay on-theme, relentless micro-trims between clauses,\u003cbr\u003e  keeps only the strongest beats, prefers dense, quotable pacing\u003cbr\u003eCUT_CRITERIA: cut repetition even within answers, remove “meta” framing and scaffolding,\u003cbr\u003e  prefer big ideas over detail dumps, sponsor\u002fcontext can replace session talk\u003cbr\u003eAUTHENTICITY_POLICY: broadcast-clean conversational edit, stumbles removed; intent\u003cbr\u003e  preserved, occasional personality kept, brief, invisible hand over rawness\u003cbr\u003eSTRUCTURE_TEMPLATE: produced wrapper around interview, context-setting cold open via vo,\u003cbr\u003e  ad breaks embedded in main, compliance-forward produced outro\u003cbr\u003eREORDER_ASSEMBLY: mostly chronological with tiny fixes, reorder only to resolve\u003cbr\u003e  continuity, no thematic reshuffling\u003cbr\u003eSPEAKER_TREATMENT: host(s) highly expendable; guest centered, mute interruptions to\u003cbr\u003e  protect answers, secondary host reduced to essentials, guest cleaned but not coddled\u003cbr\u003eRULES:\u003cbr\u003e- CUT reorder for energy only AVOID: When the only motivation is to ‘front-load’ a\u003cbr\u003e  highlight or increase excitement rather than fix comprehension or continuity.\u003cbr\u003e- CUT multi part question scaffold MUST: When a host stacks multiple parts, explains the\u003cbr\u003e  bundle, or narrates how the question was constructed, unless the guest explicitly\u003cbr\u003e  responds to the framing itself.\u003cbr\u003e- CUT secondary host followups MUST: When the secondary host’s commentary repeats the\u003cbr\u003e  primary host’s framing or restates what the guest just said, unless it introduces a\u003cbr\u003e  genuinely new angle\u002fquestion.\u003cbr\u003e- CUT detail dump enumeration PREFER: When a speaker shifts into long lists of metrics,\u003cbr\u003e  pillars, or step-by-step breakdowns that repeat prior claims, unless a single number is\u003cbr\u003e  being introduced for the first time and will be referenced later.\u003cbr\u003e- CUT guest redundant restarts PREFER: When the guest restarts the same thought (‘by the\u003cbr\u003e  way’, ‘let me bring it back’, repeated positioning statements), unless the restart\u003cbr\u003e  introduces a new concrete example or number.\u003cbr\u003e- CUT host praise runway PREFER: When the host extends compliments or extended gratitude\u003cbr\u003e  beyond a quick tag, unless it closes the episode or tees a final question.\u003cbr\u003e- CUT interactive gimmick segment PREFER: When the host proposes a game\u002fshow-and-tell\u003cbr\u003e  device (scrolling statements, ‘pick a number’, etc.) that doesn’t immediately yield\u003cbr\u003e  unique insight from the guest.\u003cbr\u003e- KEEP chronological qna flow MUST: When questions and answers build logically on the\u003cbr\u003e  prior exchange and reordering would risk changing what the guest appears to be\u003cbr\u003e  responding to.\u003cbr\u003e- KEEP guest direct answer core MUST: When the guest is directly answering the asked\u003cbr\u003e  question (definition, breakdown, roadmap, policy) even if the delivery is long—cut\u003cbr\u003e  around it, not through the essential logic.\u003cbr\u003e- KEEP guest thesis sentence MUST: When the guest delivers a concise thesis, comparison,\u003cbr\u003e  or forward-looking claim that can serve as a quotable anchor for the segment, even if\u003cbr\u003e  surrounding context must be removed.\u003cbr\u003e- KEEP light humility humanizing line PREFER: When a brief self-deprecating or human\u003cbr\u003e  moment buys goodwill and doesn’t slow the pace (e.g., a short admission or playful\u003cbr\u003e  aside).\u003cbr\u003e- MUTE host interjection during guest answer MUST: When a host backchannels or interjects\u003cbr\u003e  mid-guest sentence and it doesn’t change the meaning of the guest’s point.\u003cbr\u003e- REORDER continuity patch block PREFER: When an earlier\u002flater sentence is required to\u003cbr\u003e  make an adjacent kept line make sense (e.g., finishing a thought about a\u003cbr\u003e  ratio\u002fdefinition), and the moved block is short and self-contained.","\u003cb\u003eThe Grade Cricketer\u003c\u002fb\u003e\u003cbr\u003eJacks finish ensures nervous wait for Kiwis | ENG v NZ | T20 World Cup\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: micro-shaves between almost every turn, big cuts only for hard derailments,\u003cbr\u003e  cadence preserved via inserted pads, low silence-trim aggressiveness\u003cbr\u003eCUT_CRITERIA: nukes technical derailments completely, keeps long comedic takes intact,\u003cbr\u003e  cuts meta-apologies and resets, prefers patching over truncating\u003cbr\u003eAUTHENTICITY_POLICY: profanity and blunt tone retained, overlap and ‘yeahs’ not over-\u003cbr\u003e  cleaned, light polish; not transcript-perfect, edits hidden with timing pads\u003cbr\u003eSTRUCTURE_TEMPLATE: produced intro with music bed, sponsor\u002fpartner integrated as beat,\u003cbr\u003e  fan-comment segment as spine, cta-forward closing block\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, no thematic reshuffling, continuity fixed\u003cbr\u003e  with pickups, avoids time-jump storytelling\u003cbr\u003eSPEAKER_TREATMENT: primary host track prioritized, secondary voices often minimized,\u003cbr\u003e  backchannels muted under content, guest kept intact, lightly cleaned\u003cbr\u003eRULES:\u003cbr\u003e- CUT tech derailment block MUST: When the session shifts into troubleshooting, audio\u003cbr\u003e  routing, device\u002fcat\u002fgear issues, or recapping what was missed to recover the recording.\u003cbr\u003e- CUT meta reset apology PREFER: When a speaker says ‘sorry’\u002f‘we’ll pick it up’\u002f‘what did\u003cbr\u003e  you say’ purely to reset after a disruption, unless it contains a punchline that lands.\u003cbr\u003e- CUT nonessential third speaker contribution PREFER: When an additional speaker is not\u003cbr\u003e  carrying key questions or framing and their presence creates clutter relative to the\u003cbr\u003e  main host+guest line.\u003cbr\u003e- CUT single word speedbumps PREFER: When removing a lone word (e.g., ‘that\u002fis\u002fyou\u002felse’)\u003cbr\u003e  smooths grammar or momentum without changing meaning.\u003cbr\u003e- KEEP guest analysis arc PREFER: When the guest is building a complete analytical point\u003cbr\u003e  (setup → example → conclusion), even if it’s slightly repetitive in phrasing.\u003cbr\u003e- KEEP guest reaction crosstalk PREFER: When a brief overlap is a meaningful reaction\u003cbr\u003e  (confusion, surprise) that heightens the moment rather than obscuring words.\u003cbr\u003e- KEEP host comedic riff PREFER: When the host is in an extended comedic bit that still\u003cbr\u003e  points back to the match\u002ftopic, even if it’s tangential (e.g., exaggerated framing,\u003cbr\u003e  absurd comparisons).\u003cbr\u003e- KEEP recorded sequence PREFER: When the conversation naturally progresses from recap →\u003cbr\u003e  comment\u002freadout → implications, even if the pacing isn’t maximally tight.\u003cbr\u003e- MUTE guest noise floor events PREFER: When the guest produces nonverbal sounds (ahem,\u003cbr\u003e  quick apologies) that interrupt the host’s sentence or a transition.\u003cbr\u003e- MUTE host backchannel over guest PREFER: When the host’s ‘yeah\u002flaugh\u002fmmm’ overlaps the\u003cbr\u003e  guest’s active sentence and adds no new information.\u003cbr\u003e- REORDER topic blocks AVOID: When a reorder would be purely for emphasis\u002fpace rather than\u003cbr\u003e  to resolve confusion or a recording-order mistake.\u003cbr\u003e- REORDER clarity fix PREFER: Only if a brief move is required to restore basic\u003cbr\u003e  comprehension after a removed disruption (e.g., a missing setup line).","\u003cb\u003eLenny's Podcast: Product | Growth | Career\u003c\u002fb\u003e\u003cbr\u003eThe design process is dead. Here’s what’s replacing it. | Jenny Wen (head of design at Claude)\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves for flow, overall runtime only moderately compressed,\u003cbr\u003e  long idea blocks kept intact, low tolerance for dead air\u003cbr\u003eCUT_CRITERIA: hard cut all pre-roll logistics, prune hedges inside sentences, keep dense\u003cbr\u003e  frameworks and definitions, remove recap\u002fredundancy after point lands\u003cbr\u003eAUTHENTICITY_POLICY: polished transcript-like cleanliness, meaning preserved, rough edges\u003cbr\u003e  minimized, some overlap allowed for energy\u003cbr\u003eSTRUCTURE_TEMPLATE: externally produced cold open hook, sponsor-heavy, scripted opening\u003cbr\u003e  block, main body stays interview-forward, externally produced cta outro\u003cbr\u003eREORDER_ASSEMBLY: chronology strongly protected, no thematic reshuffle inside main, hook\u003cbr\u003e  handled via external open\u003cbr\u003eSPEAKER_TREATMENT: backchannels muted under primary speech, primary answer turns\u003cbr\u003e  protected, questioner verbosity tightened\u003cbr\u003eRULES:\u003cbr\u003e- CUT pre roll logistics MUST: Before the formal welcome\u002fquestion begins, including\u003cbr\u003e  rapport chat, recording checks, and process explanations, even if friendly or funny.\u003cbr\u003e- CUT host prompt restarts PREFER: When the questioner restarts a prompt or repeats the\u003cbr\u003e  premise after the premise is already established and the other speaker is ready to\u003cbr\u003e  answer.\u003cbr\u003e- CUT in sentence hedges PREFER: When a speaker is mid-explanation and inserts\u003cbr\u003e  hedges\u002fstarter loops (e.g., repeated 'I think', 'you know', 'kind of') that do not\u003cbr\u003e  change meaning.\u003cbr\u003e- CUT questioner self-edit loops PREFER: When the questioner iterates on the same framing\u003cbr\u003e  (‘another way to ask…’, ‘so basically…’) before handing off.\u003cbr\u003e- KEEP answerer long explanation MUST: When the answerer is building a multi-step\u003cbr\u003e  explanation; only cut if they fully restate the same claim with no added nuance.\u003cbr\u003e- KEEP framework build MUST: When the speaker is naming categories, archetypes, or a\u003cbr\u003e  multi-part model; keep the full list and the brief justification for each part unless it\u003cbr\u003e  becomes circular.\u003cbr\u003e- KEEP main chronology MUST: Throughout the core interview, unless a recording-order issue\u003cbr\u003e  creates clear confusion (e.g., a reference before it’s introduced).\u003cbr\u003e- MUTE host backchannels MUST: When the host is not holding the floor and is producing\u003cbr\u003e  frequent 'mm-hmm\u002fyeah' while the other speaker is delivering a continuous point.\u003cbr\u003e- MUTE guest backchannels PREFER: When the guest’s affirmations overlap the host’s\u003cbr\u003e  question\u002fsetup and create clutter without adding meaning.\u003cbr\u003e- REORDER topic block AVOID: Only when a block is self-contained and the reorder is\u003cbr\u003e  required to restore comprehension after a cut (not for ‘better narrative’ alone).\u003cbr\u003e- REORDER highlight hook PREFER: If a hook is needed, prefer building it from non-session\u003cbr\u003e  material (produced teaser) rather than pulling a mid-session clip forward.","\u003cb\u003eProject Files\u003c\u002fb\u003e\u003cbr\u003eQ&A: Epstein Files ‘cover-up’ & Trump’s treatment of immigrants\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: mostly light trims, one big lift, micro-shaves between clauses, long-answer\u003cbr\u003e  friendly pacing\u003cbr\u003eCUT_CRITERIA: remove meta talk about format\u002ftime, cut redundant transition phrases hard,\u003cbr\u003e  keep polemical\u002fargumentative runs intact\u003cbr\u003eAUTHENTICITY_POLICY: conversational rough edges allowed, selective polish at interruption\u003cbr\u003e  points, minimal silence surgery\u003cbr\u003eSTRUCTURE_TEMPLATE: branded cold open + music bed, question-led q&a blocks, occasional\u003cbr\u003e  narrated question cards\u003cbr\u003eREORDER_ASSEMBLY: chronology is effectively locked, no thematic reshuffling, cuts, not\u003cbr\u003e  rearrangements, fix flow\u003cbr\u003eSPEAKER_TREATMENT: primary host narrative is protected, second host interjections are\u003cbr\u003e  managed, overtalk cleaned with targeted mutes\u003cbr\u003eRULES:\u003cbr\u003e- CUT format housekeeping MUST: Whenever speakers discuss recording logistics, order of\u003cbr\u003e  questions, running time, or what to cover next, unless it is the explicit on-air premise\u003cbr\u003e  of the show segment.\u003cbr\u003e- CUT redundant turn starters PREFER: When a turn begins with a repeated setup (“just one\u003cbr\u003e  point…”, “so just to…”, single-word acknowledgements) and the substantive sentence\u003cbr\u003e  immediately follows cleanly.\u003cbr\u003e- CUT secondary speaker derail PREFER: When a secondary speaker’s insertion steers into a\u003cbr\u003e  new anecdote or side-thread before the current question is completed.\u003cbr\u003e- CUT topic bridge that changes destination PREFER: When a speaker starts to pivot to an\u003cbr\u003e  additional topic (“move on to…”) but the episode does not actually take that topic next.\u003cbr\u003e- KEEP full argument arc MUST: When a speaker is building a multi-step explanation or\u003cbr\u003e  thesis, even if it’s long or rhetorically heated, unless it drifts into pure repetition.\u003cbr\u003e- KEEP crosstalk energy PREFER: When overlap functions as emphasis\u002frapport (quick\u003cbr\u003e  agreement, short confirmations) and does not obscure the main speaker’s sentence.\u003cbr\u003e- MUTE mid-sentence interjection PREFER: When one host interjects during the other’s\u003cbr\u003e  extended answer with a short phrase that doesn’t alter meaning (e.g., a partial prompt\u003cbr\u003e  or echo) and the interruption can be removed without harming continuity.\u003cbr\u003e- REORDER whole blocks AVOID: Only when a recorded block references a later segment or\u003cbr\u003e  depends on context that appears later; otherwise do not reorder for thematic\u003cbr\u003e  optimization.","\u003cb\u003eThe Curbsiders Internal Medicine Podcast\u003c\u002fb\u003e\u003cbr\u003e#516 Lyme Disease Primer featuring  Dr. Sophie Woolston\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: micro-shave between speaker turns, macro cuts for meta-planning, high overall\u003cbr\u003e  runtime retention, occasional padding for flow\u003cbr\u003eCUT_CRITERIA: protect clinical teaching blocks, banter allowed if it lands, cut logistics\u003cbr\u003e  and timeouts hard, remove speculation that ‘doxes’\u003cbr\u003eAUTHENTICITY_POLICY: conversational texture stays audible, selective cleanup, not\u003cbr\u003e  sterilization, leaves laughter and reactions, light de-stumble within sentences\u003cbr\u003eSTRUCTURE_TEMPLATE: produced bookends around raw core, case-based teaching progression,\u003cbr\u003e  topic pivots signposted explicitly, take-home points then credits\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved; inserts layered, reorder avoidance over thematic\u003cbr\u003e  clustering, ads break beats, not topics\u003cbr\u003eSPEAKER_TREATMENT: hosts trimmed harder than guests, guest answers protected from\u003cbr\u003e  chopping, crosstalk minimized via targeted mutes, host as pacing lever\u003cbr\u003eRULES:\u003cbr\u003e- CUT meta planning and time management MUST: When speakers discuss how to structure the\u003cbr\u003e  episode (which cases to do, time checks, ‘time-in’, what to skip), even if it contains\u003cbr\u003e  some topic recap.\u003cbr\u003e- CUT risk prone speculation MUST: When a speaker begins vague or accusatory speculation\u003cbr\u003e  (e.g., motives, industry claims) or explicitly notes they can’t share details, unless it\u003cbr\u003e  is essential and fully substantiated.\u003cbr\u003e- CUT host bit that derails topic PREFER: When a host joke\u002faside extends past the\u003cbr\u003e  punchline and delays return to the clinical thread.\u003cbr\u003e- CUT host overlong preface PREFER: When a host restates what the guest just said or\u003cbr\u003e  spends multiple sentences teeing up a question that can be asked in one clean line.\u003cbr\u003e- KEEP guest clinical frameworks MUST: When the guest is defining stages, criteria, test\u003cbr\u003e  interpretation, or treatment course, unless the content is purely repetitive within a\u003cbr\u003e  minute or two.\u003cbr\u003e- KEEP local question answer sequence MUST: When a host question directly prompts the\u003cbr\u003e  guest’s explanation; do not separate them with unrelated content other than a clearly\u003cbr\u003e  produced insert.\u003cbr\u003e- KEEP early rapport tangent PREFER: During the early segment, keep a non-medical tangent\u003cbr\u003e  if it establishes guest personality and the hosts actively use it to transition back to\u003cbr\u003e  the topic.\u003cbr\u003e- KEEP guest qualifiers and uncertainty PREFER: When the guest uses caveats to correctly\u003cbr\u003e  frame evidence limits or diagnostic uncertainty, unless the same caveat repeats verbatim\u003cbr\u003e  shortly after.\u003cbr\u003e- MUTE secondary speaker backchannel over guest MUST: When a secondary speaker’s\u003cbr\u003e  laugh\u002fword overlaps the guest’s key clinical sentence (definitions, numbers, guidance).\u003cbr\u003e- MUTE stray interjections inside other speaker turn PREFER: When a short interjection\u003cbr\u003e  (single word\u002fpartial phrase) collides with the main speaker’s sentence and does not\u003cbr\u003e  change meaning or add a clean punchline.\u003cbr\u003e- REORDER topic blocks AVOID: Only if a topic block is materially out of place due to\u003cbr\u003e  recording error and the move fixes listener confusion without creating new continuity\u003cbr\u003e  issues; otherwise keep chronological order.\u003cbr\u003e- REORDER external inserts placement PREFER: When an external segment must appear mid-\u003cbr\u003e  episode, place it at a segment boundary (after a completed point, before a new subtopic)\u003cbr\u003e  rather than mid-explanation.","\u003cb\u003eAfford Anything\u003c\u002fb\u003e\u003cbr\u003eMy Brother-in-Law Wants to Buy a Rental in Mexico. Good Idea?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaving between turns, near-zero tolerance for dead air,\u003cbr\u003e  long explanations kept if coherent, macro cuts mainly at segment seams\u003cbr\u003eCUT_CRITERIA: protects actionable frameworks and definitions, banter allowed, but tightly\u003cbr\u003e  trimmed, cuts hedging and self-referential asides, removes repetitive transition chatter\u003cbr\u003eAUTHENTICITY_POLICY: polished conversational transcript, not raw, laughter and personality\u003cbr\u003e  survive cleanup, tiny overlaps tolerated, not scrubbed, false-start energy removed when\u003cbr\u003e  messy\u003cbr\u003eSTRUCTURE_TEMPLATE: produced branded intro with music, chaptered listener q&a format,\u003cbr\u003e  host-framed sponsor breaks mid-episode, cta-heavy outro plus cross-promo\u003cbr\u003eREORDER_ASSEMBLY: chronology is default and protected, micro-reorders to land a reveal,\u003cbr\u003e  reorders used as production polish\u003cbr\u003eSPEAKER_TREATMENT: mutes backchannels during long reads, host trimmed more than guest,\u003cbr\u003e  protects uninterrupted guest runs, agreement overlap minimized quickly\u003cbr\u003eRULES:\u003cbr\u003e- CUT repeated qualifiers MUST: When a speaker stacks softeners (\"um\u002fyou know\u002fI\u003cbr\u003e  mean\u002fright\") around an otherwise clear point, unless the qualifiers are part of a\u003cbr\u003e  comedic beat or a deliberate rhetorical cadence.\u003cbr\u003e- CUT extended popculture riff PREFER: When the riff stops advancing the listener question\u003cbr\u003e  and becomes a standalone tangent; keep only the minimum needed for the naming\u002fbit\u003cbr\u003e  payoff.\u003cbr\u003e- CUT host meta segues PREFER: When the host narrates difficulty segueing, recaps what’s\u003cbr\u003e  coming next, or comments on how the answer is unfolding, unless it introduces a\u003cbr\u003e  genuinely new topic boundary.\u003cbr\u003e- CUT host prompt repetition PREFER: When the host repeats the guest’s point back or adds\u003cbr\u003e  redundant agreement before letting the guest continue.\u003cbr\u003e- KEEP chronological topic flow MUST: When a reorder would cause the speakers to reference\u003cbr\u003e  something the listener hasn’t heard yet (callbacks, \"as you said\" moments), even if the\u003cbr\u003e  reorder could improve pacing.\u003cbr\u003e- KEEP framework blocks MUST: When a speaker is laying out a concrete model (e.g.,\u003cbr\u003e  definitions, step-by-step calculations, compare-to-alternative logic), even if the block\u003cbr\u003e  is long and slightly repetitive.\u003cbr\u003e- KEEP guest contrast lens PREFER: When the guest introduces a different decision lens\u003cbr\u003e  (behavioral\u002frelationship\u002frisk framing) that complements the host’s tactical angle.\u003cbr\u003e- KEEP guest pushback or reframe PREFER: When the guest reframes the question\u003cbr\u003e  (relationship\u002fbehavioral angle) or adds a contrasting lens that changes the advice\u003cbr\u003e  direction, even if it delays the tactical answer.\u003cbr\u003e- MUTE nonprimary backchannels MUST: When one speaker is reading a listener question or\u003cbr\u003e  delivering a long uninterrupted explanation and the other speaker is only offering\u003cbr\u003e  affirmations (\"mm-hmm\u002fyeah\u002foh\"), unless the interjection changes direction or adds a\u003cbr\u003e  necessary reaction beat.\u003cbr\u003e- MUTE crosstalk agreement PREFER: When overlap is purely simultaneous agreement and\u003cbr\u003e  obscures a key phrase; keep only the clearer voice.\u003cbr\u003e- REORDER key takeaway sentence PREFER: When a single sentence cleanly answers the\u003cbr\u003e  listener’s core fear and can be moved earlier to reduce anxiety\u002funcertainty, provided\u003cbr\u003e  the move stays within the same topic block and requires no additional context.\u003cbr\u003e- REORDER production stinger PREFER: When adding or aligning a sound effect\u002fmusic hit with\u003cbr\u003e  the line it punctuates (e.g., \"good news\" moments), even if it slightly shifts adjacent\u003cbr\u003e  lines.","\u003cb\u003eHacked\u003c\u002fb\u003e\u003cbr\u003eThe $5 Wrench Attack\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light macro compression, heavy micro-shaving, fast turn-taking with patched\u003cbr\u003e  breaths, keeps long conversational blocks intact\u003cbr\u003eCUT_CRITERIA: cuts meta about the recording\u002fedit, trims repetition inside a riff, keeps\u003cbr\u003e  big tangents if relevant\u003cbr\u003eAUTHENTICITY_POLICY: conversational roughness kept in, crosstalk energy not fully\u003cbr\u003e  sterilized, polish is mostly invisible micro-edits\u003cbr\u003eSTRUCTURE_TEMPLATE: cold open into narrated setup, main body is a long freeform run,\u003cbr\u003e  sponsor blocks stitched midstream\u003cbr\u003eREORDER_ASSEMBLY: chronological assembly preserved, no thematic reshuffling, edits repair\u003cbr\u003e  locally, not globally\u003cbr\u003eSPEAKER_TREATMENT: uses mutes to tame overlap, one speaker’s interjections suppressed,\u003cbr\u003e  backchannels reduced rather than cut turns\u003cbr\u003eRULES:\u003cbr\u003e- CUT production meta MUST: When the hosts discuss the act of recording\u002fediting (re-takes,\u003cbr\u003e  “I’ll edit it in,” mic notes, searching for a link), unless it is essential to\u003cbr\u003e  understanding why audio suddenly changes.\u003cbr\u003e- CUT crosstalk pingpong PREFER: When rapid-fire overlapping “yeah \u002f got it \u002f you got it”\u003cbr\u003e  loops form a verbal knot without adding content, unless it’s a deliberate comedic\u003cbr\u003e  escalation.\u003cbr\u003e- CUT scaffolding transitions PREFER: When a speaker says a connective phrase that is\u003cbr\u003e  immediately followed by a stronger, more concrete transition (“so which brings us to…,”\u003cbr\u003e  “anyway, now…”) and the cut won’t break referents.\u003cbr\u003e- CUT self-repetition within bit PREFER: When a speaker restates the same joke\u002flabel\u002fword\u003cbr\u003e  multiple times in quick succession, unless the repetition is the comedic payoff beat.\u003cbr\u003e- KEEP timeline order MUST: Across the main discussion, even when topics meander, unless a\u003cbr\u003e  later clarification is required to understand an earlier claim.\u003cbr\u003e- KEEP on-theme long tangent PREFER: When the conversation detours but remains\u003cbr\u003e  thematically connected (context building, adjacent case study, implications), even if it\u003cbr\u003e  runs several minutes.\u003cbr\u003e- KEEP primary storyteller arc PREFER: When one host is narrating a case\u002ftimeline and the\u003cbr\u003e  other host’s interruptions would force restructuring; protect the narration and trim the\u003cbr\u003e  interruptions instead.\u003cbr\u003e- MUTE backchannel during other host run MUST: When a host’s short agreement\u003cbr\u003e  noises\u002finterjections land under the other host’s uninterrupted explanation and do not\u003cbr\u003e  introduce new information.\u003cbr\u003e- REORDER clarifying definition AVOID: Only if a short definition\u002fnaming line is needed\u003cbr\u003e  earlier to prevent listener confusion and can be moved without breaking references or\u003cbr\u003e  continuity.","\u003cb\u003eFor Heaven's Sake\u003c\u002fb\u003e\u003cbr\u003eThoughts from the Shelter\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between clauses, long-form ideas kept largely intact,\u003cbr\u003e  low silence tolerance, occasional pads\u003cbr\u003eCUT_CRITERIA: redundancy cut even mid-thought, protects reflective, conceptual passages,\u003cbr\u003e  aggressively trims ritualized setup phrases\u003cbr\u003eAUTHENTICITY_POLICY: polished clarity over rawness, keeps laughter that lands, cleans\u003cbr\u003e  stumbles without sterilizing tone\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold-open pull-quote hook, straight intro into main talk,\u003cbr\u003e  credits-heavy produced outro\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, micro-reorders only for continuity, avoids\u003cbr\u003e  thematic restructuring\u003cbr\u003eSPEAKER_TREATMENT: symmetric tightening across hosts, mutes interjections during\u003cbr\u003e  monologues, protects the primary speaker’s floor\u003cbr\u003eRULES:\u003cbr\u003e- CUT thematic resequence AVOID: When reordering would change the argumentative timeline\u003cbr\u003e  (moving later conclusions ahead of earlier setup) purely to ‘improve’ structure; keep\u003cbr\u003e  the original progression instead.\u003cbr\u003e- CUT broken outro or logistics MUST: When the ending shifts into disorganized closing\u003cbr\u003e  chatter, technical confusion, or coordination talk after the final substantive exchange;\u003cbr\u003e  replace with a clean produced close if available.\u003cbr\u003e- CUT redundant restatement MUST: When a speaker repeats the same sentence\u002fclaim in\u003cbr\u003e  slightly different wording within the next few beats, unless the repetition is clearly\u003cbr\u003e  used as emphasis for a key climax line.\u003cbr\u003e- CUT crosstalk cleanup PREFER: When overlap creates confusion or muddies a key phrase;\u003cbr\u003e  prioritize a clean single-speaker line.\u003cbr\u003e- CUT ritualized setup phrases PREFER: When speakers use recurring setup language (e.g.,\u003cbr\u003e  ‘you know’, ‘it’s like’, ‘and so’, ‘the strange thing is’) that does not introduce new\u003cbr\u003e  information or a new frame.\u003cbr\u003e- KEEP conceptual turn MUST: When the conversation pivots from description into a higher-\u003cbr\u003e  level insight (moral\u002ftheological\u002fhistorical framing) and the reasoning chain is\u003cbr\u003e  coherent, even if the delivery is a bit rambling.\u003cbr\u003e- KEEP laughter reaction PREFER: When laughter or a short reaction marks rapport or\u003cbr\u003e  releases tension and does not derail the sentence that follows.\u003cbr\u003e- MUTE supportive interjection MUST: When a non-speaking host interjects brief\u003cbr\u003e  agreement\u002fthanks during the other host’s extended explanation, unless the interjection\u003cbr\u003e  sets up the next question or changes the direction.\u003cbr\u003e- REORDER micro block for continuity PREFER: When a short aside\u002ffalse start is removed and\u003cbr\u003e  a nearby phrase must be repositioned to make the surrounding sentences\u003cbr\u003e  grammatically\u002fsemantically connect.\u003cbr\u003e- REORDER quote for cold open PREFER: When creating the opening hook, pull only a self-\u003cbr\u003e  contained, high-impact excerpt that doesn’t require prior context; do not otherwise\u003cbr\u003e  reshuffle the main discussion.","\u003cb\u003eFantasy FanFellas\u003c\u002fb\u003e\u003cbr\u003eEp 1: Well of Ascension Chapters 1-6\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between turns, macro cuts for true derailments, low\u003cbr\u003e  tolerance for dead air, keeps long analytical beats intact\u003cbr\u003eCUT_CRITERIA: cut meta chatter about recording, cut flubbed reads and redoes, keep comedic\u003cbr\u003e  riffs if they land, preserve character\u002frelationship insight\u003cbr\u003eAUTHENTICITY_POLICY: leaves crosstalk for liveliness, allows some messy enthusiasm, polish\u003cbr\u003e  focused on clarity, not perfection, doesn’t sanitize edgy jokes\u003cbr\u003eSTRUCTURE_TEMPLATE: produced theme-led cold open, recap → deep dive blocks, recurring\u003cbr\u003e  segment games at end, cta stitched into outro\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, no thematic reshuffling, only tiny continuity\u003cbr\u003e  patches, rewrites avoided; trims favored\u003cbr\u003eSPEAKER_TREATMENT: aggressive backchannel muting, both hosts trimmed symmetrically,\u003cbr\u003e  overlap kept, but clarified, protects the active narrator\u003cbr\u003eRULES:\u003cbr\u003e- CUT flubbed read and retry MUST: When a chapter quote\u002frecap line is misread, restarted,\u003cbr\u003e  or repeated in near-identical form, keep only the cleanest full pass unless the mistake\u003cbr\u003e  itself is the punchline.\u003cbr\u003e- CUT meta production talk MUST: Any time either host comments on the recording process\u003cbr\u003e  (where they are in notes, whether something landed, how long the segment is taking, what\u003cbr\u003e  to cut, redo instructions), unless it is immediately repurposed into an on-mic joke that\u003cbr\u003e  advances the conversation.\u003cbr\u003e- CUT over-extended banter tangent PREFER: When banter drifts into private-story territory\u003cbr\u003e  or references that won’t pay off for listeners (inside callbacks, extended impressions)\u003cbr\u003e  and it doesn’t set up the next book discussion point.\u003cbr\u003e- CUT speaker derail from active point PREFER: When the non-leading host interrupts and\u003cbr\u003e  the interruption does not advance the current point (no clarification, no punchline\u003cbr\u003e  payoff), remove it and tighten the handoff back to the main speaker.\u003cbr\u003e- KEEP chronological flow MUST: When switching POV\u002ftopic mirrors the book’s sequence\u003cbr\u003e  (recap → chapter discussion), preserve the recorded progression rather than regrouping\u003cbr\u003e  by theme.\u003cbr\u003e- KEEP character theme analysis PREFER: When the conversation turns to motivations,\u003cbr\u003e  relationships, themes, or why a scene works (even if it’s longer than a recap beat),\u003cbr\u003e  preserve the full thought rather than summarizing.\u003cbr\u003e- KEEP energetic crosstalk laughter PREFER: When overlap is laughter or a quick comedic\u003cbr\u003e  tag that heightens the moment without obscuring key words, keep it as-is rather than\u003cbr\u003e  cleaning to single-speaker isolation.\u003cbr\u003e- KEEP heated emotional reaction PREFER: When either host has a strong emotional reaction\u003cbr\u003e  to story events (anger, delight, disbelief) that reinforces stakes, keep even if it\u003cbr\u003e  includes mild repetition.\u003cbr\u003e- KEEP in-situ reactions PREFER: Keep immediate reactions attached to the moment that\u003cbr\u003e  prompted them (laughs, shock, disgust), even if they could be relocated as a better\u003cbr\u003e  punchline elsewhere.\u003cbr\u003e- KEEP running gag bits PREFER: When a recurring bit reappears (e.g., the hosts’ repeated\u003cbr\u003e  call-and-response jokes), keep it if it’s brief and functions as a recognizable beat\u003cbr\u003e  marker between topic blocks.\u003cbr\u003e- MUTE backchannels during monologue MUST: When one host is delivering a sustained\u003cbr\u003e  explanation\u002frecap and the other interjects short affirmations (“yeah,” “mm-hmm,” single\u003cbr\u003e  words), mute the interjections unless they change meaning or create a joke beat.\u003cbr\u003e- REORDER segment blocks AVOID: Only reorder if the transcript shows a clear recording-\u003cbr\u003e  order mistake that would confuse listeners (e.g., referencing an element not yet\u003cbr\u003e  introduced) and the fix can be done with a small move without breaking continuity.","\u003cb\u003eJavaScript Jabber\u003c\u002fb\u003e\u003cbr\u003eWhat’s New in React 19.2: Compiler, Activity, and the Future of Async React - JSJ 670\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between turns, high retention of core discussion,\u003cbr\u003e  prefers frequent sub-2s trims, only occasional large block removals\u003cbr\u003eCUT_CRITERIA: hard cut pre-roll logistics, trim leading 'so\u002fum' starters, keep technical\u003cbr\u003e  explanation arcs intact, allow small rapport beats early\u003cbr\u003eAUTHENTICITY_POLICY: polished text, not over-sterilized, overlaps and interruptions\u003cbr\u003e  allowed, stumbles reduced, cadence preserved, uses mutes to stay invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music-bookended opening, standard interview → picks →\u003cbr\u003e  signoff, fast start after admin cut, show-notes and link mentions retained\u003cbr\u003eREORDER_ASSEMBLY: chronology strongly protected, no thematic reshuffling, edits happen\u003cbr\u003e  inside turns, not via rearrange\u003cbr\u003eSPEAKER_TREATMENT: host and guest treated symmetrically, backchannels suppressed under\u003cbr\u003e  primary speaker, crosstalk energy often retained, speaker noises muted, not featured\u003cbr\u003eRULES:\u003cbr\u003e- CUT pre roll logistics MUST: When the conversation is about posting links, scheduling,\u003cbr\u003e  platform UI, or ‘ready to start’ coordination, even if it contains a duplicate of the\u003cbr\u003e  eventual show intro.\u003cbr\u003e- CUT host self-interruption padding PREFER: When the host repeats\u002fhedges mid-thought\u003cbr\u003e  (‘uh…’, partial restarts) while still arriving at the same point; compress to the\u003cbr\u003e  cleanest version.\u003cbr\u003e- CUT single-word affirmations PREFER: When a standalone ‘yes\u002fexactly\u002fcool’ doesn’t\u003cbr\u003e  advance the point and removing it won’t create an unnatural jump.\u003cbr\u003e- CUT turn openers (So\u002fUm\u002fAnd\u002fOh) PREFER: When a turn begins with a discourse-starter that\u003cbr\u003e  doesn’t change meaning or set up a specific contrast; keep only if it signals a\u003cbr\u003e  deliberate pivot or emphasis.\u003cbr\u003e- KEEP chronological order MUST: Across the main conversation: do not move topic blocks\u003cbr\u003e  around; rely on micro-cuts and occasional macro removals instead.\u003cbr\u003e- KEEP brief crosstalk agreement PREFER: When overlap is short and reinforces\u003cbr\u003e  alignment\u002fenergy without obscuring key words (e.g., simultaneous ‘correct\u002fright’\u003cbr\u003e  moments).\u003cbr\u003e- KEEP guest explanation run PREFER: When the guest is in a multi-sentence explanation\u003cbr\u003e  (definitions, examples, step-by-step); prioritize continuity over shaving every micro-\u003cbr\u003e  imperfection.\u003cbr\u003e- KEEP resource callouts PREFER: When host\u002fguest references past episodes, docs, or show-\u003cbr\u003e  notes links as actionable pointers for listeners; trim surrounding chatter but retain\u003cbr\u003e  the pointer.\u003cbr\u003e- KEEP short intro banter PREFER: During the opening minutes, when light banter\u003cbr\u003e  establishes rapport and transitions into the topic; tighten but don’t fully strip it.\u003cbr\u003e- MUTE backchannel under other speaker MUST: When the non-floor speaker interjects\u003cbr\u003e  (‘yeah’, ‘mhm’, small reactions) during the other’s sentence and it competes with\u003cbr\u003e  intelligibility.\u003cbr\u003e- MUTE coughs throat clearings PREFER: When a speaker makes an ahem\u002fcough\u002faside while the\u003cbr\u003e  other continues; mute that speaker without disrupting the active speaker’s sentence.\u003cbr\u003e- REORDER intro elements PREFER: Only for bookending\u002fproduction needs (e.g., placing a\u003cbr\u003e  produced welcome before the first retained session beat) while leaving the main\u003cbr\u003e  discussion timeline intact.","\u003cb\u003ePRETTYSMART\u003c\u002fb\u003e\u003cbr\u003ePracticing Love in a Fear-Filled World With Marianne Williamson\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between clauses, macro blocks dropped for topic\u003cbr\u003e  focus, low tolerance for conversational drag, tight pacing even in monologues\u003cbr\u003eCUT_CRITERIA: theme purity over exploratory back-and-forth, cuts guest-led detours\u003cbr\u003e  aggressively, keeps quotable teaching beats intact, removes meta-talk and interview\u003cbr\u003e  mechanics\u003cbr\u003eAUTHENTICITY_POLICY: polished transcript-first cleanliness, false starts removed,\u003cbr\u003e  intention preserved, minor roughness allowed if heartfelt\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open + framed thesis, heavy narrator\u002fcontext\u003cbr\u003e  scaffolding, music-bedded transitions into segments, q&a clusters over free-flow chat\u003cbr\u003eREORDER_ASSEMBLY: narrative arc over recording chronology, large block reorders are\u003cbr\u003e  normal, front-loads the strongest hook\u003cbr\u003eSPEAKER_TREATMENT: primary speaker protected, others minimized, backchannels frequently\u003cbr\u003e  muted, guest contribution curated, not comprehensive, questions tightened to essentials\u003cbr\u003eRULES:\u003cbr\u003e- CUT guest followup debate MUST: When a guest follow-up turns the conversation into an\u003cbr\u003e  extended argumentative back-and-forth (e.g., practicality\u002ffeasibility sparring) rather\u003cbr\u003e  than advancing the central theme.\u003cbr\u003e- CUT host meta time management MUST: When the host references timing, scheduling, or\u003cbr\u003e  interview management (e.g., ‘jumping in,’ ‘being mindful of your time’) and it doesn’t\u003cbr\u003e  set up content.\u003cbr\u003e- CUT anecdote side character PREFER: When a story introduces new people\u002fplaces solely for\u003cbr\u003e  color and doesn’t pay off into a principle, lesson, or later callback.\u003cbr\u003e- CUT guest question preambles PREFER: When the guest sets up a question with multiple\u003cbr\u003e  qualifying clauses (e.g., self-positioning, disclaimers, long wind-ups) before asking\u003cbr\u003e  the actual question.\u003cbr\u003e- CUT spiritual cred proving PREFER: When the speaker lists credentials, cultural\u003cbr\u003e  references, or “I’ve read\u002flistened to…” sequences that don’t change the listener’s\u003cbr\u003e  understanding of the point.\u003cbr\u003e- KEEP chronological sequence AVOID: When a personal story depends on temporal cause-and-\u003cbr\u003e  effect (before\u002fafter, crisis → change) and reordering would blur that progression.\u003cbr\u003e- KEEP memorable metaphor MUST: When a metaphor is doing explanatory work (not just\u003cbr\u003e  decoration), even if it takes a few extra lines to land.\u003cbr\u003e- KEEP guest empathy or receipt PREFER: When the guest response provides an emotional\u003cbr\u003e  landing (gratitude, recognition, vulnerability) at the end of a heavy segment.\u003cbr\u003e- KEEP host framework definition PREFER: When the host is defining key terms or giving a\u003cbr\u003e  compact framework (e.g., a definition + contrast + takeaway), even if the delivery is\u003cbr\u003e  slightly repetitive.\u003cbr\u003e- KEEP host longform teaching run PREFER: When the host is in a sustained explanatory run\u003cbr\u003e  that is thematically central, even if it reduces turn-taking balance.\u003cbr\u003e- MUTE backchannel affirmations MUST: When a non-speaking-turn participant is offering\u003cbr\u003e  continuous affirmations during the other speaker’s answer and it doesn’t change meaning\u003cbr\u003e  or energy.\u003cbr\u003e- REORDER context explanation block MUST: When listeners need definitions\u002fbackground to\u003cbr\u003e  parse recurring references; place a short explanatory block before the first heavy use\u003cbr\u003e  of those references.\u003cbr\u003e- REORDER strongest guest question PREFER: When there is a high-stakes or emotionally\u003cbr\u003e  resonant question\u002fanswer later in the session that can function as the early hook\u003cbr\u003e  without breaking comprehension.\u003cbr\u003e- REORDER topic clusters PREFER: When the session loops between topics; consolidate\u003cbr\u003e  scattered mentions into one contiguous cluster to reduce zig-zagging.","\u003cb\u003eUnashamed with the Robertson Family\u003c\u002fb\u003e\u003cbr\u003eEp 1280 | Three Things the Enemy Steals From Every Man & How God Restores Them\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro-cut chunks, not micro-shaved, long teaching blocks left intact, very\u003cbr\u003e  light silence tightening, runtime held to a fixed window\u003cbr\u003eCUT_CRITERIA: pre-roll chatter removed wholesale, keeps dense doctrinal exposition, trims\u003cbr\u003e  citation\u002fnumber fumbles, allows ad breaks mid-thought\u003cbr\u003eAUTHENTICITY_POLICY: conversational roughness mostly preserved, mutes used more than\u003cbr\u003e  recuts, occasional overlap kept as-is, pickup-style external patches tolerated\u003cbr\u003eSTRUCTURE_TEMPLATE: sponsor block before content start, brief stinger\u002ftagline near top,\u003cbr\u003e  many midrolls throughout main, standardized cta outro insert\u003cbr\u003eREORDER_ASSEMBLY: chronology protected, no thematic reshuffle, only local splices for\u003cbr\u003e  clarity\u003cbr\u003eSPEAKER_TREATMENT: host airtime accepted as dominant, host tightened more than guest,\u003cbr\u003e  guest kept as supportive co-teacher, backchannels muted during monologues\u003cbr\u003eRULES:\u003cbr\u003e- CUT pre roll banter MUST: When the conversation is still in “are we ready \u002f off-mic\u003cbr\u003e  riffing \u002f unrelated updates” mode before the actual episode start.\u003cbr\u003e- CUT host self interruption PREFER: When the host’s interjected phrase doesn’t materially\u003cbr\u003e  advance the guest’s point or the current argument thread.\u003cbr\u003e- CUT host tangent PREFER: When the host detours into an unrelated aside (e.g., personal\u003cbr\u003e  tech\u002fmarket chatter) and it doesn’t set up the next on-theme segment.\u003cbr\u003e- CUT scripture reference fumbling PREFER: When the speaker gets stuck on chapter\u002fverse\u003cbr\u003e  numbers, mis-states a reference, or circles on citations without advancing the argument.\u003cbr\u003e- KEEP chronological sequence MUST: For the main conversation flow, unless chronology\u003cbr\u003e  itself creates confusion that cannot be solved by cutting.\u003cbr\u003e- KEEP guest explanatory extension PREFER: When the guest is expanding or systematizing\u003cbr\u003e  the host’s idea (definitions, frameworks, textual support), even if it lengthens the\u003cbr\u003e  segment.\u003cbr\u003e- KEEP host bridge question PREFER: When the host uses a direct question to hand off to\u003cbr\u003e  the guest or to pivot into the next thematic block.\u003cbr\u003e- KEEP theme-supporting illustration PREFER: When an anecdote (travel, counseling moment,\u003cbr\u003e  cultural reference) directly reinforces the spiritual point being made.\u003cbr\u003e- KEEP theological argument arc PREFER: When a speaker is building a multi-step\u003cbr\u003e  interpretation or tying passages together, even if the turn is long and repetitive.\u003cbr\u003e- MUTE backchannel overlap PREFER: When a short affirmation\u002faside lands on top of another\u003cbr\u003e  speaker’s key sentence and reduces intelligibility.\u003cbr\u003e- REORDER within topic clarifier AVOID: Only when a short explanatory line clearly belongs\u003cbr\u003e  earlier\u002flater in the same topic block to prevent listener confusion.","\u003cb\u003eGun Talk\u003c\u002fb\u003e\u003cbr\u003eWhat the Pros are Running at NRL Hunter Matches | Gun Talk Hunt\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high retention, light pruning, relentless micro-shaves at turn edges, macro\u003cbr\u003e  cuts reserved for dead-start blocks, willing to add pacing pauses\u003cbr\u003eCUT_CRITERIA: cut messy warmup and retakes, protect deep technical gear walkthroughs, host\u003cbr\u003e  ramble is more expendable, leave spicy phrasing if authentic\u003cbr\u003eAUTHENTICITY_POLICY: invisible cleanup, not rewritten, allows some crosstalk texture,\u003cbr\u003e  conversational imperfections remain, polish focused on flow, not sanitizing\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open with music, host intro then immediate topic,\u003cbr\u003e  midroll sponsor break as hard beat, music bed on the bookends\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved end-to-end, no thematic reshuffling, continuity\u003cbr\u003e  fixed with tiny patches\u003cbr\u003eSPEAKER_TREATMENT: mute-heavy management of backchannels, guests protected; host trimmed\u003cbr\u003e  harder, primary speaker gets the floor, overlap tolerated unless masking content\u003cbr\u003eRULES:\u003cbr\u003e- CUT pre show banter and reset MUST: When the recording includes a false start, redo, or\u003cbr\u003e  off-topic warmup before the real intro\u002ftopic begins, even if it has jokes or\u003cbr\u003e  personality.\u003cbr\u003e- CUT guest false start tail PREFER: When a guest ends a thought with a verbal handoff\u003cbr\u003e  like ‘I’ll shut up \u002f you go ahead’ that doesn’t advance content.\u003cbr\u003e- CUT host explanatory overreach PREFER: When the host re-explains what a guest just said\u003cbr\u003e  or piles on extra examples, unless it sets up a sharper next question or resolves\u003cbr\u003e  confusion.\u003cbr\u003e- KEEP rough edges for character AVOID: When a remark is blunt\u002fedgy but still relevant to\u003cbr\u003e  the point and not a detour into unrelated controversy.\u003cbr\u003e- KEEP chronological sequence MUST: Across the main conversation, unless a section is\u003cbr\u003e  clearly labeled as a redo\u002freset that must be removed.\u003cbr\u003e- KEEP guest full answer runs PREFER: When a guest is mid-thought and the host tries to\u003cbr\u003e  jump in; prefer trimming the host entry or delaying it rather than chopping the guest’s\u003cbr\u003e  sentence.\u003cbr\u003e- KEEP guest technical monologue PREFER: When a guest is in a sustained, information-dense\u003cbr\u003e  explanation (gear setup, process, how-to), unless it becomes circular or contradicts\u003cbr\u003e  itself.\u003cbr\u003e- KEEP segment boundaries PREFER: Keep sponsor break placement as a clear boundary between\u003cbr\u003e  discussion phases rather than interleaving it mid-explanation.\u003cbr\u003e- MUTE host backchannels MUST: When a guest is delivering a continuous explanation and the\u003cbr\u003e  host is only agreeing\u002freacting (yeah, mm-hmm, laughter) without adding new information.\u003cbr\u003e- MUTE secondary speaker overlap PREFER: When two people start talking at once and one is\u003cbr\u003e  clearly the ‘main thread’ speaker; mute the other unless the overlap is the punchline or\u003cbr\u003e  needed for context.\u003cbr\u003e- REORDER topic blocks AVOID: Only if two adjacent blocks are out of logical order due to\u003cbr\u003e  a recording mishap and the fix is obvious from the transcript alone.","\u003cb\u003eFantasy FanFellas\u003c\u002fb\u003e\u003cbr\u003eEp 3: Well of Ascension Chapters 12-18\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless 1–3s micro-shaves, big clean excisions of messy runs, pacing\u003cbr\u003e  polish over runtime reduction, low tolerance for repeated takes\u003cbr\u003eCUT_CRITERIA: remove meta-recording and restart chatter, keep comedic analogies tied to\u003cbr\u003e  point, protect the recap and chapter spine, trim tangents once they stop paying\u003cbr\u003eAUTHENTICITY_POLICY: delivery cleaned, personality intact, profanity and edge retained,\u003cbr\u003e  crosstalk left for energy, stumbles removed via retakes\u003cbr\u003eSTRUCTURE_TEMPLATE: music-led greeting into hook, early support pitch before recap,\u003cbr\u003e  chapter-by-chapter deep-dive scaffold, end-cap games: winners\u002fpredictions\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, in-place patching, not reshuffling, no topic\u003cbr\u003e  clustering across beats\u003cbr\u003eSPEAKER_TREATMENT: backchannel muting over hard cuts, dominant host flow protected, cohost\u003cbr\u003e  bits kept, cleaned heavily, overlap tolerated, not sterilized\u003cbr\u003eRULES:\u003cbr\u003e- CUT cohost false start in read MUST: When a speaker is reading (epigraph, recap, quote)\u003cbr\u003e  and derails into self-correction loops; cut back to the next clean restart or replace\u003cbr\u003e  with a pickup.\u003cbr\u003e- CUT meta editing talk MUST: When a speaker comments on restarting, asks to cut\u003cbr\u003e  something, negotiates what to keep, or otherwise talks about the act of\u003cbr\u003e  recording\u002fediting rather than the book discussion.\u003cbr\u003e- CUT multi take readthrough MUST: When epigraphs\u002fquotes are read multiple times with\u003cbr\u003e  troubleshooting in-between; keep only the best single pass (plus any minimal setup\u003cbr\u003e  needed to understand what’s being read).\u003cbr\u003e- CUT host ramble leadin PREFER: When a host spends multiple clauses winding up a point\u003cbr\u003e  that is delivered cleanly in the next sentence; cut the wind-up and keep the point.\u003cbr\u003e- CUT speculative riff sprawl PREFER: When speculation becomes a long, self-contradicting\u003cbr\u003e  riff that does not lead into the next chapter beat or a concrete prediction.\u003cbr\u003e- KEEP chapter sequence MUST: When discussion is moving chapter-to-chapter (or epigraph-\u003cbr\u003e  to-epigraph), preserve that order even if a later comment could thematically fit\u003cbr\u003e  earlier.\u003cbr\u003e- KEEP comedic analogy PREFER: When the joke\u002fanalogy maps back onto the current plot point\u003cbr\u003e  or character read within the next line or two, even if it briefly detours the\u003cbr\u003e  conversation.\u003cbr\u003e- KEEP crosstalk laughter agreement PREFER: When overlap is functioning as shared energy\u003cbr\u003e  (laughing, quick agreement) and does not obscure key information.\u003cbr\u003e- KEEP mystery thread tracking PREFER: When the hosts are connecting clues across\u003cbr\u003e  chapters\u002fepigraphs or articulating a theory that will serve as a callback later in the\u003cbr\u003e  episode.\u003cbr\u003e- KEEP pickup in place PREFER: When inserting a pickup\u002falt read, place it exactly where\u003cbr\u003e  the flub occurred (same beat), rather than relocating the corrected version elsewhere.\u003cbr\u003e- MUTE backchannel under active speaker MUST: When the non-leading speaker interjects\u003cbr\u003e  brief affirmations\u002fjokes during the other’s explanation and it competes with\u003cbr\u003e  comprehension; prefer muting the interjection over removing the lead line.\u003cbr\u003e- REORDER local sentence swap AVOID: Only when two adjacent lines within the same beat\u003cbr\u003e  need swapping to fix an immediate confusion (pronoun reference, who\u002fwhat is being\u003cbr\u003e  described) without changing the chapter\u002ftopic boundary.","\u003cb\u003eThis Glorious Mess\u003c\u002fb\u003e\u003cbr\u003eWait, Did We Just Witness The Ultimate Co-Parenting Sin?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between clauses, big macro cuts of meta blocks, low\u003cbr\u003e  tolerance for dead air, targets ~40% runtime reduction\u003cbr\u003eCUT_CRITERIA: cut behind-the-scenes producing talk, trim hedging to sharpen thesis, keep\u003cbr\u003e  personal stakes and examples, add\u002fkeep clarifying context beats\u003cbr\u003eAUTHENTICITY_POLICY: polished clarity, not sterile, keeps candid language for punch,\u003cbr\u003e  crosstalk lightly tolerated, edits hidden via surgical mutes\u003cbr\u003eSTRUCTURE_TEMPLATE: produced network-style intro open, short stingers to tee segments,\u003cbr\u003e  music-bedded midrolls in main, scripted wrap + formal credits\u003cbr\u003eREORDER_ASSEMBLY: topic coherence over record order, reorders to land takeaways sooner,\u003cbr\u003e  clusters related subpoints together\u003cbr\u003eSPEAKER_TREATMENT: primary runs protected; interjections suppressed, symmetric trimming\u003cbr\u003e  across speakers, mutes used to de-clutter overlap, leaves a little crosstalk for energy\u003cbr\u003eRULES:\u003cbr\u003e- CUT producer meta conversation MUST: When the speakers discuss how to frame the segment\u003cbr\u003e  (e.g., ‘we should make it pointier’, ‘do I need a line saying…’, ‘do you want me to do\u003cbr\u003e  it again’) rather than delivering the segment itself.\u003cbr\u003e- CUT speaker self-corrections about delivery MUST: When a speaker comments on their own\u003cbr\u003e  delivery (‘I’ve been dominating’, ‘can I set it up’, ‘let me do that again’) rather than\u003cbr\u003e  the content, unless it’s essential to explain an abrupt transition.\u003cbr\u003e- CUT repetitive agreement runs PREFER: When either speaker repeats affirmations (‘that’s\u003cbr\u003e  so true’, ‘yeah yeah’) without adding a new angle, unless it functions as a comedic beat\u003cbr\u003e  or a clear emotional peak.\u003cbr\u003e- KEEP chronological flow AVOID: When the conversation contains explicit temporal\u003cbr\u003e  references (‘as I said earlier’, ‘before we move on’) that would become confusing if\u003cbr\u003e  moved.\u003cbr\u003e- KEEP audience inclusivity caveats PREFER: When the conversation could implicitly exclude\u003cbr\u003e  common listener situations (e.g., nontraditional family structures), unless the caveat\u003cbr\u003e  becomes long, repetitive, or derails the main claim.\u003cbr\u003e- KEEP personal disclosure as stakes PREFER: When a host\u002fguest shares a personal situation\u003cbr\u003e  that concretely raises the stakes of the topic (work-arounds, guilt, trade-offs), even\u003cbr\u003e  if it momentarily detours from the headline.\u003cbr\u003e- KEEP short crosstalk reactions PREFER: When overlap is very brief and functions as a\u003cbr\u003e  punchline button or genuine emotional reaction without masking key words.\u003cbr\u003e- MUTE supportive interjections MUST: When a secondary speaker throws in short agreement\u003cbr\u003e  sounds (‘yes’, ‘wow’, ‘thank you’) over the primary speaker’s sentence and it muddies\u003cbr\u003e  intelligibility.\u003cbr\u003e- REORDER clarifying thesis lines PREFER: When a later line cleanly states the segment’s\u003cbr\u003e  core claim\u002fquestion and moving it earlier will reduce listener confusion.\u003cbr\u003e- REORDER supporting examples and research PREFER: When examples\u002fresearch are scattered,\u003cbr\u003e  cluster them immediately after the claim they support, even if it breaks chronology,\u003cbr\u003e  provided the shift stays within a few minutes and doesn’t create time-referential\u003cbr\u003e  contradictions.","\u003cb\u003eThe Focus Group Podcast\u003c\u002fb\u003e\u003cbr\u003eS6 Ep26: Twitter vs. Texans (with Elaine Godfrey)\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave for pace, near-zero pause tolerance, prefers dense\u003cbr\u003e  turns over air, macro flow mostly preserved\u003cbr\u003eCUT_CRITERIA: clarity beats spontaneity, protects analytical through-lines, trims self-\u003cbr\u003e  referential host noodling, keeps vivid, reportable anecdotes\u003cbr\u003eAUTHENTICITY_POLICY: polished conversational realism, stumbles removed, tone retained,\u003cbr\u003e  invisible patching over verbatimness, cleans edges without sterilizing\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open with music, host-led chapters plus clip blocks,\u003cbr\u003e  repeated 'set up → tape → react', standardized cta-driven outro\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, micro-reorders to fix logic, avoids thematic\u003cbr\u003e  reshuffles\u003cbr\u003eSPEAKER_TREATMENT: tightens host and guest similarly, producer\u002fthird voice fully removed,\u003cbr\u003e  aggressive backchannel muting, overlap minimized, turns clarified\u003cbr\u003eRULES:\u003cbr\u003e- CUT argument restatement MUST: When either speaker restates the same premise in adjacent\u003cbr\u003e  sentences without adding a new example, new fact, or clearer framing.\u003cbr\u003e- CUT secondary speaker presence MUST: When a producer\u002fthird mic interjects with\u003cbr\u003e  confirmations, jokes, or logistics that don’t advance the narrative, even if it’s\u003cbr\u003e  momentarily witty.\u003cbr\u003e- CUT crosstalk overlap PREFER: When cross-talk is incidental (agreement\u002ffinishing each\u003cbr\u003e  other’s sentences) and can be removed without losing meaning.\u003cbr\u003e- CUT host meta ramble PREFER: When the host is talking about the show itself, their own\u003cbr\u003e  aside, or process commentary, unless it directly tees up the next question or the next\u003cbr\u003e  external clip block.\u003cbr\u003e- CUT host self interruption PREFER: When the host breaks their own sentence with self-\u003cbr\u003e  corrections or searching for phrasing, unless it clearly sets up a sharper next\u003cbr\u003e  question.\u003cbr\u003e- CUT name checks and side examples PREFER: When examples are tossed in as quick\u003cbr\u003e  comparisons but don’t materially change the point (especially mid-paragraph), unless\u003cbr\u003e  they are needed for listener comprehension of the next beat.\u003cbr\u003e- KEEP chronological flow MUST: When the speakers are building a cumulative argument\u003cbr\u003e  across multiple turns; preserve the original back-and-forth rather than reorganizing by\u003cbr\u003e  theme.\u003cbr\u003e- KEEP host frame question MUST: When the host is doing extended framing that leads\u003cbr\u003e  directly into either (a) a guest answer that depends on it or (b) an upcoming clip block\u003cbr\u003e  that it contextualizes.\u003cbr\u003e- KEEP topic transitions to tape MUST: When the host signals a shift into a clip montage\u003cbr\u003e  (e.g., 'let’s listen' \u002f 'here’s what voters said'), keeping enough orientation so the\u003cbr\u003e  clip block lands cleanly.\u003cbr\u003e- KEEP guest reporting anecdote PREFER: When the guest is describing first-hand reporting\u003cbr\u003e  scenes or a concrete interaction, even if the delivery is slightly imperfect, as long as\u003cbr\u003e  it advances the core narrative.\u003cbr\u003e- MUTE backchannel during other speaker PREFER: When a speaker’s brief affirmations\u003cbr\u003e  ('yeah', 'mm-hmm', tag questions) occur under the other speaker’s substantive sentence\u003cbr\u003e  and aren’t needed to preserve the rhythm of a key emotional beat.\u003cbr\u003e- REORDER topic blocks AVOID: If a reorder would shift a block by more than a few beats or\u003cbr\u003e  change the perceived timeline of the conversation rather than just repairing\u003cbr\u003e  comprehension.\u003cbr\u003e- REORDER small explanatory clause PREFER: When a short clause\u002fexample is needed earlier\u003cbr\u003e  to make the immediately following sentence intelligible (pronoun referents, missing\u003cbr\u003e  setup, or a gaffe referenced before it’s stated).","\u003cb\u003eTotal Soccer Show: USMNT, Champions League, EPL, and more ...\u003c\u002fb\u003e\u003cbr\u003eIs the USMNT better now than at the 2022 World Cup? | USMNT Weekly\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro blocks cut, core kept, relentless micro-shaves between words, more\u003cbr\u003e  added pauses than trims\u003cbr\u003eCUT_CRITERIA: protects on-mic chemistry and riffs, cuts redundant connectors and tag-\u003cbr\u003e  words, banter stays; process talk goes\u003cbr\u003eAUTHENTICITY_POLICY: allows messy overlap for energy, cleans polish points invisibly,\u003cbr\u003e  doesn’t over-sanitize cadence\u003cbr\u003eSTRUCTURE_TEMPLATE: produced musical open into roll-in, early plug integrated into host\u003cbr\u003e  flow, hard segment breaks with return line\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved כמעט always, reorders avoided; continuity wins,\u003cbr\u003e  micro-patches instead of reshuffles\u003cbr\u003eSPEAKER_TREATMENT: hosts tightened more than guests, secondary interjections selectively\u003cbr\u003e  muted, crosstalk often left intact\u003cbr\u003eRULES:\u003cbr\u003e- CUT process talk MUST: When the talk is about workflow\u002flogistics (documents, forms,\u003cbr\u003e  tech, scheduling, how to structure the show) rather than the listener-facing topic, even\u003cbr\u003e  if multiple speakers are engaged.\u003cbr\u003e- CUT dangling tag words PREFER: When a turn ends with a trailing single word\u002fphrase that\u003cbr\u003e  merely reaffirms (e.g., lone ‘yeah’, ‘can’, ‘podcasting’) and the sentence lands cleanly\u003cbr\u003e  without it.\u003cbr\u003e- CUT host redundant restarts PREFER: When a host repeats a phrase to restart a sentence\u003cbr\u003e  or re-land a point and the first version already works.\u003cbr\u003e- KEEP chronological sequence MUST: By default, even when there are cleaner thematic\u003cbr\u003e  clusters available, unless the original order creates a clear listener-confusion\u003cbr\u003e  problem.\u003cbr\u003e- KEEP guest argument run MUST: When a guest is building a multi-sentence rationale or\u003cbr\u003e  timeline, even if it includes minor stumbles and overlaps.\u003cbr\u003e- KEEP in topic banter PREFER: When the joke\u002friff is embedded in the topical discussion or\u003cbr\u003e  sets up the next substantive point, even if it includes overlap and mild messiness.\u003cbr\u003e- MUTE guest backchannel over host read PREFER: During promos\u002fhousekeeping\u002fstructured\u003cbr\u003e  transitions, when a guest’s reaction (‘thanks’, ‘shocker’, etc.) overlaps and adds\u003cbr\u003e  texture but risks muddiness.\u003cbr\u003e- MUTE side quips during primary line PREFER: When a secondary speaker throws in a quick\u003cbr\u003e  aside over a primary read\u002fplug\u002fexplanation and removing it via a cut would damage the\u003cbr\u003e  other speaker’s continuity.\u003cbr\u003e- REORDER topic blocks AVOID: Only when a segment was recorded out of intended order and\u003cbr\u003e  the mismatch is explicitly noticeable to a listener (e.g., callbacks to things they\u003cbr\u003e  haven’t heard yet).","\u003cb\u003eThe Instagram Stories\u003c\u002fb\u003e\u003cbr\u003e2-16-26 - AI Doesn't Make Work Easier and ChatGPT gets ads\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: two-speed: micro-shaves plus big drops, prefers short finished runtime, very\u003cbr\u003e  low tolerance for drag, minimal silence sculpting\u003cbr\u003eCUT_CRITERIA: topic relevance beats completeness, keep analysis; drop extra headlines,\u003cbr\u003e  transitions ruthlessly de-duplicated, cta\u002foutro trimmed to essentials\u003cbr\u003eAUTHENTICITY_POLICY: light polish, not full rewrite, allows some casual rough edges,\u003cbr\u003e  cleans around the idea, not voice\u003cbr\u003eSTRUCTURE_TEMPLATE: produced open with show-context recap, bumper-defined segments and\u003cbr\u003e  breaks, external-written outros over music\u003cbr\u003eREORDER_ASSEMBLY: chronological conversation preserved, no thematic re-assembly, reorders\u003cbr\u003e  avoided entirely\u003cbr\u003eSPEAKER_TREATMENT: primary-narrator host protected, co-host trimmed to strongest takes,\u003cbr\u003e  uneven retention tolerated for pace\u003cbr\u003eRULES:\u003cbr\u003e- CUT story block MUST: When a story is not one of the episode’s chosen headline items,\u003cbr\u003e  even if it has a full intro-and-response exchange.\u003cbr\u003e- CUT host prompt question PREFER: When the prompt is purely procedural (‘thoughts?’) and\u003cbr\u003e  the next speaker’s answer is self-starting without needing the prompt for context.\u003cbr\u003e- CUT secondary host redundant agreement PREFER: When the co-host mainly restates the\u003cbr\u003e  primary host’s point without adding a new example, consequence, or distinct stance.\u003cbr\u003e- CUT transition scaffolding PREFER: When a speaker narrates the format (e.g., ‘we’ll\u003cbr\u003e  cover X, then break, then Y’) and the episode already has produced bumpers or a host-\u003cbr\u003e  written reset doing that job.\u003cbr\u003e- KEEP chronological sequence MUST: When the discussion already tracks cleanly from\u003cbr\u003e  premise → evidence → take, even if some lines could be swapped for rhetorical effect.\u003cbr\u003e- KEEP secondary host distinct frame MUST: When the co-host introduces a different lens\u003cbr\u003e  (policy, business model, implementation reality) that expands the story beyond the\u003cbr\u003e  primary host’s framing.\u003cbr\u003e- KEEP explanatory background PREFER: When a story needs quick framing to understand the\u003cbr\u003e  stakes (definitions, premise, what changed, who is affected), even if it adds a few\u003cbr\u003e  sentences before the ‘take.’","\u003cb\u003eAmericast\u003c\u002fb\u003e\u003cbr\u003eTrump's Iran Gamble... What is the US president up to?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro blocks dropped for pace, relentless micro-shaves mid-sentence, low\u003cbr\u003e  tolerance for meandering setup, key analytic runs left intact\u003cbr\u003eCUT_CRITERIA: politics-first; operational detail expendable, detours cut even if vivid,\u003cbr\u003e  keep scene-setting that frames stakes, trim repeated hedging and qualifiers\u003cbr\u003eAUTHENTICITY_POLICY: polished broadcast readability over rawness, meta self-editing\u003cbr\u003e  removed, selective conversational texture retained\u003cbr\u003eSTRUCTURE_TEMPLATE: ad-heavy produced open, branded cold-open montage, fast host id into\u003cbr\u003e  thesis, scripted cta-led outro\u003cbr\u003eREORDER_ASSEMBLY: chronology is default, small reorders to fix logic, patchwork assembly\u003cbr\u003e  inside one answer\u003cbr\u003eSPEAKER_TREATMENT: both hosts equally compressible, heavier de-flub on the rambly speaker,\u003cbr\u003e  backchannels muted when intrusive\u003cbr\u003eRULES:\u003cbr\u003e- CUT on-mic coordination MUST: When speakers coordinate who will say what, acknowledge\u003cbr\u003e  pickups, or negotiate phrasing before continuing the ‘real’ discussion.\u003cbr\u003e- CUT process talk MUST: Whenever the speakers discuss running order, audio sourcing,\u003cbr\u003e  tech\u002flogistics, or how they will redo a section, even if it contains light banter.\u003cbr\u003e- CUT battlefield or on-the-ground detail PREFER: When discussion shifts into granular\u003cbr\u003e  operational\u002fcasualty specifics that do not change the political analysis being made in\u003cbr\u003e  that moment.\u003cbr\u003e- CUT error correction dialogue PREFER: When one speaker corrects another’s slip\u003cbr\u003e  (title\u002fparty\u002flabel) in a way that can be removed without harming factual clarity in the\u003cbr\u003e  kept cut.\u003cbr\u003e- CUT long historical detour PREFER: When a tangent becomes a parallel history\u003cbr\u003e  lesson\u002fanalogy (multiple named actors, extended chronology) and the main point can be\u003cbr\u003e  stated in one sentence without it.\u003cbr\u003e- CUT redundant post-reorder bridges PREFER: After a reorder, remove leftover connective\u003cbr\u003e  tissue that references the original order (e.g., ‘as I said earlier’ when it no longer\u003cbr\u003e  points correctly).\u003cbr\u003e- CUT repeated hedging PREFER: When a speaker repeats the same qualifier or restates the\u003cbr\u003e  same claim within a short span without adding a new reason, example, or consequence.\u003cbr\u003e- KEEP brief reactive acknowledgements AVOID: When short reactions help pace turn-taking\u003cbr\u003e  and don’t step on key information.\u003cbr\u003e- KEEP scene setting detail PREFER: When concrete details (setting, tone, visuals)\u003cbr\u003e  directly support the episode’s interpretation of intent, seriousness, or political\u003cbr\u003e  posture.\u003cbr\u003e- MUTE mid-sentence asides PREFER: When a speaker inserts quick parentheticals that don’t\u003cbr\u003e  change meaning (e.g., ‘as that’, ‘as well’, stray ‘hmm’) and they interrupt a clean\u003cbr\u003e  sentence.\u003cbr\u003e- REORDER answer restarts PREFER: When the speaker restarts an answer more succinctly\u003cbr\u003e  later; move the cleaner version earlier and drop the messy lead-in.\u003cbr\u003e- REORDER dense list or attribution sequence PREFER: When a speaker’s explanation involves\u003cbr\u003e  multiple actors\u002flabels and the recorded order creates confusion or misattribution;\u003cbr\u003e  rearrange locally to make the logic track cleanly.","\u003cb\u003eTotal Soccer Show: USMNT, Champions League, EPL, and more ...\u003c\u002fb\u003e\u003cbr\u003eBest groups at the 2026 World Cup, Harry Kane's Ballon d'Or credentials, how fan-owned clubs work, and more! | Listener Questions\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light trim, near-full session, micro-shave between turns, macro cuts only for\u003cbr\u003e  pre-roll\u003cbr\u003eCUT_CRITERIA: protect long answer arcs, keep playful tangents once rolling, chop extended\u003cbr\u003e  warm-up chatter\u003cbr\u003eAUTHENTICITY_POLICY: loose, conversational texture retained, polish via invisible micro-\u003cbr\u003e  cuts, allows messy overlap to live\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music-backed open, quick top-line episode menu, clean\u003cbr\u003e  breakpoints between questions\u003cbr\u003eREORDER_ASSEMBLY: chronology is the default, no thematic reshuffle\u003cbr\u003eSPEAKER_TREATMENT: hosts trimmed harder than guests, crosstalk managed with selective\u003cbr\u003e  mutes, let interruptions signal energy\u003cbr\u003eRULES:\u003cbr\u003e- CUT pre roll banter MUST: In the opening minute(s) before the formal welcome\u002ftopic\u003cbr\u003e  slate, especially when the talk is about being ready, explaining the premise, or riffing\u003cbr\u003e  without landing the first question.\u003cbr\u003e- CUT host ramble PREFER: When a host is extending a bit past its peak or narrating their\u003cbr\u003e  own confusion in a way that delays the next substantive prompt\u002fanswer.\u003cbr\u003e- CUT low value single words PREFER: When a lone interjection (e.g., a single\u003cbr\u003e  address\u002fname\u002ffragment) interrupts flow or creates a stuttery read, unless it is needed\u003cbr\u003e  to preserve the conversational rhythm.\u003cbr\u003e- CUT redundant button PREFER: When a joke\u002fbeat has already landed and the following tag\u003cbr\u003e  lines are just re-saying the same punch or acknowledgment without adding a new angle.\u003cbr\u003e- KEEP chronological flow MUST: Throughout the main conversation, even when there are\u003cbr\u003e  tangents; prefer trimming them shorter over relocating them.\u003cbr\u003e- KEEP group banter PREFER: When multiple speakers are riffing but the exchange is still\u003cbr\u003e  trackable and adding tone\u002fchemistry; only prune the smallest pieces needed for clarity.\u003cbr\u003e- KEEP guest cadence PREFER: When guests are mid-thought, even if the delivery is slightly\u003cbr\u003e  messy; avoid edits that would make the guest sound chopped or overly produced.\u003cbr\u003e- KEEP story block PREFER: When a speaker is building a multi-sentence argument or\u003cbr\u003e  explanation (lists, reasoning chains, historical examples), even if it runs long, unless\u003cbr\u003e  it becomes clearly repetitive.\u003cbr\u003e- MUTE overlap fragment MUST: During crosstalk where one speaker’s line is clearly primary\u003cbr\u003e  and the other is mostly a partial repeat, trailing word, or side-comment that competes\u003cbr\u003e  for intelligibility.\u003cbr\u003e- REORDER topic block AVOID: Only when a later clarification is required for basic\u003cbr\u003e  comprehension of an earlier exchange and can be moved without breaking references\u002ftime-\u003cbr\u003e  words (e.g., 'earlier', 'yesterday').","\u003cb\u003eThe Daily Beast Podcast\u003c\u002fb\u003e\u003cbr\u003eWhy Trump's War Is Only About Himself: Wolff\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: moderate trim, long takes survive, decisive long-silence removal, mostly\u003cbr\u003e  phrase-level, not micro-shaved, runtime can grow via inserts\u003cbr\u003eCUT_CRITERIA: protect thesis-driven monologues and stories, cut weak analogies and empty\u003cbr\u003e  emphasis, trim factual clutter and stray numbers, let topical tangents run if lively\u003cbr\u003eAUTHENTICITY_POLICY: crosstalk left largely intact, imperfections kept unless distracting,\u003cbr\u003e  selective cleanup, not full polish, edits visible around hard beats\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open with bed, frequent mid-episode external breaks,\u003cbr\u003e  external clip used as evidence, outros built from external wrap\u003cbr\u003eREORDER_ASSEMBLY: chronology respected in main body, no thematic reshuffling, externally-\u003cbr\u00
