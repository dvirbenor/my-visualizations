erving the original question → answer\u003cbr\u003e  sequence; only consider a reorder if chronology itself causes listener confusion that\u003cbr\u003e  cannot be fixed by trimming.\u003cbr\u003e- KEEP host question core MUST: Keep the shortest form of the host question that preserves\u003cbr\u003e  what the guest is answering; remove leading clauses and trailing add-ons.\u003cbr\u003e- KEEP guest argument run PREFER: When the guest is building a multi-sentence causal claim\u003cbr\u003e  or interpretation (even with a few ums\u002frestarts), unless the segment is purely repeating\u003cbr\u003e  the same assertion with no new evidence.\u003cbr\u003e- MUTE host word level fix PREFER: When a tiny host phrasing issue (name\u002ftitle stumble,\u003cbr\u003e  duplicated word) can be repaired with a short mute while maintaining the sentence’s\u003cbr\u003e  flow.\u003cbr\u003e- REORDER misplaced context line AVOID: Only if a single short context sentence is\u003cbr\u003e  required before a kept segment to make pronouns\u002fevents intelligible, and inserting it\u003cbr\u003e  creates fewer seams than writing\u002fadding an external line.","\u003cb\u003eThe Ross Mandell Podcast\u003c\u002fb\u003e\u003cbr\u003eDefense Attorney Reveals What They Never Teach You in Law School\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light runtime compression overall, relentless sub-second micro-shaves,\u003cbr\u003e  silence trimmed then re-padded\u003cbr\u003eCUT_CRITERIA: cut technical interruptions completely, trim host verbal tics aggressively,\u003cbr\u003e  protect guest teaching\u002fexplanation arcs, keep raw personal\u002flegal anecdotes\u003cbr\u003eAUTHENTICITY_POLICY: profanity and blunt phrasing retained, edits kept invisible, some\u003cbr\u003e  rough overlap tolerated\u003cbr\u003eSTRUCTURE_TEMPLATE: music-led host intro, brief stinger within main, straightforward\u003cbr\u003e  thank-you close\u003cbr\u003eREORDER_ASSEMBLY: strict chronological assembly, no thematic reshuffle, no highlight cold-\u003cbr\u003e  open\u003cbr\u003eSPEAKER_TREATMENT: guest interruptions muted under host, guest answers largely preserved,\u003cbr\u003e  host intro protected from interjections, backchannels suppressed for clarity\u003cbr\u003eRULES:\u003cbr\u003e- CUT tech check or production note MUST: Any moment where recording\u002fproduction is\u003cbr\u003e  discussed (screen shaking, audio\u002fvideo notes, re-asking the same question due to setup),\u003cbr\u003e  even if it interrupts an otherwise good story.\u003cbr\u003e- CUT host micro starts before guest turn PREFER: Right before handing to the guest (e.g.,\u003cbr\u003e  repeated lead-ins), as long as the guest’s entry still feels properly cued.\u003cbr\u003e- CUT host repetitive connectors PREFER: When the host repeats short connectors (e.g.,\u003cbr\u003e  single-word affirmations or restarts) that don’t set up a new question or add emphasis\u003cbr\u003e  that lands.\u003cbr\u003e- KEEP guest explanatory block MUST: When the guest is laying out an educational\u002flegal\u003cbr\u003e  concept or a step-by-step practical takeaway, unless it becomes purely redundant.\u003cbr\u003e- KEEP guest full sentence response MUST: When the guest is answering a direct question\u003cbr\u003e  with substantive content; prefer muting overlaps over cutting their phrasing.\u003cbr\u003e- KEEP question answer sequence MUST: When a host question directly tees up the guest’s\u003cbr\u003e  next answer; preserve that adjacency rather than inserting other material between them.\u003cbr\u003e- KEEP host personal case example PREFER: When the host’s anecdote provides\u003cbr\u003e  stakes\u002fauthority for the topic (even if tangentially framed), unless it fully derails\u003cbr\u003e  the guest’s answer for an extended stretch.\u003cbr\u003e- MUTE guest backchannel under host MUST: When the guest reacts (short\u003cbr\u003e  interjections\u002fagreements) while the host is mid-sentence or in an uninterrupted\u003cbr\u003e  intro\u002fsetup.\u003cbr\u003e- MUTE guest interjection during host intro PREFER: During the opening introduction and\u003cbr\u003e  initial framing, unless the interjection is necessary to establish rapport or correct a\u003cbr\u003e  factual detail the host relies on.\u003cbr\u003e- REORDER topic block AVOID: Only if a cut creates a clarity problem that cannot be fixed\u003cbr\u003e  with micro-cuts, and the moved block remains adjacent to its original context (small\u003cbr\u003e  shift, not a thematic rebuild).","\u003cb\u003eThe Times of Israel Daily Briefing\u003c\u002fb\u003e\u003cbr\u003eImam Imad Al Masri: The Muslim community spreading peace in Israel and beyond\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: light overall compression; keeps arcs, micro-shaves inside sentences, long\u003cbr\u003e  guest monologues largely intact, silence mostly left natural\u003cbr\u003eCUT_CRITERIA: cuts redundancy, keeps conviction, prunes proof-by-citation detours,\u003cbr\u003e  protects theme-defining anecdotes, cleans transitions with tiny snips\u003cbr\u003eAUTHENTICITY_POLICY: keeps imperfect syntax and accent, polish stays mostly invisible,\u003cbr\u003e  allows some raw intensity, uses mutes over heavy rewriting\u003cbr\u003eSTRUCTURE_TEMPLATE: produced host-led framing intro, ad breaks create chapter beats, clear\u003cbr\u003e  'back from break' resets, outro leaves room for guest close\u003cbr\u003eREORDER_ASSEMBLY: chronological interview preserved, rare micro-reorder to repair, no\u003cbr\u003e  thematic reshuffle, edits prioritize sentence logic\u003cbr\u003eSPEAKER_TREATMENT: guest protected; host tightened more, host interruptions minimized,\u003cbr\u003e  backchannels muted during questions, guest gets long uninterrupted runs\u003cbr\u003eRULES:\u003cbr\u003e- CUT continuity breaks created by reorder MUST: If a reorder would require additional\u003cbr\u003e  narration to explain time\u002fcontext, abandon the reorder and cut within the original\u003cbr\u003e  chronology instead.\u003cbr\u003e- CUT citation name drops and source lists PREFER: When the speaker starts stacking named\u003cbr\u003e  publications\u002fexperts\u002fexamples as a tangent that delays the main point, unless the\u003cbr\u003e  conversation has explicitly shifted into ‘evidence for a contested claim.’\u003cbr\u003e- CUT guest repetition PREFER: When the guest restates the same claim in adjacent\u003cbr\u003e  sentences (rephrasing without adding new information), unless the repetition is serving\u003cbr\u003e  a deliberate rhetorical build or emotional emphasis.\u003cbr\u003e- CUT host connective ramps PREFER: When the host uses short ramps like ‘okay, so,’\u003cbr\u003e  ‘yeah,’ ‘now,’ ‘in a minute,’ or similar connectors that do not add a new question\u003cbr\u003e  constraint or essential context.\u003cbr\u003e- KEEP question then answer order MUST: When editing interview segments, do not move an\u003cbr\u003e  answer ahead of its motivating question (or detach it from the immediate setup) except\u003cbr\u003e  for a clearly labeled cold-open hook.\u003cbr\u003e- KEEP theme clinching story or analogy MUST: When a story\u002fanalogy functions as a clear\u003cbr\u003e  ‘so what’ capstone (especially near the end), even if it’s longer than the surrounding\u003cbr\u003e  turns.\u003cbr\u003e- KEEP guest long explanation block PREFER: When the guest is in a coherent multi-sentence\u003cbr\u003e  explanation (history, beliefs, mission) with internal logic, avoid fragmenting it into\u003cbr\u003e  overly chopped soundbites.\u003cbr\u003e- KEEP host signposts around breaks PREFER: When the host is clearly marking structure\u003cbr\u003e  (‘we’ll take a break,’ ‘and we are back,’ ‘here’s what we’ll cover next’), keep the\u003cbr\u003e  signpost even if it’s slightly repetitive.\u003cbr\u003e- MUTE guest backchannel during host question MUST: When the guest says a quick ‘yes\u002fthank\u003cbr\u003e  you\u002fof course’ while the host is still asking or framing the question, and the response\u003cbr\u003e  is purely phatic (not substantive).\u003cbr\u003e- MUTE overlapping affirmations MUST: When a brief affirmation\u002fbackchannel (e.g., ‘yes,’\u003cbr\u003e  ‘thank you,’ ‘wow,’ ‘of course’) lands on top of the other speaker’s active sentence or\u003cbr\u003e  question, and it doesn’t change meaning.\u003cbr\u003e- REORDER micro phrase block PREFER: When a short clause\u002fphrase needs to be repositioned\u003cbr\u003e  to restore grammatical sense after removing surrounding material, and the meaning\u003cbr\u003e  remains unchanged within the same topic beat.","\u003cb\u003eCONFLICTED\u003c\u002fb\u003e\u003cbr\u003eAfrican Slavery: The Untold Story\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between clauses, low pause tolerance, frequent trims,\u003cbr\u003e  keeps long expert run-ons intact\u003cbr\u003eCUT_CRITERIA: pre-topic context sacrificed for focus, host framing kept; logistics\u003cbr\u003e  removed, banter only if it lands\u003cbr\u003eAUTHENTICITY_POLICY: cleaned speech, minimal stumbles, allows occasional live reaction\u003cbr\u003e  bleed, polish prioritized over rawness\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open with thesis, music-bedded intro and outro, hard\u003cbr\u003e  pivot into main interview\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with tiny repairs, micro-reorders to restore coherence,\u003cbr\u003e  reorders used sparingly\u003cbr\u003eSPEAKER_TREATMENT: symmetric tightening across speakers, backchannels muted under key\u003cbr\u003e  points, guest run protected over host meander\u003cbr\u003eRULES:\u003cbr\u003e- CUT post-recording debrief and mutual compliments MUST: After the apparent\u003cbr\u003e  conversational wrap, when the speakers switch into evaluating the interview or praising\u003cbr\u003e  each other rather than advancing the listener-facing narrative.\u003cbr\u003e- CUT topic reset or previous-episode recap MUST: When the host rehashes prior-episode\u003cbr\u003e  context or provides a news\u002fupdate sidebar that isn’t required to understand today’s\u003cbr\u003e  topic hook.\u003cbr\u003e- CUT guest self-interruption distraction apology PREFER: When the guest notes they were\u003cbr\u003e  distracted or flags a momentary derail (e.g., ‘sorry, I was distracted’), unless it\u003cbr\u003e  meaningfully reframes the point.\u003cbr\u003e- CUT host over-qualification and mid-sentence backtracking PREFER: When the host\u003cbr\u003e  repeatedly rephrases, corrects, or qualifies a point without adding new information that\u003cbr\u003e  changes the question being asked.\u003cbr\u003e- CUT sensitive word prefaces and meta-commentary PREFER: When a speaker begins to\u003cbr\u003e  introduce or justify repeating a slur\u002fcharged term; retain the surrounding point but\u003cbr\u003e  remove the meta lead-in unless the term itself is essential and handled explicitly.\u003cbr\u003e- KEEP brief crosstalk excitement PREFER: When overlap signals genuine energy (quick\u003cbr\u003e  shared reactions) and doesn’t obscure a substantive claim.\u003cbr\u003e- KEEP host dense summaries as questions PREFER: When the host gives a compact,\u003cbr\u003e  information-rich summary that clearly funnels into a single, well-formed question for\u003cbr\u003e  the guest to answer.\u003cbr\u003e- MUTE host backchannel MUST: When the guest is delivering a high-information sentence and\u003cbr\u003e  the host interjects (agreement words, short phrases) that competes with intelligibility.\u003cbr\u003e- REORDER macro blocks across topics AVOID: If a reorder would move content into a\u003cbr\u003e  different topic chapter or change the episode’s argument progression, avoid it and solve\u003cbr\u003e  with cuts or a brief external bridge instead.\u003cbr\u003e- REORDER short story beats within same topic PREFER: When removing a line creates a\u003cbr\u003e  dangling reference, allow a small within-topic reorder to restore a complete sentence or\u003cbr\u003e  story setup → payoff sequence.","\u003cb\u003eAI Agents Podcast\u003c\u002fb\u003e\u003cbr\u003eBuilding AI Research Agents with Kevin White (ScrunchAI) | EP122\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high-retention, light compression, micro-shaves over macro removals, pauses\u003cbr\u003e  tightened, not sterilized\u003cbr\u003eCUT_CRITERIA: guest substance protected; host tightened, cuts question re-phrases mid-ask,\u003cbr\u003e  removes dead-end meta talk\u003cbr\u003eAUTHENTICITY_POLICY: polish via pickups, not rewrites, candid uncertainty left in, light\u003cbr\u003e  cleanup of rough edges\u003cbr\u003eSTRUCTURE_TEMPLATE: teaser\u002fcold-open before formal intro, produced intro with music bed,\u003cbr\u003e  short cta outro sign-off\u003cbr\u003eREORDER_ASSEMBLY: chronology-first main conversation, hooking handled without reordering,\u003cbr\u003e  assembly favors inserts over moves\u003cbr\u003eSPEAKER_TREATMENT: guest protected; host more editable, host lines patched\u002freplaced as\u003cbr\u003e  needed, backchannels suppressed under answers\u003cbr\u003eRULES:\u003cbr\u003e- CUT host question refinement MUST: When the host repeatedly restates or \"refines\" the\u003cbr\u003e  question inside the same turn, unless the restate introduces a meaningfully different\u003cbr\u003e  angle that the guest responds to.\u003cbr\u003e- CUT dead end meta history PREFER: When the conversation moves into background details\u003cbr\u003e  nobody can answer (e.g., uncertain origin history) and it produces no actionable insight\u003cbr\u003e  within the next beat.\u003cbr\u003e- CUT host ramble setup PREFER: When the host’s setup becomes a multi-clause preface that\u003cbr\u003e  delays the question, unless it explicitly frames the guest’s next answer with needed\u003cbr\u003e  context.\u003cbr\u003e- KEEP chronological flow MUST: For the main interview body, unless the recorded order\u003cbr\u003e  creates clear factual confusion that cannot be resolved with a single bridging line.\u003cbr\u003e- KEEP guest explanatory run MUST: When the guest is laying out a multi-step explanation\u003cbr\u003e  (definitions → mechanism → implication), even if it runs long or includes minor hedges.\u003cbr\u003e- KEEP guest limitations disclaimer PREFER: When the guest explicitly marks the edge of\u003cbr\u003e  their expertise but continues with a useful high-level explanation (i.e., the disclaimer\u003cbr\u003e  builds trust without stalling the answer).\u003cbr\u003e- KEEP guest long turn continuity PREFER: When cutting would create a stitched or overly\u003cbr\u003e  produced feel in the guest’s cadence; prefer leaving the run long over interrupting the\u003cbr\u003e  reasoning chain.\u003cbr\u003e- MUTE backchannel under primary speaker MUST: When short affirmations (e.g., \"mm-hmm\",\u003cbr\u003e  \"sure\", \"got it\") overlap or interrupt the active speaker’s sentence.\u003cbr\u003e- MUTE duplicate guest line after insert MUST: When an external pickup or duplicated line\u003cbr\u003e  is inserted and the original spoken line would repeat immediately or create an echo.\u003cbr\u003e- REORDER cold open hook AVOID: Only when a short, self-contained highlight can be moved\u003cbr\u003e  to the open without introducing references that require earlier context.","\u003cb\u003eInterpreting India\u003c\u002fb\u003e\u003cbr\u003eCybersecurity in Outer Space: A Growing Concern\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high retention, light tightening, micro-cuts over big restructures, adds\u003cbr\u003e  deliberate breathing room, long questions mostly uncompressed\u003cbr\u003eCUT_CRITERIA: cuts low-information tag-words, removes recording confusion repeats, keeps\u003cbr\u003e  dense expert explanations intact, banter only if on-mission\u003cbr\u003eAUTHENTICITY_POLICY: cleaned but not over-sanitized, leaves some ums and roughness,\u003cbr\u003e  invisible edits inside sentences\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music-bed intro, straight interview body, music-backed\u003cbr\u003e  branded outro, no cold-open; pre-roll removed\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, reorders avoided, continuity over highlight-\u003cbr\u003e  stitching\u003cbr\u003eSPEAKER_TREATMENT: guest protected; host trimmed more, host interjections suppressed,\u003cbr\u003e  guest answers kept contiguous\u003cbr\u003eRULES:\u003cbr\u003e- CUT miscommunication repeats MUST: When a moment reveals the participants re-\u003cbr\u003e  asking\u002frephrasing due to not hearing\u002funderstanding (e.g., 'say that again' \u002f immediate\u003cbr\u003e  re-take), unless it materially clarifies a complex point for the audience.\u003cbr\u003e- CUT host outro or intro extra word PREFER: When a host’s closing\u002fintro adjective or\u003cbr\u003e  emphasis is immediately echoed by the guest and adds no new meaning (avoid duplicated\u003cbr\u003e  sentiment).\u003cbr\u003e- CUT host question redundancy PREFER: When the host repeats the same premise multiple\u003cbr\u003e  times inside one long question; keep the version that most directly sets up the guest’s\u003cbr\u003e  next answer.\u003cbr\u003e- CUT host single-word tags PREFER: When the host inserts or appends short tags (e.g.,\u003cbr\u003e  one-word acknowledgments, trailing labels like 'history\u002fthat\u002fproportionate') that don’t\u003cbr\u003e  add semantic content or change the question’s intent.\u003cbr\u003e- KEEP chronological topic progression MUST: Throughout the main conversation, even if a\u003cbr\u003e  later passage might be a stronger hook; prioritize original build and logical dependency\u003cbr\u003e  between questions and answers.\u003cbr\u003e- KEEP guest cadence and hedges PREFER: When hedges\u002fqualifiers are part of the guest’s\u003cbr\u003e  legal\u002ftechnical accuracy (e.g., distinguishing policy vs law, uncertainty, lack of\u003cbr\u003e  precedent), unless they are purely repetitive.\u003cbr\u003e- KEEP guest long explanation block PREFER: When the guest is building a multi-part\u003cbr\u003e  explanation (definitions, thresholds, examples) even if it includes hedging or side-\u003cbr\u003e  qualification, unless it fully leaves the episode’s central theme.\u003cbr\u003e- MUTE host backchannel during guest MUST: When the host vocalizes short confirmations or\u003cbr\u003e  bridging phrases during a guest’s ongoing explanation and the guest’s sentence works\u003cbr\u003e  cleanly without them.\u003cbr\u003e- MUTE mid-sentence stumble fragment PREFER: When a speaker starts a phrase then restarts\u003cbr\u003e  (“I…I…”, partial clause) and the surrounding sentence remains grammatical without it;\u003cbr\u003e  prefer muting the fragment over cutting the whole sentence.\u003cbr\u003e- REORDER reset or duplicate take AVOID: Only when a clear recording re-take\u002freset creates\u003cbr\u003e  duplicated material and a small move would remove the duplication without altering\u003cbr\u003e  meaning (e.g., selecting the clean take and placing it where the first attempt\u003cbr\u003e  occurred).","\u003cb\u003eThe Journal.\u003c\u002fb\u003e\u003cbr\u003eU.S. and Israel Attack Iran\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between clauses, host delivery compressed\u003cbr\u003e  aggressively, macro blocks dropped when redundant, minimal silence tinkering\u003cbr\u003eCUT_CRITERIA: cut narration-about-narration and scaffolding, keep uncertainty and\u003cbr\u003e  analytical caveats, questions reduced to the sharpest ask, examples pruned to one\u003cbr\u003e  strongest\u003cbr\u003eAUTHENTICITY_POLICY: broadcast-polished, low disfluency, retakes implied, not showcased,\u003cbr\u003e  crosstalk cleaned via suppression, meaning preserved over verbatim\u003cbr\u003eSTRUCTURE_TEMPLATE: tape-forward, produced bookends, clip-driven beat transitions, midroll\u003cbr\u003e  sponsor block with music, credits\u002foutro treated as segments\u003cbr\u003eREORDER_ASSEMBLY: chronology protected; no reshuffle, edits happen in-place, do-overs\u003cbr\u003e  solved by deletion, not moves\u003cbr\u003eSPEAKER_TREATMENT: hosts are the primary cut source, host questions tightened to\u003cbr\u003e  essentials, interjections muted to protect answers, guest analysis left comparatively\u003cbr\u003e  intact\u003cbr\u003eRULES:\u003cbr\u003e- CUT explicit retake negotiation MUST: When speakers discuss how to re-ask\u002fre-answer a\u003cbr\u003e  question or negotiate which line to use; retain only the final clean take in its\u003cbr\u003e  original position.\u003cbr\u003e- CUT host meta scaffolding MUST: When hosts talk about the mechanics of the interview\u003cbr\u003e  (setting up clips, steering to another speaker, acknowledging confusion, asking for a\u003cbr\u003e  re-take), unless it contains a necessary factual clarification the audience would\u003cbr\u003e  otherwise miss.\u003cbr\u003e- CUT host question padding MUST: When a host question includes multiple wind-ups, self-\u003cbr\u003e  corrections, or repeated framing before the actual ask; keep only the shortest version\u003cbr\u003e  that preserves context.\u003cbr\u003e- CUT long list of targets or factions PREFER: When lists (countries, factions, goals,\u003cbr\u003e  names) extend beyond what is needed to orient the listener; retain the minimum set that\u003cbr\u003e  preserves the analytic contrast.\u003cbr\u003e- CUT redundant premise restatement PREFER: When a speaker repeats the same premise or\u003cbr\u003e  rationale across adjacent turns (often after a clip or after a host paraphrase), keeping\u003cbr\u003e  only the clearest statement that advances the point.\u003cbr\u003e- KEEP chronological flow MUST: Across the main interview, even when tightening heavily;\u003cbr\u003e  prefer local trims over moving blocks to new positions.\u003cbr\u003e- KEEP fog of war disclaimers PREFER: When speakers explicitly mark unknowns\u002fverification\u003cbr\u003e  limits (conditions unknown, outcomes unconfirmed, reporting still developing), even if\u003cbr\u003e  it slows pacing slightly.\u003cbr\u003e- KEEP guest long form reasoning PREFER: When the guest is laying out causal logic,\u003cbr\u003e  constraints, or historical parallels; compress only repetitions, not the reasoning\u003cbr\u003e  chain.\u003cbr\u003e- MUTE host interjection during answer PREFER: When the host interjects while another\u003cbr\u003e  speaker is delivering a substantive answer (clarifiers, tag questions, agreement noises)\u003cbr\u003e  and the interjection isn’t required to resolve ambiguity.\u003cbr\u003e- REORDER clarity fix reorder AVOID: Only if a later clean take is clearly intended to\u003cbr\u003e  replace an earlier one and simple cutting cannot produce a coherent sequence without\u003cbr\u003e  moving the replacement adjacent to the prompt.","\u003cb\u003e7am\u003c\u002fb\u003e\u003cbr\u003eTrump’s Iran war: regime change or regime chaos?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: micro-shave between clauses, keeps long expert runs intact, macro-cut only\u003cbr\u003e  for redundancy, low emphasis on silence cuts\u003cbr\u003eCUT_CRITERIA: replace host setup with produced framing, cuts geopolitical scene-setting\u003cbr\u003e  repetition, protects clear causal claims, prunes guest digression lists\u003cbr\u003eAUTHENTICITY_POLICY: polished but not sterile, allows some 'uh' under bed, meaning\u003cbr\u003e  preserved over verbatim, selective surgical muting\u003cbr\u003eSTRUCTURE_TEMPLATE: news-magazine cold open package, frequent mid-conversation clip drops,\u003cbr\u003e  tease stinger before next beat, produced news outro wrap\u003cbr\u003eREORDER_ASSEMBLY: small thematic reorders near end, chronology mostly preserved, reorders\u003cbr\u003e  to stitch after cuts\u003cbr\u003eSPEAKER_TREATMENT: host minimized to clean prompts, guest voice dominates runtime, more\u003cbr\u003e  aggressive trimming on guest, crosstalk essentially eliminated\u003cbr\u003eRULES:\u003cbr\u003e- CUT host question preface MUST: When the host’s question includes multiple restarts,\u003cbr\u003e  meta-setup, or stacked sub-questions and the core prompt can be expressed in one line\u003cbr\u003e  (often covered by external narration).\u003cbr\u003e- CUT host ramble MUST: When the host stacks qualifiers, context, or multiple versions of\u003cbr\u003e  the same question before yielding the floor; retain only the final clean interrogative.\u003cbr\u003e- CUT mutual thanks signoff MUST: When a produced outro will cover sign-off duties; remove\u003cbr\u003e  in-session gratitude exchanges to avoid double endings.\u003cbr\u003e- CUT bridge phrases PREFER: When phrases like 'look', 'I mean', 'hence', 'if anything',\u003cbr\u003e  or repeated qualifiers appear in clusters and don’t carry emphasis or contrast.\u003cbr\u003e- CUT guest context recap PREFER: When the guest re-explains background already\u003cbr\u003e  established by external clips\u002fnarration or by their own prior sentences, unless the\u003cbr\u003e  recap introduces a new causal hinge or stakes escalation.\u003cbr\u003e- CUT guest list block PREFER: When the guest goes into multi-item chronologies or\u003cbr\u003e  protest\u002fhistory lists that don’t change the next question’s stakes; keep a single\u003cbr\u003e  representative example instead.\u003cbr\u003e- KEEP chronological flow MUST: Throughout the main analysis, unless removing or moving a\u003cbr\u003e  block is necessary to fix a continuity break introduced by a cut (missing referent,\u003cbr\u003e  unanswered question, or abrupt topic jump).\u003cbr\u003e- KEEP guest consequence frame MUST: When the guest articulates second-order consequences\u003cbr\u003e  (spillover, incentives, governance failure, regional balance) even if phrased\u003cbr\u003e  imperfectly or with some redundancy.\u003cbr\u003e- KEEP guest long turn MUST: When the guest is building a multi-sentence causal\u003cbr\u003e  explanation, even if there are minor stumbles—avoid interrupting the arc with over-\u003cbr\u003e  editing.\u003cbr\u003e- MUTE guest mid-phrase noise PREFER: When a brief guest fragment occurs inside a music-\u003cbr\u003e  supported passage and removing it improves intelligibility without altering the\u003cbr\u003e  sentence’s core proposition.\u003cbr\u003e- REORDER closing takeaway PREFER: In the final section, when multiple conditional clauses\u003cbr\u003e  exist (e.g., 'if X continues… if Y happens…') and reordering them creates a clearer\u003cbr\u003e  escalation ladder without changing meaning.\u003cbr\u003e- REORDER guest answer fragment PREFER: When a later sentence directly answers an earlier\u003cbr\u003e  question more cleanly than the surrounding material (e.g., it provides the decisive\u003cbr\u003e  conditional or takeaway) and moving it reduces the need for extra host prompting.","\u003cb\u003eThinking Crypto News & Interviews\u003c\u002fb\u003e\u003cbr\u003eHas the Crypto Relief Rally Started? Bitcoin, Ethereum, XRP, Solana, & Uniswap Analysis!\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high retention, micro-shaved pacing, near-zero dead-air tolerance, minimal\u003cbr\u003e  macro content removal\u003cbr\u003eCUT_CRITERIA: cuts host niceties and redundancies, protects analytic explanation runs,\u003cbr\u003e  prefers surgical word-level trims\u003cbr\u003eAUTHENTICITY_POLICY: cleaned but not sterile, some natural roughness left in, edits made\u003cbr\u003e  mostly invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: ad-heavy pre-roll before welcome, music bed used to glue sections, no\u003cbr\u003e  produced outro tag\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved in main talk, reorders avoided; fixes only, front-\u003cbr\u003e  loads non-session open\u003cbr\u003eSPEAKER_TREATMENT: aggressive backchannel muting, host trimmed more than guest, guest\u003cbr\u003e  track protected from interruptions\u003cbr\u003eRULES:\u003cbr\u003e- CUT broken thought train loss MUST: When a speaker explicitly loses their train of\u003cbr\u003e  thought or the exchange becomes meta-confusion about what to cover next, once the\u003cbr\u003e  intended topic can be re-entered cleanly.\u003cbr\u003e- CUT host phatic lines PREFER: When the host uses conversational glue (e.g., compliments,\u003cbr\u003e  “great question,” repeated agreement) that does not introduce a new question, data\u003cbr\u003e  point, or transition.\u003cbr\u003e- CUT micro fillers inside fluent sentence PREFER: When single-word fillers or micro-\u003cbr\u003e  stumbles occur inside otherwise clear sentences and can be removed without changing\u003cbr\u003e  meaning or cadence.\u003cbr\u003e- KEEP brief crosstalk that confirms AVOID: When overlap is very brief and functions as a\u003cbr\u003e  confirm\u002fhandshake moment without obscuring words.\u003cbr\u003e- KEEP chronological main conversation MUST: Across the substantive discussion, unless the\u003cbr\u003e  timeline itself causes confusion that can’t be solved with micro-cuts.\u003cbr\u003e- KEEP guest full reasoning chain PREFER: When the guest is walking through a metric,\u003cbr\u003e  comparison, or causal explanation, even if it includes minor roughness, as long as each\u003cbr\u003e  sentence advances the argument.\u003cbr\u003e- MUTE host backchannels under guest MUST: When the host interjects short\u003cbr\u003e  affirmations\u002flaughter while the guest is mid-explanation, to preserve an uninterrupted\u003cbr\u003e  guest sentence.\u003cbr\u003e- MUTE secondary speaker bleed or overlap PREFER: When a secondary speaker’s audio appears\u003cbr\u003e  beneath the primary speaker (even if supportive) and it competes with intelligibility.\u003cbr\u003e- REORDER clarity repair block AVOID: Only when a brief out-of-sequence placement cleanly\u003cbr\u003e  resolves a moment of confusion (e.g., a question asked after its answer due to an\u003cbr\u003e  interruption).\u003cbr\u003e- REORDER cold open or preroll inserts PREFER: When using external promos\u002fhooks, place\u003cbr\u003e  them before the host welcome without attempting to interleave them into the core\u003cbr\u003e  conversation timeline.","\u003cb\u003eAI Agents Podcast\u003c\u002fb\u003e\u003cbr\u003eBuilding AI Red Flags - Max Eisendrath Makes Risk Management Smarter with Redflag AI | EP 123\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-full-session retention, micro-shaves, not macro cuts, turn-edge\u003cbr\u003e  tightening over reshaping, silence sculpted with trims and pads\u003cbr\u003eCUT_CRITERIA: questions streamlined; answers protected, cut redundant tag-ons and\u003cbr\u003e  fragments, banter tolerated if it lands, patch rough seams with tiny inserts\u003cbr\u003eAUTHENTICITY_POLICY: conversational roughness stays in, invisible cleanup, not ‘radio\u003cbr\u003e  perfect’, slang and candid reactions preserved\u003cbr\u003eSTRUCTURE_TEMPLATE: produced branded intro bed, unsegmented chronological main talk, cta-\u003cbr\u003e  style outro under music\u003cbr\u003eREORDER_ASSEMBLY: chronology is effectively fixed, assembly favors live q→a flow\u003cbr\u003eSPEAKER_TREATMENT: guest prioritized; host trimmed harder, aggressive suppression of\u003cbr\u003e  under-talk, host prompts tightened to essentials\u003cbr\u003eRULES:\u003cbr\u003e- CUT host question tag ons MUST: When the host’s question is already complete and\u003cbr\u003e  remaining words are just trailing add-ons (e.g., extra address, ‘or?’, ‘of…’) that don’t\u003cbr\u003e  change meaning.\u003cbr\u003e- CUT host redundant confirmations PREFER: When the host adds quick confirmations or\u003cbr\u003e  conversational resets (‘alright’, ‘thanks’, ‘yeah…’) that don’t set up a new question or\u003cbr\u003e  meaningfully react.\u003cbr\u003e- CUT meta question framing PREFER: When either speaker comments on how a question was\u003cbr\u003e  phrased (self-critique, restart chatter) and the corrected question immediately follows.\u003cbr\u003e- KEEP chronological sequence MUST: Throughout the main conversation, unless a time-order\u003cbr\u003e  artifact makes a question\u002fanswer relationship unclear without a move.\u003cbr\u003e- KEEP guest explanation blocks MUST: When the guest is building a multi-step explanation\u003cbr\u003e  or listing concrete examples, even if the delivery is slightly meandering, unless it\u003cbr\u003e  becomes repetitive.\u003cbr\u003e- KEEP host reaction that advances topic PREFER: When the host’s reaction provides a clear\u003cbr\u003e  bridge into the next question or sharpens the premise, even if informal.\u003cbr\u003e- KEEP light comedic riffs PREFER: When an off-topic riff adds character\u002fchemistry and\u003cbr\u003e  resolves quickly back into the topic (i.e., it ‘lands’ and doesn’t derail the segment).\u003cbr\u003e- MUTE guest backchannels under host MUST: When the guest is audibly agreeing while the\u003cbr\u003e  host is asking or framing a question and it competes with the host’s intelligibility.\u003cbr\u003e- MUTE non speaking backchannels PREFER: When the non-current speaker is affirming or\u003cbr\u003e  interjecting (‘yeah’, ‘right’, small laughs) under the active speaker’s sentence and it\u003cbr\u003e  doesn’t change the content.\u003cbr\u003e- REORDER misplaced reference AVOID: Only when a later clarifying clause is required for\u003cbr\u003e  an earlier line to make sense and it can be moved without creating continuity issues.","\u003cb\u003eInterpreting India\u003c\u002fb\u003e\u003cbr\u003eAI Adoption Journey for Population Scale: The UCAF Framework\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: ultra-high retention, light compression, micro-shaves over macro removals,\u003cbr\u003e  allows long, uninterrupted explanations, low silence-trim appetite\u003cbr\u003eCUT_CRITERIA: cuts dangling sentence tails, trims repeated acknowledgements, prefers\u003cbr\u003e  surgical grammar cleanups, keeps dense technical detail intact\u003cbr\u003eAUTHENTICITY_POLICY: leaves some ums\u002fahs for naturalness, polish focuses on clarity, not\u003cbr\u003e  perfection, edits kept invisible and minimal\u003cbr\u003eSTRUCTURE_TEMPLATE: produced host-led intro with bed, conversation starts immediately\u003cbr\u003e  after intro, music-backed outro with subscription cta\u003cbr\u003eREORDER_ASSEMBLY: chronology is effectively locked, no thematic reshuffling, assembly\u003cbr\u003e  changes only via trims\u003cbr\u003eSPEAKER_TREATMENT: guests strongly protected from cuts, micro-mutes inside speaker turns,\u003cbr\u003e  host trimmed slightly more than guests\u003cbr\u003eRULES:\u003cbr\u003e- CUT dangling fragment MUST: When a turn ends with a stranded word\u002fphrase (often after a\u003cbr\u003e  clause break) that no longer connects cleanly to the next kept sentence.\u003cbr\u003e- CUT on mic production direction MUST: When the host or guests comment on the recording\u003cbr\u003e  process (e.g., ‘I’ll do the outro now’) rather than addressing the audience.\u003cbr\u003e- CUT host repeated thanks PREFER: When host acknowledgements stack (thanks + restatement)\u003cbr\u003e  and the next question is already clear without them.\u003cbr\u003e- CUT redundant turn closer PREFER: When a speaker adds a brief, non-essential trailing\u003cbr\u003e  tag (e.g., a repeated noun like “systems\u002fscale\u002fnow”) after the main thought is already\u003cbr\u003e  complete.\u003cbr\u003e- KEEP guest full reasoning chain MUST: When a guest is building a multi-step causal\u003cbr\u003e  argument or definition; do not interrupt with cuts that remove steps, even if the\u003cbr\u003e  phrasing is slightly rough.\u003cbr\u003e- KEEP long expository block PREFER: When a guest is laying out a framework definition,\u003cbr\u003e  multi-part taxonomy, or extended concrete example—even if it’s lengthy—unless it becomes\u003cbr\u003e  purely repetitive.\u003cbr\u003e- KEEP question answer sequence PREFER: When the host question cleanly tees up the next\u003cbr\u003e  guest response; preserve adjacency rather than clustering similar topics elsewhere.\u003cbr\u003e- MUTE guest or host micro aside PREFER: When a speaker inserts a short\u003cbr\u003e  parenthetical\u002fscene-setting phrase that adds little and interrupts sentence flow\u003cbr\u003e  (especially mid-sentence), mute it without collapsing the broader point.\u003cbr\u003e- REORDER topic block AVOID: Only when the existing order creates a comprehension problem\u003cbr\u003e  (e.g., an explanation depends on a definition recorded later) that cannot be solved by a\u003cbr\u003e  short cut or a brief inserted reminder.","\u003cb\u003eWSJ What’s News\u003c\u002fb\u003e\u003cbr\u003eWhy Trump Is Striking Iran Now\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: aggressive runtime compression, micro-shaves between clauses, macro blocks\u003cbr\u003e  dropped wholesale, low tolerance for meandering setup\u003cbr\u003eCUT_CRITERIA: questions trimmed to the essential ask, excise on-mic producing and cueing,\u003cbr\u003e  keep analysis; drop speculation padding, historical context only if payoff\u003cbr\u003eAUTHENTICITY_POLICY: polished, broadcast-clean reads, stumbles and hedges minimized, edits\u003cbr\u003e  kept mostly invisible, factual caution preserved\u003cbr\u003eSTRUCTURE_TEMPLATE: produced open with sponsor bed, hard midroll break and reset, clip-\u003cbr\u003e  driven beats within interview, produced outro with cross-promo\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, no thematic reshuffling, continuity over\u003cbr\u003e  highlight-first cold opens\u003cbr\u003eSPEAKER_TREATMENT: hosts heavily compressed, guests protected as primary value, mute\u003cbr\u003e  patches to smooth host lines, crosstalk\u002finterruptions minimized\u003cbr\u003eRULES:\u003cbr\u003e- CUT host clip cueing MUST: When a host says they’re about to play a clip, asks to hold,\u003cbr\u003e  or narrates the mechanics of inserting audio, unless the line itself contains essential\u003cbr\u003e  context the listener needs to understand the clip.\u003cbr\u003e- CUT host guest handoff confusion MUST: When speakers negotiate who should answer next\u003cbr\u003e  (e.g., ‘you jump in \u002f I meant to ask the other person’); remove the negotiation and keep\u003cbr\u003e  the clean question to the intended respondent.\u003cbr\u003e- CUT intra turn restarts MUST: When a speaker restarts a sentence to find cleaner\u003cbr\u003e  wording, keep only the strongest version and remove the abandoned lead-in.\u003cbr\u003e- CUT background story block PREFER: When a guest launches into extended chronology or\u003cbr\u003e  scene-setting that doesn’t directly support the immediate point being made in the\u003cbr\u003e  current answer.\u003cbr\u003e- CUT host overlong question PREFER: When a host question contains multiple stacked\u003cbr\u003e  premises\u002fexamples (or repeats the same ask), cut back to a single clear interrogative\u003cbr\u003e  that the guest can answer cleanly.\u003cbr\u003e- CUT host self reference PREFER: When hosts mention their own process (who they called,\u003cbr\u003e  what time it is, how they’ll structure the question) unless it directly advances the\u003cbr\u003e  reporting.\u003cbr\u003e- KEEP chronological order MUST: When the session already progresses logically by\u003cbr\u003e  topic\u002fquestion, preserve the original sequence and avoid restructuring into thematic\u003cbr\u003e  chapters.\u003cbr\u003e- KEEP guest direct answer core MUST: When the guest is delivering the primary analytic\u003cbr\u003e  claim or on-the-ground reporting; cut around it rather than cutting through it.\u003cbr\u003e- KEEP uncertainty qualifiers PREFER: When the speaker flags genuine unknowns (fog-of-war,\u003cbr\u003e  unconfirmed outcomes, what reporting does\u002fdoesn’t show); keep concise caveats even if\u003cbr\u003e  they add a little length.\u003cbr\u003e- MUTE host stumble within sentence PREFER: When a host’s sentence is usable but contains\u003cbr\u003e  a brief flub\u002frepeated word; mute only the flub and keep the surrounding clause so the\u003cbr\u003e  line stays continuous.\u003cbr\u003e- REORDER clarifying explainer AVOID: Only if an earlier segment becomes confusing after\u003cbr\u003e  trims and a later, compact definition\u002fclarifier can repair comprehension without\u003cbr\u003e  changing the meaning of subsequent answers.","\u003cb\u003eHow To Be 60 with Kaye Adams\u003c\u002fb\u003e\u003cbr\u003eSuzi Quatro: Determined, Independent and Not Slowing Down at 75\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between phrases, moderate overall runtime reduction,\u003cbr\u003e  low tolerance for tiny redundancies, silence mostly left intact\u003cbr\u003eCUT_CRITERIA: protect emotional\u002fpsychology through-lines, cut mid-sentence hedges and\u003cbr\u003e  qualifiers, trim host banter once premise lands, remove duplicative restatements quickly\u003cbr\u003eAUTHENTICITY_POLICY: polished transcript-level cleanup, profanity retained when natural,\u003cbr\u003e  keeps some imperfect spontaneity, edits kept mostly invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: produced show open with music, host-led segment before interview,\u003cbr\u003e  quick return from segments to guest, produced reflective\u002ftease outro\u003cbr\u003eREORDER_ASSEMBLY: chronological backbone preserved, tiny reorders to fix flow, reorders\u003cbr\u003e  used for clarity not drama\u003cbr\u003eSPEAKER_TREATMENT: host affirmations frequently suppressed, guest cleaned nearly as hard,\u003cbr\u003e  protect guest’s long-form answers, overtalk handled via mute not cut\u003cbr\u003eRULES:\u003cbr\u003e- CUT qualifier chains MUST: When a speaker stacks framing\u002fhedging phrases (e.g., 'kind of\u003cbr\u003e  \u002f you know \u002f I mean \u002f first of all') before the actual point, unless the hedging itself\u003cbr\u003e  is the point (uncertainty\u002fvulnerability).\u003cbr\u003e- CUT guest tag endings PREFER: When the guest appends quick tag phrases ('you know',\u003cbr\u003e  'okay', 'right') after a complete thought, unless it punctuates a comedic\u002fdefiant button\u003cbr\u003e  line.\u003cbr\u003e- CUT host question stutters PREFER: When the host’s question contains small restarts or\u003cbr\u003e  duplicate framing, unless the restart is used to soften or sensitively re-approach a\u003cbr\u003e  personal topic.\u003cbr\u003e- CUT host ramble after hook PREFER: When the host continues banter or list-style context\u003cbr\u003e  after the guest\u002ftopic hook is already clear, unless it directly tees up the next guest\u003cbr\u003e  answer.\u003cbr\u003e- CUT micro repetitions inside story PREFER: When a speaker repeats the same clause\u002fword\u003cbr\u003e  wheel explanation\u002fsummary beat within the same turn, unless the repetition is used for\u003cbr\u003e  emphasis at a clear peak line.\u003cbr\u003e- KEEP chronology MUST: When the story depends on step-by-step causality (life timeline,\u003cbr\u003e  relationship progression), even if it could be tightened by rearranging beats.\u003cbr\u003e- KEEP emotional vulnerability block PREFER: When the guest articulates a personal\u003cbr\u003e  emotional mechanism (hurt, fear, coping, identity) that advances the episode’s theme,\u003cbr\u003e  even if it includes some rough edges or repetition.\u003cbr\u003e- KEEP guest button line PREFER: When the guest delivers a crisp, quotable stance or\u003cbr\u003e  boundary-setting line; preserve the full lead-in needed for it to hit.\u003cbr\u003e- MUTE host backchannel MUST: When the host’s 'mm\u002fyeah\u002fwow' overlaps the guest’s\u003cbr\u003e  substantive sentence and doesn’t change the pacing or emotional beat.\u003cbr\u003e- MUTE single-word interjections MUST: When a speaker’s short interjection ('yeah', 'mm',\u003cbr\u003e  name repetition) lands on top of the other speaker’s sentence and isn’t required for\u003cbr\u003e  meaning or comedic timing.\u003cbr\u003e- REORDER answer fragment PREFER: When an answer contains a short clause that directly\u003cbr\u003e  resolves the preceding question but appears a few beats later, and moving it earlier\u003cbr\u003e  reduces confusion without changing meaning.\u003cbr\u003e- REORDER setup line PREFER: When a clarifying setup phrase can be moved closer to the\u003cbr\u003e  point it explains, provided the shift is small and doesn’t create a continuity\u002fjump-in-\u003cbr\u003e  energy artifact.","\u003cb\u003eGlobal Roaming with Geraldine Doogue and Hamish Macdonald\u003c\u002fb\u003e\u003cbr\u003eCan Trump and Netanyahu bomb their way to regime change?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: aggressive silence stripping, macro blocks cut for pace, micro-shaves inside\u003cbr\u003e  sentences, very low tolerance for drift\u003cbr\u003eCUT_CRITERIA: host airtime is expendable, keep expert substance intact, cut meta-talk and\u003cbr\u003e  studio chatter, remove hedges, keep claims\u003cbr\u003eAUTHENTICITY_POLICY: polished read-over-raw delivery, disfluency cleaned to near-script,\u003cbr\u003e  rough edges kept only if useful\u003cbr\u003eSTRUCTURE_TEMPLATE: produced open with narration, music-bed stitched transitions, external\u003cbr\u003e  wrap with calls-to-action, segmented like radio blocks\u003cbr\u003eREORDER_ASSEMBLY: narrative arc over chronology, heavy block reassembly, front-load stakes\u003cbr\u003e  and ‘latest’\u003cbr\u003eSPEAKER_TREATMENT: guests protected, host compressed, host questions trimmed to\u003cbr\u003e  essentials, minimal tolerance for host ramble\u003cbr\u003eRULES:\u003cbr\u003e- CUT host commentary block MUST: When the host shifts from prompting\u002fclarifying into\u003cbr\u003e  extended analysis that duplicates what guests already said or is not required to tee up\u003cbr\u003e  the next segment.\u003cbr\u003e- CUT host meta production talk MUST: Any time the host discusses recording logistics,\u003cbr\u003e  sign-offs, self-cueing, or post-interview evaluation, even if it’s lively, unless it\u003cbr\u003e  contains a critical editorial clarification needed for listeners.\u003cbr\u003e- CUT mid-sentence hedge words PREFER: When single-word hedges or connectors (“but”,\u003cbr\u003e  “and”, “uh”, “there”) add no meaning and the sentence remains grammatical without them.\u003cbr\u003e- CUT redundant question tags PREFER: When a host question includes trailing tag lines\u003cbr\u003e  that repeat the premise or restate the question after it has already landed (e.g.,\u003cbr\u003e  appended ‘so what does that mean?’), unless the tag is needed to re-orient after a cut\u003cbr\u003e  or reorder.\u003cbr\u003e- KEEP chronology within guest explanation PREFER: Within an individual guest’s\u003cbr\u003e  explanatory sequence, avoid reordering individual sentences\u002fclaims unless necessary to\u003cbr\u003e  fix a clear reference problem created by a larger block move.\u003cbr\u003e- KEEP guest cadence and emphasis PREFER: When a guest uses repetition or intensifiers to\u003cbr\u003e  convey certainty\u002furgency, unless it becomes circular or measurably delays the next\u003cbr\u003e  necessary beat.\u003cbr\u003e- KEEP guest explanatory run PREFER: When a guest is laying out a chain of reasoning\u003cbr\u003e  (sequence of facts → interpretation → implication), even if it’s dense or long, unless\u003cbr\u003e  the same point is repeated later in near-identical wording.\u003cbr\u003e- MUTE guest redundant tail clause PREFER: When a guest appends a short trailing clause\u003cbr\u003e  that repeats the immediate prior phrase (often after a cut\u002freorder), mute only the\u003cbr\u003e  redundant fragment rather than cutting the whole turn.\u003cbr\u003e- REORDER guest answer before host wrap PREFER: When the host’s wrap-up or segue is weaker\u003cbr\u003e  than the guest’s opening ‘news peg’, move the guest’s strongest anchoring update earlier\u003cbr\u003e  and use an external line to introduce it.\u003cbr\u003e- REORDER topic cluster blocks PREFER: When the session contains multiple subtopics or\u003cbr\u003e  multiple guests, assemble contiguous blocks by topic (e.g., ‘regional reaction’ then\u003cbr\u003e  ‘regime mechanics’) even if it requires large timeline shifts.","\u003cb\u003eHistory Extra podcast\u003c\u002fb\u003e\u003cbr\u003eThe forgotten wars that redefined Europe\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves for pace, big runtime compression via macro cuts, low\u003cbr\u003e  tolerance for dead air, guest answers kept largely intact\u003cbr\u003eCUT_CRITERIA: host scaffolding stripped to essentials, methodology\u002fdetail blocks heavily\u003cbr\u003e  pruned, keeps definitions and timelines, cuts topical asides without payoff\u003cbr\u003eAUTHENTICITY_POLICY: polished interview, not fully sterile, hard cuts on\u003cbr\u003e  restarts\u002fapologies, some light disfluency tolerated, in-sentence cleanups via mutes\u003cbr\u003eSTRUCTURE_TEMPLATE: produced sponsor-led cold open, fast drop into first question, midroll\u003cbr\u003e  at topic breakpoint, narrated outro plus ad stack\u003cbr\u003eREORDER_ASSEMBLY: chronology respected; only micro-reorders, reorders to repair logic, not\u003cbr\u003e  theme, small clause swaps for clarity, no large temporal restructuring\u003cbr\u003eSPEAKER_TREATMENT: guest foregrounded; host minimized, host reduced to clean prompts,\u003cbr\u003e  guest parentheticals selectively muted, guest nuance generally protected\u003cbr\u003eRULES:\u003cbr\u003e- CUT host meta instructions MUST: When the host explains recording\u002fediting process, note-\u003cbr\u003e  taking, retakes, pronunciation checks, or scheduling, unless a tiny fragment is needed\u003cbr\u003e  for an on-mic introduction or attribution.\u003cbr\u003e- CUT host ramble MUST: When the host expands a question with repeated framing, examples,\u003cbr\u003e  or self-commentary after the guest already has enough context to answer.\u003cbr\u003e- CUT host interjections over guest PREFER: When short host reactions or partial question\u003cbr\u003e  restarts appear during\u002fadjacent to a guest’s continuous explanation and aren’t needed to\u003cbr\u003e  maintain sense.\u003cbr\u003e- CUT sources methodology digression PREFER: When the guest moves into extended\u003cbr\u003e  historiography\u002fsource-critique detail that doesn’t directly advance the current\u003cbr\u003e  narrative question; keep only the minimum needed to justify a key claim or frame bias.\u003cbr\u003e- CUT topical news asides PREFER: When a remark is pegged to current news or fleeting\u003cbr\u003e  topicality and isn’t necessary for the historical argument.\u003cbr\u003e- KEEP orientation blocks MUST: When the guest is defining terms, laying out\u003cbr\u003e  geography\u002ftimeline, or enumerating main actors, even if the delivery is list-like; trim\u003cbr\u003e  only redundancies, not the structural skeleton.\u003cbr\u003e- KEEP overall chronological flow MUST: Across major topic blocks (intro context →\u003cbr\u003e  timeline → actors → causes → key campaigns → consequences), unless a reorder is required\u003cbr\u003e  to correct a clear continuity error.\u003cbr\u003e- KEEP guest caveats and limits PREFER: When the guest adds uncertainty, scope limits, or\u003cbr\u003e  complexity markers that prevent an oversimplified takeaway, unless they become\u003cbr\u003e  repetitive within the same answer.\u003cbr\u003e- MUTE guest parenthetical aside PREFER: When the guest inserts a brief explanatory aside\u003cbr\u003e  (e.g., ‘in other words…’) that is not required for comprehension and interrupts sentence\u003cbr\u003e  momentum.\u003cbr\u003e- REORDER guest clarifying clause PREFER: When a short clarifier is spoken slightly later\u003cbr\u003e  but is required to understand the sentence\u002fclaim immediately preceding it; move it\u003cbr\u003e  earlier within the same beat.\u003cbr\u003e- REORDER interrupted sentence repair PREFER: When an interruption\u002fcut leaves a thought\u003cbr\u003e  dangling and the missing completion exists nearby in the session; relocate the\u003cbr\u003e  completion to restore a clean, single-pass idea.","\u003cb\u003eComplexified\u003c\u002fb\u003e\u003cbr\u003eWhat's Next for American Jews and Israel? A Half-Century of Consensus Weakens.\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between phrases, tight pause tolerance; occasional\u003cbr\u003e  pads, protects full explanation arcs\u003cbr\u003eCUT_CRITERIA: behind-the-scenes talk removed completely, host question drafts heavily\u003cbr\u003e  pruned, keeps dense historical\u002fpolitical detail\u003cbr\u003eAUTHENTICITY_POLICY: polished, listener-facing transcript illusion, keeps a few natural\u003cbr\u003e  reactions, cleans rough edges without rewriting\u003cbr\u003eSTRUCTURE_TEMPLATE: produced host-led opening narration, music bed threaded through host,\u003cbr\u003e  mid-episode break as segment, formal credit outro with cta\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with tiny repairs, reorders only to smooth joins, no\u003cbr\u003e  thematic reshuffle\u003cbr\u003eSPEAKER_TREATMENT: host tightened more than guest, mutes backchannels under answers, guest\u003cbr\u003e  narrative priority preserved\u003cbr\u003eRULES:\u003cbr\u003e- CUT behind scenes meta MUST: Any time the host\u002fproducer comments on how the interview is\u003cbr\u003e  going (awkwardness, tempo notes, question quality, typing\u002fnotes, redo requests),\u003cbr\u003e  regardless of whether it is personable, unless it is explicitly needed to explain an\u003cbr\u003e  audible break to the listener.\u003cbr\u003e- CUT host question restarts MUST: When the host begins a question, abandons it, then\u003cbr\u003e  restarts or re-frames (including partial statistics set-ups); keep only the clean final\u003cbr\u003e  version that sets up the guest’s next answer.\u003cbr\u003e- CUT guest micro disfluency PREFER: When the guest’s delivery includes brief\u003cbr\u003e  interjections ('ah', 'um') that do not signal emotion or emphasis; remove at a high rate\u003cbr\u003e  to maintain clarity and pace.\u003cbr\u003e- CUT host verbal scaffolding PREFER: When the host uses stacked lead-ins ('so \u002f yeah \u002f\u003cbr\u003e  okay \u002f right') before a question or after an answer, unless it functions as the only\u003cbr\u003e  clear pivot to the next topic.\u003cbr\u003e- CUT micro redundancy inside answers PREFER: When the speaker repeats the same idea in\u003cbr\u003e  adjacent clauses (e.g., stacked qualifiers like 'kind of \u002f sort of \u002f you know') without\u003cbr\u003e  adding a new nuance; preserve one representative phrasing and cut the rest.\u003cbr\u003e- KEEP chronological flow MUST: Unless there is a clear comprehension problem that a small\u003cbr\u003e  reorder solves, preserve the original question→answer sequence and the natural\u003cbr\u003e  escalation of the discussion.\u003cbr\u003e- KEEP guest complete answer arc MUST: When the guest is building an explanation across\u003cbr\u003e  multiple sentences (history → shift → consequence), even if some clauses are tightened;\u003cbr\u003e  do not cut the connective tissue that makes the reasoning legible.\u003cbr\u003e- KEEP guest specifics PREFER: When the guest provides concrete details (dates,\u003cbr\u003e  institutions, named organizations, polling findings, examples of community responses),\u003cbr\u003e  even if delivery is slightly rough, unless the detail is clearly incorrect inside the\u003cbr\u003e  transcript itself.\u003cbr\u003e- MUTE host backchannel under guest PREFER: When the host’s 'mm-hmm\u002fyeah' occurs during a\u003cbr\u003e  guest’s ongoing sentence and does not add meaning (i.e., pure affirmation), especially\u003cbr\u003e  if it competes with an important clause.\u003cbr\u003e- REORDER fact line clarity AVOID: When a short block containing a key statistic\u002fsummary\u003cbr\u003e  lands more clearly earlier\u002flater within the same answer with minimal temporal shift and\u003cbr\u003e  without changing what it is responding to.\u003cbr\u003e- REORDER transition fix block PREFER: When a sentence or wrap-up exists cleanly elsewhere\u003cbr\u003e  in the session and can be moved short distances to eliminate a broken transition or\u003cbr\u003e  duplicated outro attempt.","\u003cb\u003eHistory Extra podcast\u003c\u002fb\u003e\u003cbr\u003eJuana Inés de la Cruz: life of the week\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between clauses, guest answers kept mostly intact,\u003cbr\u003e  low silence tolerance, macro trims target long examples\u003cbr\u003eCUT_CRITERIA: host is expendable; guest is protected, cuts micro-connectives beyond\u003cbr\u003e  baseline, detail-heavy scene-setting gets collapsed, keeps spicy quotes if illuminating\u003cbr\u003eAUTHENTICITY_POLICY: polished transcript-forward delivery, removes tiny stumbles and\u003cbr\u003e  linkers, allows natural cadence in long answers\u003cbr\u003eSTRUCTURE_TEMPLATE: produced narrated intro lead-in, sponsor midroll splits the interview,\u003cbr\u003e  outros handled with external credits\u002fcta, session logistics never reach air\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, reorders avoided; cuts do the work\u003cbr\u003eSPEAKER_TREATMENT: guest dominance protected, host minimized to clean questions,\u003cbr\u003e  backchannels suppressed rather than shared\u003cbr\u003eRULES:\u003cbr\u003e- CUT high-level repetition MUST: When the same claim is restated with only minor wording\u003cbr\u003e  changes across adjacent turns, unless the repetition escalates into a new conclusion or\u003cbr\u003e  sharper framing.\u003cbr\u003e- CUT host setup and re-asks MUST: When the host is rephrasing what was just\u003cbr\u003e  asked\u002fanswered or padding a question with extra framing, unless the added line\u003cbr\u003e  introduces a genuinely new angle the guest hasn’t addressed.\u003cbr\u003e- CUT extended example block PREFER: When the guest launches into a long plot-summary or\u003cbr\u003e  multi-step illustrative anecdote that can be summarized by the surrounding sentence(s)\u003cbr\u003e  without harming comprehension.\u003cbr\u003e- CUT guest self-deprecating asides PREFER: When they are quick throwaways that don’t\u003cbr\u003e  advance the historical point and can be removed without changing tone or meaning.\u003cbr\u003e- CUT host reaction turns PREFER: When the host turn is primarily appreciation, surprise,\u003cbr\u003e  or agreement and does not introduce the next substantive question or a needed\u003cbr\u003e  transition.\u003cbr\u003e- KEEP chronological order MUST: Throughout the main interview, unless a reorder is\u003cbr\u003e  necessary to repair a genuine comprehension break caused by removing an intervening\u003cbr\u003e  section.\u003cbr\u003e- KEEP guest longform explanation MUST: When the guest is building an argument or\u003cbr\u003e  biographical sequence step-by-step, even if the cadence is slightly imperfect, unless\u003cbr\u003e  the section becomes a removable example block.\u003cbr\u003e- KEEP guest vivid or bawdy quote PREFER: When a provocative\u002fvivid quote concretely\u003cbr\u003e  evidences the guest’s point (tone, themes, stakes), even if it slightly challenges the\u003cbr\u003e  audience’s expectations.\u003cbr\u003e- MUTE host interjections over guest MUST: When the host interjects during a guest’s\u003cbr\u003e  continuous answer (including laughter\u002f‘yep’\u002f‘right’) and it competes with the guest’s\u003cbr\u003e  sentence.\u003cbr\u003e- MUTE host backchannels PREFER: When the guest is in an uninterrupted explanation and the\u003cbr\u003e  host interjects with confirmations\u002flaughter that don’t steer the content, especially\u003cbr\u003e  mid-sentence.\u003cbr\u003e- REORDER clarity patch AVOID: Only when a short explanatory line from elsewhere can be\u003cbr\u003e  moved to prevent listener confusion created by a cut, and the move does not change the\u003cbr\u003e  apparent causality of events.","\u003cb\u003eThe Athletic NBA Show\u003c\u002fb\u003e\u003cbr\u003eRockets fight back, Shai Returns, and what is the Heat’s future?\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-total session retention, micro-shaves, not macro cuts, adds pacing pads\u003cbr\u003e  generously, light silence trimming only\u003cbr\u003eCUT_CRITERIA: cuts interruptions more than tangents, single-word cleanup for flow,\u003cbr\u003e  protects complete argument arcs, prefers muting over removing turns\u003cbr\u003eAUTHENTICITY_POLICY: conversational texture stays in, crosstalk often preserved, edits\u003cbr\u003e  kept mostly invisible, polish via overlap muting\u003cbr\u003eSTRUCTURE_TEMPLATE: produced framing around raw interview, mid-episode external blocks\u003cbr\u003e  common, music-led transitions and beds, outro includes sponsor-style wrap\u003cbr\u003eREORDER_ASSEMBLY: chronology treated as default, no thematic reshuffling, external inserts\u003cbr\u003e  bookend\u002fbridge\u003cbr\u003eSPEAKER_TREATMENT: guest protected more than host, host minimized during guest answers,\u003cbr\u003e  backchannels managed by muting, crosstalk kept when supportive\u003cbr\u003eRULES:\u003cbr\u003e- CUT host micro interruption PREFER: When the host inserts a short phrase mid-guest\u003cbr\u003e  answer that doesn’t change the direction of the point (e.g., quick confirmations, half-\u003cbr\u003e  questions).\u003cbr\u003e- CUT micro tag questions PREFER: When a trailing tag (“right?”, “you know?”) or one-word\u003cbr\u003e  reiteration doesn’t add emphasis and slightly clutters the handoff.\u003cbr\u003e- CUT redundant single words PREFER: When a single word is duplicated across adjacent\u003cbr\u003e  turns (often during crosstalk) and removing it improves readability without changing\u003cbr\u003e  meaning.\u003cbr\u003e- KEEP chronological session flow MUST: Across the main conversation, even when a later\u003cbr\u003e  point might ‘hook’ better earlier; preserve the recorded progression.\u003cbr\u003e- KEEP guest explanatory run MUST: When the guest is building a multi-step explanation\u003cbr\u003e  (even if it’s a bit long or includes parentheticals), unless there’s a clear factual\u003cbr\u003e  detour that breaks the point.\u003cbr\u003e- KEEP guest full clause integrity MUST: When a possible cut would remove a guest’s\u003cbr\u003e  qualifier or connective tissue (“because\u002fso\u002fbut”) and risk changing the logic of the\u003cbr\u003e  argument.\u003cbr\u003e- KEEP external as seams PREFER: When adding show elements (intro\u002ftransition\u002foutro), use\u003cbr\u003e  them as seams between intact session sections rather than interleaving them sentence-by-\u003cbr\u003e  sentence.\u003cbr\u003e- KEEP supportive crosstalk PREFER: When overlaps are short and clearly supportive\u003cbr\u003e  (affirming the current point) and do not mask key words.\u003cbr\u003e- MUTE guest backchannel overlap PREFER: When the guest’s brief agreement sounds land on\u003cbr\u003e  top of the host’s active line and don’t add distinct information; prefer muting the\u003cbr\u003e  overlap rather than cutting the host’s line.\u003cbr\u003e- MUTE host backchannel overlap PREFER: When the host’s short affirmations (e.g., “yeah,”\u003cbr\u003e  “mm-hmm”) occur during the guest’s ongoing sentence and don’t set up a new question or\u003cbr\u003e  redirect.\u003cbr\u003e- REORDER session blocks AVOID: Only if a chronological placement causes clear confusion\u003cbr\u003e  (missing context, reference to something not yet introduced) that cannot be fixed with a\u003cbr\u003e  brief external line.","\u003cb\u003eThe Front\u003c\u002fb\u003e\u003cbr\u003eThe Bluey-obsessed Australian ISIS kids stuck in Syria\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless sub-second micro-shaves, macro cuts to remove whole beats, brisk\u003cbr\u003e  pacing over completeness\u003cbr\u003eCUT_CRITERIA: show-don’t-tell: prefer tape over recap, redundancy intolerance (q and a),\u003cbr\u003e  protect the emotional human audio, trim political color to the spine\u003cbr\u003eAUTHENTICITY_POLICY: polished clarity, not sterile, allows punchy rough edges, cleans\u003cbr\u003e  stumbles invisibly, uses artificial pads for cadence\u003cbr\u003eSTRUCTURE_TEMPLATE: produced headline-led cold open, music-bedded narration framing, tape\u003cbr\u003e  woven through the interview, outro lands on lived experience\u003cbr\u003eREORDER_ASSEMBLY: chronological core, minimal reshuffle, tiny reorders to fix phrasing,\u003cbr\u003e  assembly favors clarity over fidelity\u003cbr\u003eSPEAKER_TREATMENT: host tightened to high-function prompts, guest kept dominant but\u003cbr\u003e  streamlined, single-word mutes for clean starts, reactions kept when they hand off\u003cbr\u003eRULES:\u003cbr\u003e- CUT timeline references AVOID: When reordering would create time\u002fplace confusion that\u003cbr\u003e  requires additional narration to explain.\u003cbr\u003e- CUT guest descriptive recap PREFER: When the guest starts narrating details that are (or\u003cbr\u003e  will be) presented more directly via external grabs\u002factuality.\u003cbr\u003e- CUT guest preamble PREFER: When the guest circles the point with hedges\u002fscene-throat-\u003cbr\u003e  clearing before delivering the actionable\u002ffactual claim.\u003cbr\u003e- CUT host editorial aside PREFER: When the host’s commentary shifts into speculative\u003cbr\u003e  political motive\u002fcharacter analysis and doesn’t advance the factual\u002fanalytical argument\u003cbr\u003e  being built by the guest.\u003cbr\u003e- CUT host followup question PREFER: When it repeats premises already established or would\u003cbr\u003e  be answered by the guest’s next sentence without prompting.\u003cbr\u003e- CUT host question block PREFER: When the host asks a multi-part scene-setting question\u003cbr\u003e  that will be covered by external tape or the guest’s next answer anyway.\u003cbr\u003e- KEEP chronological topic flow MUST: When the existing order already builds naturally\u003cbr\u003e  from scene-setting to implications to solutions.\u003cbr\u003e- KEEP emotional peak actuality MUST: When external audio contains the most affecting,\u003cbr\u003e  humanizing content (even if it’s messy, repetitive, or imperfectly phrased).\u003cbr\u003e- KEEP guest solution claim MUST: When the guest states the core diagnosis\u002fsolution\u003cbr\u003e  framing that ties security and humanitarian stakes together.\u003cbr\u003e- KEEP host bridge line PREFER: When the host’s short reaction\u002fsummary clearly pivots to\u003cbr\u003e  the next question or re-anchors the listener after tape.\u003cbr\u003e- KEEP sharp language for emphasis PREFER: When a strong phrase (including blunt\u002fprofane\u003cbr\u003e  emphasis) functions as a clear pivot or crystallizes the stakes rather than being casual\u003cbr\u003e  chatter.\u003cbr\u003e- MUTE guest false start single word PREFER: When the guest begins with a clipped starter\u003cbr\u003e  (e.g., a half-start or filler opening) and the sentence remains intact without it.\u003cbr\u003e- REORDER adjacent answer fragment PREFER: When moving a short fragment earlier\u002flater\u003cbr\u003e  (within the immediate exchange) resolves a dangling reference or makes an answer\u003cbr\u003e  grammatically complete.","\u003cb\u003eWiser World\u003c\u002fb\u003e\u003cbr\u003e81. Iran's Unfinished Revolution: A Conversation with Sahar Delijani\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves for flow, host runtime compressed hard, macro blocks\u003cbr\u003e  cut, not just words, adds breathing-room pads\u003cbr\u003eCUT_CRITERIA: host meta-talk is expendable, protect guest narrative continuity, remove\u003cbr\u003e  workshopy question-forming, keep vivid, humanizing examples\u003cbr\u003eAUTHENTICITY_POLICY: polished host, natural guest, process artifacts removed aggressively,\u003cbr\u003e  emotion allowed to stay imperfect, light cleanup of overlaps\u003cbr\u003eSTRUCTURE_TEMPLATE: scripted context-heavy cold open, bookended host narration, sponsor\u003cbr\u003e  blocks woven into runtime, music beds for sectioning\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with rare fixes, small thematic patch reorders, reorder\u003cbr\u003e  to prevent confusion\u003cbr\u003eSPEAKER_TREATMENT: guest protected, host compressed, mute backchannels under narration,\u003cbr\u003e  crosstalk minimized not dramatized, host kept as guide-rail\u003cbr\u003eRULES:\u003cbr\u003e- CUT timeline disruptive recall AVOID: When a proposed reorder would require extensive\u003cbr\u003e  new bridging because speakers reference \"as I said earlier\" or refer to something not\u003cbr\u003e  yet heard; default to cutting redundancy instead of reshuffling larger arcs.\u003cbr\u003e- CUT host question workshopping MUST: When the host verbally iterates on how to phrase a\u003cbr\u003e  question (\"let me try again \u002f workshop this \u002f my brain is short-circuiting\"), unless the\u003cbr\u003e  exchange produces a materially clearer question that the guest answers immediately\u003cbr\u003e  after.\u003cbr\u003e- CUT duplicate host agreement phrases PREFER: When the host stacks multiple affirmations\u003cbr\u003e  or restates the guest’s point without adding a new question, unless it marks a clear\u003cbr\u003e  transition into the next topic.\u003cbr\u003e- CUT host analogy ramble PREFER: When the host pivots to a different country\u002fpersonal\u003cbr\u003e  reflection to make the same point, unless the guest explicitly builds on the analogy to\u003cbr\u003e  introduce new information or stakes.\u003cbr\u003e- CUT host post answer praise block PREFER: When the host delivers extended praise\u002fsummary\u003cbr\u003e  after a strong guest answer, unless it directly introduces the next question or adds\u003cbr\u003e  unique context the audience needs.\u003cbr\u003e- CUT host self positioning disclaimer PREFER: When the host repeatedly qualifies their\u003cbr\u003e  own uncertainty (\"I haven’t witnessed \u002f I’m just an average person\"), unless it is\u003cbr\u003e  required for factual caution or ethical framing of the topic.\u003cbr\u003e- KEEP guest historical setup MUST: When the guest is laying down essential historical\u003cbr\u003e  background (dates, sequences, definitions) that later answers depend on, even if it runs\u003cbr\u003e  long or contains minor verbal roughness.\u003cbr\u003e- KEEP host orientation question MUST: When the host asks a clarifying, audience-serving\u003cbr\u003e  question that prompts the guest to define terms, timeline, or stakes (i.e., converts\u003cbr\u003e  abstract geopolitics into accessible framing).\u003cbr\u003e- KEEP guest emotional concrete scene PREFER: When the guest provides a concrete,\u003cbr\u003e  emotionally loaded example that embodies the theme (e.g., specific family\u002fcommunity\u003cbr\u003e  scenes, public rituals, lived experience), even if it repeats the abstract takeaway.\u003cbr\u003e- MUTE nonprimary backchannel MUST: When one speaker is giving short affirmations (\"right\u003cbr\u003e  \u002f yeah \u002f thank you\") over the other’s substantive explanation, unless the overlap itself\u003cbr\u003e  meaningfully changes the meaning or tone.\u003cbr\u003e- REORDER clarifying guest block PREFER: When a later guest explanation resolves confusion\u003cbr\u003e  created by an earlier host question, and moving it earlier reduces listener cognitive\u003cbr\u003e  load without breaking references to prior points.","\u003cb\u003eCoffee House Shots\u003c\u002fb\u003e\u003cbr\u003eGreen victory in Gorton and Denton\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high retention, micro-shave pacing, rarely removes whole beats, tightens\u003cbr\u003e  inside sentences, low tolerance for dead air\u003cbr\u003eCUT_CRITERIA: host scaffolding is expendable, provocative specifics usually stay, cuts for\u003cbr\u003e  pace, not sanitizing, trims connective tissue relentlessly\u003cbr\u003eAUTHENTICITY_POLICY: natural cadence, not over-polished, leaves some ums and roughness,\u003cbr\u003e  edits are mostly invisible micro-cuts\u003cbr\u003eSTRUCTURE_TEMPLATE: produced music-bed intro, immediate jump into first question, light,\u003cbr\u003e  functional sign-off, no formal chaptering\u003cbr\u003eREORDER_ASSEMBLY: chronology strongly preserved, no thematic reshuffling, only tiny\u003cbr\u003e  continuity patches\u003cbr\u003eSPEAKER_TREATMENT: guest-first protection, host reduced to prompts, uses mutes to\u003cbr\u003e  declutter turns, one guest can carry runtime\u003cbr\u003eRULES:\u003cbr\u003e- CUT host followups and reaction MUST: When the host is reacting, paraphrasing, or asking\u003cbr\u003e  a question that the next guest answer already addresses or can stand without.\u003cbr\u003e- CUT host redundant scene setting PREFER: When the host is adding framing that the guest\u003cbr\u003e  has just provided (or is about to provide) in more detail.\u003cbr\u003e- CUT intra sentence connectors PREFER: When words like conjunctions\u002fhedges (e.g., leading\u003cbr\u003e  'and', 'as', 'to', 'recently') can be removed without changing meaning or grammar\u003cbr\u003e  audibly, to sharpen cadence.\u003cbr\u003e- CUT would require large reorder PREFER: If making a section work would require moving\u003cbr\u003e  large blocks around, prefer tightening\u002fcutting instead of restructuring the timeline.\u003cbr\u003e- KEEP chronological sequence MUST: Throughout the main discussion, unless a reorder is\u003cbr\u003e  required to fix a comprehension break that cannot be solved by trimming.\u003cbr\u003e- KEEP guest argument arcs MUST: When a guest is building a multi-sentence analysis (even\u003cbr\u003e  if long), unless they fully restart the point or drift into redundant restatement.\u003cbr\u003e- KEEP guest uninterrupted monologues PREFER: When a guest is delivering a cohesive\u003cbr\u003e  explanation; prefer removing tiny stumbles over breaking the monologue into smaller\u003cbr\u003e  chunks.\u003cbr\u003e- MUTE host interjections during guest flow MUST: When the host interrupts or stacks quick\u003cbr\u003e  prompts while a guest’s answer is already in motion and the listener doesn’t lose\u003cbr\u003e  orientation without the host line.\u003cbr\u003e- MUTE digressive guest subclauses PREFER: When a guest inserts a long aside that is\u003cbr\u003e  thematically adjacent but slows the forward motion (e.g., tactical blow-by-blow or extra\u003cbr\u003e  illustrative detail) and the surrounding sentence can bridge cleanly.\u003cbr\u003e- REORDER opening or closing elements PREFER: Only to swap in a produced intro\u002foutro or to\u003cbr\u003e  place a brief continuity line where it restores a clean transition.","\u003cb\u003eEveryday Wellness\u003c\u002fb\u003e\u003cbr\u003eEp. 561 Why Eating Less Isn’t Working – The Real Root Causes of Obesity & Metabolic Disease with Dr. Jason Fung | Menopause & Metabolic Health\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between clauses, keeps full long-form explanations,\u003cbr\u003e  episode length not a constraint\u003cbr\u003eCUT_CRITERIA: polish inside sentences, not blocks, protect teaching analogies and\u003cbr\u003e  frameworks, remove repetitive re-assertions quickly\u003cbr\u003eAUTHENTICITY_POLICY: clean disfluencies, keep strong opinions, allows blunt phrasing to\u003cbr\u003e  stand, light-touch realism over perfection\u003cbr\u003eSTRUCTURE_TEMPLATE: music bed bookends, scripted host opener recap, mid-episode break\u003cbr\u003e  modules\u003cbr\u003eREORDER_ASSEMBLY: chronology is effectively locked, bridge with pickups, not reshuffles,\u003cbr\u003e  no thematic rearranging\u003cbr\u003eSPEAKER_TREATMENT: guest airtime is protected, host tightened to questions\u002fsteers, muting\u003cbr\u003e  used for stray noises\u003cbr\u003eRULES:\u003cbr\u003e- CUT repetition re-assertion MUST: When a speaker restates the same takeaway multiple\u003cbr\u003e  times with minimal new mechanism or example, especially in a heated or rhythmic run-on.\u003cbr\u003e- CUT guest edge words without payload PREFER: When standalone intensifiers or tag\u003cbr\u003e  questions ('right?', 'you know') cluster without adding meaning and removing them\u003cbr\u003e  doesn’t change the argument’s structure.\u003cbr\u003e- CUT host meta-framing PREFER: When the host comments on the conversation itself (e.g.,\u003cbr\u003e  praising nuance, thanking, scene-setting) unless it directly sets up the next question\u003cbr\u003e  or introduces a new subtopic.\u003cbr\u003e- CUT host run-up to question PREFER: When the host piles multiple prefaces before a\u003cbr\u003e  question; keep one clean setup line and move quickly to the ask.\u003cbr\u003e- CUT single-word host interjections PREFER: When the host’s brief interjection is not\u003cbr\u003e  functioning as a handoff or clarification and slightly muddies the guest’s line.\u003cbr\u003e- KEEP chronological sequence MUST: By default for the full main conversation; do not\u003cbr\u003e  cluster topics out of order just to increase topical cohesion.\u003cbr\u003e- KEEP guest multi-step explanation MUST: When the guest is building a numbered\u002fstepwise\u003cbr\u003e  causal chain or defining categories; avoid cutting intermediate steps that make later\u003cbr\u003e  conclusions feel ungrounded.\u003cbr\u003e- KEEP external pickup bridge PREFER: When a cut creates a tiny grammatical or logical\u003cbr\u003e  seam, prefer inserting a brief pickup\u002fVO connector instead of moving adjacent\u003cbr\u003e  conversation.\u003cbr\u003e- KEEP teaching analogy or framework PREFER: When an analogy or named framework is doing\u003cbr\u003e  explanatory work (sets up the logic and then pays it off with actionable guidance), even\u003cbr\u003e  if it’s longer than surrounding material.\u003cbr\u003e- MUTE guest laughter or asides MUST: When the guest’s chuckle\u002funder-breath reaction\u003cbr\u003e  overlaps the host’s sentence and doesn’t become a conversational beat that the host\u003cbr\u003e  responds to.\u003cbr\u003e- REORDER topic block AVOID: Only when a removed section causes a clear\u003cbr\u003e  reference\u002fbackpointer to become confusing and a simple external pickup cannot restore\u003cbr\u003e  the missing premise.","\u003cb\u003eBulwark Takes\u003c\u002fb\u003e\u003cbr\u003eWhat Happened to Anthropic Could Happen to Any AI Company (w\u002f Hayden Field)\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-complete conversation retained, relentless micro-shaves for pace, no\u003cbr\u003e  macro segment removals, low silence-trim intensity\u003cbr\u003eCUT_CRITERIA: cuts meaning-light connectives, keeps full explanatory blocks, trims hedges\u003cbr\u003e  inside questions, lightly prunes outros\u002fctas\u003cbr\u003eAUTHENTICITY_POLICY: cleaned but not over-sanitized, emphasis repetitions left intact,\u003cbr\u003e  minimal crosstalk cleanup, edits aim to be invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: standard intro into mai
