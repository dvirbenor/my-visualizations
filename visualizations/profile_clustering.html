e screaming MUST: When the opening is pure hype\u002fventing before the show\u003cbr\u003e  frame is established and it doesn’t introduce the first news item cleanly.\u003cbr\u003e- CUT micro wording snags PREFER: When a sentence has a small hitch (stray 'um',\u003cbr\u003e  duplicated word, dangling setup like 'peek at…') that can be removed without changing\u003cbr\u003e  meaning or tone.\u003cbr\u003e- CUT secondary speaker track PREFER: When a non-core speaker’s contribution is not\u003cbr\u003e  integrated into on-mic discussion (no on-air setup\u002fpayoff) and functions like off-camera\u003cbr\u003e  production presence.\u003cbr\u003e- KEEP chronological topic flow MUST: Across the main segment, even when later material\u003cbr\u003e  might be a stronger hook—avoid pulling highlights forward via reorders.\u003cbr\u003e- KEEP long context blocks PREFER: When a speaker is laying out the timeline, stakes, or\u003cbr\u003e  ethical frame for a news story, even if it’s lengthy or politically charged.\u003cbr\u003e- KEEP supportive backchannels PREFER: During argumentative\u002fexplanatory stretches, keep\u003cbr\u003e  short ‘mm-hmm\u002fyeah’ responses if they don’t obscure words and they signal engagement.\u003cbr\u003e- MUTE cohost interjections during scripted read MUST: When one host is reading the formal\u003cbr\u003e  intro\u002frundown or a clean setup line and the other host is ad-libbing over it (even if\u003cbr\u003e  the ad-lib is fun).\u003cbr\u003e- REORDER topic blocks AVOID: Only if a topic is clearly recorded out of order in a way\u003cbr\u003e  that creates listener confusion that cannot be fixed with a brief cut\u002fbridge."],"x":{"dtype":"f4","bdata":"tSLCQHKWykDF2sNA+MO\u002fQMWgwkDLZMJA"},"y":{"dtype":"f4","bdata":"rEpdQec7Y0E6TGFBwhtkQccMXkElW2NB"},"type":"scatter"},{"hoverinfo":"skip","line":{"color":"#2ca02c","dash":"dot","width":1.5},"mode":"lines","showlegend":false,"x":{"dtype":"f4","bdata":"cpbKQPjDv0C1IsJAcpbKQA=="},"y":{"dtype":"f4","bdata":"5ztjQcIbZEGsSl1B5ztjQQ=="},"type":"scatter"},{"hoverinfo":"skip","mode":"text","showlegend":false,"text":["Anchor-Block Rule Editing"],"textfont":{"color":"#2ca02c","size":9},"x":[6.111276149749756],"y":[14.076436042785645],"type":"scatter"},{"hoverinfo":"text","marker":{"color":"#d62728","line":{"color":"white","width":0.5},"size":8},"mode":"markers","name":"Chapterized Scripted Narrative","text":["\u003cb\u003eUnpacking Israeli History\u003c\u002fb\u003e\u003cbr\u003eThe Formation of \"Modern\" Zionism: The History of Israel (Part 3)\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaving between clauses, macro cuts for off-mic logistics,\u003cbr\u003e  near-zero dead-air tolerance, keeps full narrative paragraphs intact\u003cbr\u003eCUT_CRITERIA: cuts self-referential host asides, protects scripted-sounding history\u003cbr\u003e  exposition, comedy kept only if it lands, removes meta-argument about wording\u003cbr\u003eAUTHENTICITY_POLICY: polish-first: restarts rarely survive, allows some signature\u003cbr\u003e  catchphrases, cleans intensity without flattening, fixes continuity with invisible\u003cbr\u003e  patches\u003cbr\u003eSTRUCTURE_TEMPLATE: produced bookends, narrated core, chapterized progression with labels,\u003cbr\u003e  regular recap\u002fpreview scaffolding, cta-heavy outro retained\u003cbr\u003eREORDER_ASSEMBLY: chronology flexible within minutes, reorders to repair cut continuity,\u003cbr\u003e  front-loads clarifying setup lines, maintains chapter order integrity\u003cbr\u003eSPEAKER_TREATMENT: host speech heavily sculpted, mutes used as surgical smoothing, deletes\u003cbr\u003e  stumbles mid-sentence, keeps authoritative narrator tone\u003cbr\u003eRULES:\u003cbr\u003e- CUT reorder across chapters AVOID: Avoid moving material across explicit chapter headers\u003cbr\u003e  unless there is a clear factual dependency that cannot be solved with trims or a shorter\u003cbr\u003e  reorder.\u003cbr\u003e- CUT extended riff looping MUST: When the host repeats the same beat (synonyms, re-saying\u003cbr\u003e  the same line, stacking parentheticals) without adding new information, keeping only the\u003cbr\u003e  strongest single formulation.\u003cbr\u003e- CUT host personal anecdote MUST: When the host references their own classes, friends,\u003cbr\u003e  credentials, or behind-the-scenes context, unless it directly advances the historical\u003cbr\u003e  point being made in the next sentence.\u003cbr\u003e- CUT host self-correction loop MUST: When the host repeats a clause multiple times to fix\u003cbr\u003e  it; retain only the final clean version even if it means hard-cutting inside the\u003cbr\u003e  thought.\u003cbr\u003e- CUT in-session production or scheduling talk MUST: Any recording\u002fscheduling\u002fcoordination\u003cbr\u003e  discussion that leaks into the session audio, even if it occurs near a real content\u003cbr\u003e  transition.\u003cbr\u003e- CUT host meta delivery PREFER: When the host comments on pronunciation, wording choices,\u003cbr\u003e  or how intense a moment was, unless the meta-comment is the joke payoff or is needed to\u003cbr\u003e  prevent misunderstanding.\u003cbr\u003e- KEEP conceptual definition block MUST: When a segment is doing real explanatory work\u003cbr\u003e  (definitions, distinctions, ‘let’s review’ summaries, thesis statements), even if it\u003cbr\u003e  contains some stylistic roughness or repeated emphasis.\u003cbr\u003e- KEEP host emphatic line PREFER: When the host delivers a concise thesis\u002fpivot line that\u003cbr\u003e  drives the narrative forward (chapter turns, ‘what matters here is…’), even if it’s\u003cbr\u003e  stylistically intense.\u003cbr\u003e- MUTE host flub fragment PREFER: When a brief host fragment (1–3 words) disrupts an\u003cbr\u003e  otherwise clean sentence but the sentence can continue naturally without it.\u003cbr\u003e- REORDER setup sentence PREFER: When a later line provides necessary setup\u002fsubject for a\u003cbr\u003e  kept sentence whose antecedent was cut—move the setup earlier rather than adding new\u003cbr\u003e  narration.\u003cbr\u003e- REORDER single paragraph bridge PREFER: When a transition paragraph works better as a\u003cbr\u003e  lead-in (e.g., ‘and so while…’) to the next topic, and the move is within the same\u003cbr\u003e  chapter-sized segment.","\u003cb\u003eJack\u003c\u002fb\u003e\u003cbr\u003eBest Work Day Ever (feat. Virginia Burger)\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: micro-shaves between scripted phrases, moderate overall session compression,\u003cbr\u003e  long monologues largely left intact, silence tightened but not zeroed\u003cbr\u003eCUT_CRITERIA: remove all recording-process chatter, retake paragraphs; keep clean take,\u003cbr\u003e  cut self-derailing asides fast, protect dense explanatory passages\u003cbr\u003eAUTHENTICITY_POLICY: polished broadcast surface, mistakes removed rather than showcased,\u003cbr\u003e  some conversational edge remains, edits kept mostly invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open + headline run, story blocks with break bumpers,\u003cbr\u003e  midrolls treated as chapters, listener q then credits\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, no thematic reshuffling, patch with inserts,\u003cbr\u003e  not reorders\u003cbr\u003eSPEAKER_TREATMENT: single-narrator polish priority, on-mic flubs removed, not masked, very\u003cbr\u003e  light muting usage, cadence continuity over verbatimness\u003cbr\u003eRULES:\u003cbr\u003e- CUT host retakes and partial paragraphs MUST: When the host restarts a\u003cbr\u003e  sentence\u002fparagraph to redo it, cut the abandoned attempt and jump to the restart, unless\u003cbr\u003e  the failed attempt contains uniquely important factual content not repeated in the clean\u003cbr\u003e  take.\u003cbr\u003e- CUT host stumble then restart MUST: When the host interrupts themselves to restart\u003cbr\u003e  (including mid-paragraph), remove the stumble and anchor the edit on the restart cue.\u003cbr\u003e- CUT recording slates and production meta MUST: Any time the host references takes,\u003cbr\u003e  countdowns, page\u002fscript management, or where to rejoin the script (e.g., \"three, two,\"\u003cbr\u003e  \"we’re at midroll,\" \"roll it to\"), regardless of comedic value.\u003cbr\u003e- CUT host physical state ramble PREFER: When the host digresses into fatigue\u002fvoice\u002fhealth\u003cbr\u003e  complaints or off-topic self-talk that delays the next story beat, unless it directly\u003cbr\u003e  sets up a necessary pause\u002ftransition.\u003cbr\u003e- CUT redundant bridge lines around inserts PREFER: When an external insert\u002fpickup cleanly\u003cbr\u003e  delivers a bridge line, remove the overlapping or duplicated session version rather than\u003cbr\u003e  keeping both for redundancy.\u003cbr\u003e- CUT single word hesitations inside scripted reads PREFER: Within otherwise scripted\u003cbr\u003e  narration\u002fads, remove isolated stray words (\"uh,\" \"ah,\" repeated articles) when the\u003cbr\u003e  sentence scans cleanly without them.\u003cbr\u003e- KEEP chronological order MUST: By default for all story beats and explanations, even if\u003cbr\u003e  a later segment might be a stronger hook; prefer trimming over rearranging.\u003cbr\u003e- KEEP host emphatic repetition for argument PREFER: When repetition is used to make a\u003cbr\u003e  point (contrast, irony, enumeration) rather than being a mistake or a restart.\u003cbr\u003e- KEEP substantive legal or process explanation PREFER: When the content is explaining a\u003cbr\u003e  mechanism (legal, institutional, procedural) with concrete examples and logical\u003cbr\u003e  sequencing, even if it’s dense or lengthy.\u003cbr\u003e- MUTE brief intrusive noise under speech AVOID: Only for momentary intrusions that can’t\u003cbr\u003e  be cleanly cut without damaging timing (e.g., a tiny overlap\u002fnoise during an otherwise\u003cbr\u003e  good line).\u003cbr\u003e- REORDER segment blocks AVOID: Only when required to preserve break logic (e.g., placing\u003cbr\u003e  a sponsor break where the script explicitly tees it) or to repair an obvious out-of-\u003cbr\u003e  order recording mistake that would confuse listeners.","\u003cb\u003eStuff You Missed in History Class\u003c\u002fb\u003e\u003cbr\u003eHercules Posey & the President’s House\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: micro-shaved conversational pacing, macro-cuts for off-mic disruptions, keeps\u003cbr\u003e  full narrative explanations, low silence tolerance, then pad\u003cbr\u003eCUT_CRITERIA: hard-cut bodily\u002fnoise interruptions, keep witty historical reactions, patch\u003cbr\u003e  tiny connective tissue externally, listener mail preserved as palate-cleanser\u003cbr\u003eAUTHENTICITY_POLICY: polished narration, conversational edges, allows informal phrasing to\u003cbr\u003e  stand, cleans errors more than personality, visible edits kept mostly invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: produced ad bookends and midrolls, straight read-through history\u003cbr\u003e  backbone, quote\u002ftext close before mail, occasional setup lines preloaded\u003cbr\u003eREORDER_ASSEMBLY: small reorders to smooth takes, chronology respected in main story,\u003cbr\u003e  moves setup before explanations\u003cbr\u003eSPEAKER_TREATMENT: narrator track protected; banter trimmed, uses mutes to preserve\u003cbr\u003e  continuity, crosstalk largely eliminated\u003cbr\u003eRULES:\u003cbr\u003e- CUT theme based resequence AVOID: When a proposed reorder would restructure the argument\u003cbr\u003e  into thematic clusters at the expense of the timeline of events.\u003cbr\u003e- CUT host backstage chatter MUST: When hosts discuss process (spelling, scrolling, ‘say\u003cbr\u003e  that again’, timing the runtime) that doesn’t serve the listener’s understanding.\u003cbr\u003e- CUT meta about wording or pronunciation MUST: When a restart is purely to fix wording,\u003cbr\u003e  pronunciation, or a flub and a clean take exists immediately after.\u003cbr\u003e- CUT recording disruptions MUST: When the talk is dominated by environmental noise,\u003cbr\u003e  health\u002fnose\u002fthroat management, or troubleshooting, even if it contains some banter,\u003cbr\u003e  unless it directly explains an unavoidable continuity change.\u003cbr\u003e- CUT overlap crosstalk PREFER: When overlapping acknowledgments create clutter without\u003cbr\u003e  adding comedic timing or new information.\u003cbr\u003e- KEEP host reaction beats PREFER: When the hosts’ brief interjections express moral\u003cbr\u003e  clarity\u002firony or emphasize stakes, and they do not derail the timeline into a new\u003cbr\u003e  tangent.\u003cbr\u003e- KEEP listener mail block PREFER: In the closing segment as a decompression beat, unless\u003cbr\u003e  it balloons into a multi-step rabbit hole that competes with the episode’s ending.\u003cbr\u003e- KEEP minimal external patch words PREFER: When a 1–3 word insert can bridge a cut\u003cbr\u003e  cleanly (e.g., conjunctions, a repeated keyword, a single missing verb) without adding\u003cbr\u003e  new information.\u003cbr\u003e- KEEP short host agreement laughter PREFER: When a brief agreement beat supports warmth\u003cbr\u003e  at transitions (e.g., after a quote or before a new section) and stays under ~1\u003cbr\u003e  sentence.\u003cbr\u003e- MUTE speaker flub under good audio PREFER: When one host makes an error, aside, or stray\u003cbr\u003e  fragment while the other host’s line should remain continuous and intelligible.\u003cbr\u003e- REORDER clean take block PREFER: When a later clean read of the same paragraph exists\u003cbr\u003e  and swapping it in avoids audible restart artifacts, while keeping the surrounding\u003cbr\u003e  chronology intact.\u003cbr\u003e- REORDER setup sentence PREFER: When a short orienting line (topic statement \u002f ‘today\u003cbr\u003e  we’re talking about…’) can be moved earlier to prevent listener confusion at a section\u003cbr\u003e  boundary.","\u003cb\u003eUnpacking Israeli History\u003c\u002fb\u003e\u003cbr\u003eBefore Zionism Had a Name (Zionism 1 of 5)\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between clauses, macro cuts to protect momentum, low\u003cbr\u003e  tolerance for dead air, keeps long narrative runs intact\u003cbr\u003eCUT_CRITERIA: cut meta-process and off-mic coordination, prefer one clean take of a\u003cbr\u003e  thought, keep thesis and framing caveats, comedy kept only if it lands\u003cbr\u003eAUTHENTICITY_POLICY: polished voice, not raw session, stumbles removed, personality\u003cbr\u003e  retained, lightly preserves emphatic repeats, invisible cleanup over audible chopping\u003cbr\u003eSTRUCTURE_TEMPLATE: produced intro, produced outro, chapterized history-lecture arc,\u003cbr\u003e  frequent on-ramps between beats, cta and credits at the end\u003cbr\u003eREORDER_ASSEMBLY: small timeline nudges for clarity, reorder only within a beat,\u003cbr\u003e  chronology preserved at macro scale\u003cbr\u003eSPEAKER_TREATMENT: host-only: tighten to narrator mode, mute to preserve beds\u002fcontinuity,\u003cbr\u003e  backstage chatter removed entirely\u003cbr\u003eRULES:\u003cbr\u003e- CUT reorder opportunity overreach AVOID: When improving flow would require moving\u003cbr\u003e  material across major chapters or changing the historical sequence; solve with trimming\u003cbr\u003e  or new linking lines instead.\u003cbr\u003e- CUT host meta coordination MUST: When the host addresses producers, asks what’s in the\u003cbr\u003e  outline, or comments on episode construction, unless the line is immediately repurposed\u003cbr\u003e  into a clean listener-facing setup.\u003cbr\u003e- CUT host self negotiation MUST: When the host negotiates phrasing in real time (e.g.,\u003cbr\u003e  ‘should I say this?’, ‘ignore that line’, ‘one more caveat… okay okay’) beyond what’s\u003cbr\u003e  needed for a clean, single listener-facing disclaimer.\u003cbr\u003e- CUT repeated take MUST: When the same sentence\u002fintro\u002fdefinition is attempted multiple\u003cbr\u003e  times within a short span; keep only the most polished\u002fclear take.\u003cbr\u003e- CUT host ramble PREFER: When the host riff becomes self-referential (e.g., ‘don’t let me\u003cbr\u003e  fall down this rabbit hole’) and does not add a new fact, example, or punchline within a\u003cbr\u003e  couple of sentences.\u003cbr\u003e- KEEP chapter signposts MUST: When a line cleanly labels a new chapter\u002fbeat or resets\u003cbr\u003e  listener orientation; sacrifice smaller jokes around it to keep the signpost crisp.\u003cbr\u003e- KEEP audience scope caveats PREFER: When the host clarifies intent, audience scope, or\u003cbr\u003e  epistemic boundaries (e.g., what the episode is and is not arguing), even if it adds a\u003cbr\u003e  beat of length—unless it becomes a multi-paragraph digression.\u003cbr\u003e- KEEP intentional emphasis repetition PREFER: When repetition is used as rhetorical\u003cbr\u003e  emphasis in the finished narration (not a restart), especially near chapter turns or\u003cbr\u003e  thesis statements.\u003cbr\u003e- MUTE micro stumble inside bed PREFER: When the host has a brief stumble\u002frestart inside a\u003cbr\u003e  scored\u002fbed section and removing it with a cut would create an audible jump; mute the\u003cbr\u003e  fragment to maintain continuity.\u003cbr\u003e- REORDER chapter header PREFER: When a chapter label exists but lands late (after\u003cbr\u003e  examples have begun); move the label to the top of that section to act as a signpost.\u003cbr\u003e- REORDER setup question PREFER: When a concise framing question or premise appears\u003cbr\u003e  shortly after the explanation it motivates; move the setup earlier within the same topic\u003cbr\u003e  block (sub-minute shifts).","\u003cb\u003eThe Prof G Pod with Scott Galloway\u003c\u002fb\u003e\u003cbr\u003eNo Mercy \u002f No Malice: The Epstein Tax\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro cuts over micro shaving, performance-first tightening (pickups\u003cbr\u003e  removed), keeps sentences intact, swaps takes, adds brief pads after hard splices\u003cbr\u003eCUT_CRITERIA: strip all self-directed studio talk, numbers\u002fphrasing retries fully removed,\u003cbr\u003e  protects punchy moral one-liners, cuts content to avoid digression risk\u003cbr\u003eAUTHENTICITY_POLICY: highly polished, invisible editorial hand, no stumbles, no profanity-\u003cbr\u003e  as-process, narration reads as continuous take, cleaned timing via inserted silence\u003cbr\u003eSTRUCTURE_TEMPLATE: produced sponsor-heavy cold open, branded intro into narrated essay,\u003cbr\u003e  music beds punctuate key beats, short stinger-style outro\u003cbr\u003eREORDER_ASSEMBLY: narrative arc trumps timeline, heavy block-level rearrangement, stitches\u003cbr\u003e  best takes into one flow, uses reorders to fix continuity\u003cbr\u003eSPEAKER_TREATMENT: single-voice final (one host), non-essential co-host fully removed,\u003cbr\u003e  mutes intra-sentence to preserve pacing, speaker equality not a priority\u003cbr\u003eRULES:\u003cbr\u003e- CUT adjacent duplicate sentence MUST: When the same sentence\u002fclaim appears twice due to\u003cbr\u003e  assembly from multiple takes; remove the duplicate even if the wording differs slightly.\u003cbr\u003e- CUT dangling fragment from reorder MUST: When a reordered section leaves behind a\u003cbr\u003e  repeated or orphaned phrase (e.g., a clause that now appears elsewhere in full), remove\u003cbr\u003e  the leftover fragment rather than trying to justify it with extra narration.\u003cbr\u003e- CUT numbers retry block MUST: When a stat-heavy sentence is repeated multiple times to\u003cbr\u003e  get it right; keep only the single cleanest delivery even if it means removing a longer\u003cbr\u003e  surrounding block.\u003cbr\u003e- CUT pickup chatter MUST: When the speaker comments on the read itself (e.g., apologies,\u003cbr\u003e  self-critique, “too wonky,” “take a breath”), unless it is intentionally part of the on-\u003cbr\u003e  mic persona for this series segment.\u003cbr\u003e- CUT secondary host presence PREFER: When a secondary host appears only for\u003cbr\u003e  conversational scaffolding or acknowledgement in a narration-forward segment; keep only\u003cbr\u003e  if it materially changes meaning or is required by the show format.\u003cbr\u003e- KEEP micro bridge insert PREFER: When a reorder creates a grammatical seam, allow tiny\u003cbr\u003e  connective inserts (single-word\u002fshort-phrase bridges) to smooth logic without adding new\u003cbr\u003e  ideas.\u003cbr\u003e- KEEP primary voice continuity PREFER: When choosing between a slightly imperfect\u003cbr\u003e  continuous read and a noticeably choppy assembly, prefer continuity and then use small\u003cbr\u003e  pads\u002fmusic to hide seams.\u003cbr\u003e- KEEP rhetorical thesis zinger PREFER: When a line functions as a memorable thesis,\u003cbr\u003e  button, or moral contrast (short, quotable phrasing), even if adjacent material is\u003cbr\u003e  heavily compressed.\u003cbr\u003e- MUTE single word stumble PREFER: When removing a tiny phrase inside a sentence yields a\u003cbr\u003e  cleaner read without forcing a full retake swap or a larger cut.\u003cbr\u003e- REORDER best take block MUST: When multiple takes exist for the same passage, assemble\u003cbr\u003e  the episode from the cleanest takes regardless of original session order, prioritizing\u003cbr\u003e  clarity and momentum.\u003cbr\u003e- REORDER topic cluster PREFER: When the session meanders due to pickups, move blocks to\u003cbr\u003e  keep the argument grouped by claim → evidence → implication rather than preserving\u003cbr\u003e  recording sequence.","\u003cb\u003eUnpacking Israeli History\u003c\u002fb\u003e\u003cbr\u003eWhen Zionism Became a State: The History of Israel (Part 4 of 5)\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave between clauses, macro blocks cut when off-mission,\u003cbr\u003e  low pause tolerance in narration, density over conversational looseness\u003cbr\u003eCUT_CRITERIA: cuts self-referential host riffing, dedupes repeated lines immediately,\u003cbr\u003e  trims jokes that delay thesis, keeps moral\u002fanalytic spine intact\u003cbr\u003eAUTHENTICITY_POLICY: highly polished narration, minimal stumbles, cleaned phrasing over\u003cbr\u003e  raw spontaneity, allows selective personality lines, invisible repairs preferred to re-\u003cbr\u003e  record\u003cbr\u003eSTRUCTURE_TEMPLATE: produced sponsor-led cold open, chapterized history lecture format,\u003cbr\u003e  music-bedded narrative throughout, hard-outro with standardized credits\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved, micro-reorders allowed, reorders only to fix\u003cbr\u003e  logic, small temporal shifts only\u003cbr\u003eSPEAKER_TREATMENT: single-voice narration sculpted tightly, mutes used as surgical\u003cbr\u003e  excisions, no rebalancing—voice is the show\u003cbr\u003eRULES:\u003cbr\u003e- CUT host list retake MUST: When the host repeats a list or example for emphasis; keep\u003cbr\u003e  one clean enumeration and remove the alternate phrasing.\u003cbr\u003e- CUT host meta commentary MUST: When the host comments on the act of hosting (self-rating\u003cbr\u003e  the series, apologizing for jokes, promising future episodes, explaining podcast\u003cbr\u003e  mechanics), unless it is the shortest possible bridge into the next historical beat.\u003cbr\u003e- CUT host repetition second take MUST: When the host repeats a sentence\u002flist “another\u003cbr\u003e  way” or restarts a paragraph, keeping only the cleanest\u002fmost forceful take even if it\u003cbr\u003e  slightly reduces spontaneity.\u003cbr\u003e- CUT host personal aside PREFER: When personal comparisons or generational shout-outs\u003cbr\u003e  don’t materially support the historical claim being made in that paragraph.\u003cbr\u003e- CUT long opinion rant PREFER: When the host’s opinionated emphasis escalates into\u003cbr\u003e  extended editorializing rather than adding a new factual or interpretive layer.\u003cbr\u003e- KEEP macro timeline order AVOID: When a reorder would change the historical sequence or\u003cbr\u003e  reframe a chronological argument; prefer cutting or rewriting via pickups instead.\u003cbr\u003e- KEEP signature voice line PREFER: When a brief, punchy line expresses the host’s\u003cbr\u003e  characteristic voice while still advancing the point (e.g., a one-sentence aside that\u003cbr\u003e  sharpens interpretation).\u003cbr\u003e- KEEP stakes clarifier PREFER: When the line explicitly clarifies stakes, definitions, or\u003cbr\u003e  the central tension (ideal vs. reality, aspiration vs. guarantee), even if it introduces\u003cbr\u003e  a slightly didactic tone.\u003cbr\u003e- MUTE intra sentence strays PREFER: When removing a few words (interjections, half-\u003cbr\u003e  starts, parenthetical fragments) inside an otherwise good sentence, especially under\u003cbr\u003e  music, to preserve the sentence’s flow without a hard cut.\u003cbr\u003e- REORDER chapter setup PREFER: When moving a short setup line earlier reduces a stumble\u003cbr\u003e  into the chapter or removes an awkward back-reference, without changing the macro\u003cbr\u003e  timeline.\u003cbr\u003e- REORDER short narration block PREFER: When a nearby sentence provides essential context\u003cbr\u003e  (definition, framing, setup) that makes the subsequent beat clearer if heard first; keep\u003cbr\u003e  the shift local (within the same topic run).","\u003cb\u003eUnpacking Israeli History\u003c\u002fb\u003e\u003cbr\u003eWhen Zionism Went Into Exile: The History of Israel (Part 2)\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shave for cadence, dead-air trimmed to near-zero, macro-cuts\u003cbr\u003e  remove derailments fast, long narrative paragraphs left intact\u003cbr\u003eCUT_CRITERIA: process talk and self-notes excised, pronunciation\u002fcredential asides\u003cbr\u003e  removed, keep the history; drop the meta, signposted mini-asides sometimes survive\u003cbr\u003eAUTHENTICITY_POLICY: cleaned narrator voice over rawness, self-corrections mostly erased,\u003cbr\u003e  some humor preserved for character, editorial hand kept mostly invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: produced bookends with music, cold-open uses external audio,\u003cbr\u003e  chapterized timeline progression, music beds under narration\u003cbr\u003eREORDER_ASSEMBLY: chronology protected; only micro-reorders, reorders used to repair\u003cbr\u003e  interruptions, shifts stay within a beat\u003cbr\u003eSPEAKER_TREATMENT: host treated like scripted narrator, mute used for tiny intrusions,\u003cbr\u003e  banter tolerated only if tight, protects flow over spontaneity\u003cbr\u003eRULES:\u003cbr\u003e- CUT need for large thematic resequence AVOID: When a reorder would change the chapter\u003cbr\u003e  sequence or re-argue the thesis out of its chronological scaffold; prefer cutting or\u003cbr\u003e  rewriting with inserts instead.\u003cbr\u003e- CUT host process talk MUST: When the host comments on the act of recording\u002fediting\u003cbr\u003e  (brain breaks, “give me a second,” reworking lines, chapter-number confusion), unless it\u003cbr\u003e  is used as a tight transition into the next structured segment.\u003cbr\u003e- CUT host pronunciation uncertainty MUST: When the host pauses to ask if a name\u002fterm is\u003cbr\u003e  pronounced correctly or jokes about not knowing a term, unless the uncertainty itself is\u003cbr\u003e  the point of the story beat (rare).\u003cbr\u003e- CUT host to producer notes MUST: When the host addresses a producer or leaves reminders\u003cbr\u003e  (booking guests, look-ups, future tasks), regardless of where they appear in the\u003cbr\u003e  narrative.\u003cbr\u003e- CUT host ramble or bit PREFER: When the host launches into a multi-sentence comedic bit\u003cbr\u003e  or self-referential riff that delays the next historical point, unless it directly\u003cbr\u003e  teaches\u002fclarifies a concept needed immediately after.\u003cbr\u003e- CUT host self positioning PREFER: When the host foregrounds personal\u003cbr\u003e  credibility\u002fidentity\u002finside-baseball context (“my major was…”, “tweet that”, etc.)\u003cbr\u003e  instead of advancing the historical explanation.\u003cbr\u003e- CUT inflammatory or overstated analogy PREFER: When the host uses a high-voltage\u003cbr\u003e  comparison or label that could distort the historical claim or yank focus from the\u003cbr\u003e  intended argument, even if it’s emotionally motivated.\u003cbr\u003e- KEEP host emphatic line MUST: When the host lands a concise thesis sentence or stakes-\u003cbr\u003e  setting contrast that anchors a chapter’s argument, even if the delivery is slightly\u003cbr\u003e  conversational.\u003cbr\u003e- KEEP primary source quote block PREFER: When the host is quoting or closely paraphrasing\u003cbr\u003e  a primary\u002fsource text to ground the history, even if the tone turns heavy or the quote\u003cbr\u003e  runs longer than typical speech.\u003cbr\u003e- MUTE host micro interjection PREFER: When the host inserts a brief, derailment-style\u003cbr\u003e  phrase mid-thought (e.g., “wait,” “pausing,” under-the-breath qualifiers) that disrupts\u003cbr\u003e  a sentence but can be removed without restructuring the surrounding clause.\u003cbr\u003e- REORDER clarifying clause PREFER: When a short clarification\u002fdefinition was recorded\u003cbr\u003e  slightly later but is required to understand the very next sentence; move it earlier\u003cbr\u003e  within the same beat so the paragraph reads cleanly.\u003cbr\u003e- REORDER post stumble resume PREFER: When the host detours into a stumble (pronunciation\u003cbr\u003e  check, self-correction, aside) and then returns to the original sentence; reorder to\u003cbr\u003e  place the clean continuation adjacent to the setup.","\u003cb\u003eInner Cosmos with David Eagleman\u003c\u002fb\u003e\u003cbr\u003eEp143 \"How do things last?\" Part 1: neurons to civilizations\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro trims over micro-shaves, keeps full explanatory run-ups, low tolerance\u003cbr\u003e  for dead air, pads inserted to smooth seams\u003cbr\u003eCUT_CRITERIA: strip self-directed production chatter, retake cleanup, keep best take,\u003cbr\u003e  protect illustrative analogies and examples, trim polarizing side-opinions fast\u003cbr\u003eAUTHENTICITY_POLICY: polished narration, not 'raw tape', stumbles removed; cadence\u003cbr\u003e  preserved, surgical word-mutes inside sentences, clean seams favored over verité\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold-open question hook, music-bed under most narration,\u003cbr\u003e  early sponsor stack, recurring midrolls, forward-promo to next installment\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, reorder only for clause repair, no thematic\u003cbr\u003e  reshuffle, shifts kept to seconds\u003cbr\u003eSPEAKER_TREATMENT: host-only clarity prioritized, non-host voices treated as removable,\u003cbr\u003e  host interruptions repaired with mutes, narrative continuity over egalitarian balance\u003cbr\u003eRULES:\u003cbr\u003e- CUT host production talk MUST: When the host comments on the script\u002fteleprompter, file\u003cbr\u003e  delivery, recording status, or addresses staff\u002feditor mid-take (even if it’s brief),\u003cbr\u003e  unless it is required to understand an upcoming edit or segment boundary.\u003cbr\u003e- CUT host self-referential edit notes MUST: When the host references what they will cut,\u003cbr\u003e  skip, or change (e.g., “note here,” “dear editor,” “I’ll shorten that”), remove even if\u003cbr\u003e  it occurs mid-explanation.\u003cbr\u003e- CUT off-mic interruptions MUST: When outside-life interruptions occur (e.g., someone\u003cbr\u003e  entering the room) and they don’t contribute to the narrative, even if the host\u003cbr\u003e  references them as an aside.\u003cbr\u003e- CUT producer engineer interjections MUST: When a non-host speaker appears for logistics,\u003cbr\u003e  confirmation, or monitoring (recording checks, doc corrections), remove entirely rather\u003cbr\u003e  than leaving a ‘behind the scenes’ moment.\u003cbr\u003e- CUT retake block MUST: When the host repeats a sentence\u002fidea to ‘do it again’ or\u003cbr\u003e  explicitly selects a better version, keep only the strongest take and remove the\u003cbr\u003e  setup\u002fdecision chatter.\u003cbr\u003e- CUT opinion aside PREFER: When the host offers a provocative personal stance that is not\u003cbr\u003e  needed for the conceptual throughline and can distract from the explanatory focus.\u003cbr\u003e- CUT reorder opportunity PREFER: When fixing a problem would require moving a block far\u003cbr\u003e  from its setup\u002fpayoff, prefer cutting or rewriting via available alternate takes rather\u003cbr\u003e  than large reorders.\u003cbr\u003e- KEEP setup payoff proximity MUST: When an example is introduced and then explained, keep\u003cbr\u003e  the explanation immediately following the setup rather than relocating either part for\u003cbr\u003e  pacing.\u003cbr\u003e- KEEP example chain PREFER: When the host runs a multi-example sequence to generalize a\u003cbr\u003e  principle (several quick illustrations of the same point), keep the sequence intact\u003cbr\u003e  unless one example is clearly redundant in function.\u003cbr\u003e- MUTE host stray words PREFER: When a single word\u002fshort fragment from the host disrupts a\u003cbr\u003e  sentence but the surrounding bed\u002fcadence is usable, prefer muting that fragment instead\u003cbr\u003e  of making a larger cut.\u003cbr\u003e- REORDER micro clause PREFER: Only when two adjacent fragments can be swapped to restore\u003cbr\u003e  grammatical sense or smooth a splice, and the time shift is small enough to be\u003cbr\u003e  imperceptible at the topic level.","\u003cb\u003eAsk Haviv Anything\u003c\u002fb\u003e\u003cbr\u003eEpisode 94: America's war, not Israel's\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: macro cuts over micro-shaving, long analytical runs kept intact, low\u003cbr\u003e  tolerance for derailed flow, silence tightening is subtle\u003cbr\u003eCUT_CRITERIA: cut disruptions and repeated restarts, trim self-referential framing,\u003cbr\u003e  compress promos to essentials, protect the thesis spine\u003cbr\u003eAUTHENTICITY_POLICY: clean continuity, not ‘raw tape’, allows some ums in-stream, hard cut\u003cbr\u003e  on messy resets, invisible fixes over audible jumps\u003cbr\u003eSTRUCTURE_TEMPLATE: produced bookends, talk core, quick orienting intro framing,\u003cbr\u003e  sponsor\u002fdedication early placement, minimal formal chapters\u003cbr\u003eREORDER_ASSEMBLY: chronology-first assembly, tiny reorders for sentence logic, no thematic\u003cbr\u003e  reshuffling\u003cbr\u003eSPEAKER_TREATMENT: host cadence protected through cuts, word-level mutes as a tool,\u003cbr\u003e  single-speaker monologue allowed\u003cbr\u003eRULES:\u003cbr\u003e- CUT dependency on reorder for pacing AVOID: When reordering would be used mainly to\u003cbr\u003e  ‘optimize’ pacing or create a new narrative arc rather than to fix local clarity.\u003cbr\u003e- CUT interruption block MUST: When the recording is interrupted (alarms,\u003cbr\u003e  leaving\u002freturning, talking to someone off-mic) and the speaker reboots the same point\u003cbr\u003e  multiple times.\u003cbr\u003e- CUT host meta explaining the episode PREFER: When the host narrates process or\u003cbr\u003e  credibility scaffolding (how to fact-check, where the idea came from, predictions about\u003cbr\u003e  convincing you) instead of advancing the argument.\u003cbr\u003e- CUT host parenthetical aside PREFER: When the host inserts a quick aside that doesn’t\u003cbr\u003e  change the claim (e.g., additional qualifiers or conversational nudges) and the\u003cbr\u003e  surrounding sentence stands cleanly without it.\u003cbr\u003e- CUT patreon or community detail PREFER: When fundraising\u002fcommunity pitch moves from a\u003cbr\u003e  simple CTA into feature lists or extended explanation.\u003cbr\u003e- KEEP chronological argument build MUST: When the host is building a layered argument\u003cbr\u003e  where later points depend on earlier definitions and setup.\u003cbr\u003e- KEEP host longform explanation MUST: When the host is in a sustained explanation block;\u003cbr\u003e  do not over-cut into choppy back-and-forth cadence just to raise density.\u003cbr\u003e- KEEP thesis spine MUST: When the host is in a continuous causal chain (premise →\u003cbr\u003e  evidence → implication) even if it’s dense, name-heavy, or runs long without\u003cbr\u003e  interaction.\u003cbr\u003e- KEEP stakes setting personal context PREFER: At the top of the episode, when brief\u003cbr\u003e  personal scene-setting establishes urgency and why this installment exists; trim only\u003cbr\u003e  the extra branches that don’t change the stakes.\u003cbr\u003e- MUTE single word or name PREFER: When only one word (often a proper noun or a brief\u003cbr\u003e  misstep) needs removal and cutting it would create a noticeable jump in the sentence’s\u003cbr\u003e  timing.\u003cbr\u003e- REORDER clause level fix PREFER: When two adjacent clauses were recorded seconds apart\u003cbr\u003e  and swapping them repairs a cut-induced fragment or restores the intended sentence\u003cbr\u003e  without changing meaning.","\u003cb\u003eWe Study Billionaires - The Investor’s Podcast Network\u003c\u002fb\u003e\u003cbr\u003eTIP794: Keynes And The Markets w\u002f Kyle Grieve\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaving between clauses, near-zero dead-air tolerance, keeps\u003cbr\u003e  long monologue blocks intact\u003cbr\u003eCUT_CRITERIA: cuts stumbles\u002fword-salad, not ideas, preserves illustrative investing\u003cbr\u003e  anecdotes, prefers repair over removal\u003cbr\u003eAUTHENTICITY_POLICY: polished read, minimal verbal debris, allows some conversational\u003cbr\u003e  texture, meta-editing talk removed\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open + music bed, sponsor-heavy midroll blocks, network-\u003cbr\u003e  style disclaimer outro\u003cbr\u003eREORDER_ASSEMBLY: chronology-first with micro-reorders, reorders only to fix continuity,\u003cbr\u003e  small shifts (under a minute)\u003cbr\u003eSPEAKER_TREATMENT: single-voice narration protected, uses micro-mutes within sentences,\u003cbr\u003e  cadence preserved over verbatimness\u003cbr\u003eRULES:\u003cbr\u003e- CUT apology and reset MUST: When the host says “sorry,” “redo,” or otherwise signals a\u003cbr\u003e  reset; remove the marker and keep the clean continuation.\u003cbr\u003e- CUT host misread word salad MUST: When a sentence becomes garbled (false starts, tangled\u003cbr\u003e  phrasing, misordered words); keep only the cleanest pass that preserves the meaning.\u003cbr\u003e- CUT host restart repetition MUST: When the host repeats a clause\u002fsentence to restart\u003cbr\u003e  (especially after a flub), unless the repetition is used deliberately for rhetorical\u003cbr\u003e  emphasis.\u003cbr\u003e- CUT micro tics inside sentences MUST: When short interjections\u002fpartials (e.g., stray\u003cbr\u003e  connectors, single-word fragments) interrupt cadence without adding meaning; remove even\u003cbr\u003e  if it requires multiple tiny cuts.\u003cbr\u003e- KEEP emphasis beats PREFER: When a brief pause or repeated phrase functions as\u003cbr\u003e  intentional emphasis for a key takeaway; do not over-tighten it into a monotone read.\u003cbr\u003e- KEEP high-signal quotes and definitions PREFER: When reading or paraphrasing key\u003cbr\u003e  conceptual distinctions\u002fanalogies that anchor the episode’s thesis; compress around them\u003cbr\u003e  rather than summarizing them away.\u003cbr\u003e- KEEP original progression PREFER: When the narration is already coherent; prefer micro-\u003cbr\u003e  cuts over reordering to maintain the natural build of arguments.\u003cbr\u003e- KEEP story block personal example PREFER: When the host uses a first-person anecdote or\u003cbr\u003e  concrete case study to instantiate an investing principle, even if it runs long, unless\u003cbr\u003e  it fully detaches from the stated lesson.\u003cbr\u003e- MUTE intra sentence throwaway phrase PREFER: When removing a brief aside or filler\u003cbr\u003e  clause mid-sentence is cleaner than cutting the whole turn and does not break grammar.\u003cbr\u003e- REORDER macro topic blocks AVOID: When the reorder would change the narrative timeline\u003cbr\u003e  or re-chapter the episode by theme rather than fixing local clarity.\u003cbr\u003e- REORDER sentence fragment PREFER: When a correction or improved take exists nearby and\u003cbr\u003e  moving a short fragment will create a single clean, logically ordered\u003cbr\u003e  sentence\u002fparagraph."],"x":{"dtype":"f4","bdata":"O7ywQFodu0C2D7RAvT2tQJrQqkAnnq5ASFexQJ+4s0DOxK1A\u002fKWpQA=="},"y":{"dtype":"f4","bdata":"qgtRQRunV0GzJVJB1jBPQWtzUkHs2E5BlLFOQWWZU0GOS1JBvyNTQQ=="},"type":"scatter"},{"hoverinfo":"skip","line":{"color":"#d62728","dash":"dot","width":1.5},"mode":"lines","showlegend":false,"x":{"dtype":"f4","bdata":"Wh27QPylqUC9Pa1AJ56uQEhXsUBaHbtA"},"y":{"dtype":"f4","bdata":"G6dXQb8jU0HWME9B7NhOQZSxTkEbp1dB"},"type":"scatter"},{"hoverinfo":"skip","mode":"text","showlegend":false,"text":["Chapterized Scripted Narrative"],"textfont":{"color":"#d62728","size":9},"x":[5.509576320648193],"y":[13.11913776397705],"type":"scatter"},{"hoverinfo":"text","marker":{"color":"#9467bd","line":{"color":"white","width":0.5},"size":8},"mode":"markers","name":"Near-Full Episode Preservation","text":["\u003cb\u003eThe DSR Daily Brief\u003c\u002fb\u003e\u003cbr\u003eDSR Weekly Wrap-up: Hillary Clinton’s Bizarre Epstein Testimony\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-full-session retention, micro-trims only, no macro cuts, silence lightly\u003cbr\u003e  tightened\u003cbr\u003eCUT_CRITERIA: cuts only for tiny cleanups, leaves most tangents intact, keeps rough edges\u003cbr\u003e  for flow\u003cbr\u003eAUTHENTICITY_POLICY: conversational messiness preserved, overlaps and interjections kept,\u003cbr\u003e  minimal transcript-polish footprint\u003cbr\u003eSTRUCTURE_TEMPLATE: produced ad\u002fmembership pre-roll, hard cut into show start, lightweight\u003cbr\u003e  wrap at end\u003cbr\u003eREORDER_ASSEMBLY: strict chronological assembly, no thematic reshuffling, reorders avoided\u003cbr\u003e  entirely\u003cbr\u003eSPEAKER_TREATMENT: host and guest treated symmetrically, guest content protected nearly\u003cbr\u003e  verbatim, backchannels selectively suppressed\u003cbr\u003eRULES:\u003cbr\u003e- CUT guest wording AVOID: Even if slightly rambling, unless it becomes internally\u003cbr\u003e  contradictory or clearly derails the point being made.\u003cbr\u003e- CUT closing tag variants PREFER: When the only remaining content is a casual sign-off or\u003cbr\u003e  repeated goodbye and it can be replaced by a cleaner standardized button.\u003cbr\u003e- CUT micro redundancy PREFER: When a speaker re-says the same clause\u002fidea in immediate\u003cbr\u003e  succession without adding new meaning, especially inside a longer sentence.\u003cbr\u003e- KEEP chronological order MUST: For all substantive discussion blocks, even when a later\u003cbr\u003e  section might be a stronger hook.\u003cbr\u003e- KEEP crosstalk energy PREFER: When the overlap is brief and functions as conversational\u003cbr\u003e  energy (shared reaction) without obscuring meaning.\u003cbr\u003e- KEEP topic detour PREFER: When the detour remains thematically adjacent (same\u003cbr\u003e  story\u002fimplications) and sustains conversational momentum, even if it’s not strictly\u003cbr\u003e  necessary.\u003cbr\u003e- MUTE backchannel overlap PREFER: When a short agreement\u002finterjection occurs under\u003cbr\u003e  another speaker’s active point and the overlap adds clutter more than energy.\u003cbr\u003e- REORDER setup then payoff AVOID: Only if a reference appears before its necessary setup\u003cbr\u003e  and the listener would otherwise be confused.","\u003cb\u003eThe Victor Davis Hanson Show on Spotify\u003c\u002fb\u003e\u003cbr\u003eVictor Davis Hanson: Trump’s Democrat ‘Lose, Lose’ SOTU Strategy\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-full session preservation, relentless micro-shaving between words, macro\u003cbr\u003e  cuts reserved for retakes, adds pacing pads when needed\u003cbr\u003eCUT_CRITERIA: cuts retakes, not arguments, protects long uninterrupted monologues, host\u003cbr\u003e  housekeeping is expendable, only prunes tangents when broken\u003cbr\u003eAUTHENTICITY_POLICY: keeps conversational rough edges, doesn’t sanitize overlap in main,\u003cbr\u003e  polishes promos more than talk\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold-open teaser montage, fast pivot into sponsor break,\u003cbr\u003e  host-led framing bookends, outro includes listener\u002faudience element\u003cbr\u003eREORDER_ASSEMBLY: chronology protected end-to-end, fixes problems by cutting, not\u003cbr\u003e  reshuffling, external hooks instead of reorders\u003cbr\u003eSPEAKER_TREATMENT: mutes guest during host reads, guest is protected over host, crosstalk\u003cbr\u003e  kept for energy, host interruptions selectively suppressed\u003cbr\u003eRULES:\u003cbr\u003e- CUT botched segment then resume MUST: When a section contains an obvious broken take\u003cbr\u003e  followed by a clean restart; remove the broken take entirely and continue\u003cbr\u003e  chronologically from the restart.\u003cbr\u003e- CUT host retakes and restarts MUST: When the host flags a redo, stumbles into a restart,\u003cbr\u003e  or repeats a question setup to correct themselves; replace with the clean re-take rather\u003cbr\u003e  than keeping both.\u003cbr\u003e- CUT narrow factoid detours PREFER: When a brief aside is purely name\u002fID parsing or a\u003cbr\u003e  throwaway specificity that doesn’t advance the larger point and interrupts the flow of\u003cbr\u003e  the argument.\u003cbr\u003e- CUT single word micro redundancies PREFER: When a repeated\u003cbr\u003e  connector\u002farticle\u002finterjection (e.g., 'and', 'oh', 'a', 'it') appears due to false-start\u003cbr\u003e  momentum and removing it does not alter the sentence’s meaning or cadence.\u003cbr\u003e- KEEP guest long analysis blocks MUST: When the guest is building a sustained explanation\u003cbr\u003e  or list of supporting points, even if it’s episodic, rhetorically sharp, or slightly\u003cbr\u003e  meandering; only intervene if there’s an obvious error\u002fretake marker.\u003cbr\u003e- KEEP crosstalk in substantive exchange PREFER: When overlap happens during active\u003cbr\u003e  discussion and does not obscure key words; preserve it as conversational texture rather\u003cbr\u003e  than force-cleaning it.\u003cbr\u003e- MUTE guest backchannel during host copy MUST: When the host is delivering intro copy,\u003cbr\u003e  sponsor copy, or a formal transition and the guest speaks over it (even briefly);\u003cbr\u003e  suppress the guest so the host track remains singular and readable.\u003cbr\u003e- MUTE host side asides over guest PREFER: When the host adds a small aside or prompt\u003cbr\u003e  while the guest is already mid-thought and it doesn’t meaningfully redirect the point;\u003cbr\u003e  suppress to protect the guest’s continuity.\u003cbr\u003e- REORDER main conversation blocks AVOID: During the main discussion, even if a later\u003cbr\u003e  moment would make a stronger earlier hook; prefer leaving it in place and relying on an\u003cbr\u003e  external cold open for the hook.","\u003cb\u003eMindful In Minutes Meditation\u003c\u002fb\u003e\u003cbr\u003eReturning To Your Inner Child W\u002f Daniela Babura\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaving between words, keeps full conversational blocks,\u003cbr\u003e  near-zero dead-air tolerance\u003cbr\u003eCUT_CRITERIA: cuts clutter, keeps the hangout, single-word trims over block cuts, protects\u003cbr\u003e  personal stories and warmth, tangents kept when mood-building\u003cbr\u003eAUTHENTICITY_POLICY: conversational, not over-sanitized, overlap energy left audible,\u003cbr\u003e  polish is mostly invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: long sponsor stack before intro, music stingers mark transitions, mid-\u003cbr\u003e  episode sponsor stitched in\u003cbr\u003eREORDER_ASSEMBLY: chronology is strongly protected, no thematic reshuffling, only non-\u003cbr\u003e  chronology is ad insertion\u003cbr\u003eSPEAKER_TREATMENT: host presence largely maintained, host backchannels muted under guest,\u003cbr\u003e  crosstalk tolerated as affirmation\u003cbr\u003eRULES:\u003cbr\u003e- CUT single word clutter MUST: When a word\u002ffragment only serves as a restart, bridge, or\u003cbr\u003e  grammatical filler and removing it does not change meaning.\u003cbr\u003e- CUT topic redundancy PREFER: When an idea is immediately re-said with no added nuance;\u003cbr\u003e  compress by removing the first pass or the recap rather than both.\u003cbr\u003e- KEEP guest answer arc MUST: When the guest is building a narrative or explanation; do\u003cbr\u003e  not “summarize” by cutting internal steps unless purely repetitive.\u003cbr\u003e- KEEP affirming crosstalk PREFER: When overlap is brief and functions as agreement\u002fenergy\u003cbr\u003e  rather than creating confusion.\u003cbr\u003e- KEEP banter PREFER: When it reinforces the relationship tone or tees up the next\u003cbr\u003e  substantive point, even if it’s slightly meandering.\u003cbr\u003e- KEEP chronological flow PREFER: Even when speakers reference time or release timing\u003cbr\u003e  awkwardly; prefer micro-trims to make the reference cleaner rather than relocating the\u003cbr\u003e  passage.\u003cbr\u003e- KEEP personal vulnerability PREFER: When a speaker names an insecurity, fear, or\u003cbr\u003e  formative memory that explains their stance (even if it makes the moment less\u003cbr\u003e  “polished”).\u003cbr\u003e- MUTE host backchannel MUST: When the guest is mid-thought and the host’s interjection\u003cbr\u003e  overlaps or competes for attention.\u003cbr\u003e- REORDER conversation blocks AVOID: Only when necessary to place an external insert at a\u003cbr\u003e  mandated position and the move does not change the logical dependency of the discussion.","\u003cb\u003eTFTC: A Bitcoin Podcast\u003c\u002fb\u003e\u003cbr\u003e#722: AI Privacy Is The New Bitcoin Privacy with Mark Suman\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between clauses, keeps full thought arcs intact, low\u003cbr\u003e  macro-cut appetite overall\u003cbr\u003eCUT_CRITERIA: micro-cuts for cadence, not content, protects guest explanations over host\u003cbr\u003e  phrasing, conversation continuity over verbatim accuracy\u003cbr\u003eAUTHENTICITY_POLICY: light-touch polish; natural talk remains, crosstalk\u002fenergy tolerated\u003cbr\u003e  in small doses, edits aim to be invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: produced cold open with music, frequent midroll sponsor blocks,\u003cbr\u003e  produced cta outro separate from session\u003cbr\u003eREORDER_ASSEMBLY: chronological spine preserved, assembly edits are stitch-level, no\u003cbr\u003e  thematic reshuffling\u003cbr\u003eSPEAKER_TREATMENT: guest protected; host tightened harder, backchannels muted rather than\u003cbr\u003e  chopped, host promos corrected via inserts\u003cbr\u003eRULES:\u003cbr\u003e- CUT single words function words MUST: When removing a single word (e.g., 'that\u002fyou\u002fbe')\u003cbr\u003e  improves syntactic flow or eliminates a stumble without altering meaning.\u003cbr\u003e- CUT ad transition chatter PREFER: When moving into or out of sponsor\u002fCTA material,\u003cbr\u003e  remove conversational glue that makes the pivot messy, unless it provides essential\u003cbr\u003e  context for the ad claim.\u003cbr\u003e- CUT host meta asides PREFER: When the host comments on the show process (e.g., format\u003cbr\u003e  notes, timing apologies) and it doesn’t set up a substantive next question.\u003cbr\u003e- CUT host overexplaining setup PREFER: When the host restates the premise\u002fquestion\u003cbr\u003e  multiple times before yielding the floor, unless the restatement clearly reframes into a\u003cbr\u003e  sharper question.\u003cbr\u003e- CUT host redundant words phrases PREFER: When the host repeats small words\u002fphrases while\u003cbr\u003e  thinking (especially around questions), unless the repetition is part of a comedic beat.\u003cbr\u003e- KEEP brief crosstalk congratulations laughter AVOID: When overlap signals rapport\u002fenergy\u003cbr\u003e  and does not obscure intelligibility.\u003cbr\u003e- KEEP chronological topic progression MUST: For the main conversation, unless a\u003cbr\u003e  recording-order mistake would confuse a first-time listener.\u003cbr\u003e- KEEP guest wording precision MUST: When the guest is making a technical or conceptual\u003cbr\u003e  distinction; avoid edits that could change the claim’s scope.\u003cbr\u003e- KEEP guest longform answer arc PREFER: When the guest is building an argument with\u003cbr\u003e  examples\u002fanalogies, even if the delivery is slightly rough, unless it becomes a separate\u003cbr\u003e  unrelated tangent.\u003cbr\u003e- MUTE guest or host quick affirmations PREFER: When a standalone 'yeah\u002fmm-hmm' lands\u003cbr\u003e  during the other speaker’s uninterrupted explanation.\u003cbr\u003e- MUTE overlapping backchannel PREFER: When a brief 'yeah\u002fmm-hmm' overlaps the other\u003cbr\u003e  speaker’s sentence and adds no new information; prefer mute over cutting the primary\u003cbr\u003e  speaker’s line.\u003cbr\u003e- REORDER produced hook PREFER: When there is a strong standalone hook line available as a\u003cbr\u003e  produced cold open, place it before the live intro without changing the main\u003cbr\u003e  conversation order.\u003cbr\u003e- REORDER sponsor blocks PREFER: When sponsor reads need to occur at standard break\u003cbr\u003e  points, place them as clean blocks at natural seams rather than interrupting an active\u003cbr\u003e  explanation mid-sentence.","\u003cb\u003eJavaScript Jabber\u003c\u002fb\u003e\u003cbr\u003eCan You Really Trust AI-Generated Code? - JSJ 699\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: relentless micro-shaves between clauses, macro runtime mostly preserved, very\u003cbr\u003e  low stumble tolerance, occasional padding to smooth\u003cbr\u003eCUT_CRITERIA: cuts self-referential meta and setup chatter, preserves long explanatory\u003cbr\u003e  argument arcs, keeps show-format segments (picks\u002fplugs), banter kept only if it lands\u003cbr\u003eAUTHENTICITY_POLICY: polished wording, conversational tone kept, cleans rough starts\u003cbr\u003e  aggressively, laughs and warmth retained, some overlap energy tolerated\u003cbr\u003eSTRUCTURE_TEMPLATE: sponsor ad bookends with music, host intro → topic → picks → plug,\u003cbr\u003e  midroll ad breaks inside main, hard-stop acknowledged, then wrap\u003cbr\u003eREORDER_ASSEMBLY: strictly chronological conversation flow, no thematic reshuffling to\u003cbr\u003e  optimize, edits are trims, not reassembly\u003cbr\u003eSPEAKER_TREATMENT: non-floor backchannels frequently muted, symmetric tightening across\u003cbr\u003e  speakers, host kept as driver, not ramble, guest cadence protected during substance\u003cbr\u003eRULES:\u003cbr\u003e- CUT pre topic preamble MUST: Before the host’s first on-topic framing question, unless a\u003cbr\u003e  personal detail is directly used to motivate the episode’s core premise.\u003cbr\u003e- CUT within turn disfluency clusters MUST: When a speaker stacks multiple fillers\u002ffalse\u003cbr\u003e  starts inside a single sentence; compress to the cleanest grammatical path rather than\u003cbr\u003e  preserving the stumble.\u003cbr\u003e- CUT host filler leadin PREFER: When the host is about to ask a question but cycles\u003cbr\u003e  through multiple lead-ins; keep the question and the minimum setup needed for the guest\u003cbr\u003e  to answer.\u003cbr\u003e- CUT host recursive rephrasing PREFER: When the host repeats the guest’s point in\u003cbr\u003e  multiple equivalent phrasings without adding a new question, contrast, or summary\u003cbr\u003e  payoff.\u003cbr\u003e- CUT salesy meta disclaimer PREFER: When a speaker explicitly comments on not wanting to\u003cbr\u003e  sound commercial or talks about the conversation as marketing, unless it introduces a\u003cbr\u003e  concrete, listener-useful resource link immediately after.\u003cbr\u003e- KEEP chronological order MUST: For all main-topic discussion, even when a later\u003cbr\u003e  statement would make a stronger early hook.\u003cbr\u003e- KEEP guest answer block PREFER: When the guest is answering a direct host question;\u003cbr\u003e  avoid interrupting the arc with excessive intercuts beyond disfluency cleanup.\u003cbr\u003e- KEEP guest long form explanation PREFER: When the guest is building a multi-step\u003cbr\u003e  reasoning chain (definitions → examples → implications), even if the delivery is\u003cbr\u003e  slightly rambly or repetitive.\u003cbr\u003e- KEEP light laughter reaction PREFER: When it punctuates a point or maintains rapport,\u003cbr\u003e  even if it is not strictly informational.\u003cbr\u003e- MUTE non floor backchannel MUST: When the non-speaking party interjects short\u003cbr\u003e  acknowledgements (e.g., ‘yeah’, ‘right’, ‘mm-hmm’) during a continuous explanation and\u003cbr\u003e  it doesn’t change meaning or timing.\u003cbr\u003e- REORDER format blocks AVOID: Only if a format block (e.g., picks, plugs) was recorded\u003cbr\u003e  out of place and would break the show’s standard closing flow.\u003cbr\u003e- REORDER clarity fix PREFER: Only when a small swap is necessary to repair a clear\u003cbr\u003e  continuity error (e.g., answer appears before the question) and can be done without\u003cbr\u003e  changing meaning."],"x":{"dtype":"f4","bdata":"6UwFQf8EBkGwWwhBCCgBQfdTBEE="},"y":{"dtype":"f4","bdata":"PIKEQYz3gEHdJoZB9tuFQQr0hEE="},"type":"scatter"},{"hoverinfo":"skip","line":{"color":"#9467bd","dash":"dot","width":1.5},"mode":"lines","showlegend":false,"x":{"dtype":"f4","bdata":"sFsIQQgoAUH\u002fBAZBsFsIQQ=="},"y":{"dtype":"f4","bdata":"3SaGQfbbhUGM94BB3SaGQQ=="},"type":"scatter"},{"hoverinfo":"skip","mode":"text","showlegend":false,"text":["Near-Full Episode Preservation"],"textfont":{"color":"#9467bd","size":9},"x":[8.314531326293945],"y":[16.560998916625977],"type":"scatter"},{"hoverinfo":"text","marker":{"color":"#8c564b","line":{"color":"white","width":0.5},"size":8},"mode":"markers","name":"Produced-Frame Linear Editing","text":["\u003cb\u003eRelatable with Allie Beth Stuckey\u003c\u002fb\u003e\u003cbr\u003eVeteran, Honey Mogul, I Am Second Founder – Now Fighting for Clean Food | Ron Simmons & Nate Sheets\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-whole-session retention, micro-shaves only, not blocks, high tolerance\u003cbr\u003e  for rough pacing, silence trimmed only when long\u003cbr\u003eCUT_CRITERIA: cuts are rare and tiny, continuity over punchiness, minimal removal of\u003cbr\u003e  interjections, lets imperfect transitions stand\u003cbr\u003eAUTHENTICITY_POLICY: raw-pass feel preserved, stumbles and repetitions left in, no\u003cbr\u003e  aggressive de-umming, doesn't smooth every handoff\u003cbr\u003eSTRUCTURE_TEMPLATE: sponsor pre-roll before host intro, session plays straight through,\u003cbr\u003e  post-roll wrap + promos, outro can be externally voiced\u003cbr\u003eREORDER_ASSEMBLY: strictly chronological assembly, no thematic reshuffling, adds context\u003cbr\u003e  via wraps, not reorders\u003cbr\u003eSPEAKER_TREATMENT: symmetric, hands-off speaker editing, host kept largely intact, allows\u003cbr\u003e  frequent backchanneling, no crosstalk surgery\u003cbr\u003eRULES:\u003cbr\u003e- CUT micro interjection fragment PREFER: When a very short interjection or half-sentence\u003cbr\u003e  sits between two clean turns and makes the next line feel like it restarts (i.e., it\u003cbr\u003e  adds no meaning and bumps the downbeat).\u003cbr\u003e- CUT single long pause PREFER: When there is a conspicuously long pause that reads like\u003cbr\u003e  dead air rather than emphasis, especially around topic handoffs or question starts.\u003cbr\u003e- KEEP chronological order MUST: Across the main conversation, even when a later point\u003cbr\u003e  could 'set up' an earlier one more cleanly.\u003cbr\u003e- KEEP full answer arc MUST: When a speaker is giving a chronological story or testimony-\u003cbr\u003e  style explanation, even if it includes small side notes or repeated phrasing.\u003cbr\u003e- KEEP backchannel and reactions PREFER: When they function as active listening and do not\u003cbr\u003e  step on a key informational phrase.\u003cbr\u003e- MUTE secondary speaker overlap AVOID: Only when overlap masks a substantive point;\u003cbr\u003e  otherwise preserve the natural conversational texture.\u003cbr\u003e- REORDER session blocks AVOID: Only if a recording-order issue creates confusion that\u003cbr\u003e  cannot be fixed with a brief external line; otherwise avoid reorders entirely.","\u003cb\u003eThe Athletic NBA Show\u003c\u002fb\u003e\u003cbr\u003eContenders Revealed + Pistons handle Thunder\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-full session retention, micro-shaves, not block cuts, dead air lightly\u003cbr\u003e  tightened, occasional pacing pads inserted\u003cbr\u003eCUT_CRITERIA: cuts for clarity, not content, banter usually survives intact, avoids\u003cbr\u003e  removing host framing, only trims when it snags\u003cbr\u003eAUTHENTICITY_POLICY: light-touch cleanup, audible humanity, listener reactions left in,\u003cbr\u003e  minimal de-ums vs rewrite, edits stay invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: produced headline block with music, clear break → segment handoff,\u003cbr\u003e  interview core, produced wrap, calls-to-action in outro\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved, no thematic reshuffling, assembly edits are\u003cbr\u003e  additive, not reorders\u003cbr\u003eSPEAKER_TREATMENT: host framing protected, guest answers minimally cut, mutes used to\u003cbr\u003e  reduce stepping-on, backchannels selectively retained\u003cbr\u003eRULES:\u003cbr\u003e- CUT dangling single words MUST: When a lone word\u002ffragment (e.g., an orphaned starter or\u003cbr\u003e  tag) creates a grammatical hitch and removing it restores a clean read.\u003cbr\u003e- CUT cosmetic compliments PREFER: When the compliment\u002faside doesn’t change the\u003cbr\u003e  conversation’s direction and can be removed without breaking the surrounding sentence.\u003cbr\u003e- KEEP chronological flow MUST: When the conversation already progresses logically; do not\u003cbr\u003e  reorder merely to ‘improve pacing’ if it would change how reactions land.\u003cbr\u003e- KEEP full answer arcs MUST: When a guest is building a multi-sentence explanation or\u003cbr\u003e  contextualizing a claim; do not ‘summarize by cutting’ unless it’s truly repetitive.\u003cbr\u003e- KEEP host question setup MUST: When it establishes stakes, context, or a clear prompt\u003cbr\u003e  for the guest—even if it runs slightly long.\u003cbr\u003e- KEEP affirmative backchannel PREFER: When the backchannel is brief and cleanly placed\u003cbr\u003e  (not masking words) and it improves the sense of dialogue and attentiveness.\u003cbr\u003e- KEEP banter PREFER: When it reinforces rapport or smoothly bridges into basketball\u003cbr\u003e  analysis, even if it’s not strictly necessary to the information.\u003cbr\u003e- MUTE underlap interjection PREFER: When a short interjection (from any speaker) lands\u003cbr\u003e  under someone else’s active sentence and doesn’t add meaning beyond acknowledgment.\u003cbr\u003e- REORDER clarity fix AVOID: Only if a section references information that hasn’t been\u003cbr\u003e  introduced yet and a small move would eliminate listener confusion without altering\u003cbr\u003e  meaning.","\u003cb\u003eRaging Moderates with Scott Galloway and Jessica Tarlov \u003c\u002fb\u003e\u003cbr\u003eWhy It's Hard to Know What Comes Next in Iran\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high retention, micro-shaved delivery, virtually no macro deletions, runtime\u003cbr\u003e  expands via inserts, low tolerance for dead air\u003cbr\u003eCUT_CRITERIA: cuts hedges, throat-clearing qualifiers, protects long expert explanations,\u003cbr\u003e  edits for syntactic clarity, not content, lets substance run past polish\u003cbr\u003eAUTHENTICITY_POLICY: cleaned transcript feel, natural cadence, stumbles removed, not\u003cbr\u003e  personality, allows some overlap to remain, minimal visible editorial hand in-content\u003cbr\u003eSTRUCTURE_TEMPLATE: produced ad-heavy cold open, cta insert after host intro, mid-episode\u003cbr\u003e  'quick break' bumper, outro includes credential readout\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved end-to-end, no thematic reshuffling, breaks are\u003cbr\u003e  inserts, not rearrangements\u003cbr\u003eSPEAKER_TREATMENT: guest protected; hosts tightened harder, mutes micro-interjections\u003cbr\u003e  under leads, backchannels reduced during questions, allows brief crosstalk emphasis\u003cbr\u003eRULES:\u003cbr\u003e- CUT dangling single words MUST: When a standalone word at a clause boundary creates a\u003cbr\u003e  stuttery ramp-in (e.g., an orphaned noun or article) and the sentence reads cleanly\u003cbr\u003e  without it.\u003cbr\u003e- CUT hedge stack MUST: When a speaker piles on brief qualifiers (e.g., 'uh', 'kind of',\u003cbr\u003e  'just', 'you know') inside an otherwise coherent sentence, unless removing them would\u003cbr\u003e  change the speaker’s level of certainty.\u003cbr\u003e- CUT host question windup PREFER: When a host’s question includes multiple\u003cbr\u003e  prefaces\u002ftheses before the actual ask, unless each premise is necessary for the guest’s\u003cbr\u003e  targeted answer.\u003cbr\u003e- CUT sentence restarts PREFER: When a host begins a question with a soft lead-in then\u003cbr\u003e  restarts more cleanly (or repeats the setup) without adding new information.\u003cbr\u003e- KEEP chronological flow MUST: For substantive discussion blocks, even when later remarks\u003cbr\u003e  could serve as a stronger hook, unless the original order causes listener confusion that\u003cbr\u003e  cannot be fixed with micro-trims.\u003cbr\u003e- KEEP expert multi-scenario block MUST: When the guest is laying out structured\u003cbr\u003e  scenarios, trade-offs, or stepwise logic (numbered lists, 'first\u002fsecond\u002fthird'\u003cbr\u003e  reasoning), even if it runs long.\u003cbr\u003e- KEEP guest full answer tail MUST: When the guest is landing an answer with a concluding\u003cbr\u003e  sentence or summary framing, even if the hosts begin to move on.\u003cbr\u003e- KEEP brief overlap emphasis PREFER: When overlap is used as emphasis\u002fagreement in the\u003cbr\u003e  moment and remains intelligible without cleanup.\u003cbr\u003e- KEEP rhetorical flourish PREFER: When a speaker uses a brief metaphor\u002flabel to\u003cbr\u003e  crystallize a point (e.g., a named 'heel' or punchy comparison), unless it derails into\u003cbr\u003e  a tangent.\u003cbr\u003e- MUTE underbed interjection MUST: When a secondary speaker interjects a single word\u002fshort\u003cbr\u003e  affirmation while the primary speaker continues a sentence, unless the interjection is\u003cbr\u003e  required to preserve meaning (e.g., correcting a factual term).\u003cbr\u003e- REORDER clarity fix only AVOID: Only when a brief answer depends on a definition or\u003cbr\u003e  premise stated later and the dependency is explicit in the transcript; keep shifts\u003cbr\u003e  minimal and local.\u003cbr\u003e- REORDER ad read positioning PREFER: Do not reorder session content to 'make room' for\u003cbr\u003e  ads; instead, place external segments at existing beat changes (topic pivots, handoffs,\u003cbr\u003e  or natural pauses).","\u003cb\u003eBreaking Points with Krystal and Saagar\u003c\u002fb\u003e\u003cbr\u003e2\u002f28\u002f26: IRAN WAR: Trump RISKS IT ALL For Israel\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near full-session retention, micro-cuts only, no macros, no pause\u002fsilence\u003cbr\u003e  tightening\u003cbr\u003eCUT_CRITERIA: substance-first; almost nothing removed, cleans only tiny verbal snags,\u003cbr\u003e  keeps long explanatory runs intact\u003cbr\u003eAUTHENTICITY_POLICY: verbatim-leaning, rough edges allowed, keeps ums and informal\u003cbr\u003e  cadence, edits stay mostly invisible\u003cbr\u003eSTRUCTURE_TEMPLATE: long promo block pre-roll, main interview runs uninterrupted, long\u003cbr\u003e  promo block outro\u003cbr\u003eREORDER_ASSEMBLY: chronology treated as fixed, no thematic reshuffling\u003cbr\u003eSPEAKER_TREATMENT: guest flow is protected, host interjections trimmed\u002fmuted first,\u003cbr\u003e  overlap tolerated when intelligible\u003cbr\u003eRULES:\u003cbr\u003e- CUT dangling fragment MUST: When a word\u002fphrase is left hanging at a turn boundary (e.g.,\u003cbr\u003e  a clipped last word or an abandoned restart) and removing it does not change the meaning\u003cbr\u003e  of the surrounding sentence.\u003cbr\u003e- CUT guest interruption by host PREFER: When the host interrupts mid-argument without\u003cbr\u003e  redirecting to a clearer or more productive question; preserve the guest’s original\u003cbr\u003e  completion whenever possible.\u003cbr\u003e- CUT host setup redundancy PREFER: When the host’s framing repeats what was just said or\u003cbr\u003e  is a partial re-approach to the same question, unless it clearly sharpens the guest’s\u003cbr\u003e  next response.\u003cbr\u003e- KEEP chronological order MUST: Throughout the main conversation, unless a chronology\u003cbr\u003e  break causes explicit confusion (e.g., references to something not yet introduced).\u003cbr\u003e- KEEP crosstalk energy PREFER: When brief overlap signals engagement and the primary\u003cbr\u003e  speaker remains intelligible; do not over-clean into sterile turn-taking.\u003cbr\u003e- KEEP long argument run PREFER: When a speaker is building a multi-step explanation or\u003cbr\u003e  prediction, even if it includes verbal clutter, as long as the logic remains trackable.\u003cbr\u003e- MUTE host backchannel MUST: When the host offers a brief reaction during the guest’s\u003cbr\u003e  active sentence and it adds no new information or question, especially if it risks\u003cbr\u003e  masking a key guest word.\u003cbr\u003e- REORDER continuity fix AVOID: Only when a short passage was recorded out of sequence (or\u003cbr\u003e  an insert belongs earlier) and moving it is the smallest possible fix to make references\u003cbr\u003e  coherent.","\u003cb\u003eThe Times of Israel Daily Briefing\u003c\u002fb\u003e\u003cbr\u003eUS, Israel strike Iran's top leaders in Operation Roaring Lion\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: high-retention, light overall compression, relentless micro-shaves between\u003cbr\u003e  clauses, macro blocks left largely intact, breathing room added with pads\u003cbr\u003eCUT_CRITERIA: cuts confusion\u002fredo exchanges quickly, single-word surgical de-clunking,\u003cbr\u003e  keeps substantive context even long, avoids removing whole topical beats\u003cbr\u003eAUTHENTICITY_POLICY: polished transcript, not rewritten, hedges mostly preserved for\u003cbr\u003e  accuracy, stumbles removed only when jarring, produced bookends, conversational core\u003cbr\u003eSTRUCTURE_TEMPLATE: music-backed open and close, early sponsor break then return, explicit\u003cbr\u003e  “we’re back” reset, straight run-through main segment\u003cbr\u003eREORDER_ASSEMBLY: chronology strongly protected, no thematic reshuffling, assembly changes\u003cbr\u003e  mainly for inserts\u003cbr\u003eSPEAKER_TREATMENT: symmetric polish across speakers, guest backchannels muted under host,\u003cbr\u003e  host question preserved; guest tightened, interruptions cleaned, not showcased\u003cbr\u003eRULES:\u003cbr\u003e- CUT clarification redo exchange MUST: When either speaker asks to repeat\u002fclarify due to\u003cbr\u003e  not hearing or misunderstanding, and the corrected question\u002fanswer follows immediately.\u003cbr\u003e- CUT micro redundancy within sentence PREFER: When a clause contains immediate self-\u003cbr\u003e  duplication or a doubled construction that doesn’t add emphasis (e.g., repeated function\u003cbr\u003e  words) and removal doesn’t change meaning.\u003cbr\u003e- CUT single word hitch PREFER: When a lone connector\u002fhedge (e.g., short interjection or\u003cbr\u003e  extra preposition) causes a stumble in an otherwise clean sentence, especially in the\u003cbr\u003e  guest’s rapid factual delivery.\u003cbr\u003e- KEEP guest qualification language PREFER: When the guest uses uncertainty markers (e.g.,\u003cbr\u003e  “assessed,” “not confirmed,” “as far as I understand”) to separate verified facts from\u003cbr\u003e  assessment.\u003cbr\u003e- KEEP host scene setting block PREFER: When the host is establishing time, stakes, and\u003cbr\u003e  what the episode will cover, even if it runs long or stacks multiple facts before the\u003cbr\u003e  first question.\u003cbr\u003e- MUTE guest backchannel PREFER: When the guest interjects brief agreement\u002fcorrections\u003cbr\u003e  under the host’s active sentence or question and the host’s line should remain\u003cbr\u003e  continuous.\u003cbr\u003e- REORDER content blocks MUST: Only when necessary to place an external insert\u003cbr\u003e  (sponsor\u002fproduced element) and restore continuity with an explicit re-entry line;\u003cbr\u003e  otherwise keep chronological order.","\u003cb\u003eDeep State Radio\u003c\u002fb\u003e\u003cbr\u003eDSR Weekly Wrap-up: Hillary Clinton’s Bizarre Epstein Testimony\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near-full-session retention, micro-shaves, not macro cuts, loose\u003cbr\u003e  conversational pacing tolerated\u003cbr\u003eCUT_CRITERIA: cuts target micro-stumbles only, keeps most filler for naturalness,\u003cbr\u003e  opinionated riffing largely preserved\u003cbr\u003eAUTHENTICITY_POLICY: light-clean, clearly human cadence, stumbles and repetitions often\u003cbr\u003e  left, not chasing transcript-perfect polish\u003cbr\u003eSTRUCTURE_TEMPLATE: produced pre-roll before host, straight intro into rundown, wrap with\u003cbr\u003e  forward-looking plug\u003cbr\u003eREORDER_ASSEMBLY: chronology preserved end-to-end, no thematic reshuffling, assembly\u003cbr\u003e  relies on trims, not moves\u003cbr\u003eSPEAKER_TREATMENT: backchannels handled via mutes, guest continuity strongly protected,\u003cbr\u003e  overlap tolerated when affirming\u003cbr\u003eRULES:\u003cbr\u003e- CUT isolated filler particle PREFER: When a single filler particle appears mid-thought\u003cbr\u003e  and the surrounding sentence already flows without it (especially before a clean\u003cbr\u003e  continuation).\u003cbr\u003e- CUT single word starters PREFER: When a clause begins with an isolated starter that\u003cbr\u003e  doesn’t add meaning (e.g., a lone connective\u002fpronoun) and removing it doesn’t change the\u003cbr\u003e  sentence structure.\u003cbr\u003e- KEEP chronological order MUST: For the main conversation and story rundown, unless an\u003cbr\u003e  out-of-order reference would otherwise be confusing to a first-time listener.\u003cbr\u003e- KEEP guest continuous delivery MUST: When the guest is mid-explanation; avoid edits that\u003cbr\u003e  would break cadence even if small filler remains.\u003cbr\u003e- KEEP long form argument arc MUST: When a speaker is building a multi-sentence analysis\u003cbr\u003e  or prediction, even if it includes repetition or stacked qualifiers.\u003cbr\u003e- KEEP affirming crosstalk PREFER: When brief overlap functions as agreement\u002fenergy and\u003cbr\u003e  does not mask key nouns\u002fclaims.\u003cbr\u003e- KEEP self-aware disclaimers PREFER: When speakers flag uncertainty\u002flimits of expertise\u003cbr\u003e  as part of responsible framing before covering a story anyway.\u003cbr\u003e- MUTE host backchannel MUST: When the host interjects a short acknowledgment during a\u003cbr\u003e  guest’s continued sentence and the interjection is not required for meaning or timing.\u003cbr\u003e- MUTE under breath aside PREFER: When a speaker drops a quick under-the-breath remark\u003cbr\u003e  that distracts from the other speaker’s main point in that moment.\u003cbr\u003e- REORDER short clarity fix AVOID: Only when a brief move resolves a clear continuity\u003cbr\u003e  mistake (e.g., a follow-up answer appears before the question) and the shift can be kept\u003cbr\u003e  minimal.","\u003cb\u003eThe Lawfare Podcast\u003c\u002fb\u003e\u003cbr\u003eLawfare Live: U.S. and Israel Strike Iran\u003cbr\u003e\u003cbr\u003eEditorial style profile:\u003cbr\u003eCOMPRESSION: near full-session retention, micro-shaves over big cuts, dead-air trimmed,\u003cbr\u003e  not rushed, adds tiny pads after edits\u003cbr\u003eCUT_CRITERIA: substance-first, minimal removals, keeps long analytical monologues intact,\u003cbr\u003e  tolerant of live rough edges, cuts only to prevent confusion\u003cbr\u003eAUTHENTICITY_POLICY: live feel over heavy polish, ums\u002fhesitations largely retained, edits\u003cbr\u003e  kept invisible, overlap not fully sterilized\u003cbr\u003eSTRUCTURE_TEMPLATE: produced pre-roll announcement only, straight into live opening,\u003cbr\u003e  single continuous main discussion, brief host sign-off outro\u003cbr\u003eREORDER_ASSEMBLY: chronology treated as sacrosanct, no thematic reshuffling, assembly is\u003cbr\u003e  “trim, don’t rebuild”\u003cbr\u003eSPEAKER_TREATMENT: protect guest turns; trim host more, de-overlap via selective muting,\u003cbr\u003e  pick one dominant speaker, backchannels kept only when clean\u003cbr\u003eRULES:\u003cbr\u003e- CUT brief restart apology PREFER: When a speaker momentarily stops to apologize\u002fexcuse\u003cbr\u003e  themselves and immediately restarts the same thought cleanly.\u003cbr\u003e- CUT dangling tag endings PREFER: When a sentence ends with a trailing word\u002fphrase that\u003cbr\u003e  adds no information and the thought is already complete.\u003cbr\u003e- KEEP chronological order MUST: By default, even when later comments might make earlier\u003cbr\u003e  ones sound less precise.\u003cbr\u003e- KEEP long expert explanations MUST: When a speaker is building a multi-step analytical\u003cbr\u003e  answer, even if it includes hedging, asides, or minor repetition.\u003cbr\u003e- KEEP light banter inside topic PREFER: When the humor\u002fbanter is brief and embedded\u003cbr\u003e  within the ongoing point rather than launching a new tangent.\u003cbr\u003e- KEEP short crosstalk agreement PREFER: When the overlap is brief and does not obscure\u003cbr\u003e  intelligibility, serving as energy\u002faffirmation.\u003cbr\u003e- M
